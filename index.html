      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        contents:[{role:'user',parts:[{text:prompt}]}],
        generationConfig:{temperature:0.05, maxOutputTokens:400, responseMimeType: "application/json"}
      })
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    const raw = data?.candidates?.[0]?.content?.parts?.[0]?.text||'';

    let parsed = null;
    try{ parsed = JSON.parse(raw); }
    catch(e1){
      const jsonMatch = raw.match(/\{[^]*\}/);
      if(jsonMatch) try{ parsed = JSON.parse(jsonMatch[0]); }catch(e2){}
    }
    if(!parsed) throw new Error('JSON inválido: '+raw.substring(0,80));

    parsed.tipo = tipoDetectado;

    // ★ Gemini tiene la última palabra absoluta, reemplazamos el parser local que falla a menudo.
    Object.keys(parsed).forEach(k => {
      const geminiVal = parsed[k];
      if(geminiVal !== null && geminiVal !== undefined && geminiVal !== ''){
        _agendaMicData[k] = geminiVal;
      } else if (['cliente','hora','precio','servicio','ubicacion'].includes(k)) {
        // En caso de que Gemini devuelva null, limpiamos los falsos positivos del local (ej. señor jueves)
        // Solo la fecha permitimos que el local la sobreviva por si a Gemini se le escapó.
        if (k !== 'fecha') _agendaMicData[k] = null;
      }
    });

    if(_agendaMicData.cliente){
      _agendaMicData.cliente = _agendaMicData.cliente
        .replace(/^señora\s+/i,'Sra. ')
        .replace(/^señor\s+/i,'Sr. ')
        .replace(/^doña\s+/i,'Sra. ')
        .replace(/^don\s+/i,'Sr. ')
        .replace(/^(el|la)\s+/i,'')
        .trim();
    }

    const panelPresente = document.getElementById('ag-mic-campos');
    if(panelPresente){
      _mostrarResumenAgendaEnMic(_agendaMicData, text, tipoDetectado);
    } else {
      _rellenarFormularioAgenda(parsed);
    }

    const st = document.getElementById('ag-mic-status');
    if(st){
      const faltantes = ['cliente','fecha','servicio'].filter(k=>!_agendaMicData[k] && (tipoDetectado==='trabajo' && k==='servicio' || k!=='servicio'));
      st.style.animation='none';
      if(faltantes.length===0){
        st.style.background='#EBF1F5'; st.style.color='#2A4455';
        st.innerHTML='<span>✓</span> Datos verificados por IA';
      } else {
        st.style.background='#FEF9EC'; st.style.color='#92400E';
        st.innerHTML='⚠ Faltan: '+faltantes.join(', ')+' — completá después';
      }
      setTimeout(()=>{ if(st) st.style.animation=''; }, 4000);
    }
  } catch(e){
    console.error('Gemini agenda error:', e.message);
    const st = document.getElementById('ag-mic-status');
    if(st){
      st.style.animation='none';
      st.style.background='#F5F5F5';
      st.style.color='#64748B';
      const localCliente = _agendaMicData.cliente;
      st.textContent = localCliente
        ? '✓ Parser local (Gemini falló): cliente = '+localCliente
        : '⚠ Sin Gemini — completá manualmente';
    }
  }
}

function _rellenarFormularioAgenda(p){
  if(!p) return;
  const setVal = (id,v) => { if(!v&&v!==0) return; const el=document.getElementById(id); if(el) el.value=v; };
  setVal('ag-cliente',   p.cliente);
  setVal('ag-fecha',     p.fecha);
  setVal('ag-ubicacion', p.ubicacion);
  setVal('ag-notas',     p.notas);
  if(p.precio) setVal('ag-precio', p.precio);
  if(p.hora){
    const [hh,mm] = p.hora.split(':');
    const h24 = parseInt(hh);
    const period = h24>=12?'PM':'AM';
    const h12 = h24%12||12;
    const txtEl = document.getElementById('ag-hora-txt');
    if(txtEl) txtEl.value = h12+':'+(mm||'00');
    setAgAmpm(period);
  }
  if(p.servicio){
    const sel = document.getElementById('ag-servicio');
    if(sel){
      const pNorm = p.servicio.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
      const found = Array.from(sel.options).find(o=>{
        const oNorm = o.value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
        return oNorm===pNorm || oNorm.startsWith(pNorm) || pNorm.startsWith(oNorm);
      });
      if(found) sel.value = found.value;
    }
  }
}

// ── Eliminar repeticiones de texto por reinicios del mic ──
function _deduplicarTranscript(text){
  if(!text) return '';
  let words = text.trim().split(/\s+/);
  if(words.length < 2) return text;

  // En Android Chrome (continuous=true), a veces el texto se repite.
  // Colapsar repeticiones contiguas exactas de n-gramos (hasta 20 palabras de largo).
  const maxN = Math.min(20, Math.floor(words.length / 2));
  for (let n = 1; n <= maxN; n++) {
    let i = 0;
    while (i <= words.length - 2*n) {
      // Comparar sin importar mayúsculas
      let chunk1 = words.slice(i, i+n).join(' ').toLowerCase();
      let chunk2 = words.slice(i+n, i+2*n).join(' ').toLowerCase();
      if (chunk1 === chunk2) {
        words.splice(i, n); // Eliminar la primera instancia de la repetición
        // No incrementamos "i" para que un triple repetido (A A A) también se colapse
      } else {
        i++;
      }
    }
  }

  // Límite duro de palabras para evitar que la cadena enorme rompa el JSON en Gemini
  if(words.length > 150) {
    words = words.slice(0, 150);
  }

  const result = words.join(' ');
  if (!result) return '';
  return result.charAt(0).toUpperCase() + result.slice(1);
}

function processVoiceResult(text) {
  if (processVoiceResult._busy) return;
  processVoiceResult._busy = true;
  clearTimeout(processVoiceResult._busyTimer);
  processVoiceResult._busyTimer = setTimeout(()=>{ processVoiceResult._busy = false; }, 8000);
  stopListening();

  // ★ Deduplicar texto repetido por reinicios del mic
  // Ej: "agenda construccion ... agenda construccion ..." → tomar solo la primera ocurrencia completa
  text = _deduplicarTranscript(text);

  // ── Nota / Lista antes que Gemini ──
  if(isNotaCommand(text)){
    processVoiceResult._busy = false;
    clearTimeout(processVoiceResult._busyTimer);
    // ★ Cerrar mic principal completamente antes de abrir lista
    micListening = false;
    micRestartLock = false;
    if(recognition){ try{ recognition.stop(); }catch(e){} recognition = null; }
    document.getElementById('micModal').style.display='none';
    const tLow = text.toLowerCase();
    const tipo = tLow.includes('nota') && !tLow.includes('lista') ? 'nota' : 'lista';
    // Extraer título si lo dice: "crea una lista de compras" → "Lista de compras"
    let titulo = tipo==='lista' ? 'Lista' : 'Nota';
    // ★ Extraer título del comando: "crea una lista de materiales" → "Materiales"
    const matchTitulo =
      text.match(/(?:lista|nota)\s+de\s+([\w\s]{2,40}?)(?:\s*$|,|\s+para\b)/i) ||
      text.match(/(?:lista|nota)\s+para\s+([\w\s]{2,40}?)(?:\s*$|,)/i) ||
      text.match(/(?:lista|nota)\s+([\w\s]{2,30}?)(?:\s*$)/i);
    if(matchTitulo){
      let tt = matchTitulo[1].trim()
        .replace(/^(de |del |una |un |para |el |la )/i,'').trim();
      titulo = tt.charAt(0).toUpperCase() + tt.slice(1);
    } else if(tipo==='lista') titulo = 'Lista de compras';
    abrirModoLista(tipo, titulo);
    return;
  }

  // ── Si Gemini está configurado, usar IA ──
  const geminiKey = localStorage.getItem('fnz_gemini_key');
  if(geminiKey){
    processVoiceWithGemini(text);
    return;
  }

  // Fallback: parser manual
  processVoiceResultManual(text);
}

function processVoiceResultManual(text) {
  try {
  // Limpiar palabras de activación antes de evaluar
  const cleanText = text.replace(/^(oye|hey|ok|escucha|mira)\b/gi,'').trim();
  if(cleanText) text = cleanText;
  // Si es comando de agenda → mismo flujo: mic queda abierto con resumen
  if(isAgendaCommand(text)){
    processVoiceResult._busy = false;
    try { parseAgendaVoz(text); } catch(e) {}
    const p = window._avParsed;
    const tLow3 = text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const esVis = /\b(visita|vista|crea una visita|cotizar|cotizacion|presupuesto|pasar a ver|ir a ver|revisar|chequear)\b/.test(tLow3);
    const tipoF = p ? p.tipo : (esVis ? 'visita' : 'trabajo');
    const localData = p ? {...p, tipo: tipoF} : {tipo: tipoF};
    _mostrarResumenAgendaEnMic(localData, text, tipoF);
    return;
  }
  const parsed = parseVoiceCommand(text);
  micParsed = parsed;

  const preview = document.getElementById('micPreview');
  const saveBtn = document.getElementById('micSaveBtn');

  document.getElementById('pvType').textContent = parsed.type==='ingreso' ? '↑ Ingreso' : '↓ Egreso';
  document.getElementById('pvType').style.color = parsed.type==='ingreso' ? 'var(--gold)' : '#E05252';
  document.getElementById('pvCat').textContent = parsed.cat ? `${parsed.cat.icon} ${parsed.cat.name}` : '❓ Sin categoría';
  document.getElementById('pvDesc').textContent = parsed.desc || '';
  document.getElementById('pvAmt').textContent = parsed.amount ? `S/ ${parsed.amount.toFixed(2)}` : '⚠ Monto no detectado';
  document.getElementById('pvAmt').style.color = parsed.type==='ingreso' ? 'var(--gold)' : '#E05252';
  document.getElementById('pvDateLbl').textContent = '📅 ' + fmtDateLabel(parsed.date);

  // Cliente detectado
  const clienteBadge = document.getElementById('pvClienteBadge');
  if (parsed.cliente) {
    const clienteLimpio = parsed.cliente
      .replace(/^(el|la|los|las|un|una)\s+/i, '')
      .replace(/^señora\s+/i,'Sra. ')
      .replace(/^señor\s+/i,'Sr. ')
      .replace(/^doña\s+/i,'Sra. ')
      .replace(/^don\s+/i,'Sr. ')
      .trim();
    if(clienteLimpio){
      clienteBadge.textContent = `👤 Cliente: ${clienteLimpio}`;
      clienteBadge.style.display = 'block';
    } else { clienteBadge.style.display = 'none'; }
  } else { clienteBadge.style.display = 'none'; }

  // Servicio del negocio
  const negBadge = document.getElementById('pvNegocioBadge');
  if (parsed.servicioNeg) {
    negBadge.textContent = `🔵 Servicio: ${parsed.servicioNeg.label}`;
    negBadge.style.display = 'block';
  } else { negBadge.style.display = 'none'; }

  // Servicio de casa vinculado
  const svcBadge = document.getElementById('pvServiceBadge');
  if (parsed.serviceMatch) {
    svcBadge.textContent = `🏠 Marcará "${parsed.serviceMatch.name}" como pagado`;
    svcBadge.style.display = 'block';
  } else { svcBadge.style.display = 'none'; }

  // Pregunta de ambigüedad negocio/personal
  const ambRow = document.getElementById('pvAmbiguityRow');
  if (parsed.needsNegocioConfirm) {
    ambRow.style.display = 'flex';
    saveBtn.style.display = 'none'; // espera confirmación
  } else {
    ambRow.style.display = 'none';
  }

  // Fill editable fields
  document.getElementById('pvAmtEdit').value = parsed.amount || '';
  document.getElementById('pvTypeEdit').value = parsed.type;
  updateCatSelect(parsed.type, parsed.cat?.id);
  document.getElementById('pvDescEdit').value = parsed.desc || '';
  document.getElementById('pvDateEdit').value = parsed.date;

  preview.style.display = 'block';
  if (!parsed.needsNegocioConfirm) {
    saveBtn.style.display = (parsed.amount && parsed.amount>0) ? 'block' : 'none';
    if (!parsed.amount || parsed.amount<=0)
      document.getElementById('micText').textContent += ' ⚠ No detecté el monto, escríbelo abajo.';
  }

  // ── Micrófono inteligente: pedir datos faltantes en modo negocio ──
  if (state.modo === 'negocio' && parsed.type === 'ingreso') {
    const faltantes = [];
    if (!parsed.cliente) faltantes.push({campo:'cliente', pregunta:'¿el nombre del cliente?'});
    if (!parsed.ubicacion) faltantes.push({campo:'ubicacion', pregunta:'¿el distrito o ubicación?'});
    if (faltantes.length > 0) {
      setTimeout(() => askMissingData(faltantes, 0), 800);
    }
  }
  processVoiceResult._busy = false; // ★ siempre resetear al terminar
  } catch(err) {
    console.error('processVoiceResult error:', err);
    processVoiceResult._busy = false;
  }
}

function askMissingData(faltantes, idx){
  if(idx >= faltantes.length) return;
  const {campo, pregunta} = faltantes[idx];
  const nombreApp = (typeof state !== "undefined" && state.nombreUsuario) ? state.nombreUsuario : "Oye";
  const msg = `${nombreApp}, falta ${pregunta}`;
  speakAndListen(msg, campo, ()=>askMissingData(faltantes, idx+1));
}

function speakAndListen(mensaje, campoId, onDone){
  const micText = document.getElementById('micText');
  const hint = document.getElementById('micHint');
  if(micText) micText.textContent = '🤖 ' + mensaje;
  if(hint) hint.innerHTML = `<em>Di el ${campoId === 'cliente' ? 'nombre del cliente' : 'distrito'}</em>`;

  // Usar síntesis de voz si está disponible
  if('speechSynthesis' in window){
    const utt = new SpeechSynthesisUtterance(mensaje);
    utt.lang = 'es-PE';
    utt.rate = 1.0;
    utt.onend = () => startListeningForField(campoId, onDone);
    window.speechSynthesis.speak(utt);
  } else {
    setTimeout(() => startListeningForField(campoId, onDone), 500);
  }
}

let _fieldListening = false;
function startListeningForField(campoId, onDone){
  if(_fieldListening) return;
  _fieldListening = true;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ _fieldListening=false; return; }
  const rec = new SR();
  rec.lang = 'es-PE';
  rec.interimResults = false;
  rec.maxAlternatives = 1;

  document.getElementById('micFab')?.classList.add('listening');
  document.querySelectorAll('.wave-bar').forEach(b=>b.classList.add('active'));

  rec.onresult = (e) => {
    const texto = e.results[0][0].transcript.trim();
    _fieldListening = false;
    rec.stop();
    document.getElementById('micFab')?.classList.remove('listening');
    document.querySelectorAll('.wave-bar').forEach(b=>b.classList.remove('active'));

    if(campoId === 'ubicacion'){
      // Normalizar con distritos
      const norm = texto.toLowerCase();
      const match = DISTRITOS_LIMA.find(d=>d.toLowerCase()===norm) ||
                    DISTRITOS_LIMA.find(d=>norm.includes(d.toLowerCase())) ||
                    texto;
      if(micParsed) micParsed.ubicacion = match;
      // Mostrar en el campo descripción (no pisar el badge de cliente)
      const descEl = document.getElementById('pvDescEdit');
      if(descEl && micParsed && !micParsed.ubicacionEnDesc) {
        micParsed.ubicacionEnDesc = true;
        descEl.value = (descEl.value ? descEl.value + ' · ' : '') + match;
      }
      document.getElementById('micText').textContent = '✓ Ubicación: ' + match;
    } else if(campoId === 'cliente'){
      if(micParsed) micParsed.cliente = texto;
      document.getElementById('pvCat').textContent = (document.getElementById('pvCat').textContent||'') + ' · 👤 ' + texto;
      const clienteBadge = document.getElementById('pvClienteBadge');
      if(clienteBadge){
        clienteBadge.textContent = '👤 Cliente: ' + texto;
        clienteBadge.style.display = 'block';
      }
      document.getElementById('micText').textContent = '✓ Cliente: ' + texto;
      const pvAmtEl = document.getElementById('pvAmtEdit');
      if(pvAmtEl) pvAmtEl.focus();
    }
    setTimeout(onDone, 400);
  };
  rec.onerror = () => { _fieldListening=false; onDone(); };
  rec.onend = () => { _fieldListening=false; };
  try { rec.start(); } catch(e){ _fieldListening=false; }
}


// Confirmar si es negocio o personal (botones de ambigüedad)
function confirmarNegocio(esNegocio) {
  if (!micParsed) return;
  const ambRow = document.getElementById('pvAmbiguityRow');
  ambRow.style.display = 'none';

  if (esNegocio) {
    // Reasignar categoría correcta según qué era
    const t = nrm(micParsed.raw);
    let newCatId;
    if (/\bgnv\b/.test(t))                          newCatId = 'cneg_gnv';
    else if (/\bmateriales?\b|\binsumos?\b/.test(t)) newCatId = 'cneg_mat';
    else                                              newCatId = 'cneg_gas';
    const newCat = state.catsEx.find(c=>c.id===newCatId) || micParsed.cat;
    micParsed.cat = newCat;
    micParsed.negocio = true;
    document.getElementById('pvCat').textContent = `${newCat.icon} ${newCat.name}`;
    updateCatSelect('egreso', newCat.id);
    document.getElementById('pvNegocioBadge').textContent = '🏗️ Registrado como gasto del negocio';
    document.getElementById('pvNegocioBadge').style.display = 'block';
  } else {
    micParsed.negocio = false;
    // Si era combustible sin negocio → Transporte personal
    const newCat = state.catsEx.find(c=>c.id==='ce2') || micParsed.cat;
    micParsed.cat = newCat;
    document.getElementById('pvCat').textContent = `${newCat.icon} ${newCat.name}`;
    updateCatSelect('egreso', newCat.id);
    document.getElementById('pvNegocioBadge').textContent = '🏠 Registrado como gasto personal';
    document.getElementById('pvNegocioBadge').style.display = 'block';
  }
  document.getElementById('micSaveBtn').style.display = 'block';
}

function updateCatSelect(type, selectedId) {
  const sel = document.getElementById('pvCatEdit');
  if(!sel) return; // ★ modal puede no estar en DOM todavía — no explotar
  const list = (type==='ingreso' ? state.catsIn : state.catsEx) || [];
  sel.innerHTML = list.map(c=>`<option value="${c.id}" ${c.id===selectedId?'selected':''}>${c.icon} ${c.name}</option>`).join('');
  const typeEdit = document.getElementById('pvTypeEdit');
  if(typeEdit) typeEdit.onchange = function(){
    updateCatSelect(this.value);
    const pvType = document.getElementById('pvType');
    if(pvType){
      pvType.textContent = this.value==='ingreso'?'↑ Ingreso':'↓ Egreso';
      pvType.style.color = this.value==='ingreso'?'var(--gold)':'#E05252';
    }
  };
}

function saveMicTx() {
  // ★ Si hay contexto de formulario fantasma, usar ese flujo
  if(_micContext && _micContext !== 'tx'){
    _saveMicByContext();
    return;
  }
  // Flujo original para transacciones
  const amount = parseFloat(document.getElementById('pvAmtEdit').value);
  const type   = document.getElementById('pvTypeEdit').value;
  const catId  = document.getElementById('pvCatEdit').value;
  const desc   = document.getElementById('pvDescEdit').value.trim();
  if(!amount || amount<=0){ toast('Escribe un monto válido','error'); return; }
  const allCats=[...state.catsIn,...state.catsEx,
    ...DEFAULT_CATS_NEG_IN,...DEFAULT_CATS_NEG_EX,
    ...DEFAULT_CATS_IN,...DEFAULT_CATS_EX];
  const cat = allCats.find(c=>c.id===catId);
  const catName = cat?.name || (type==='ingreso'?'Otro ingreso':'Otro gasto');
  const tx = {
    id: Date.now()+'', type, amount,
    category: catName,
    description: desc || catName,
    date: document.getElementById('pvDateEdit').value||todayStr(),
    catId,
    cliente:      micParsed?.cliente      ||null,
    servicioTipo: micParsed?.servicioNeg?.label||null,
    negocio:      !!(micParsed?.negocio),
  };
  state.transactions.push(tx);
  let servicioMarcado=null;
  if(micParsed&&micParsed.serviceMatch){
    const svc=state.servicios.find(s=>s.id===micParsed.serviceMatch.id);
    if(svc&&!svc.pagado){svc.pagado=true;servicioMarcado=svc.name;}
  }
  saveAll(); syncToSheets(tx); render();
  document.getElementById('micModal').style.display='none';
  let msg=`✓ ${type==='ingreso'?'Ingreso':'Gasto'} de S/ ${amount.toFixed(2)} registrado`;
  if(servicioMarcado) msg+=` · ✅ ${servicioMarcado} pagado`;
  toast(msg);
}

function _saveMicByContext(){
  const ctx = _micContext;
  const d   = _ghostData;
  document.getElementById('micModal').style.display='none';

  if(ctx==='agenda_visita'||ctx==='agenda_construccion'){
    // Construir objeto pre-datos para openAddAgenda
    // Extraer fecha real del texto si está en _ghostData como label
    let fechaISO = todayStr();
    if(micParsed && micParsed.date) fechaISO = micParsed.date;
    else if(window._avParsed && window._avParsed.fecha) fechaISO = window._avParsed.fecha;

    // Extraer hora limpia
    let horaLimpia = '';
    if(d.hora) horaLimpia = d.hora.replace(/\s*(AM|PM)/i,'').trim();
    if(window._avParsed && window._avParsed.hora) horaLimpia = window._avParsed.hora;

    const preData = {
      cliente:   d.cliente  || (window._avParsed&&window._avParsed.cliente)  || '',
      ubicacion: d.ubicacion|| (window._avParsed&&window._avParsed.ubicacion)|| '',
      telefono:  d.telefono || '',
      hora:      horaLimpia,
      fecha:     fechaISO,
      servicio:  d.servicio || (window._avParsed&&window._avParsed.servicio) || '',
      precio:    d.precio   ? parseFloat(d.precio.replace('S/ ','')) : (window._avParsed&&window._avParsed.precio)||'',
      notas:     d.notas    || '',
    };
    const tipo = ctx==='agenda_visita' ? 'visita' : 'trabajo';
    // Mostrar campos faltantes en un toast informativo
    const def = MIC_CONTEXTS[ctx];
    const faltan = def.fields.filter(f=>f.req&&!d[f.id]&&!preData[f.id]).map(f=>f.label);
    if(faltan.length) toast('⚠ Falta: '+faltan.join(', ')+' — completa en el formulario','info');
    setTimeout(()=>openAddAgenda(tipo, null, preData), 200);
    return;
  }

  if(ctx==='deuda'){
    // Abrir modal de deuda prellenado con datos detectados
    const nombre = d.nombre || '';
    const total  = d.total  ? parseFloat(d.total.replace('S/ ','')) : '';
    const cuota  = d.cuota  ? parseFloat(d.cuota.replace('S/ ','')) : '';
    const nc     = d.ncuotas? parseInt(d.ncuotas) : '';
    // Abrir el modal de deuda con pre-datos
    openAddDebt({name:nombre, totalAmount:total, cuotaMonto:cuota, cuotasTotales:nc, cuotasPagadas:0, categoria:DEBT_CATS[0], color:DEBT_COLORS[0]});
    toast('Completa los datos faltantes','info');
    return;
  }

  if(ctx==='nota'){
    const tipo   = d.tipo==='✓ Lista'?'lista': d.tipo==='⏰ Recordatorio'?'recordatorio':'texto';
    const titulo = d.titulo || 'Nota de voz';
    // Abrir con datos pre-cargados del ghost form
    if(tipo==='lista') abrirModoLista('lista', titulo);
    else if(tipo==='texto') openNotaTexto({titulo: titulo});
    else openNotaVoz();
    toast('Nota lista — agrega el contenido','info');
    return;
  }

  // Fallback — tx normal
  saveMicTx();
}

function _checkGhostSaveReady(){

function ejecutarTransferencia() {
  const amount = parseFloat(document.getElementById('tf-amount').value);
  const desc   = document.getElementById('tf-desc').value.trim();
  const date   = document.getElementById('tf-date').value || todayStr();
  const tipo   = document.getElementById('tf-tipo').value;
  const modo   = state.modo;

  if (!amount || amount <= 0) { toast('Escribe un monto válido','error'); return; }

  const fechaLabel = date;
  const modoOrigen = modo;
  const modoDestino = modo === 'negocio' ? 'personal' : 'negocio';

  // ── Transacción en cuenta ORIGEN (egreso) ──
  const descOrigen = tipo === 'retiro'
    ? (desc || 'Retiro personal')
    : (desc || 'Transferencia enviada a ' + (modoDestino==='personal'?'Personal':'Negocio'));

  const txOrigen = {
    id:          Date.now()+'_o',
    type:        'egreso',
    amount,
    category:    tipo === 'retiro' ? 'Retiro personal' : 'Transferencia enviada',
    description: descOrigen,
    date:        fechaLabel,
    catId:       modoOrigen==='negocio'
                   ? (tipo==='retiro' ? 'transfer_neg_retiro_out' : 'transfer_neg_out')
                   : 'transfer_out',
    esTransferencia: true,
  };

  // ── Transacción en cuenta DESTINO (ingreso) ──
  const descDestino = tipo === 'retiro'
    ? (desc || 'Retiro del negocio')
    : (desc || 'Transferencia recibida de ' + (modoOrigen==='negocio'?'Negocio':'Personal'));

  const txDestino = {
    id:          Date.now()+'_d',
    type:        'ingreso',
    amount,
    category:    tipo === 'retiro' ? 'Retiro del negocio' : 'Transferencia recibida',
    description: descDestino,
    date:        fechaLabel,
    catId:       modoDestino==='negocio'
                   ? 'transfer_neg_in'
                   : (tipo==='retiro' ? 'transfer_retiro_in' : 'transfer_in'),
    esTransferencia: true,
  };

  // Guardar en cuenta origen
  state.transactions.push(txOrigen);
  saveAll();

  // Cambiar al modo destino, cargar, guardar allá también
  const kDest = getKeys(modoDestino);
  const txsDest = load(kDest.tx, []);
  txsDest.push(txDestino);
  save(kDest.tx, txsDest);

  render();
  closeTransferModal();

  const tipoLabel = tipo === 'retiro' ? 'Retiro personal' : 'Transferencia';
  toast(`✓ ${tipoLabel} de ${fmt(amount)} registrada en ambas cuentas`);
}

let _searchQuery = '';
let _activeFilters = [];
let _selectedTags = [];
let _allTags = ['#obra', '#cliente', '#urgente', '#factura', '#pendiente', '#completado', '#presupuesto', '#reunion', '#importante'];

function renderSearchBar(){
  return `
    <div class="search-bar">
      <div class="search-input-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" 
               class="search-input" 
               placeholder="Buscar en notas..." 
               value="${_searchQuery}" 
               oninput="onSearchInput(this.value)"
               onkeydown="if(event.key==='Escape'){this.value='';onSearchInput('');}">
      </div>
      <div class="search-filters">
        <div class="filter-chip ${_activeFilters.includes('hoy')?'active':''}" onclick="toggleSearchFilter('hoy')">📅 Hoy</div>
        <div class="filter-chip ${_activeFilters.includes('semana')?'active':''}" onclick="toggleSearchFilter('semana')">📆 Semana</div>
        <div class="filter-chip ${_activeFilters.includes('fotos')?'active':''}" onclick="toggleSearchFilter('fotos')">📷 Con fotos</div>
        <div class="filter-chip ${_activeFilters.includes('recordatorio')?'active':''}" onclick="toggleSearchFilter('recordatorio')">⏰ Recordatorio</div>
        <div class="filter-chip ${_activeFilters.includes('vinculadas')?'active':''}" onclick="toggleSearchFilter('vinculadas')">🔗 Vinculadas</div>
        <div class="filter-chip ${_activeFilters.includes('favoritas')?'active':''}" onclick="toggleSearchFilter('favoritas')">⭐ Favoritas</div>
      </div>
    </div>`;
}

function onSearchInput(query){
  _searchQuery = query.toLowerCase().trim();
  render();
}

function toggleSearchFilter(filter){
  if(_activeFilters.includes(filter)){
    _activeFilters = _activeFilters.filter(f => f !== filter);
  } else {
    _activeFilters.push(filter);
  }
  render();
}

function filterNotas(notas){
  let filtered = [...notas];
  
  // Búsqueda por texto
  if(_searchQuery){
    filtered = filtered.filter(n => {
      const searchIn = [
        n.titulo || '',
        n.texto || '',
        (n.items || []).map(i => i.texto).join(' '),
        (n.tags || []).join(' ')
      ].join(' ').toLowerCase();
      return searchIn.includes(_searchQuery);
    });
  }
  
  // Filtros
  _activeFilters.forEach(f => {
    switch(f){
      case 'hoy':
        const hoy = new Date().toISOString().split('T')[0];
        filtered = filtered.filter(n => n.creado && n.creado.startsWith(hoy));
        break;
      case 'semana':
        const hace7dias = new Date(Date.now() - 7*24*60*60*1000).toISOString();
        filtered = filtered.filter(n => n.creado && n.creado >= hace7dias);
        break;
      case 'fotos':
        filtered = filtered.filter(n => n.fotos && n.fotos.length > 0);
        break;
      case 'recordatorio':
        filtered = filtered.filter(n => n.recordatorio);
        break;
      case 'vinculadas':
        filtered = filtered.filter(n => n.vinculadoA && n.vinculadoA.length > 0);
        break;
      case 'favoritas':
        filtered = filtered.filter(n => n.favorita);
        break;
    }
  });
  
  return filtered;
}

function renderTagsInput(notaId){
  const nota = state.notas.find(n => n.id === notaId);
  if(!nota) return '';
  
  const tags = nota.tags || [];
  
  return `
    <div class="tag-input-wrap">
      <input type="text" 
             class="tag-input" 
             placeholder="Agregar tag (#obra, #cliente, #urgente...)"
             id="tag-input-${notaId}"
             oninput="onTagInput(this.value, '${notaId}')"
             onkeydown="if(event.key==='Enter'&&this.value)addTag(this.value,'${notaId}')">
      <div id="tag-suggestions-${notaId}" style="display:none"></div>
    </div>
    <div class="nota-tags" id="tags-${notaId}">
      ${tags.map(t => `<span class="tag ${t.replace('#','')}" onclick="removeTag('${t}','${notaId}')">${t} <span class="tag-remove">✕</span></span>`).join('')}
    </div>`;
}

function onTagInput(value, notaId){
  if(!value.startsWith('#')) value = '#' + value;
  const suggestions = _allTags.filter(t => t.toLowerCase().includes(value.toLowerCase()));
  
  const sugDiv = document.getElementById(`tag-suggestions-${notaId}`);
  if(suggestions.length > 0 && value.length > 1){
    sugDiv.innerHTML = suggestions.map(t => 
      `<div class="tag-suggestion" onclick="addTag('${t}','${notaId}')">${t}</div>`
    ).join('');
    sugDiv.style.display = 'block';
  } else {
    sugDiv.style.display = 'none';
  }
}

function addTag(tag, notaId){
  if(!tag.startsWith('#')) tag = '#' + tag;
  tag = tag.toLowerCase().trim();
  
  const nota = state.notas.find(n => n.id === notaId);
  if(!nota) return;
  
  if(!nota.tags) nota.tags = [];
  if(nota.tags.includes(tag)) return;
  
  nota.tags.push(tag);
  if(!_allTags.includes(tag)) _allTags.push(tag);
  
  saveAll();
  
  // Limpiar input
  const input = document.getElementById(`tag-input-${notaId}`);
  if(input) input.value = '';
  
  // Ocultar sugerencias
  const sugDiv = document.getElementById(`tag-suggestions-${notaId}`);
  if(sugDiv) sugDiv.style.display = 'none';
  
  // Re-renderizar tags
  const tagsDiv = document.getElementById(`tags-${notaId}`);
  if(tagsDiv){
    tagsDiv.innerHTML = nota.tags.map(t => 
      `<span class="tag ${t.replace('#','')}" onclick="removeTag('${t}','${notaId}')">${t} <span class="tag-remove">✕</span></span>`
    ).join('');
  }
  
  toast(`Tag ${tag} agregado`);
}

function removeTag(tag, notaId){
  const nota = state.notas.find(n => n.id === notaId);
  if(!nota) return;
  
  nota.tags = (nota.tags || []).filter(t => t !== tag);
  saveAll();
  
  // Re-renderizar tags
  const tagsDiv = document.getElementById(`tags-${notaId}`);
  if(tagsDiv){
    tagsDiv.innerHTML = nota.tags.map(t => 
      `<span class="tag ${t.replace('#','')}" onclick="removeTag('${t}','${notaId}')">${t} <span class="tag-remove">✕</span></span>`
    ).join('');
  }
}

function compartirPDF(notaId){
  const nota = state.notas.find(n => n.id === notaId);
  if(!nota) return;

  const titulo = (nota.titulo || 'Nota sin título').replace(/</g,'&lt;');
  const cuerpo = nota.texto
    ? nota.texto.replace(/<br\s*\/?>/gi,'\n').replace(/<[^>]+>/g,'')
    : (nota.items ? nota.items.map(i=>(i.done?'✓':'○')+' '+i.texto).join('\n') : '');
  const tags = (nota.tags||[]).join(', ');
  const fecha = nota.creado ? new Date(nota.creado).toLocaleString('es-PE') : '';

  const htmlContent = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>' + titulo + '</title>'
    + '<style>body{font-family:sans-serif;padding:30px;max-width:700px;margin:0 auto}'
    + 'h1{font-size:22px;border-bottom:2px solid #333;padding-bottom:8px}'
    + 'pre{white-space:pre-wrap;font-size:14px;line-height:1.7}'
    + '.footer{margin-top:24px;font-size:11px;color:#999;border-top:1px solid #eee;padding-top:8px}'
    + '@media print{button{display:none}}</style></head>'
    + '<body><button onclick="window.print()" style="margin-bottom:16px;padding:8px 16px;cursor:pointer">🖨 Imprimir / Guardar PDF</button>'
    + '<h1>' + titulo + '</h1><pre>' + cuerpo.replace(/</g,'&lt;') + '</pre>'
    + '<div class="footer">Creado: ' + fecha + (tags ? ' · Tags: ' + tags : '') + '</div></body></html>';

  const win = window.open('','_blank');
  if(!win){ toast('Permitir ventanas emergentes para imprimir','error'); return; }
  win.document.write(htmlContent);
  win.document.close();
  cerrarModalCompartir();
}


function compartirWhatsApp(notaId){
  const nota = state.notas.find(n => n.id === notaId);
  if(!nota) return;
  
  let texto = `*${nota.titulo || 'Nota'}*\n\n`;
  
  if(nota.tipo === 'lista' && nota.items){
    texto += nota.items.map(i => `${i.done?'✓':'○'} ${i.texto}`).join('\n');
  } else if(nota.texto){
    texto += nota.texto.replace(/<[^>]+>/g,'').trim();
  }
  
  if(nota.tags && nota.tags.length){
    texto += `\n\n${nota.tags.join(' ')}`;
  }
  
  const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(texto)}`;
  window.open(url, '_blank');
  
  toast('Abriendo WhatsApp...');
  cerrarModalCompartir();
}

function copiarTexto(notaId){
  const nota = state.notas.find(n => n.id === notaId);
  if(!nota) return;
  
  let texto = `${nota.titulo || 'Nota'}\n\n`;
  
  if(nota.tipo === 'lista' && nota.items){
    texto += nota.items.map(i => `${i.done?'✓':'○'} ${i.texto}`).join('\n');
  } else if(nota.texto){
    texto += nota.texto.replace(/<[^>]+>/g,'').trim();
  }
  
  navigator.clipboard.writeText(texto).then(() => {

function agregarRecordatorio(notaId){
  const nota = state.notas.find(n => n.id === notaId);
  if(!nota) return;
  
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-title" style="color:#FF9800">⏰ Recordatorio</div>
    <div class="field">
      <label class="field-label">Fecha y hora</label>
      <input type="datetime-local" 
             class="reminder-input" 
             id="reminder-datetime"
             value="${nota.recordatorio || ''}">
    </div>
    <div style="font-size:12px;color:var(--muted);margin-top:8px">
      Recibirás una notificación en este momento
    </div>
    <div class="btn-row" style="margin-top:16px">
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
      ${nota.recordatorio ? `<button class="btn" onclick="quitarRecordatorio('${notaId}')" style="background:#E05252;color:#FFF">Quitar</button>` : ''}
      <button class="btn-gold" onclick="guardarRecordatorio('${notaId}')">Guardar</button>
    </div>`;
  showModal();
}

function guardarRecordatorio(notaId){
  const datetime = document.getElementById('reminder-datetime').value;
  if(!datetime) return toast('Selecciona fecha y hora','error');
  
  const nota = state.notas.find(n => n.id === notaId);
  if(!nota) return;
  
  nota.recordatorio = datetime;
  saveAll();
  
  // Programar notificación
  programarNotificacion(nota);
  
  closeModal();
  render();
  toast('Recordatorio configurado ✓');
}

function quitarRecordatorio(notaId){
  const nota = state.notas.find(n => n.id === notaId);
  if(!nota) return;
  
  delete nota.recordatorio;
  saveAll();
  
  closeModal();
  render();
  toast('Recordatorio eliminado');
}

function programarNotificacion(nota){
  if(!('Notification' in window)) return;
  
  if(Notification.permission === 'granted'){
    const tiempoRecordatorio = new Date(nota.recordatorio).getTime();
    const ahora = Date.now();
    const delay = tiempoRecordatorio - ahora;
    
    if(delay > 0){
      setTimeout(() => {
        new Notification('📝 Recordatorio', {
          body: nota.titulo || 'Nota sin título',
          icon: '/favicon.ico'
        });
      }, delay);
    }
  } else if(Notification.permission !== 'denied'){
    Notification.requestPermission();
  }
}

function abrirGaleriaFotos(notaId){
  const nota = state.notas.find(n => n.id === notaId);
  if(!nota) return;
  
  if(!nota.fotos) nota.fotos = [];
  
  const fotosHtml = nota.fotos.map((foto, idx) => `
    <div class="gallery-item">
      <img src="${foto}" alt="Foto ${idx+1}">
      <div class="gallery-delete" onclick="eliminarFoto('${notaId}', ${idx})">✕</div>
    </div>
  `).join('');
  
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-title" style="color:var(--text)">📸 Galería de fotos</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:16px">${nota.fotos.length} foto${nota.fotos.length!==1?'s':''}</div>
    
    <div class="photo-gallery">
      ${fotosHtml}
      <div class="gallery-item gallery-add" onclick="agregarFotoGaleria('${notaId}')">
        <div>+</div>
      </div>
    </div>
    
    <div class="btn-row" style="margin-top:16px">
      <button class="btn-gold" onclick="closeModal()">Listo</button>
    </div>`;
  showModal();
}

function agregarFotoGaleria(notaId){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.multiple = true;
  
  input.onchange = e => {
    const files = Array.from(e.target.files);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = evt => {
        const nota = state.notas.find(n => n.id === notaId);
        if(!nota) return;
        
        if(!nota.fotos) nota.fotos = [];
        nota.fotos.push(evt.target.result);
        saveAll();
        
        // Re-abrir modal actualizado
        abrirGaleriaFotos(notaId);
      };
      reader.readAsDataURL(file);
    });
  };
  
  input.click();
}

function eliminarFoto(notaId, index){
  if(!confirm('¿Eliminar esta foto?')) return;
  
  const nota = state.notas.find(n => n.id === notaId);
  if(!nota || !nota.fotos) return;
  
  nota.fotos.splice(index, 1);
  saveAll();
  
  abrirGaleriaFotos(notaId);
  toast('Foto eliminada');
}

function verFotoZoom(src){
  const zoom = document.createElement('div');
  zoom.className = 'photo-zoom';
  zoom.innerHTML = `
    <img src="${src}" alt="Foto">
    <button class="photo-zoom-close" onclick="this.parentElement.remove()">✕</button>
  `;
  zoom.onclick = e => {
    if(e.target === zoom) zoom.remove();
  };
  document.body.appendChild(zoom);
}

function mostrarMovimientosVinculados(notaId){
  const nota = state.notas.find(n => n.id === notaId);
  if(!nota) return '';
  
  if(!nota.vinculadoA || nota.vinculadoA.length === 0) return '';
  
  const movimientos = nota.vinculadoA.map(movId => {
    const mov = state.transactions.find(t => t.id === movId);
    if(!mov) return null;
    
    return `
      <div class="linked-item">
        <div class="linked-desc">
          ${mov.description || mov.category}
          <div style="font-size:11px;color:var(--muted);margin-top:2px">
            ${new Date(mov.date).toLocaleDateString('es-PE')}
          </div>
        </div>
        <div class="linked-amount ${mov.type==='egreso'?'egreso':''}">
          ${mov.type==='ingreso'?'+':'-'} S/ ${parseFloat(mov.amount).toFixed(2)}
        </div>
        <div class="linked-remove" onclick="desvincularMovimiento('${notaId}','${movId}')">✕</div>
      </div>
    `;
  }).filter(Boolean).join('');
  
  if(!movimientos) return '';
  
  return `
    <div class="linked-items">
      <div class="linked-header">
        🔗 Movimientos vinculados
      </div>
      ${movimientos}
    </div>`;
}

function vincularMovimiento(notaId){
  const nota = state.notas.find(n => n.id === notaId);
  if(!nota) return;
  
  const movimientosHtml = state.transactions
    .filter(t => !(nota.vinculadoA || []).includes(t.id))
    .sort((a,b) => b.date.localeCompare(a.date))
    .slice(0, 20)
    .map(t => `
      <div class="share-btn" onclick="agregarVinculo('${notaId}','${t.id}')">
        <div class="share-icon ${t.type==='ingreso'?'whatsapp':'pdf'}">
          ${t.type==='ingreso'?'↑':'↓'}
        </div>
        <div class="share-label">
          <div style="font-weight:600">${t.description || t.category}</div>
          <div class="share-desc">
            ${new Date(t.date).toLocaleDateString('es-PE')} · 
            S/ ${parseFloat(t.amount).toFixed(2)}
          </div>
        </div>
      </div>
    `).join('');
  
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-title" style="color:var(--blue)">🔗 Vincular movimiento</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:16px">Selecciona movimientos relacionados con esta nota</div>
    
    <div style="max-height:400px;overflow-y:auto">
      ${movimientosHtml || '<div style="text-align:center;padding:40px;color:var(--muted)">No hay movimientos disponibles</div>'}
    </div>
    
    <div class="btn-row" style="margin-top:16px">
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
    </div>`;
  showModal();
}

function agregarVinculo(notaId, movId){
  const nota = state.notas.find(n => n.id === notaId);
  if(!nota) return;
  
  if(!nota.vinculadoA) nota.vinculadoA = [];
  if(!nota.vinculadoA.includes(movId)){
    nota.vinculadoA.push(movId);
    saveAll();
    toast('Movimiento vinculado ✓');
    closeModal();
    render();
  }
}

function desvincularMovimiento(notaId, movId){
  const nota = state.notas.find(n => n.id === notaId);
  if(!nota) return;
  
  nota.vinculadoA = (nota.vinculadoA || []).filter(id => id !== movId);
  saveAll();
  render();
  toast('Desvinculado');
}

document.addEventListener('keydown', e => {
  // Solo en editor de notas
  if(!document.activeElement || !document.activeElement.closest('#pned-content')) return;
  
  // Ctrl+B → Negrita
  if(e.ctrlKey && e.key === 'b'){
    e.preventDefault();
    pnedCmd('bold');
    mostrarKeyboardHint('Negrita');
  }
  
  // Ctrl+I → Itálica
  if(e.ctrlKey && e.key === 'i'){
    e.preventDefault();
    pnedCmd('italic');
    mostrarKeyboardHint('Itálica');
  }
  
  // Ctrl+U → Subrayado
  if(e.ctrlKey && e.key === 'u'){
    e.preventDefault();
    pnedCmd('underline');
    mostrarKeyboardHint('Subrayado');
  }
  
  // Ctrl+Z → Deshacer (ya implementado)
  if(e.ctrlKey && e.key === 'z'){
    mostrarKeyboardHint('Deshacer');
  }
  
  // Ctrl+Y → Rehacer (ya implementado)
  if(e.ctrlKey && e.key === 'y'){
    mostrarKeyboardHint('Rehacer');
  }
});

function mostrarKeyboardHint(texto){
  const existing = document.querySelector('.keyboard-hint');
  if(existing) existing.remove();
  
  const hint = document.createElement('div');
  hint.className = 'keyboard-hint show';
  hint.textContent = texto;
  document.body.appendChild(hint);
  
  setTimeout(() => {
    hint.classList.remove('show');
    setTimeout(() => hint.remove(), 200);
  }, 1500);
}

  function pNearestWall(x,y){

    [{x:ax1,y:ay1},{x:ax2,y:ay2}].forEach(p=>{c.beginPath();c.arc(p.x,p.y,3.5,0,Math.PI*2);c.fill();});
    // tick marks
    [{x:ax1,y:ay1},{x:ax2,y:ay2}].forEach(p=>{const a=Math.atan2(ay2-ay1,ax2-ax1)+Math.PI/4;c.beginPath();c.moveTo(p.x-Math.cos(a)*6,p.y-Math.sin(a)*6);c.lineTo(p.x+Math.cos(a)*6,p.y+Math.sin(a)*6);c.stroke();});
    const mx=(ax1+ax2)/2,my=(ay1+ay2)/2;const lbl=label||(Math.round(len)+'px');
    c.font='bold 11px DM Sans,sans-serif';const tw=c.measureText(lbl).width;
    c.fillStyle='#fff';c.fillRect(mx-tw/2-5,my-10,tw+10,14);
    c.fillStyle=col;c.fillText(lbl,mx-tw/2,my+2);c.restore();
  }

  function dObj(c,o,alpha){
    if(o.type==='wall')return dWall(c,o,alpha);
    if(o.type==='door')return dDoor(c,o);
    if(o.type==='window')return dWindow(c,o);
    if(o.type==='opening')return dOpening(c,o);
    if(o.type==='stairs')return dStairs(c,o);
    if(o.type==='cstairs')return dCStairs(c,o);
    if(o.type==='lstairs')return dLStairs(c,o);
    if(o.type==='dim')return dDimLine(c,o);
    c.save();c.globalAlpha=alpha||1;
    if(o.type==='text'){c.font=`${o.fs||14}px DM Sans,sans-serif`;c.fillStyle=o.color||'#1a1a2e';c.fillText(o.label||'',o.x,o.y);}
    if(o.type==='image'&&o._img)c.drawImage(o._img,o.x,o.y,o.w,o.h);
    c.restore();
  }

  function dHandles(o){
    ctx.save();ctx.fillStyle='#185FA5';ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
    for(const h of pGetHandles(o)){ctx.beginPath();ctx.arc(h.x,h.y,5,0,Math.PI*2);ctx.fill();ctx.stroke();}
    if(o.type==='image'){ctx.strokeStyle='#185FA580';ctx.lineWidth=1;ctx.setLineDash([4,3]);ctx.strokeRect(o.x-2,o.y-2,o.w+4,o.h+4);ctx.setLineDash([]);}
    ctx.restore();
  }

  function pRedraw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    // All saved objects
    _PS.objs.forEach(o=>dObj(ctx,o));
    // Current wall chain — draw walls segment by segment
    if(_PS.chain.length>1){
      for(let i=0;i<_PS.chain.length-1;i++) dWall(ctx,{type:'wall',x1:_PS.chain[i].x,y1:_PS.chain[i].y,x2:_PS.chain[i+1].x,y2:_PS.chain[i+1].y,thick:_PS.wallThick});
    }
    // Chain point indicators
    _PS.chain.forEach((p,i)=>{
      ctx.save();ctx.fillStyle=i===0?'#546878':'#185FA5';ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();ctx.restore();
    });
    // Wall preview from last chain point to cursor
    if(_PS.tool==='wall'&&_PS.chain.length>0&&_PS.snapPt){
      const last=_PS.chain[_PS.chain.length-1];
      const sp=_PS.closeSnap?_PS.chain[0]:_PS.snapPt;
      dWall(ctx,{type:'wall',x1:last.x,y1:last.y,x2:sp.x,y2:sp.y,thick:_PS.wallThick,color:_PS.closeSnap?'#546878':'#185FA5',sw:1.5,fill:_PS.closeSnap?'rgba(42,122,68,.15)':'rgba(24,95,165,.12)'},0.7);
    }
    // Close-snap ring
    if(_PS.closeSnap&&_PS.chain.length>0){
      ctx.save();ctx.strokeStyle='#546878';ctx.lineWidth=2;ctx.fillStyle='rgba(42,122,68,.18)';
      ctx.beginPath();ctx.arc(_PS.chain[0].x,_PS.chain[0].y,CLOSE_R,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.restore();
    }
    // Dim preview
    if(_PS.tool==='dim'&&_PS.dimPhase===1&&_PS.dimP1&&_PS.snapPt) dDimLine(ctx,{x1:_PS.dimP1.x,y1:_PS.dimP1.y,x2:_PS.snapPt.x,y2:_PS.snapPt.y});
    // Snap indicators
    if(_PS.snapPt&&(_PS.tool==='wall'||_PS.tool==='dim')){
      const sp=_PS.snapPt;
      ctx.save();
      if(sp.type==='point'){ctx.strokeStyle='#185FA5';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(sp.x,sp.y,9,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(24,95,165,.2)';ctx.fill();}
      else if(sp.type==='angle'){
        const from=_PS.chain.length>0?_PS.chain[_PS.chain.length-1]:_PS.dimP1;
        if(from){ctx.strokeStyle='#EF9F27';ctx.lineWidth=0.8;ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(from.x,from.y);ctx.lineTo(sp.x,sp.y);ctx.stroke();ctx.setLineDash([]);}
        ctx.fillStyle='#EF9F27';ctx.beginPath();ctx.arc(sp.x,sp.y,4,0,Math.PI*2);ctx.fill();
      }
      ctx.restore();
    }
    // Angle tooltip
    if(_PS.snapPt&&_PS.chain.length>0&&!_PS.closeSnap){
      const last=_PS.chain[_PS.chain.length-1];const sp=_PS.snapPt;
      const ang=Math.round(((Math.atan2(sp.y-last.y,sp.x-last.x)*180/Math.PI)%360+360)%360);
      const len=Math.hypot(sp.x-last.x,sp.y-last.y);
      const scale=+document.getElementById('pscale-m')?.value||20;
      const cm=Math.round(len/20*scale);
      ctx.save();ctx.fillStyle='rgba(0,0,0,.72)';ctx.beginPath();ctx.roundRect(sp.x+12,sp.y-22,82,16,4);ctx.fill();
      ctx.font='bold 10px DM Sans,sans-serif';ctx.fillStyle='#fff';ctx.textBaseline='middle';
      ctx.fillText(`${ang}° · ${cm}cm`,sp.x+16,sp.y-14);ctx.restore();
    }
    // Door/window placement preview
    if((_PS.tool==='door'||_PS.tool==='window'||_PS.tool==='opening')&&_PS.wallSnap){
      const ws=_PS.wallSnap;
      const o={type:_PS.tool,x:ws.x,y:ws.y,angle:ws.angle,width:80,thick:_PS.wallThick,swing:1,leafAngle:75};
      dObj(ctx,o);
      ctx.save();ctx.strokeStyle='#185FA5';ctx.lineWidth=1;ctx.setLineDash([3,2]);
      ctx.beginPath();ctx.arc(ws.x,ws.y,6,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);ctx.restore();
    }
    // Stairs drag preview
    if(_PS.tool==='stairs'&&_PS.drawing&&_PS.stairsPreview&&_PS.stairsPreview.w>10){
      ctx.save();ctx.globalAlpha=0.6;dStairs(ctx,{..._PS.stairsPreview,steps:Math.max(4,Math.round(_PS.stairsPreview.h/14))});ctx.restore();
    }
    // Selection
    if(_PS.sel)dHandles(_PS.sel);
  }

  // ── Loupe ──────────────────────────────────────────────────────
  function pShowLoupe(x,y){
    loupe.style.display='block';
    const sz=LR*2;loupe.width=loupe.height=sz;loupe.style.width=loupe.style.height=sz+'px';
    let lx=x+22,ly=y-sz-12;
    if(lx+sz>cv.width-10)lx=x-sz-22;if(ly<10)ly=y+22;
    loupe.style.left=lx+'px';loupe.style.top=ly+'px';
    lctx.clearRect(0,0,sz,sz);lctx.save();
    lctx.beginPath();lctx.arc(LR,LR,LR,0,Math.PI*2);lctx.clip();
    lctx.fillStyle='#ddd';lctx.fillRect(0,0,sz,sz);
    lctx.translate(LR,LR);lctx.scale(LZ,LZ);lctx.translate(-x,-y);
    lctx.strokeStyle='rgba(0,0,0,.08)';lctx.lineWidth=0.3;
    for(let g=Math.floor((x-LR/LZ)/20)*20;g<x+LR/LZ;g+=20){lctx.beginPath();lctx.moveTo(g,-999);lctx.lineTo(g,999);lctx.stroke();}
    for(let g=Math.floor((y-LR/LZ)/20)*20;g<y+LR/LZ;g+=20){lctx.beginPath();lctx.moveTo(-999,g);lctx.lineTo(999,g);lctx.stroke();}
    _PS.objs.forEach(o=>dObj(lctx,o));
    if(_PS.chain.length>1){for(let i=0;i<_PS.chain.length-1;i++) dWall(lctx,{type:'wall',x1:_PS.chain[i].x,y1:_PS.chain[i].y,x2:_PS.chain[i+1].x,y2:_PS.chain[i+1].y,thick:_PS.wallThick});}
    lctx.restore();
    lctx.strokeStyle='rgba(224,82,82,.9)';lctx.lineWidth=1;
    lctx.beginPath();lctx.moveTo(LR-14,LR);lctx.lineTo(LR+14,LR);lctx.stroke();
    lctx.beginPath();lctx.moveTo(LR,LR-14);lctx.lineTo(LR,LR+14);lctx.stroke();
  }
  function pHideLoupe(){loupe.style.display='none';}

  function pStatus(snap,hint){
    const ss=document.getElementById('fp-snapst');if(ss)ss.textContent=snap||'';
    const ht=document.getElementById('fp-hint');if(ht)ht.textContent=hint||'';
  }

  // ── Undo/Redo ────────────────────────────────────────────────────
  function pSaveUndo(){_PS.undo.push(JSON.stringify(_PS.objs));if(_PS.undo.length>60)_PS.undo.shift();_PS.redo=[];}
  window.pUndo=function(){if(!_PS.undo.length)return;_PS.redo.push(JSON.stringify(_PS.objs));_PS.objs=JSON.parse(_PS.undo.pop());_PS.sel=null;pRedraw();};
  window.pRedo=function(){if(!_PS.redo.length)return;_PS.undo.push(JSON.stringify(_PS.objs));_PS.objs=JSON.parse(_PS.redo.pop());_PS.sel=null;pRedraw();};

  // ── EVENTS ───────────────────────────────────────────────────────
  cv.addEventListener('mousedown',pDown);
  cv.addEventListener('mousemove',pMove);
  cv.addEventListener('mouseup',pUp);
  cv.addEventListener('dblclick',pDbl);
  cv.addEventListener('touchstart',e=>{e.preventDefault();pDown(e);},{passive:false});
  cv.addEventListener('touchmove',e=>{e.preventDefault();pMove(e);},{passive:false});
  cv.addEventListener('touchend',e=>{e.preventDefault();pDbl(e);},{passive:false});
  cv.addEventListener('contextmenu',e=>{e.preventDefault();const p=pPt(e);pCtxMenu(e.clientX,e.clientY,p.x,p.y);});

  function pDown(e){
    if(e.button===2)return;
    const{x,y}=pPt(e);hidePCtxMenu();

    if(_PS.tool==='select'){
      if(_PS.sel){const h=pHitHdl(_PS.sel,x,y);if(h){_PS.dragHandle=h;_PS.dragging=true;_PS.dragOx=x;_PS.dragOy=y;return;}}
      let hit=null;for(let i=_PS.objs.length-1;i>=0;i--){if(pHit(_PS.objs[i],x,y)){hit=_PS.objs[i];break;}}
      if(hit){_PS.sel=hit;_PS.drag=hit;_PS.dragging=true;_PS.dragHandle=null;_PS.dragOx=x-((hit.x||hit.x1||0));_PS.dragOy=y-((hit.y||hit.y1||0));}
      else _PS.sel=null;
      pRedraw();return;
    }

    if(_PS.tool==='wall'){
      const sp=_PS.snapPt||{x,y};
      if(_PS.closeSnap&&_PS.chain.length>=3){
        pSaveUndo();
        for(let i=0;i<_PS.chain.length-1;i++) _PS.objs.push({type:'wall',x1:_PS.chain[i].x,y1:_PS.chain[i].y,x2:_PS.chain[i+1].x,y2:_PS.chain[i+1].y,thick:_PS.wallThick,color:'#2C2C2A',sw:1.5});
        _PS.objs.push({type:'wall',x1:_PS.chain[_PS.chain.length-1].x,y1:_PS.chain[_PS.chain.length-1].y,x2:_PS.chain[0].x,y2:_PS.chain[0].y,thick:_PS.wallThick,color:'#2C2C2A',sw:1.5});
        _PS.chain=[];pHideLoupe();pRedraw();pStatus('','✓ Habitación cerrada · Clic para nueva');return;
      }
      _PS.chain.push({x:sp.x,y:sp.y});
      pStatus('','Clic → continuar · Doble clic → terminar · Acercate al inicio → cerrar');
      pRedraw();return;
    }

    if(_PS.tool==='dim'){
      if(_PS.dimPhase===0){_PS.dimP1={x,y};_PS.dimPhase=1;pStatus('','Clic en segundo punto');}
      else{
        const sp=_PS.snapPt||{x,y};const dp=_PS.dimP1;_PS.dimPhase=0;pHideLoupe();
        const len=Math.hypot(sp.x-dp.x,sp.y-dp.y);
        const scale=+(document.getElementById('pscale-m')?.value)||20;
        const def=Math.round(len/20*scale)+'cm';
        pShowDimInp(x,y,def,lbl=>{pSaveUndo();_PS.objs.push({type:'dim',x1:dp.x,y1:dp.y,x2:sp.x,y2:sp.y,label:lbl,color:'#185FA5',sw:1});pRedraw();});
        pStatus('','');
      }return;
    }

    if(_PS.tool==='door'||_PS.tool==='window'||_PS.tool==='opening'){
      const ws=_PS.wallSnap;
      if(ws){pSaveUndo();_PS.objs.push({type:_PS.tool,x:ws.x,y:ws.y,angle:ws.angle,width:80,thick:_PS.wallThick,leafAngle:75,swing:1});pRedraw();}
      else toast('Acercate a un muro para colocar','error');
      return;
    }

    if(_PS.tool==='stairs'){_PS.drawing=true;_PS.startX=x;_PS.startY=y;return;}
    if(_PS.tool==='cstairs'){pSaveUndo();_PS.objs.push({type:'cstairs',x,y,r:60,steps:12});pRedraw();return;}
    if(_PS.tool==='text'){const lbl=prompt('Texto / etiqueta:','');if(!lbl)return;pSaveUndo();_PS.objs.push({type:'text',x,y,label:lbl,color:'#1a1a2e',fs:14});pRedraw();return;}
  }

  function pMove(e){
    const{x,y}=pPt(e);_PS.mouseX=x;_PS.mouseY=y;
    document.getElementById('fp-coords').textContent=`x:${Math.round(x)} y:${Math.round(y)}`;

    if(_PS.tool==='select'&&_PS.dragging){
      if(_PS.dragHandle&&_PS.sel){pApplyHdl(_PS.sel,_PS.dragHandle,x,y);}
      else if(_PS.drag){
        const o=_PS.drag;
        if(o.type==='wall'||o.type==='dim'){const ox1=o.x1,oy1=o.y1;o.x1=x-_PS.dragOx;o.y1=y-_PS.dragOy;o.x2+=o.x1-ox1;o.y2+=o.y1-oy1;_PS.dragOx=x-o.x1;_PS.dragOy=y-o.y1;}
        else if(o.x!=null){o.x=x-_PS.dragOx;o.y=y-_PS.dragOy;}
      }
      pRedraw();return;
    }

    if(_PS.tool==='stairs'&&_PS.drawing){
      _PS.stairsPreview={x:Math.min(_PS.startX,x),y:Math.min(_PS.startY,y),w:Math.abs(x-_PS.startX),h:Math.abs(y-_PS.startY)};
      pRedraw();return;
    }

    if(_PS.tool==='wall'){
      if(_PS.chain.length>0){
        const last=_PS.chain[_PS.chain.length-1];
        _PS.snapPt=pSnap(last.x,last.y,x,y);
      } else {
        _PS.snapPt={x,y,type:null};
        for(const p of pAllPts()){if(Math.hypot(x-p.x,y-p.y)<SNAP_PT_R){_PS.snapPt={...p,type:'point'};break;}}
      }
      _PS.closeSnap=pCheckClose(_PS.snapPt.x,_PS.snapPt.y);
      let sn='';
      if(_PS.closeSnap)sn='⊙ Cerrar habitación';
      else if(_PS.snapPt.type==='point')sn='⊙ Punto';
      else if(_PS.snapPt.type==='angle')sn=`⊣ ${_PS.snapPt.angle}°`;
      pStatus(sn,'');
      if(_PS.chain.length>0)pShowLoupe(x,y);else pHideLoupe();
      pRedraw();return;
    }

    if(_PS.tool==='dim'){
      if(_PS.dimPhase===1){_PS.snapPt=pSnap(_PS.dimP1.x,_PS.dimP1.y,x,y);pShowLoupe(x,y);}
      else{_PS.snapPt={x,y,type:null};for(const p of pAllPts()){if(Math.hypot(x-p.x,y-p.y)<SNAP_PT_R){_PS.snapPt={...p,type:'point'};break;}}}
      pRedraw();return;
    }

    if(_PS.tool==='door'||_PS.tool==='window'||_PS.tool==='opening'){_PS.wallSnap=pNearestWall(x,y);pRedraw();return;}

    pRedraw();
  }

  function pUp(e){
    if(_PS.tool==='stairs'&&_PS.drawing){
      _PS.drawing=false;const pr=_PS.stairsPreview;
      if(pr&&pr.w>20&&pr.h>20){pSaveUndo();_PS.objs.push({type:'stairs',x:pr.x,y:pr.y,w:pr.w,h:pr.h,steps:Math.max(4,Math.round(pr.h/14)),angle:0});pRedraw();}
      _PS.stairsPreview=null;return;
    }
    if(_PS.tool==='select'){_PS.dragging=false;_PS.drag=null;_PS.dragHandle=null;}
  }

  function pDbl(e){
    const{x,y}=pPt(e);
    if(_PS.tool==='wall'&&_PS.chain.length>1){
      // Remove last duplicate point from dblclick
      if(_PS.chain.length>2){_PS.chain.pop();}
      pSaveUndo();
      for(let i=0;i<_PS.chain.length-1;i++) _PS.objs.push({type:'wall',x1:_PS.chain[i].x,y1:_PS.chain[i].y,x2:_PS.chain[i+1].x,y2:_PS.chain[i+1].y,thick:_PS.wallThick,color:'#2C2C2A',sw:1.5});
      _PS.chain=[];pHideLoupe();pRedraw();pStatus('','✓ Muro terminado · Clic para nuevo');return;
    }
    if(_PS.tool==='select'){
      for(let i=_PS.objs.length-1;i>=0;i--){if(pHit(_PS.objs[i],x,y)){pEditObj(_PS.objs[i]);break;}}
    }
  }

  function pEditObj(o){
    if(o.type==='text'){const l=prompt('Texto:',o.label);if(l!==null){pSaveUndo();o.label=l;pRedraw();}}
    else if(o.type==='dim'){const l=prompt('Medida:',o.label||'');if(l!==null){pSaveUndo();o.label=l;pRedraw();}}
    else if(o.type==='wall'){const t=prompt('Grosor muro (px):',o.thick||_PS.wallThick);if(t){pSaveUndo();o.thick=+t||_PS.wallThick;pRedraw();}}
    else if(o.type==='door'){
      const a=prompt('Ancho (px), swing 1=der/-1=izq, apertura°:',`${o.width||80},${o.swing||1},${o.leafAngle||75}`);
      if(a){pSaveUndo();const[w,s,la]=a.split(',');o.width=+w||80;o.swing=+s||1;o.leafAngle=+la||75;pRedraw();}
    }
    else if(o.type==='stairs'){const s=prompt('Peldaños:',o.steps||8);if(s){pSaveUndo();o.steps=+s||8;pRedraw();}}
    else if(o.type==='cstairs'){const s=prompt('Radio (px), peldaños:',`${o.r||60},${o.steps||12}`);if(s){pSaveUndo();const[r,st]=s.split(',');o.r=+r||60;o.steps=+st||12;pRedraw();}}
  }

  function pShowDimInp(x,y,def,cb){
    dimInp.style.display='block';dimInp.style.left=(x-45)+'px';dimInp.style.top=(y+8)+'px';
    dimInp.value=def;dimInp.focus();dimInp.select();
    function done(){dimInp.style.display='none';cb(dimInp.value||def);}
    dimInp.onkeydown=e=>{if(e.key==='Enter')done();if(e.key==='Escape')dimInp.style.display='none';};
    dimInp.onblur=done;
  }

  // Context menu
  let _ctxTgt=null;
  function pCtxMenu(cx,cy,x,y){
    let hit=null;for(let i=_PS.objs.length-1;i>=0;i--){if(pHit(_PS.objs[i],x,y)){hit=_PS.objs[i];break;}}
    if(!hit)return;_ctxTgt=hit;_PS.sel=hit;pRedraw();
    let m=document.getElementById('plano-ctx-menu');
    if(!m){m=document.createElement('div');m.id='plano-ctx-menu';m.className='plano-ctx-menu';
      m.innerHTML=`<div class="plano-ctx-item" onclick="pCtxEdit()">✏️ Editar propiedades</div><div class="plano-ctx-item" onclick="pCtxDupe()">⧉ Duplicar</div><div class="plano-ctx-item" onclick="pCtxFlip()">↔ Voltear</div><div class="plano-ctx-item" onclick="pCtxRot()">↻ Rotar 90°</div><div class="plano-ctx-item" onclick="pCtxFront()">▲ Al frente</div><div class="plano-ctx-item danger" onclick="pCtxDel()">🗑 Eliminar</div>`;
      document.body.appendChild(m);}
    m.style.display='block';m.style.left=cx+'px';m.style.top=cy+'px';
  }
  function hidePCtxMenu(){const m=document.getElementById('plano-ctx-menu');if(m)m.style.display='none';}
  document.addEventListener('click',hidePCtxMenu);
  window.pCtxEdit=function(){if(_ctxTgt)pEditObj(_ctxTgt);};
  window.pCtxDupe=function(){if(!_ctxTgt)return;pSaveUndo();const c=JSON.parse(JSON.stringify(_ctxTgt));delete c._img;if(c.src){const img=new Image();img.src=c.src;c._img=img;}if(c.x!=null){c.x+=20;c.y+=20;}if(c.x1!=null){c.x1+=20;c.y1+=20;c.x2+=20;c.y2+=20;}_PS.objs.push(c);pRedraw();};
  window.pCtxFlip=function(){if(!_ctxTgt)return;pSaveUndo();const o=_ctxTgt;if(o.swing)o.swing*=-1;if(o.x1!=null){[o.x1,o.x2]=[o.x2,o.x1];[o.y1,o.y2]=[o.y2,o.y1];}pRedraw();};
  window.pCtxRot=function(){if(!_ctxTgt)return;pSaveUndo();const o=_ctxTgt;if(o.angle!=null)o.angle=(o.angle||0)+Math.PI/2;if(o.type==='stairs'){const tmp=o.w;o.w=o.h;o.h=tmp;}pRedraw();};
  window.pCtxFront=function(){if(!_ctxTgt)return;pSaveUndo();_PS.objs=_PS.objs.filter(o=>o!==_ctxTgt);_PS.objs.push(_ctxTgt);pRedraw();};
  window.pCtxDel=function(){if(!_ctxTgt)return;pSaveUndo();_PS.objs=_PS.objs.filter(o=>o!==_ctxTgt);_PS.sel=null;pRedraw();};

  // Toolbar
  window.pSetTool=function(t){
    _PS.tool=t;_PS.chain=[];_PS.dimPhase=0;_PS.drawing=false;_PS.snapPt=null;_PS.wallSnap=null;_PS.stairsPreview=null;
    pHideLoupe();
    document.querySelectorAll('.fptool[id^="fpt-"]').forEach(b=>b.classList.remove('active'));
    const el=document.getElementById('fpt-'+t);if(el)el.classList.add('active');
    cv.style.cursor=t==='select'?'default':'crosshair';

  function pKeyDown(e){

function cerrarEditorTabla(){ document.getElementById('tabla-overlay')?.remove(); render(); }

function guardarTabla(){
  const nota=(state.notas||[]).find(n=>n.id===_tablaNotaId);if(!nota)return;
  nota.titulo=document.getElementById('tabla-titulo')?.value||'Tabla sin título';

  nota.modificado=new Date().toISOString();
  saveAll();toast('Tabla guardada ✓');

function tColLetter(c){return String.fromCharCode(65+c);}
function tCellId(r,c){return tColLetter(c)+(r+1);}

function tBuildTable(){
  const{rows,cols}=_tablaState;
  let h='<thead><tr><th class="rh"></th>';
  for(let c=0;c<cols;c++)h+=`<th onclick="tSelect(0,${c})">${tColLetter(c)}</th>`;
  h+='</tr></thead><tbody>';
  for(let r=0;r<rows;r++){
    h+=`<tr><td class="rh-td" onclick="tSelect(${r},0)">${r+1}</td>`;
    for(let c=0;c<cols;c++) h+=`<td id="ttd-${r}-${c}" onclick="tClickCell(${r},${c})" ondblclick="tDblCell(${r},${c})"><input class="tbl-cell-inp" id="tci-${r}-${c}" value="" readonly onkeydown="tCellKey(event,${r},${c})" onblur="tCommit(${r},${c})" oninput="tCellInput(${r},${c})"></td>`;
    h+='</tr>';
  }
  h+='</tbody>';
  document.getElementById('tabla-sheet').innerHTML=h;
}

function tSelect(r,c){ _tablaState.selR=r;_tablaState.selC=c;
  document.querySelectorAll('#tabla-sheet td').forEach(td=>td.classList.remove('sel-td'));
  const td=document.getElementById(`ttd-${r}-${c}`);if(td)td.classList.add('sel-td');
  document.getElementById('tabla-cell-ref').textContent=tCellId(r,c);
  document.getElementById('tabla-formula-inp').value=_tablaState.data[r]?.[c]||'';
}

function tClickCell(r,c){ if(_tablaState.editing)tCommit(_tablaState.selR,_tablaState.selC); tSelect(r,c); }
function tDblCell(r,c){ tStartEdit(r,c); }

function tStartEdit(r,c){
  _tablaState.editing=true;const inp=document.getElementById(`tci-${r}-${c}`);
  if(!inp)return;inp.removeAttribute('readonly');inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);
}

function tCommit(r,c){
  _tablaState.editing=false;const inp=document.getElementById(`tci-${r}-${c}`);
  if(!inp)return;inp.setAttribute('readonly','');_tablaState.data[r][c]=inp.value;
  if(inp.value.startsWith('='))tRenderFormulas();
  document.getElementById('tabla-formula-inp').value=inp.value;
}

function tCellInput(r,c){_tablaState.data[r][c]=document.getElementById(`tci-${r}-${c}`)?.value||'';}

function tCellKey(e,r,c){
  const{rows,cols}=_tablaState;
  if(e.key==='Enter'){e.preventDefault();tCommit(r,c);if(r<rows-1)tSelect(r+1,c);}
  else if(e.key==='Tab'){e.preventDefault();tCommit(r,c);if(c<cols-1)tSelect(r,c+1);}
  else if(e.key==='Escape'){tCommit(r,c);tSelect(r,c);}
  else if(!_tablaState.editing&&!e.ctrlKey&&!e.metaKey&&e.key.length===1)tStartEdit(r,c);
  else if(!_tablaState.editing){
    if(e.key==='ArrowUp'&&r>0){e.preventDefault();tSelect(r-1,c);}
    if(e.key==='ArrowDown'&&r<rows-1){e.preventDefault();tSelect(r+1,c);}
    if(e.key==='ArrowLeft'&&c>0){e.preventDefault();tSelect(r,c-1);}
    if(e.key==='ArrowRight'&&c<cols-1){e.preventDefault();tSelect(r,c+1);}
    if(e.key==='Delete'||e.key==='Backspace'){_tablaState.data[r][c]='';const inp=document.getElementById(`tci-${r}-${c}`);if(inp)inp.value='';tRenderFormulas();}
  }
}

function tFormulaInput(){ const v=document.getElementById('tabla-formula-inp').value;const inp=document.getElementById(`tci-${_tablaState.selR}-${_tablaState.selC}`);if(inp)inp.value=v;_tablaState.data[_tablaState.selR][_tablaState.selC]=v; }
function tFormulaKey(e){ if(e.key==='Enter'){tCommit(_tablaState.selR,_tablaState.selC);if(_tablaState.selR<_tablaState.rows-1)tSelect(_tablaState.selR+1,_tablaState.selC);} }

function tEvalFormula(raw,vis=new Set()){
  if(!raw||!raw.startsWith('='))return raw;
  let expr=raw.slice(1).toUpperCase();
  const repl=(fn,args)=>{
    const parts=args.trim().split(':');
    if(parts.length===2){
      const a=parts[0].trim(),b=parts[1].trim();
      const r1=+a.slice(1)-1,c1=a.charCodeAt(0)-65,r2=+b.slice(1)-1,c2=b.charCodeAt(0)-65;
      const vals=[];
      for(let r=Math.min(r1,r2);r<=Math.max(r1,r2);r++)for(let c=Math.min(c1,c2);c<=Math.max(c1,c2);c++){const v=+tEvalFormula(_tablaState.data[r]?.[c]||'',vis);if(!isNaN(v))vals.push(v);}
      if(fn==='SUMA'||fn==='SUM')return vals.reduce((a,b)=>a+b,0);
      if(fn==='PROMEDIO'||fn==='AVERAGE')return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;
    }
    return 0;
  };
  expr=expr.replace(/(SUMA|SUM|PROMEDIO|AVERAGE)\(([^)]+)\)/g,(_,fn,args)=>repl(fn,args));
  expr=expr.replace(/([A-J])(\d+)/g,(_,col,row)=>{const key=col+row;if(vis.has(key))return 0;vis.add(key);const v=tEvalFormula(_tablaState.data[+row-1]?.[col.charCodeAt(0)-65]||'',vis);return isNaN(+v)?0:+v;});
  try{return +Function('"use strict";return('+expr+')')();}catch{return '#ERR';}
}

function tRenderFormulas(){
  const{data,rows,cols}=_tablaState;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const raw=data[r]?.[c]||'';const inp=document.getElementById(`tci-${r}-${c}`);if(!inp)continue;
    if(raw.startsWith('=')){const v=tEvalFormula(raw);inp.value=isNaN(+v)?v:(+v%1===0?+v:(+v).toFixed(2));}
    else inp.value=raw;
  }
  tApplyFmt();
}

function tApplyFmt(){
  const{fmt,rows,cols}=_tablaState;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const inp=document.getElementById(`tci-${r}-${c}`);const td=document.getElementById(`ttd-${r}-${c}`);if(!inp||!td)continue;
    const f=fmt[r][c];
    inp.classList.toggle('tw-bold',!!f.bold);inp.classList.toggle('tw-italic',!!f.italic);
    inp.style.textAlign=f.align||'left';
    ['bg-yellow','bg-blue','bg-green','bg-red'].forEach(bg=>td.classList.remove(bg));
    if(f.bg)td.classList.add(f.bg);
  }
}

window.tAddRow=function(){_tablaState.data.push(Array(_tablaState.cols).fill(''));_tablaState.fmt.push(Array.from({length:_tablaState.cols},()=>({})));_tablaState.rows++;tBuildTable();tRenderFormulas();tSelect(_tablaState.rows-1,_tablaState.selC);};
window.tAddCol=function(){_tablaState.data.forEach(r=>r.push(''));_tablaState.fmt.forEach(r=>r.push({}));_tablaState.cols++;tBuildTable();tRenderFormulas();tSelect(_tablaState.selR,_tablaState.cols-1);};
window.tDelRow=function(){if(_tablaState.rows<=1)return;_tablaState.data.splice(_tablaState.selR,1);_tablaState.fmt.splice(_tablaState.selR,1);_tablaState.rows--;tBuildTable();tRenderFormulas();tSelect(Math.min(_tablaState.selR,_tablaState.rows-1),_tablaState.selC);};
window.tDelCol=function(){if(_tablaState.cols<=1)return;_tablaState.data.forEach(r=>r.splice(_tablaState.selC,1));_tablaState.fmt.forEach(r=>r.splice(_tablaState.selC,1));_tablaState.cols--;tBuildTable();tRenderFormulas();tSelect(_tablaState.selR,Math.min(_tablaState.selC,_tablaState.cols-1));};
window.tFmt=function(prop){_tablaState.fmt[_tablaState.selR][_tablaState.selC][prop]=!_tablaState.fmt[_tablaState.selR][_tablaState.selC][prop];tApplyFmt();};
window.tAlign=function(a){_tablaState.fmt[_tablaState.selR][_tablaState.selC].align=a;tApplyFmt();};
window.tBg=function(bg){_tablaState.fmt[_tablaState.selR][_tablaState.selC].bg=bg;tApplyFmt();};
window.tClearCell=function(){const{selR,selC}=_tablaState;_tablaState.data[selR][selC]='';_tablaState.fmt[selR][selC]={};const inp=document.getElementById(`tci-${selR}-${selC}`);if(inp)inp.value='';tRenderFormulas();};
window.tSuma=function(){const c=_tablaState.selC,r=_tablaState.selR;_tablaState.data[r][c]=`=SUMA(${tColLetter(c)}1:${tColLetter(c)}${r})`;tRenderFormulas();};
window.tProm=function(){const c=_tablaState.selC,r=_tablaState.selR;_tablaState.data[r][c]=`=PROMEDIO(${tColLetter(c)}1:${tColLetter(c)}${r})`;tRenderFormulas();};
window.tGeminiAnalizar=function(){
  const key=localStorage.getItem('fnz_gemini_key');if(!key){toast('Configurá tu API key de Gemini en Ajustes','error');return;}
  const filas=_tablaState.data.filter(r=>r.some(c=>c!==''));
  if(!filas.length){toast('La tabla está vacía','error');return;}
  const csv=filas.map(r=>r.join('\t')).join('\n');
  toast('✨ Analizando tabla con Gemini...');
  fetch(GEMINI_URL(key),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{role:'user',parts:[{text:`Analizá estos datos de tabla en español de Perú. Identificá patrones, totales relevantes, y dá 2-3 observaciones útiles. Datos:\n${csv}`}]}],generationConfig:{temperature:0.3,maxOutputTokens:400}})})
  .then(r=>r.json()).then(d=>{
    const txt=d?.candidates?.[0]?.content?.parts?.[0]?.text||'No se pudo analizar.';
    const bar=document.getElementById('tabla-gemini-bar');if(bar)bar.querySelector('span').textContent='✨ '+txt;
    toast('✓ Análisis completado');
  }).catch(()=>toast('Error al conectar con Gemini','error'));
};

async function exportarNotaA4WhatsApp(notaId){
  const nota=(state.notas||[]).find(n=>n.id===notaId);
  if(!nota){toast('Nota no encontrada','error');return;}

  // Mostrar loader
  const loader=document.createElement('div');loader.id='a4-loader';
  loader.innerHTML='<div class="a4-spin"></div><p>Generando imagen A4...</p>';
  document.body.appendChild(loader);

  try{
    // A4 a 96dpi: 794 x 1123 px
    const W=794,H=1123;
    const cv=document.createElement('canvas');cv.width=W;cv.height=H;
    const ctx=cv.getContext('2d');

    // Fondo blanco
    ctx.fillStyle='#FFFFFF';ctx.fillRect(0,0,W,H);

    // Borde sutil
    ctx.strokeStyle='#E2E8F0';ctx.lineWidth=1;ctx.strokeRect(20,20,W-40,H-40);

    // Header con color de la nota
    const nc=(NOTA_COLORES&&NOTA_COLORES[nota.colorHoja])||NOTA_COLORES.amarillo;
    ctx.fillStyle=nc.border||'var(--gold)';ctx.fillRect(20,20,W-40,56);

    // Título
    ctx.font='700 22px DM Sans, Arial, sans-serif';ctx.fillStyle='#FFFFFF';
    ctx.fillText((nota.titulo||'Sin título').substring(0,50),40,58);

    // Fecha y tipo
    const fecha=nota.creado?new Date(nota.creado).toLocaleDateString('es-PE',{day:'numeric',month:'long',year:'numeric'}):'';
    const tipoLbl={texto:'Nota de texto',lista:'Lista',audio:'Nota de voz',plano:'Plano / boceto',tabla:'Tabla'}[nota.tipo]||'Nota';
    ctx.font='400 13px DM Sans, Arial, sans-serif';ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.fillText(`${tipoLbl} • ${fecha}`,40,76);

    // Línea separadora
    ctx.strokeStyle=nc.border||'var(--gold)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(20,76);ctx.lineTo(W-20,76);ctx.stroke();

    let yPos=110;const pad=40;const maxW=W-2*pad;

    ctx.textBaseline='top';

    // Función helper: texto con wrap
    function drawWrappedText(text,x,y,maxWidth,lineHeight,font,color){
      ctx.font=font;ctx.fillStyle=color;
      const words=text.split(' ');let line='';let lineY=y;
      for(const word of words){
        const test=line?line+' '+word:word;
        if(ctx.measureText(test).width>maxWidth&&line){
          ctx.fillText(line,x,lineY);line=word;lineY+=lineHeight;
          if(lineY>H-60)return lineY; // overflow guard
        } else line=test;
      }
      if(line){ctx.fillText(line,x,lineY);lineY+=lineHeight;}
      return lineY;
    }

    if(nota.tipo==='lista'&&nota.items&&nota.items.length){
      // Lista de ítems
      const done=nota.items.filter(i=>i.done).length;
      ctx.font='500 14px DM Sans, Arial, sans-serif';ctx.fillStyle='#64748B';
      ctx.fillText(`${done} de ${nota.items.length} completados`,pad,yPos);yPos+=28;
      for(const item of nota.items){
        if(yPos>H-80)break;
        ctx.font='400 15px DM Sans, Arial, sans-serif';
        ctx.fillStyle=item.done?'#94A3B8':'#1E293B';
        const txt=(item.done?'☑ ':'○ ')+(item.texto||'').substring(0,80);
        yPos=drawWrappedText(txt,pad,yPos,maxW,22,'400 15px DM Sans, Arial, sans-serif',item.done?'#94A3B8':'#1E293B')+6;
      }
    } else if(nota.tipo==='tabla'&&nota._tablaData){
      // Tabla
      try{
        const saved=JSON.parse(nota._tablaData);
        const tData=saved.data||[];
        const rows=tData.filter(r=>r.some(c=>c!==''));
        if(rows.length){
          const colW=Math.min(120,Math.floor((W-2*pad)/Math.max(rows[0].length,1)));
          ctx.font='700 12px DM Sans, Arial, sans-serif';
          ctx.fillStyle='#F1F5F9';ctx.fillRect(pad,yPos,W-2*pad,24);
          let colX=pad;
          (rows[0]||[]).forEach((cell,ci)=>{
            ctx.fillStyle='#334155';ctx.fillText((cell||'').toString().substring(0,14),colX+5,yPos+6);
            colX+=colW;
          });
          yPos+=24;
          rows.slice(1).forEach((row,ri)=>{
            if(yPos>H-80)return;
            ctx.fillStyle=ri%2===0?'#FFFFFF':'#F8FAFC';
            ctx.fillRect(pad,yPos,W-2*pad,22);
            ctx.strokeStyle='#E2E8F0';ctx.lineWidth=0.5;ctx.strokeRect(pad,yPos,W-2*pad,22);
            let cx=pad;ctx.font='400 12px DM Sans, Arial, sans-serif';ctx.fillStyle='#1E293B';
            row.forEach(cell=>{ctx.fillText((cell||'').toString().substring(0,14),cx+5,yPos+5);cx+=colW;});
            yPos+=22;
          });
        }
      } catch(e){}
    } else if(nota.tipo==='plano'&&nota._objetos&&nota._objetos.length){
      // Dibujar objetos del plano
      const objetos=nota._objetos;
      const scale=Math.min(maxW/800,600/600,1);
      ctx.save();ctx.translate(pad,yPos);ctx.scale(scale,scale);
      for(const o of objetos){
        ctx.globalAlpha=o.op||1;ctx.strokeStyle=o.color||'#1a1a2e';ctx.lineWidth=o.sw||2;ctx.lineCap='round';ctx.lineJoin='round';
        if(o.type==='pen'&&o.pts&&o.pts.length>1){ctx.beginPath();ctx.moveTo(o.pts[0].x,o.pts[0].y);for(let i=1;i<o.pts.length;i++)ctx.lineTo(o.pts[i].x,o.pts[i].y);ctx.stroke();}
        if(o.type==='line'){ctx.beginPath();ctx.moveTo(o.x1,o.y1);ctx.lineTo(o.x2,o.y2);ctx.stroke();}
        if(o.type==='rect'){ctx.strokeRect(o.x,o.y,o.w,o.h);}
        if(o.type==='text'){ctx.font=`${o.fs||14}px DM Sans, Arial`;ctx.fillStyle=o.color||'#1a1a2e';ctx.fillText(o.label||'',o.x,o.y);}
        // dim
        if(o.type==='dim'){
          const{x1,y1,x2,y2,label,color}=o;const col=color||'#185FA5';
          const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy);if(len<4)continue;
          const nx=dx/len,ny=dy/len,off=24;const ax1=x1-ny*off,ay1=y1+nx*off,ax2=x2-ny*off,ay2=y2+nx*off;
          ctx.save();ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.globalAlpha=0.7;
          ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(ax1,ay1);ctx.stroke();
          ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(ax2,ay2);ctx.stroke();
          ctx.setLineDash([]);ctx.globalAlpha=1;ctx.beginPath();ctx.moveTo(ax1,ay1);ctx.lineTo(ax2,ay2);ctx.stroke();
          const mx=(ax1+ax2)/2,my=(ay1+ay2)/2;const lbl=label||Math.round(len)+'px';
          ctx.font='700 11px DM Sans, Arial';const tw=ctx.measureText(lbl).width;
          ctx.fillStyle='#fff';ctx.fillRect(mx-tw/2-4,my-10,tw+8,14);
          ctx.fillStyle=col;ctx.fillText(lbl,mx-tw/2,my+2);ctx.restore();
        }
        if(o.type==='image'&&o.src){
          const img=new Image();img.src=o.src;
          try{ctx.drawImage(img,o.x,o.y,o.w,o.h);}catch(e){}
        }
      }
      ctx.restore();
      yPos+=Math.min(600*scale+20,H-yPos-80);
    } else {
      // Nota de texto
      const rawTxt=(nota.texto||'').replace(/<br\s*\/?>/gi,'\n').replace(/<[^>]+>/g,'').trim();
      if(rawTxt){
        yPos=drawWrappedText(rawTxt,pad,yPos,maxW,22,'400 15px DM Sans, Arial, sans-serif','#1E293B')+4;
      }
      if(nota.tipo==='audio'&&nota.texto){
        ctx.font='400 13px DM Sans, Arial, sans-serif';ctx.fillStyle='#64748B';
        ctx.fillText('🎙 Transcripción de audio',pad,yPos);yPos+=22;
      }
    }

    // Footer
    ctx.fillStyle='#F8FAFC';ctx.fillRect(20,H-50,W-40,30);
    ctx.font='400 11px DM Sans, Arial, sans-serif';ctx.fillStyle='#94A3B8';
    ctx.fillText('Mis Finanzas • '+new Date().toLocaleString('es-PE'),pad,H-29);
    const appTxt='Nota personal';ctx.fillText(appTxt,W-pad-ctx.measureText(appTxt).width,H-29);

    // Convertir a blob
    document.getElementById('a4-loader')?.remove();

    cv.toBlob(async blob=>{
      const file=new File([blob],'nota-a4.jpg',{type:'image/jpeg'});
      // Intentar Web Share API con archivo (móvil)
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        try{ await navigator.share({files:[file],title:nota.titulo||'Nota',text:'Nota compartida desde Mis Finanzas'}); return; }
        catch(e){ /* usuario canceló */ }
      }
      // Fallback: descargar + abrir WhatsApp
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download='nota-a4.jpg';a.click();
      setTimeout(()=>{
        URL.revokeObjectURL(url);
        const txt=encodeURIComponent(`📝 *${nota.titulo||'Nota'}* — imagen adjunta\n_Mis Finanzas App_`);
        window.open(`https://wa.me/?text=${txt}`,'_blank');
      },800);
    },'image/jpeg',0.92);

  } catch(err){
    document.getElementById('a4-loader')?.remove();
    toast('Error al generar imagen: '+err.message,'error');
  }
}
