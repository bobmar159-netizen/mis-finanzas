async function pnedIA(action){
  const k=localStorage.getItem('fnz_gemini_key');if(!k)return;
  const res=document.getElementById('pned-ia-res');if(!res)return;
  res.innerHTML=`<div class="pn-ia-proc"><div class="pn-ia-dot"></div> Gemini procesando...</div>`;
  const ctx=pnedCollect().map(b=>{
    if(b.type==='check')return`[${b.done?'✓':'○'}] ${(b.content||'').replace(/<[^>]+>/g,'')}${b.price?' (S/'+b.price+')':''}`;
    if(b.type==='table'&&b.rows)return b.rows.map(r=>Object.values(r).join(' | ')).join('\n');
    return(b.content||'').replace(/<[^>]+>/g,'');
  }).join('\n').trim();
  const prompts={
    resumir:`Resumí brevemente en español peruano:\n${ctx}`,
    puntos: `Extraé 3-5 puntos clave como lista:\n${ctx}`,
    tareas: `Extraé SOLO las tareas pendientes como lista:\n${ctx}`,
    mejorar:`Mejorá la redacción haciéndola más clara y profesional:\n${ctx}`,
    precios:`Sumá todos los precios mencionados y mostrá el desglose:\n${ctx}`,
  };
  try{
    const r=await fetch(GEMINI_URL(k),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{role:'user',parts:[{text:prompts[action]}]}],generationConfig:{temperature:0.2,maxOutputTokens:500}})});
    const d=await r.json();
    const txt=(d?.candidates?.[0]?.content?.parts?.[0]?.text||'Sin respuesta').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
    res.innerHTML=txt;
  }catch(e){res.innerHTML='<span style="color:#E05252">⚠ Error con Gemini</span>';}
}

function pnMicToggle(){ if(window._pnMicRecording)pnMicStop();else pnMicStart(); }

function pnMicStart(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){document.getElementById('pn-mic-status').textContent='⚠ Necesitás Chrome';return;}
  window._pnMicRecording=true; window._pnMicTranscript=''; window._pnMicSecs=0;
  const btn=document.getElementById('pn-mic-btn');
  if(btn){btn.style.background='linear-gradient(135deg,#C62828,#E57373)';btn.textContent='⏹ Detener';}
  document.querySelectorAll('#pn-wave .pn-wav-bar').forEach(b=>b.classList.add('on'));
  document.getElementById('pn-mic-status').textContent='🔴 Grabando...';
  window._pnMicTimer=setInterval(()=>{
    window._pnMicSecs++;
    const m=String(Math.floor(window._pnMicSecs/60)).padStart(2,'0');
    const s=String(window._pnMicSecs%60).padStart(2,'0');
    const el=document.getElementById('pn-mic-timer');if(el)el.textContent=m+':'+s;
  },1000);
  const rec=new SR(); rec.lang='es-PE'; rec.continuous=true; rec.interimResults=true;
  window._pnMicRec=rec;
  rec.onresult=e=>{
    let finals='',interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)finals+=e.results[i][0].transcript+' ';else interim+=e.results[i][0].transcript;}
    if(finals)window._pnMicTranscript+=finals;
    const display=(window._pnMicTranscript+interim).trim();
    const el=document.getElementById('pn-mic-txt');if(el&&display){el.innerHTML=`<span>${display}</span>`;el.scrollTop=el.scrollHeight;}
    const sb=document.getElementById('pn-mic-save');if(sb&&window._pnMicTranscript.trim())sb.style.display='block';
  };
  rec.onerror=e=>{if(e.error!=='no-speech'&&e.error!=='aborted')pnMicStop();};
  rec.onend=()=>{if(window._pnMicRecording)try{rec.start();}catch(e){}};
  try{rec.start();}catch(e){}
}

function pnMicStop(){
  window._pnMicRecording=false;
  clearInterval(window._pnMicTimer);
  if(window._pnMicRec){try{window._pnMicRec.stop();}catch(e){}}
  const btn=document.getElementById('pn-mic-btn');
  if(btn){btn.style.background='linear-gradient(135deg,#5D4037,#8D6E63)';btn.textContent='🎙 Grabar de nuevo';}
  document.querySelectorAll('#pn-wave .pn-wav-bar').forEach(b=>b.classList.remove('on'));
  const st=document.getElementById('pn-mic-status');
  if(st)st.textContent=window._pnMicTranscript.trim()?'✓ Listo — guardá o grabá más':'Toca para grabar';
}

async function pnMicSave(notaId){
  const transcript=window._pnMicTranscript.trim();
  if(!transcript){toast('No hay texto grabado','error');return;}
  const st=document.getElementById('pn-mic-status');
  if(st)st.innerHTML=`<div class="pn-ia-proc" style="justify-content:center"><div class="pn-ia-dot"></div> Gemini organizando...</div>`;
  const k=localStorage.getItem('fnz_gemini_key');
  let newBlocks=[];
  if(k){
    const prompt=`Analizá este texto dictado por voz en español peruano para una nota de finanzas.
Devolvé SOLO JSON válido con este formato:
{"bloques":[{"tipo":"paragraph|check|bullet|h1|h2|table","contenido":"texto","precio":null_o_numero,"hecho":false}]}
Reglas:
- Listas de compras/materiales con precios → tipo "check" con precio
- Texto libre → "paragraph"
- Título claro → primer bloque "h2"
- Máximo 15 bloques
Texto: "${transcript}"`;
    try{
      const r=await fetch(GEMINI_URL(k),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{role:'user',parts:[{text:prompt}]}],generationConfig:{temperature:0.1,maxOutputTokens:500}})});
      const d=await r.json();
      const raw=(d?.candidates?.[0]?.content?.parts?.[0]?.text||'').replace(/```json|```/g,'').trim();
      const parsed=JSON.parse(raw);
      if(parsed.bloques?.length) newBlocks=parsed.bloques.map(b=>({id:pnId(),type:b.tipo||'paragraph',content:b.contenido||'',price:b.precio||null,done:b.hecho||false}));
    }catch(e){console.error('Gemini mic nota error:',e);}
  }
  if(!newBlocks.length){
    const lines=transcript.split(/(?<=[.!?])\s+/).filter(l=>l.trim().length>2);
    newBlocks=lines.length?lines.map(l=>({id:pnId(),type:'paragraph',content:l.trim(),price:null,done:false})):[{id:pnId(),type:'paragraph',content:transcript,price:null,done:false}];
  }
  const n=(state.notas||[]).find(x=>x.id===notaId);
  if(n){
    if(!n.blocks) n.blocks=[];
    n.blocks.push(...newBlocks);
    // ★ FIX: sincronizar también n.items para compatibilidad con renderNotaCard
    const checkBlocks = newBlocks.filter(b=>b.type==='check');
    if(checkBlocks.length>0){
      if(!n.items) n.items=[];
      checkBlocks.forEach(b=>n.items.push({texto:b.content||'',precio:b.price||null,done:b.done||false}));
      // Actualizar tipo si era texto y ahora tiene items
      if(n.tipo==='texto' || !n.tipo) n.tipo='lista';
    }
    // Actualizar texto HTML para preview
    n.texto = (n.texto||'') + newBlocks.map(b=>{
      if(b.type==='check') return `<div>${b.done?'✓':'○'} ${b.content}${b.price?' - S/'+b.price:''}</div>`;
      return `<p>${b.content||''}</p>`;
    }).join('');
    n.modificado=new Date().toISOString();
    save('fnz_notas',state.notas);
  }
  pnMicClose();
  toast(`✓ ${newBlocks.length} bloque${newBlocks.length!==1?'s':''} agregados${localStorage.getItem('fnz_gemini_key')?' con IA':''}`);
  render();
}

// CARGA INICIAL DESDE SHEETS
// Si localStorage está vacío O el usuario fuerza recarga,
// restaura todos los datos desde Google Sheets automáticamente
// ══════════════════════════════════════════════════════

function loadFromSheets(forzar) {
  const url = localStorage.getItem('fnz_sheets_url') || '';
  if (!url) { render(); return; }

  // Con forzar=false (arranque): siempre intentar, pero solo mostrar spinner si localStorage vacío
  const hayDatos = (
    (load('fnz_neg_tx', []).length > 0) ||
    (load('fnz_tx', []).length > 0)
  );

  // Si no hay datos locales, mostrar pantalla de carga
  if (!hayDatos || forzar) {
    document.getElementById('content').innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px;padding:20px">
        <div style="font-size:40px">☁️</div>
        <div style="font-family:'Inter', system-ui, sans-serif;font-size:16px;font-weight:700;color:var(--text)">${forzar?'Cargando desde Sheets...':'Restaurando datos...'}</div>
        <div style="font-size:12px;color:var(--muted);text-align:center">Sincronizando con tu Google Sheets</div>
        <div class="pulse" style="width:48px;height:4px;background:var(--gold);border-radius:8px;margin-top:4px"></div>
      </div>`;
  }

  const fullUrl = url + '?data=' + encodeURIComponent(JSON.stringify({ action: 'load' }));
  fetch(fullUrl, { method: 'GET' })
    .then(r => r.json())
    .then(data => {
      if (!data || !data.ok) { render(); return; }

      let added = 0;

      // Agenda
      if (data.agenda && data.agenda.length) {
        const m = _mergeById(load('fnz_agenda',[]), data.agenda);
        save('fnz_agenda', m); state.agenda = m;
        added += data.agenda.length;
      }

      // Movimientos negocio — merge por ID Y huella (evita duplicados)
      if (data.movimientos && data.movimientos.length) {
        const local = load('fnz_neg_tx',[]);
        const _normCat = cat => _mapearCategoriaNotion(cat||'').toLowerCase().trim();
        const _h = t => [t.date||'',t.type||'',Math.round((t.amount||0)*100),_normCat(t.category),(t.cliente||'').toLowerCase().trim()].join('|');
        const idsSeen    = new Set(local.map(t=>t.id));
        const huellasSeen= new Set(local.map(_h));
        const toAdd = (data.movimientos||[]).filter(t => {
          if(!t||!t.id) return false;
          if(idsSeen.has(t.id)) return false;
          const h = _h(t);
          if(huellasSeen.has(h)) return false;
          idsSeen.add(t.id); huellasSeen.add(h);
          return true;
        });
        if(toAdd.length > 0){
          const m = [...local, ...toAdd].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
          save('fnz_neg_tx', m);
          if (state.modo === 'negocio') state.transactions = m;
          added += toAdd.length;
        }
      }

      // Movimientos personales
      if (data.movimientosPersonales && data.movimientosPersonales.length) {
        const local = load('fnz_tx',[]);
        const idsSeen = new Set(local.map(t=>t.id));
        const toAdd = data.movimientosPersonales.filter(t=>t&&t.id&&!idsSeen.has(t.id));
        if(toAdd.length>0){
          const m=[...local,...toAdd].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
          save('fnz_tx',m);
          if(state.modo==='personal') state.transactions=m;
          added+=toAdd.length;
        }
      }

      // Deudas
      if (data.deudas && data.deudas.length) {
        const m = _mergeById(load('fnz_neg_debts',[]), data.deudas);
        save('fnz_neg_debts', m);
        if (state.modo === 'negocio') state.debts = m;
      }
      // Servicios
      if (data.servicios && data.servicios.length) {
        const m = _mergeById(load('fnz_neg_services',[]), data.servicios);
        save('fnz_neg_services', m);
        if (state.modo === 'negocio') state.servicios = m;
      }
      // Metas
      if (data.metas && data.metas.length) {
        const m = _mergeById(load('fnz_neg_metas',[]), data.metas);
        save('fnz_neg_metas', m);
        if (state.modo === 'negocio') state.metas = m;
      }
      // Notas
      if (data.notas && data.notas.length) {
        const m = _mergeById(load('fnz_notas',[]), data.notas);
        save('fnz_notas', m); state.notas = m;
      }

      save('fnz_last_load', new Date().toISOString());
      loadStateForModo(state.modo);
      if(added > 0 || forzar) toast('✓ Sheets: '+added+' registros nuevos cargados');
      render();
    })
    .catch(() => render());
}

// Merge por id: local tiene prioridad, agrega remote solo si id no existe
function _mergeById(local, remote) {
  const map = {};
  (local  || []).forEach(x => { if (x && x.id) map[x.id] = x; });
  (remote || []).forEach(x => { if (x && x.id && !map[x.id]) map[x.id] = x; });
  return Object.values(map);
}

// ── FAB arrastrable — mantener presionado 400ms ──
(function(){
  const fab=document.getElementById('micFab');
  if(!fab)return;
  const saved=localStorage.getItem('fnz_fab_pos');
  if(saved){try{const p=JSON.parse(saved);fab.style.bottom=p.b;if(p.l){fab.style.left=p.l;fab.style.right='auto';}else if(p.r){fab.style.right=p.r;fab.style.left='auto';}}catch(e){}}
  let _drag=false,_moved=false,_hold=null,_sx=0,_sy=0,_ox=0,_oy=0;

  function _start(cx,cy){
    _drag=true;_moved=false;
    fab.classList.add('dragging');
    // Calcular posición actual del FAB en viewport
    const r=fab.getBoundingClientRect();
    _ox=r.left;_oy=r.top;_sx=cx;_sy=cy;
    fab.style.position='fixed';
    fab.style.left=_ox+'px';
    fab.style.top=_oy+'px';
    fab.style.bottom='auto';
    fab.style.right='auto';
    fab.style.transition='none';
  }
  function _move(cx,cy){
    if(!_drag)return;
    const dx=cx-_sx,dy=cy-_sy;
    if(Math.abs(dx)>3||Math.abs(dy)>3)_moved=true;
    const nx=Math.max(0,Math.min(window.innerWidth-64,_ox+dx));
    const ny=Math.max(0,Math.min(window.innerHeight-64,_oy+dy));
    fab.style.left=nx+'px';
    fab.style.top=ny+'px';
  }
  function _end(){
    if(!_drag)return;
    _drag=false;
    fab.classList.remove('dragging');
    fab.style.transition='';
    clearTimeout(_hold);
    if(_moved){
      const r=fab.getBoundingClientRect();
      const b=Math.max(8,window.innerHeight-r.bottom);
      const l=Math.max(8,r.left);
      fab.style.bottom=b+'px';fab.style.left=l+'px';
      fab.style.right='auto';fab.style.top='';
      localStorage.setItem('fnz_fab_pos',JSON.stringify({b:fab.style.bottom,l:fab.style.left}));
    }
  }

  // Touch — touchstart en el FAB, move/end en document
  fab.addEventListener('touchstart',(e)=>{
    const t=e.touches[0];
    _moved=false;
    // Guardar posición del toque para usar en _start
    const startX=t.clientX,startY=t.clientY;
    _hold=setTimeout(()=>{
      _start(startX,startY);
      if(navigator.vibrate)navigator.vibrate(40);
    },400);
  },{passive:true});

  document.addEventListener('touchmove',(e)=>{
    if(!_drag)return;
    e.preventDefault();
    _move(e.touches[0].clientX,e.touches[0].clientY);
  },{passive:false});

  document.addEventListener('touchend',(e)=>{
    clearTimeout(_hold);
    if(_drag){_end();e.preventDefault();}
  },{passive:false});

  document.addEventListener('touchcancel',()=>{clearTimeout(_hold);if(_drag)_end();});

  // Mouse
  fab.addEventListener('mousedown',(e)=>{
    const sx=e.clientX,sy=e.clientY;
    _moved=false;
    _hold=setTimeout(()=>_start(sx,sy),400);
  });
  document.addEventListener('mousemove',(e)=>{if(_drag)_move(e.clientX,e.clientY);});
  document.addEventListener('mouseup',()=>{clearTimeout(_hold);if(_drag)_end();});
  fab.addEventListener('click',(e)=>{if(_moved)e.stopImmediatePropagation();},true);
})();

// ── Normalizar texto (sin tildes, sin signos) ──
function nrm(s) {
  return (s||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9\s]/g,' ')
    .replace(/\s+/g,' ').trim();
}

// ── Extraer monto (robusto) ──
function extractAmount(text) {
  // FIX: normalizar punto de miles (1.500 → 1500) antes de parsear
  text = text.replace(/(\d+)\.(\d{3})(?!\d)/g, '$1$2');
  const t = text;
  // S/. 400 | S/ 400 | S/.400
  let m = t.match(/s\/\.?\s*(\d[\d.,]*)/i);
  if (m) { const n=parseFloat(m[1].replace(',','.')); if(!isNaN(n)&&n>0) return n; }
  // 400 soles | 400.50 soles
  m = t.match(/(\d[\d.,]*)\s*(?:soles?|sol\b|nuevos?\s*soles?)/i);
  if (m) { const n=parseFloat(m[1].replace(',','.')); if(!isNaN(n)&&n>0) return n; }
  // número con decimales: 400.50 | 400,50
  m = t.match(/\b(\d{1,6}[.,]\d{1,2})\b/);
  if (m) { const n=parseFloat(m[1].replace(',','.')); if(!isNaN(n)&&n>0) return n; }
  // número entero de 2+ dígitos (toma el último encontrado en el texto)
  const allNums = [...t.matchAll(/\b(\d{2,7})\b/g)].map(x=>parseFloat(x[1])).filter(x=>x>0&&x<9999999);
  if (allNums.length) return allNums[allNums.length-1];
  // números en palabras
  const words = nrm(text).split(/\s+/);
  let total=0, last=0;
  for (const w of words) {
    if (NUM_WORDS[w]!==undefined) {
      const v=NUM_WORDS[w];
      if(v===1000){total+=(last||1)*1000;last=0;}
      else if(v>=100){last=(last||1)*v;}
      else last+=v;
    }
  }
  if(last||total) return total+last;
  return null;
}

// ── Detectar tipo ingreso / egreso ──
function detectType(text) {
  const t = nrm(text);

  // ── Patrones de EGRESO con prioridad absoluta ──
  // "le presté / le di prestado / di plata a" = yo di dinero = egreso
  if (/\b(le preste|le di prestado|di plata a|preste plata|le di plata)\b/.test(t)) return 'egreso';
  // "recargué saldo/celular" = egreso
  if (/\b(recargue|recarga)\b/.test(t) && /\b(saldo|celular|tarjeta|bus|metropolitano|movil)\b/.test(t)) return 'egreso';
  // "deposité" sin "me" antes = yo moví dinero = egreso
  if (/\b(deposite|hice un deposito)\b/.test(t) && !/\bme\b/.test(t)) return 'egreso';
  // "di propina" = egreso
  if (/\b(di propina|deje propina|le di propina)\b/.test(t)) return 'egreso';

  // ── Patrones de INGRESO con prioridad absoluta ──
  // "me [verb] [dinero]" donde YO recibo = siempre ingreso
  if (/\bme (dieron|regalo|regalaron|presto|prestaron|devolvieron|retornaron|reembolso|reembolsaron|regreso|regresaron|mandaron|enviaron|deposito|depositaron|transfirieron|pasaron|abonaron|pagaron|cayeron|llegaron|entraron)\b/.test(t)) return 'ingreso';
  // "de parte de [alguien]" = recibí dinero = ingreso
  if (/\bde parte de\b/.test(t)) return 'ingreso';
  // "encontré/hallé" dinero = ingreso
  if (/\b(encontre|halle|encontré|hallé)\b/.test(t)) return 'ingreso';
  // "gané" sin contexto de juego que implique gasto = ingreso
  if (/\b(gane|gané)\b/.test(t) && !/\b(gaste en|pague en)\b/.test(t)) return 'ingreso';

  let inScore=0, outScore=0;

  // Si hay un patrón "me [verb] X para [purpose]", ignorar las palabras del propósito al puntuar
  // Para evitar que "me dieron para arreglar la casa" pierda por 'arreglo' y 'casa'
  let scoringText = t;
  if (/\bme (dio|dieron|regalo|regalaron|presto|prestaron|mando|mandaron|envio|enviaron|deposito|depositaron)\b/.test(t)) {
    scoringText = t.replace(/\bpara\b.*/,'').replace(/\bpor\b.*/,'');
  }

  for (const kw of INGRESO_KW) if(scoringText.includes(nrm(kw))) inScore++;
  for (const kw of EGRESO_KW)  if(scoringText.includes(nrm(kw))) outScore++;
  if(inScore>outScore) return 'ingreso';
  if(outScore>inScore) return 'egreso';
  if(/recib|cobr|gan[ae]|ingres|deposit|me (cay|lleg|entr|pag|abona|dier|manda|envia|pasa)|vend[ii]|transfer.*recib|punto.*adicional/i.test(text)) return 'ingreso';
  // Negocio — si está en modo negocio y mencionó un servicio, es ingreso
  if(state.modo==='negocio' && detectServicioNegocio(text)) return 'ingreso';
  // Negocio — verbos típicos de cobro del gasfitero
  if(state.modo==='negocio' && /\b(instal[eé]|conect[eé]|repar[eé]|convert[ií]|modifiqu[eé]|hice|realic[eé]|termin[eé]|cobr[eé]|atend[ií]|fui a|trabaj[eé])\b/i.test(text)) return 'ingreso';
  return 'egreso';
}

// ── Detectar categoría — incluye categorías creadas por el usuario ──
function detectCategory(text, type) {
  const t = nrm(text);
  const allCats = type==='ingreso' ? state.catsIn : state.catsEx;

  // Si el texto tiene patrón "me [verb] X para [purpose]" o "me [verb] X por [purpose]"
  // ignorar la parte posterior al "para/por" para no contaminar la categoría
  let catText = t;
  if (/\bme (dio|dieron|regalo|regalaron|presto|prestaron|mando|mandaron|envio|enviaron|deposito|depositaron|transfirieron|pasaron)\b/.test(t)) {
    catText = t.replace(/\b(para|por)\b.*/,'');
  }

  // 1. Coincidencia exacta por nombre de categoría
  for (const cat of allCats) {
    if(catText.includes(nrm(cat.name))) return cat;
  }

  // 2. Score por keywords del sistema
  let best=null, bestScore=0;
  for (const [catId, kws] of Object.entries(CAT_KEYWORDS)) {
    if(catId.startsWith('_')) continue;
    const cat = allCats.find(c=>c.id===catId);
    if(!cat) continue;
    let score=0;
    for (const kw of kws) if(catText.includes(nrm(kw))) score++;
    if(score>bestScore){bestScore=score;best=cat;}
  }
  if(best && bestScore>0) return best;

  // 3. Categorías extra
  const EXTRA_MAP = {
    '_cuidado': ['cuidado','personal','belleza','peluq','barber','gym','spa','higiene'],
    '_deporte': ['deporte','gym','gimnasio','sport','fitness','cancha','natacion'],
    '_familia': ['familia','familiar','envio','envíos','apoyo'],
    '_ahorro':  ['ahorro','ahorre','aparte','guarde','separe','fondo','meta']
  };
  for (const [key, nameHints] of Object.entries(EXTRA_MAP)) {
    const kws = CAT_KEYWORDS[key] || [];
    let score=0;
    for (const kw of kws) if(catText.includes(nrm(kw))) score++;
    if(score>0){
      const userCat = allCats.find(c=>{
        const cn=nrm(c.name);
        return nameHints.some(h=>cn.includes(h));
      });
      if(userCat) return userCat;
    }
  }

  // 4. Fallback inteligente
  if(type==='ingreso'){
    // "encontré/hallé" → Otro ingreso
    if(/\b(encontre|halle)\b/.test(t))
      return allCats.find(c=>c.id==='ci6') || allCats.find(c=>c.name==='Otro ingreso') || allCats.filter(c=>!c.negocio)[0];
    // "me [verb] de parte de persona" → Bono
    const receivedFromPerson = /\b(de parte de|me (mand[oo]|envi[oo]|dio|dieron|deposit[oo]|transfi|pas[oo]|regalo|regalaron))\b/.test(t);
    if(receivedFromPerson)
      return allCats.find(c=>c.id==='ci5') || allCats.find(c=>c.id==='ci6') || allCats.filter(c=>!c.negocio)[0];
    return allCats.find(c=>c.id==='ci6')
      || allCats.find(c=>c.name==='Otro ingreso')
      || allCats.filter(c=>!c.negocio).slice(-1)[0]
      || allCats[0];
  }
  return allCats.find(c=>c.id==='ce10')
    || allCats.find(c=>c.name==='Otro gasto')
    || allCats.filter(c=>!c.negocio).slice(-1)[0]
    || allCats[0];
}

// ── Extraer fecha del texto ──
function extractDate(text) {
  const t = nrm(text);
  const today = new Date();
  function toStr(d){
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  function shift(days){ const d=new Date(today); d.setDate(d.getDate()+days); return toStr(d); }

  // ── PRIORIDAD MÁXIMA: "este/para este + día" ──
  const DIAS_MAP = {domingo:0,lunes:1,martes:2,miercoles:3,jueves:4,viernes:5,sabado:6};
  const esteMatch = t.match(/\b(?:este|esta|para este|para esta|el este)\s+(domingo|lunes|martes|miercoles|jueves|viernes|sabado)\b/);
  if(esteMatch){
    const num = DIAS_MAP[esteMatch[1]];
    const d2=new Date(today);
    let diff=(num-d2.getDay()+7)%7;
    if(diff===0) diff=7;
    d2.setDate(d2.getDate()+diff);
    return toStr(d2);
  }
  // "el próximo + día"
  const proxMatch = t.match(/(?:el proximo|el próximo|proximo|próximo)\s+(domingo|lunes|martes|miercoles|jueves|viernes|sabado)/);
  if(proxMatch){
    const num = DIAS_MAP[proxMatch[1]];
    const d2=new Date(today);
    let diff=(num-d2.getDay()+7)%7||7;
    d2.setDate(d2.getDate()+diff);
    return toStr(d2);
  }

  // ── PRIORIDAD 2: días de la semana solos (antes que mañana/hoy) ──
  const DIAS = [['domingo',0],['lunes',1],['martes',2],['miercoles',3],['jueves',4],['viernes',5],['sabado',6]];
  const esFuturo = /\b(este|esta|el proximo|el próximo|proximo|próximo|para el|para esta|para este)\b/.test(t);
  for (const [nombre,num] of DIAS) {
    if(new RegExp('\\b'+nombre+'\\b').test(t)){
      const d=new Date(today);
      const hoy=d.getDay();
      let diff=(num-hoy+7)%7;
      if(diff===0) diff=7; // mismo día → próxima semana
      d.setDate(d.getDate()+diff);
      return toStr(d);
    }
  }

  // pasado mañana
  if(/pasado (manana|mañana)/.test(t)||t.includes('pasado manana')) return shift(+2);
  // antes de ayer / anteayer / antier
  if(/antes de ayer|anteayer|antier/.test(t)) return shift(-2);
  // ayer
  if(/\bayer\b/.test(t)) return shift(-1);
  // mañana
  if(/\bmanana\b/.test(t)) return shift(+1);
  // hoy
  if(/\bhoy\b/.test(t)) return toStr(today);
  // Expresiones futuras peruanas
  if(/\bla próxima semana\b|\bla proxima semana\b/.test(t)) return shift(+7);
  if(/\besta semana\b/.test(t)) return toStr(today);
  if(/\ben (\d+) días\b|en (\d+) dias\b/.test(t)){
    const mm=t.match(/en (\d+) d[ií]as/); if(mm) return shift(parseInt(mm[1]));
  }
  // esta semana → hoy
  if(/esta semana/.test(t)) return toStr(today);
  // semana pasada → hace 7 días
  if(/semana pasada|semana anterior/.test(t)) return shift(-7);
  // mes pasado → hace 30 días aprox
  if(/mes pasado|mes anterior/.test(t)) { const d=new Date(today); d.setMonth(d.getMonth()-1); return toStr(d); }
  return toStr(today); // por defecto: hoy
}

// ── Formato de fecha legible en español ──
function fmtDateLabel(ds) {
  if(!ds) return 'Hoy';
  const d=new Date(ds+'T00:00:00');
  const dias=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const today=new Date();
  const diff=Math.round((new Date(ds+'T12:00:00')-new Date(today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0')+'T12:00:00'))/(864e5));
  const label=diff===0?'Hoy':diff===-1?'Ayer':diff===-2?'Antes de ayer':diff===1?'Mañana':`${dias[d.getDay()]} ${d.getDate()} ${meses[d.getMonth()]}`;
  return `${label} · ${d.getDate().toString().padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

// ── Extraer descripción limpia ──
function extractDescription(text) {
  let t = text;
  // Quitar referencias temporales
  t = t.replace(/\b(pasado mañana|antes de ayer|anteayer|antier|mañana|ayer|hoy)\b/gi,'');
  t = t.replace(/\b(el\s+)?(lunes|martes|miércoles|miercoles|jueves|viernes|sábado|sabado|domingo)\b/gi,'');
  t = t.replace(/\b(esta semana|semana pasada|semana anterior|mes pasado|mes anterior)\b/gi,'');
  // Quitar montos
  t = t.replace(/s\/\.?\s*\d+(?:[.,]\d+)?/gi,'');
  t = t.replace(/\d+(?:[.,]\d+)?\s*(?:soles?|sol\b|nuevos?\s*soles?)?/gi,'');
  // Quitar verbos de registro
  t = t.replace(/\b(gast[eéo]|pagu[eéo]|compr[eéo]|recibi[oó]|cobr[eéo]|gan[eéo]|ingres[eéo]|deposit[aoó]|me\s+(deposit|pag|transfi|dier|cay|lleg|entr|abona|mand|envi|pas)[a-záéíóú]*|apunta|registra|anota|agrega|guard[ao]|entr[oó]|sali[oó]|se\s+fue|mand[eéo]|envi[eéo]|transferi[oó])\b/gi,'');
  // Quitar "concepto (de)", conectores, artículos
  t = t.replace(/\b(concepto\s+(de)?|por\s+concepto\s+de?|un\s+|una\s+|de\s+|en\s+|por\s+|para\s+|del\s+|al\s+|la\s+|el\s+|lo\s+|las\s+|los\s+|con\s+|que\s+|es\s+|fue\s+|hay\s+)\b/gi,' ');
  return t.replace(/\s+/g,' ').trim();
}

// ── Desambiguación GAS: ¿doméstico o del auto? ──
function isContextGasolinaAuto(text) {
  const t = nrm(text);
  // Verbos/contexto que indican recarga de combustible vehicular
  const autoPatterns = [
    'meti gas','meti gasolina','cargue gas','cargue gasolina',
    'puse gas','puse gasolina','llene el tanque','llene el carro',
    'llene el auto','llene la moto','llene el vehiculo',
    'gas del carro','gas del auto','gas de la moto','gas del vehiculo',
    'gasolina','combustible','petroleo','gnv','glp',
    'grifo','repsol','primax','pecsa','petroperu','petroperú'
  ];
  for (const p of autoPatterns) if (t.includes(nrm(p))) return true;
  // "metí/eché/puse/cargué N soles en gas" → auto
  if (/\b(meti|eche|puse|cargue|llene|recargue)\b/.test(t) && t.includes('gas')) return true;
  return false;
}

function isContextGasDomestico(text) {
  const t = nrm(text);
  if (isContextGasolinaAuto(text)) return false; // el auto tiene prioridad si hay ambigüedad
  const homePatterns = [
    'gas de la casa','gas del hogar','gas domestico','gas domiciliario',
    'balon de gas','balón de gas','calidda','limagas','solgas','zeta gas',
    'recibo de gas','pague el gas','pague del gas','pague de gas',
    'gas natural','servicio de gas','factura de gas'
  ];
  for (const p of homePatterns) if (t.includes(nrm(p))) return true;
  // "pagué/pagué el/cobré el gas" sin contexto de auto → doméstico
  if (/\b(pague|cancele|abone|cubri)\b/.test(t) && t.includes('gas')) return true;
  return false;
}

// ── Detectar si el texto coincide con un servicio registrado ──
// Retorna el objeto servicio de state.servicios o null
function detectServiceMatch(text) {
  const t = nrm(text);
  // Mapeo de señales de voz → palabras clave del nombre del servicio
  const serviceSignals = [
    { signals: ['luz','enel','luz del sur','electricidad','recibo de luz','energia electrica'],
      nameKeys: ['luz','enel','electr'] },
    { signals: ['agua','sedapal','recibo de agua','servicio de agua'],
      nameKeys: ['agua','sedapal'] },
    { signals: ['gas de la casa','gas del hogar','gas domestico','gas domiciliario',
                'balon de gas','calidda','limagas','solgas','recibo de gas',
                'pague el gas','pague del gas','pague de gas','gas natural'],
      nameKeys: ['gas','calidda','limagas'] },
    { signals: ['internet','wifi','banda ancha','recibo de internet','pague el internet'],
      nameKeys: ['internet','wifi','banda'] },
    { signals: ['telefono','celular','movistar','claro','entel','bitel','wom',
                'plan celular','recibo del celular','pague el celular','pague el telefono'],
      nameKeys: ['telefono','celular','movil','movistar','claro','entel','bitel'] },
    { signals: ['cable','directv','claro tv','movistar tv','television','pague el cable'],
      nameKeys: ['cable','tv','directv','claro tv','movistar tv'] },
  ];

  // El gas del auto NO activa el servicio
  if (isContextGasolinaAuto(text)) return null;

  for (const { signals, nameKeys } of serviceSignals) {
    const signalMatch = signals.some(s => t.includes(nrm(s)));
    if (!signalMatch) continue;
    // Buscar en state.servicios el que coincida
    const svc = state.servicios.find(s => {
      const sn = nrm(s.name);
      return nameKeys.some(nk => sn.includes(nk));
    });
    if (svc) return svc;
  }
  return null;
}

// ── Descripción inteligente ──
function buildSmartDescription(text, cat, detectedService) {
  // Si es un pago de servicio conocido, usar nombre real del servicio
  if (detectedService) return 'Pago ' + detectedService.name;
  const raw = extractDescription(text);
  if (!raw || raw.length < 2) return cat?.name || '';
  // Capitalizar primera letra
  return raw.charAt(0).toUpperCase() + raw.slice(1);
}

// Detectar qué servicio del negocio mencionó
function detectServicioNegocio(text) {
  const t = nrm(text);
  for (const svc of SERVICIOS_NEGOCIO) {
    for (const kw of svc.kws) {
      if (t.includes(nrm(kw))) return svc;
    }
  }
  return null;
}


// Extraer ubicación/distrito desde voz
function extractUbicacion(text){
  const norm = text.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'');

  // Ordenar distritos de mayor a menor longitud para que "San Juan de Miraflores"
  // tenga prioridad sobre "Miraflores" o "San Juan de Lurigancho"
  const distritosOrdenados = [...DISTRITOS_LIMA].sort((a,b)=>b.length-a.length);

  // 1. Coincidencia directa (buscar el distrito más largo primero)
  for(const d of distritosOrdenados){
    const dn = d.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    if(norm.includes(dn)) return d;
  }

  // 2. Patrones contextuales con captura amplia (hasta 35 chars)
  const patterns = [
    /(?:en el distrito de|en la zona de|distrito de|zona de)\s+([a-z\s]{3,35}?)(?:\s*[,.]|\s+a las|\s+\d|$)/i,
    /(?:en|por|en la|en el|hacia|queda en|vive en|domicilio en|ubicado en)\s+([a-z][a-z\s]{2,33}?)(?:\s*[,.]|\s+a las|\s+\d|\s+precio|\s+soles|\s+servicio|$)/i,
  ];
  for(const p of patterns){
    const m = norm.match(p);
    if(m){
      const candidate = m[1].trim();
      // Buscar el distrito más largo que sea substring del candidato
      for(const d of distritosOrdenados){
        const dn = d.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
        if(candidate.includes(dn) || dn.includes(candidate)) return d;
      }
    }
  }
  return null;
}

// Extraer nombre del cliente desde la voz
function extractCliente(text) {
  const t = text;
  // Detectar tratamiento para conservarlo (Sr./Sra.)
  const _tratMatch = text.match(/\b(señor|señora|don|doña|sr\.?|sra\.?)\s+/i);
  const _trat = _tratMatch ? (/(señora|doña|sra)/i.test(_tratMatch[1]) ? 'Sra.' : 'Sr.') : '';
  // ★ Palabras de servicio — cortar el nombre aquí
  const SERVICIO_STOP = /\b(punto\s+adicional|terma|cocina|horno|calefon|parrilla|secadora|instalacion|conexion|reparacion|modificacion|gasfiteria|documentacion|conversion|construccion|punto|adicional|tuberia|red|boca|servicio)\b/i;

  const patterns = [
    // Con preposición explícita — máxima prioridad
    /(?:al|para el|para la|a la|para|con el|con la)\s+(?:señor|señora|don|doña|sr\.?|sra\.?|ing\.?|ingeniero|ingeniera|doctor|doctora|prof\.?|profesor|profesora|arquitecto|arquitecta|licenciado|licenciada)\s+([A-Za-záéíóúñÁÉÍÓÚÑ][A-Za-záéíóúñÁÉÍÓÚÑ\s]{1,25}?)(?:\s*[,.]|\s+\d|\s+en\b|\s+de\b|\s+del\b|\s+por\b|\s+a las|\s+precio|\s+soles|\s+servicio|$)/i,
    /(?:para|al|a|con)\s+(?:el|la)\s+(?:cliente|clienta|señor|señora|vecino|vecina|casero|casera|propietario|propietaria|dueño|dueña)\s+([A-Za-záéíóúñÁÉÍÓÚÑ][A-Za-záéíóúñÁÉÍÓÚÑ\s]{1,20}?)(?:\s*[,.]|\s+en\b|\s+de\b|\s+precio|\s+soles|\s+servicio|$)/i,
    /(?:casa de|domicilio de|vivienda de|propiedad de)\s+([A-Za-záéíóúñÁÉÍÓÚÑ][A-Za-záéíóúñÁÉÍÓÚÑ\s]{1,25}?)(?:\s*[,.]|\s+en\b|\s+de\b|$)/i,
    /de(?:l|\s+la)?\s+(?:señor|señora|don|doña|sr\.?|sra\.?)\s+([A-Za-záéíóúñÁÉÍÓÚÑ][A-Za-záéíóúñÁÉÍÓÚÑ\s]{1,25}?)(?:\s*[,.]|\s+en\b|\s+de\b|\s+por\b|\s+precio|$)/i,
    /(?:para|al|con)\s+([A-ZÁÉÍÓÚÑ][a-záéíóúñ]+\s+[A-ZÁÉÍÓÚÑ][a-záéíóúñ]+)(?:\s+en\b|\s+de\b|\s*[,.]|\s+precio|$)/,
    // ★ Sin preposición: "señora Carmen Lince", "señor Pedro viernes"
    /(?:señora?|doña?|don|sr\.?|sra\.?)\s+([A-Za-záéíóúñÁÉÍÓÚÑ][A-Za-záéíóúñÁÉÍÓÚÑ\s]{1,20}?)(?:\s+en\b|\s+de\b|\s*[,.]|\s+\d|\s+este\b|\s+el\b|\s+la\b|\s+lunes|\s+martes|\s+miercoles|\s+jueves|\s+viernes|\s+sabado|\s+domingo|\s+hoy|\s+manana|\s+mañana|\s+servicio\b|\s+precio\b|\s+soles\b|\s+punto\b|\s+terma\b|\s+cocina\b|\s+horno\b|\s+calefon\b|\s+parrilla\b|\s+instalacion\b|\s+conexion\b|\s+reparacion\b|$)/i,
  ];
  for (const p of patterns) {
    const m = t.match(p);
    if (m && m[1]) {
      let nombre = m[1].trim().replace(/\s+/g,' ');
      // ★ Cortar en la primera palabra de servicio
      const svcIdx = nombre.search(SERVICIO_STOP);
      if(svcIdx > 0) nombre = nombre.slice(0, svcIdx).trim();
      // Limpiar preposiciones y días de semana
      nombre = nombre.replace(/\b(en|de|del|al|la|el|por|para|con|que|fue|era|un|una|este|esta|dia|día|lunes|martes|miercoles|jueves|viernes|sabado|domingo|hoy|manana|mañana|siguiente|proximo|próximo)\b/gi,'').trim();
      // ★ Si segunda palabra es inicio de distrito → solo primera
      const partes = nombre.split(/\s+/).filter(Boolean);
      const DISTW = /^(los|san|la|el|villa|santa|jesus|pueblo|puente|ate|callao|surco|lince|rimac|comas|barranco|lurin|chorrillos|breña|brena|miraflores|independencia|carabayllo|ventanilla)$/i;
      const DIASW = /^(lunes|martes|miercoles|jueves|viernes|sabado|domingo|hoy|manana|mañana)$/i;
      if(partes.length>1 && (DISTW.test(partes[1])||DIASW.test(partes[1]))) nombre=partes[0];
      else nombre=partes.slice(0,2).join(' ');
      if (nombre.length > 1) return (_trat ? _trat + ' ' + nombre : nombre);
    }
  }
  // ── FALLBACK ULTRASIMPLE: "señor/don + nombre" en cualquier posición ──
  // Cubre casos donde los patrones complejos fallan por orden desordenado
  const ULTRA_SVCSTOP = /^(servicio|punto|adicional|terma|cocina|horno|calefon|parrilla|secadora|instalacion|conexion|reparacion|modificacion|gasfiteria|documentacion|conversion|construccion|tuberia|red|precio|soles|para|en|de|del|al|la|el|a|las)$/i;
  const ultFallback = t.match(/(?:señora?|doña?|don|sr\.?|sra\.?)\s+([A-ZÁÉÍÓÚÑa-záéíóúñ][a-záéíóúñ]{1,20})/i);
  if(ultFallback && ultFallback[1]){
    const fn = ultFallback[1].trim();
    if(!ULTRA_SVCSTOP.test(fn) && fn.length > 1) return (_trat ? _trat + ' ' + fn : fn);
  }
  // ── FALLBACK 2: texto normalizado — "senor/don + nombre" ──
  const t3 = t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const nrmFall = t3.match(/(?:senora?|dona|don)\s+([a-z][a-z]{1,18})/i);
  if(nrmFall && nrmFall[1]){
    const fn2 = nrmFall[1].trim();
    if(!ULTRA_SVCSTOP.test(fn2) && fn2.length > 1) {
      const fn2cap = fn2.charAt(0).toUpperCase()+fn2.slice(1);
      return (_trat ? _trat + ' ' + fn2cap : fn2cap);
    }
  }
  return null;
}

function parseVoiceCommand(text) {
  const amount      = extractAmount(text);
  const type        = detectType(text);
  const date        = extractDate(text);
  const cliente     = extractCliente(text);
  const servicioNeg = detectServicioNegocio(text);
  const t           = nrm(text);
  const esNegocio   = state.modo === 'negocio';

  let cat;

  if (esNegocio) {
    // ── MODO NEGOCIO: clasificación automática, sin preguntas ──
    if (type === 'ingreso') {
      // Detectar cuál de los 8 servicios es
      if (servicioNeg) {
        const nombres = {
          'punto_adicional':    'Punto Adicional',
          'modificacion_red':   'Modificación Red',
          'instalacion_nueva':  'Instalación Nueva',
          'conversion_artefacto':'Conversión Artefacto',
          'conexion_artefacto': 'Conexión Artefacto',
          'reparacion_tuberia': 'Reparación Tubería',
          'gasfiteria':         'Gasfitería',
          'documentacion':      'Documentación',
          'cocina_artefacto':   'Cocina / Cocinilla',
          'horno_artefacto':    'Horno a Gas',
          'terma_artefacto':    'Terma',
          'secadora_artefacto': 'Secadora a Gas',
          'cafelon_artefacto':  'Calefón',
          'parrilla_artefacto': 'Parrilla a Gas',
        };
        const nombre = nombres[servicioNeg.id];
        cat = state.catsIn.find(c=>c.name===nombre) || state.catsIn[state.catsIn.length-1];
      } else {
        cat = state.catsIn[state.catsIn.length-1]; // Otro Servicio
      }
    } else {
      // Egreso en modo negocio → clasificar por tipo
      if (/\bgnv\b/.test(t))
        cat = state.catsEx.find(c=>c.id==='cne2') || state.catsEx[0];
      else if (/gasolina|combustible|meti gas|cargue gas|llene/.test(t))
        cat = state.catsEx.find(c=>c.id==='cne3') || state.catsEx[0];
      else if (/materiales?|insumos?/.test(t))
        cat = state.catsEx.find(c=>c.id==='cne1') || state.catsEx[0];
      else if (/herramienta|equipo|instrumento/.test(t))
        cat = state.catsEx.find(c=>c.id==='cne4') || state.catsEx[0];
      else if (/auto|carro|vehiculo|veh[ií]culo|moto\b|coche|reparacion|arreglo|mantenimiento|llanta|frenos|aceite|placa|soat|revision tecnica|servicio tecnico del auto|taller/.test(t))
        cat = state.catsEx.find(c=>c.id==='cne7') || state.catsEx[0];
      else if (/viatico|pasaje|movilidad|taxi|uber/.test(t))
        cat = state.catsEx.find(c=>c.id==='cne5') || state.catsEx[0];
      else
        cat = state.catsEx.find(c=>c.id==='cne6') || state.catsEx[0]; // Otro gasto negocio
    }
  } else {
    // ── MODO PERSONAL: lógica anterior ──
    if (servicioNeg && type === 'ingreso') {
      cat = state.catsIn.find(c=>c.id==='cneg_svc') || state.catsIn[state.catsIn.length-1];
    } else if (/\bmateriales?\b|\binsumos?\b/.test(t) && isContextoNegocioClear(text)) {
      cat = state.catsEx.find(c=>c.id==='cneg_mat') || state.catsEx[state.catsEx.length-1];
    } else if (/\bgnv\b/.test(t)) {
      cat = state.catsEx.find(c=>c.id==='cneg_gnv') || detectCategory(text, type);
    } else if (isContextGasolinaAuto(text) && isContextoNegocioClear(text)) {
      cat = state.catsEx.find(c=>c.id==='cneg_gas') || detectCategory(text, type);
    } else if (isContextGasolinaAuto(text)) {
      cat = state.catsEx.find(c=>c.id==='ce2') || detectCategory(text, type);
    } else if (isContextGasDomestico(text)) {
      cat = state.catsEx.find(c=>c.id==='ce6') || detectCategory(text, type);
    } else {
      cat = detectCategory(text, type);
    }
  }

  // Ambigüedad solo aplica en modo personal
  const needsNegocioConfirm = !esNegocio && detectNegocioAmbiguidad(text, cat?.id);
  const serviceMatch = type === 'egreso' && !esNegocio ? detectServiceMatch(text) : null;

  let desc = '';
  if (servicioNeg) {
    desc = servicioNeg.label + (cliente ? ` — ${cliente}` : '');
  } else {
    desc = buildSmartDescription(text, cat, serviceMatch);
  }

  const ubicacion = extractUbicacion(text);
  return { amount, type, cat, desc, date, serviceMatch,
           cliente, ubicacion, servicioNeg, negocio: esNegocio,
           needsNegocioConfirm, raw: text };
}

let _micContext = null;       // contexto actual detectado
let _ghostData  = {};         // datos detectados {campo: valor}
let _ghostHistory = [];       // historial para "rectifica" [{campo, valor}]

function detectMicContext(text) {
  const t = text.toLowerCase();
  if(/agenda\s*(visita|cita|vista)/.test(t))       return 'agenda_visita';
  if(/agenda\s*(construc|trabajo|instal|servicio|obra)/.test(t)) return 'agenda_construccion';
  if(/\b(gast[eé]|pagu[eé]|cobr[eé]|ingres|egres|compr[eé]|deposit|sueldo|bono|transfer)\b/.test(t)) return 'tx';
  if(/\b(deuda|cuota|pr[eé]stamo|banco|tarjeta|debo|me cobran)\b/.test(t)) return 'deuda';
  if(/\b(nota|lista|recordatorio|apunta|anota|no olvides)\b/.test(t)) return 'nota';
  return null;
}

function setMicContext(ctx) {
  if(_micContext === ctx) return; // ya está configurado
  _micContext = ctx;
  _ghostData = {};
  _ghostHistory = [];
  const def = MIC_CONTEXTS[ctx];
  if(!def) return;

  // Cambiar colores del header
  const header = document.getElementById('micHeader');
  const box    = document.getElementById('micBox');
  if(header) header.style.background = def.bg;
  if(box)    box.style.borderTop = '3px solid '+def.color;

  document.getElementById('micContextIcon').textContent  = def.icon;
  document.getElementById('micContextTitle').textContent = def.title;
  document.getElementById('micContextSub').textContent   = def.sub;

  // Renderizar campos fantasma
  renderGhostFields(ctx);
  document.getElementById('micGhostForm').style.display='block';
}

function renderGhostFields(ctx) {
  const def = MIC_CONTEXTS[ctx];
  if(!def) return;
  const container = document.getElementById('micGhostFields');
  container.innerHTML = def.fields.map(f=>`
    <div id="ghost-${f.id}" style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;transition:all .25s">
      <span style="font-size:15px;min-width:20px">${f.icon}</span>
      <span class="ghost-label" style="font-size:12px;font-weight:500;color:#CBD5E1;flex:1">${f.label}${f.req?' *':''}</span>
      <span class="ghost-value" style="font-size:12px;font-weight:600;color:#CBD5E1"></span>
    </div>`).join('');
  updateMissingFields(ctx);
}

function fillGhostField(fieldId, value) {
  const el = document.getElementById('ghost-'+fieldId);
  if(!el) return;
  // Guardar historial para rectifica
  if(_ghostData[fieldId]) {
    _ghostHistory.push({campo: fieldId, valor: _ghostData[fieldId]});
  }
  _ghostData[fieldId] = value;
  _ghostHistory.push({campo: fieldId, valor: value});

  // Animar campo: gris → amarillo
  el.style.background    = '#FFFBEB';
  el.style.borderColor   = '#C9A84C';
  el.querySelector('.ghost-label').style.color = '#92400E';
  el.querySelector('.ghost-value').style.color = '#92400E';
  el.querySelector('.ghost-value').textContent = value;
  updateMissingFields(_micContext);
  _checkGhostSaveReady();
}

function clearLastGhostField() {
  if(_ghostHistory.length === 0) {
    toast('No hay datos para borrar','error'); return;
  }
  // Sacar el último del historial
  const last = _ghostHistory.pop();
  delete _ghostData[last.campo];

  // Resetear visualmente
  const el = document.getElementById('ghost-'+last.campo);
  if(el){
    el.style.background  = '#F8FAFC';
    el.style.borderColor = '#E2E8F0';
    el.querySelector('.ghost-label').style.color = '#CBD5E1';
    el.querySelector('.ghost-value').style.color = '#CBD5E1';
    el.querySelector('.ghost-value').textContent = '';
  }
  toast('Dato borrado — sigue hablando','info');
  updateMissingFields(_micContext);
}

function updateMissingFields(ctx) {
  const def = MIC_CONTEXTS[ctx]; if(!def) return;
  const cont = document.getElementById('micMissingFields'); if(!cont) return;
  const faltantes = def.fields.filter(f=>f.req && !_ghostData[f.id]);
  if(faltantes.length===0){
    cont.innerHTML='<span style="font-size:11px;color:#4CAF85;font-weight:600">✓ Listo para guardar</span>';
  } else {
    cont.innerHTML = faltantes.map(f=>
      `<span style="font-size:10px;background:#FEF9EE;border:1px solid #C9A84C33;border-radius:8px;padding:2px 8px;color:#92400E">${f.icon} Falta: ${f.label}</span>`
    ).join('');
  }
}

function updateGhostFromText(text) {
  // Detectar contexto si aún no está definido
  if(!_micContext){
    const ctx = detectMicContext(text);
    if(ctx) setMicContext(ctx);
    else return;
  }

  const t = text.toLowerCase();

  // ★ Detectar comando rectifica/borra/corrije
  if(/\b(rectifica|rectifca|corrij[ae]|corrige|borra|cancela|eso no|no eso|error|elimina)\b/.test(t)){
    clearLastGhostField();
    return;
  }

  // Extraer datos según contexto
  if(_micContext==='agenda_visita'||_micContext==='agenda_construccion'){
    // Cliente: "para el señor/señora X" o "al señor X"
    const cl = text.match(/(?:para (?:el |la )?(?:señor|señora|sr\.?|sra\.?)?\s*)([A-ZÁÉÍÓÚÑ][a-záéíóúñ]+(?:\s[A-ZÁÉÍÓÚÑ][a-záéíóúñ]+)?)/i);
    if(cl && !_ghostData.cliente) fillGhostField('cliente', cl[1]);

    // Fecha
    const fecha = extractDate(text);
    if(fecha && !_ghostData.fecha) fillGhostField('fecha', fmtDateLabel(fecha));

    // Hora: "a las X" 
    const hr = text.match(/a\s+las?\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm)?/i);
    if(hr && !_ghostData.hora){
      let h=parseInt(hr[1]), m=parseInt(hr[2]||0);
      const ap=(hr[3]||'').toLowerCase();
      if(ap==='pm'&&h<12) h+=12;
      if(ap==='am'&&h===12) h=0;
      fillGhostField('hora', `${h}:${m<10?'0'+m:m} ${h>=12?'PM':'AM'}`);
    }

    // Ubicación: "en X" (excluir horario)
    const ub = text.match(/\ben\s+((?!las?\s+\d)[A-Za-záéíóúñÁÉÍÓÚÑ][a-záéíóúñ\s]{3,20})/i);
    if(ub && !_ghostData.ubicacion) fillGhostField('ubicacion', ub[1].trim());

    // Teléfono
    const tel = text.match(/\b(9\d{8})\b/);
    if(tel && !_ghostData.telefono) fillGhostField('telefono', tel[1]);

    // Servicio (solo construcción)
    if(_micContext==='agenda_construccion'){
      const servicios=['terma','calefón','cafelon','cocina','horno','parrilla','punto adicional','tubería','tuberia','gasfitería','gasfiteria','reparación','reparacion','instalación','instalacion','conexión','conexion'];
      for(const sv of servicios){
        if(t.includes(sv) && !_ghostData.servicio){
          fillGhostField('servicio', sv.charAt(0).toUpperCase()+sv.slice(1));
          break;
        }
      }
      // Precio
      const pr = extractAmount(text);
      if(pr && !_ghostData.precio) fillGhostField('precio', 'S/ '+pr.toFixed(2));
    }

  } else if(_micContext==='tx'){
    // Tipo
    if(/\b(gast[eé]|pagu[eé]|compr[eé]|egres|salió)\b/.test(t) && !_ghostData.tipo)
      fillGhostField('tipo','↓ Egreso');
    if(/\b(cobr[eé]|ingres[oó]|deposit|sueldo|bono|gané)\b/.test(t) && !_ghostData.tipo)
      fillGhostField('tipo','↑ Ingreso');
    // Monto
    const am = extractAmount(text);
    if(am && !_ghostData.monto) fillGhostField('monto','S/ '+am.toFixed(2));
    // Fecha
    const fe = extractDate(text);
    if(fe && !_ghostData.fecha) fillGhostField('fecha', fmtDateLabel(fe));

  } else if(_micContext==='deuda'){
    const am = extractAmount(text);
    if(am && !_ghostData.total) fillGhostField('total','S/ '+am.toFixed(2));
    const nc = text.match(/(\d+)\s*cuotas?/i);
    if(nc && !_ghostData.ncuotas) fillGhostField('ncuotas', nc[1]+' cuotas');

  } else if(_micContext==='nota'){
    if(/\blista\b/.test(t) && !_ghostData.tipo)        fillGhostField('tipo','✓ Lista');
    if(/\brecordatorio\b/.test(t) && !_ghostData.tipo) fillGhostField('tipo','⏰ Recordatorio');
    if(/\btexto\b/.test(t) && !_ghostData.tipo)        fillGhostField('tipo','📝 Texto');
  }
}

// ── Variables de control del micrófono ──


let micRestartLock    = false;
 // ★ texto acumulado ANTES del restart actual
 // ★ finales de la sesión actual (no del restart)
const MIC_SILENCE_MS  = /android/i.test(navigator.userAgent) ? 3500 : 2500; // ★ Android necesita más tiempo

function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('micText').textContent='⚠ Tu navegador no soporta reconocimiento de voz. Usa Chrome.';
    document.getElementById('micText').style.color='#E05252';
    return;
  }

  micFullTranscript = '';
  _micSessionBase   = '';
  _micSessionFinals = '';
  micRestartLock    = false;
  clearTimeout(micSilenceTimer);

  recognition = new SR();
  recognition.lang            = 'es-PE';
  recognition.interimResults  = true;
  recognition.maxAlternatives = 3;
  recognition.continuous      = true;

  micListening = true;
  document.getElementById('micBtn').style.background='linear-gradient(135deg,#E05252,#f87171)';
  document.getElementById('micBtnIcon').textContent='⏹';
  document.getElementById('micBtnTxt').textContent='Detener';
  document.getElementById('micFab').classList.add('listening');
  document.querySelectorAll('.wave-bar').forEach(b=>b.classList.add('active'));
  document.getElementById('micHint').innerHTML='<em>Escuchando... tómate tu tiempo 🎙</em>';
  document.getElementById('micText').style.color='#1E293B';
  document.getElementById('micText').textContent='...';

  startListeningHandlers(recognition);
  recognition.onstart = () => {
    document.getElementById('micText').textContent='🎙 Habla ahora...';
    document.getElementById('micText').style.color='#2E7D32';
  };
  recognition.start();
}

function restartListening() {
  if (!micListening) return;
  micRestartLock = true;
  try { recognition.stop(); } catch(e) {}
  const _rDelay = /android/i.test(navigator.userAgent) ? 400 : 150;
  setTimeout(() => {
    if (!micListening) return;
    micRestartLock = false;
    // ★ Guardar lo acumulado hasta ahora como base de la nueva sesión
    _micSessionBase   = micFullTranscript.trim();
    _micSessionFinals = '';    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang           = 'es-PE';
    recognition.interimResults = true;
    recognition.maxAlternatives= 3;
    recognition.continuous     = true;
    startListeningHandlers(recognition);
    try { recognition.start(); } catch(e) {}
  }, 150);
}

function startListeningHandlers(rec) {
  // ★ Acumular solo los resultados NUEVOS de esta sesión.
  // _micSessionBase = todo lo dicho antes del último restart.
  // _micSessionFinals = finales confirmados de esta sesión.
  // micFullTranscript = base + sessionFinals (lo que se muestra y procesa).

    rec.onresult = (e) => {
    let sessionInterim = '';
    let sessionFinals  = '';
    let lastTr = '';

    // Reconstruir SIEMPRE desde 0 para evitar errores críticos de Android Chrome
    for(let i = 0; i < e.results.length; i++){
      let tr = e.results[i][0].transcript.trim();
      if(e.results[i].isFinal) {
        if(tr && tr !== lastTr) { // Evita que Chrome agregue el mismo sub-segmento varias veces
          sessionFinals += tr + ' ';
          lastTr = tr;
        }
      } else {
        sessionInterim += tr + ' ';
      }
    }

    _micSessionFinals = sessionFinals.trim();

    const base = _micSessionBase.trim();
    const finals = _micSessionFinals.trim();
    // Prevenir duplicación en el display visual
    let combinedFinal = (base + (base && finals ? ' ' : '') + finals).trim();
    combinedFinal = _deduplicarTranscript(combinedFinal); 
    micFullTranscript = combinedFinal;

    const interimClean = sessionInterim.trim();
    const display = (micFullTranscript + (micFullTranscript && interimClean ? ' ' : '') + interimClean).trim();

    document.getElementById('micText').textContent = display || '...';

    // Detección de contexto en tiempo real
    _actualizarContextoMic(display);

    // Formulario fantasma
    if(display) try { updateGhostFromText(display); } catch(err){}

    // Timer de silencio — procesar cuando para de hablar
    // ★ Usar display (finals + interim) — el FINAL puede llegar tarde o nunca
    // Guardar el último interim para usarlo si el timer dispara antes del FINAL
    window._micLastInterim = sessionInterim;

    clearTimeout(micSilenceTimer);
    const textoParaTimer = display; // finals + interim — lo que el usuario realmente dijo
    if(textoParaTimer.trim()){
      const esAgenda = isAgendaCommand(textoParaTimer);

      // ★ Lista/nota: detección local — procesar rápido sin esperar silencio largo
      if(isNotaCommand(textoParaTimer)){
        const _textoNota = display;
        micSilenceTimer = setTimeout(()=>{
          const texto = (micFullTranscript.trim() || _textoNota).trim();
          if(micListening && texto) processVoiceResult(texto);
        }, 800);
      } else if(esAgenda){
        const nrmText = textoParaTimer.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
        const tieneCliente  = /\b(se[nñ]or[a]?|don|do[nñ]a)\s+[a-z]/i.test(nrmText);
        const tieneServicio = /(punto adicional|terma|cocina|horno|calefon|parrilla|secadora|instalacion|conexion|reparacion|modificacion|gasfiteria|documentacion|conversion)/i.test(nrmText);
        const tieneFecha    = /\b(ma[nñ]ana|lunes|martes|mi[eé]rcoles|jueves|viernes|s[aá]bado|domingo|hoy|\d{4}-\d{2})\b/i.test(nrmText);
        const suficiente    = tieneCliente && (tieneServicio || tieneFecha);
        const esAndroid = /android/i.test(navigator.userAgent);
        const espera = esAndroid
          ? (suficiente ? 3500 : 6000)
          : (suficiente ? 2000 : 4000);
        const _textoAgenda = display;
        micSilenceTimer = setTimeout(()=>{
          const texto = (micFullTranscript.trim() || _textoAgenda).trim();
          if(micListening && texto) processVoiceResult(texto);
        }, espera);
      } else {
        const _textoGeneral = display;
        micSilenceTimer = setTimeout(()=>{
          const texto = (micFullTranscript.trim() || _textoGeneral).trim();
          if(micListening && texto) processVoiceResult(texto);
        }, MIC_SILENCE_MS);
      }
    }
    // ★ Guardar display completo para usar como fallback en el timer
    window._micLastDisplay = display;
  };

  rec.onerror = (e) => {
    if(e.error === 'no-speech'){ if(micListening && !micRestartLock) restartListening(); return; }
    if(e.error === 'aborted') return;
    if(e.error === 'not-allowed'){
      document.getElementById('micText').textContent = '⚠ Permiso de micrófono denegado.';
      document.getElementById('micText').style.color = '#E05252';
    }
    micRestartLock = false;
    stopListening();
  };

  rec.onend = () => {
    if(micListening && !micRestartLock) restartListening();
  };
}

// ── Detectar contexto en tiempo real mientras habla ──
function _actualizarContextoMic(texto){
  const header = document.getElementById('micHeader');
  const icon   = document.getElementById('micContextIcon');
  const title  = document.getElementById('micContextTitle');
  const sub    = document.getElementById('micContextSub');
  if(!header||!icon||!title||!sub) return;

  const t = texto.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();

  if(isNotaCommand(texto)){
    const esLista = t.includes('lista');
    header.style.background='#1E3A2E';
    icon.textContent  = esLista ? '📋' : '📝';
    title.textContent = esLista ? 'Modo Lista' : 'Nueva Nota';
    sub.textContent   = esLista ? 'Dictarás ítems uno por uno' : 'Se abrirá el editor de notas';
  } else if(isAgendaCommand(texto)){
    const esVis = /\b(visita|cotizar|presupuesto)\b/.test(t);
    header.style.background='#1A2B3E';
    icon.textContent  = esVis ? '👁' : '🔧';
    title.textContent = esVis ? 'Agenda — Visita' : 'Agenda — Trabajo';
    sub.textContent   = 'Gemini llenará los campos automáticamente';
  } else if(/\b(gast[eé]|pagu[eé]|compr[eé]|recib[ií]|cobr[eé]|gan[eé])\b/.test(t)){
    header.style.background='#1E293B';
    icon.textContent  = /\b(recib|cobr|gan)\b/.test(t) ? '↑' : '↓';
    title.textContent = /\b(recib|cobr|gan)\b/.test(t) ? 'Registrar Ingreso' : 'Registrar Gasto';
    sub.textContent   = 'Gemini analizará el monto y categoría';
  }
}

function stopListening() {
  micListening      = false;
  micRestartLock    = true;
  _micSessionBase   = '';
  _micSessionFinals = '';
  micFullTranscript = '';
  clearTimeout(micSilenceTimer);
  if(recognition){ try{ recognition.stop(); }catch(e){} }
  // ★ Null-safe: elementos pueden no existir cuando el panel de agenda está activo
  const micBtn  = document.getElementById('micBtn');
  const micIcon = document.getElementById('micBtnIcon');
  const micTxt  = document.getElementById('micBtnTxt');
  const micHint = document.getElementById('micHint');
  const micFab  = document.getElementById('micFab');
  if(micBtn)  micBtn.style.background = 'linear-gradient(135deg,#475569,#64748B)';
  if(micIcon) micIcon.textContent = '🎙';
  if(micTxt)  micTxt.textContent  = 'Escuchar de nuevo';
  if(micFab)  micFab.classList.remove('listening');
  document.querySelectorAll('.wave-bar').forEach(b=>b.classList.remove('active'));
  if(micHint) micHint.innerHTML = 'Di algo como: <em>"Gasté 50 soles en comida"</em>';
}

function openMonedaModal() {
  const m = state.moneda || 'PEN';
  const monedas = [
    { code: 'USD', symbol: '$', name: 'Dólar Estadounidense' },
    { code: 'EUR', symbol: '€', name: 'Euro' },
    { code: 'PEN', symbol: 'S/', name: 'Sol Peruano' },
    { code: 'MXN', symbol: '$', name: 'Peso Mexicano' },
    { code: 'COP', symbol: '$', name: 'Peso Colombiano' },
    { code: 'CLP', symbol: '$', name: 'Peso Chileno' },
    { code: 'ARS', symbol: '$', name: 'Peso Argentino' },
    { code: 'BRL', symbol: 'R$', name: 'Real Brasileño' },
    { code: 'GBP', symbol: '£', name: 'Libra Esterlina' },
  ];
  
  const html = `
    <div class="modal-title" style="font-family:'Inter', system-ui, sans-serif;font-size:20px;font-weight:700;margin-bottom:16px;color:var(--text)">Moneda</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:16px">Selecciona la moneda principal de la aplicación.</div>
    <div style="display:flex;flex-direction:column;gap:8px;max-height:60vh;overflow-y:auto;padding-right:4px">
      ${`${monedas.map(c => `
        <div onclick="setMoneda('${c.code}', '${c.symbol}')" style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:${m===c.code?'var(--bg)':'var(--card)'};border:1px solid ${m===c.code?'var(--gold)':'var(--border)'};border-radius:8px;cursor:pointer;transition:all .2s">
          <div style="display:flex;align-items:center;gap:12px">
            <div style="width:36px;height:36px;border-radius:8px;background:${m===c.code?'var(--gold)':'#F8FAFC'};color:${m===c.code?'#FFF':'var(--text)'};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;border:1px solid ${m===c.code?'var(--gold)':'var(--border)'}">${c.symbol}</div>
            <div style="font-size:14px;font-weight:600;color:var(--text);font-family:'Inter', system-ui, sans-serif">${c.name}</div>
          </div>
          ${m===c.code?'<div style="color:var(--gold);font-size:18px;font-weight:700">✓</div>':''}
        </div>
      `).join('')}`}
    </div>
  `;
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal').style.display = 'flex';
}

function setMoneda(code, symbol) {
  state.moneda = code;
  state.monedaSymbol = symbol;
  save('fnz_moneda', code);
  save('fnz_moneda_symbol', symbol);
  closeModal();
  render();
  toast('Moneda actualizada a ' + code);
}
