// ── Normalizar texto (sin tildes, sin signos) ──
function nrm(s) {
  return (s||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9\s]/g,' ')
    .replace(/\s+/g,' ').trim();
}

// ── Extraer monto (robusto) ──
function extractAmount(text) {
  // FIX: normalizar punto de miles (1.500 → 1500) antes de parsear
  text = text.replace(/(\d+)\.(\d{3})(?!\d)/g, '$1$2');
  const t = text;
  // S/. 400 | S/ 400 | S/.400
  let m = t.match(/s\/\.?\s*(\d[\d.,]*)/i);
  if (m) { const n=parseFloat(m[1].replace(',','.')); if(!isNaN(n)&&n>0) return n; }
  // 400 soles | 400.50 soles
  m = t.match(/(\d[\d.,]*)\s*(?:soles?|sol\b|nuevos?\s*soles?)/i);
  if (m) { const n=parseFloat(m[1].replace(',','.')); if(!isNaN(n)&&n>0) return n; }
  // número con decimales: 400.50 | 400,50
  m = t.match(/\b(\d{1,6}[.,]\d{1,2})\b/);
  if (m) { const n=parseFloat(m[1].replace(',','.')); if(!isNaN(n)&&n>0) return n; }
  // número entero de 2+ dígitos (toma el último encontrado en el texto)
  const allNums = [...t.matchAll(/\b(\d{2,7})\b/g)].map(x=>parseFloat(x[1])).filter(x=>x>0&&x<9999999);
  if (allNums.length) return allNums[allNums.length-1];
  // números en palabras
  const words = nrm(text).split(/\s+/);
  let total=0, last=0;
  for (const w of words) {
    if (NUM_WORDS[w]!==undefined) {
      const v=NUM_WORDS[w];
      if(v===1000){total+=(last||1)*1000;last=0;}
      else if(v>=100){last=(last||1)*v;}
      else last+=v;
    }
  }
  if(last||total) return total+last;
  return null;
}

// ── Detectar tipo ingreso / egreso ──
function detectType(text) {
  const t = nrm(text);

  // ── Patrones de EGRESO con prioridad absoluta ──
  // "le presté / le di prestado / di plata a" = yo di dinero = egreso
  if (/\b(le preste|le di prestado|di plata a|preste plata|le di plata)\b/.test(t)) return 'egreso';
  // "recargué saldo/celular" = egreso
  if (/\b(recargue|recarga)\b/.test(t) && /\b(saldo|celular|tarjeta|bus|metropolitano|movil)\b/.test(t)) return 'egreso';
  // "deposité" sin "me" antes = yo moví dinero = egreso
  if (/\b(deposite|hice un deposito)\b/.test(t) && !/\bme\b/.test(t)) return 'egreso';
  // "di propina" = egreso
  if (/\b(di propina|deje propina|le di propina)\b/.test(t)) return 'egreso';

  // ── Patrones de INGRESO con prioridad absoluta ──
  // "me [verb] [dinero]" donde YO recibo = siempre ingreso
  if (/\bme (dieron|regalo|regalaron|presto|prestaron|devolvieron|retornaron|reembolso|reembolsaron|regreso|regresaron|mandaron|enviaron|deposito|depositaron|transfirieron|pasaron|abonaron|pagaron|cayeron|llegaron|entraron)\b/.test(t)) return 'ingreso';
  // "de parte de [alguien]" = recibí dinero = ingreso
  if (/\bde parte de\b/.test(t)) return 'ingreso';
  // "encontré/hallé" dinero = ingreso
  if (/\b(encontre|halle|encontré|hallé)\b/.test(t)) return 'ingreso';
  // "gané" sin contexto de juego que implique gasto = ingreso
  if (/\b(gane|gané)\b/.test(t) && !/\b(gaste en|pague en)\b/.test(t)) return 'ingreso';

  let inScore=0, outScore=0;

  // Si hay un patrón "me [verb] X para [purpose]", ignorar las palabras del propósito al puntuar
  // Para evitar que "me dieron para arreglar la casa" pierda por 'arreglo' y 'casa'
  let scoringText = t;
  if (/\bme (dio|dieron|regalo|regalaron|presto|prestaron|mando|mandaron|envio|enviaron|deposito|depositaron)\b/.test(t)) {
    scoringText = t.replace(/\bpara\b.*/,'').replace(/\bpor\b.*/,'');
  }

  for (const kw of INGRESO_KW) if(scoringText.includes(nrm(kw))) inScore++;
  for (const kw of EGRESO_KW)  if(scoringText.includes(nrm(kw))) outScore++;
  if(inScore>outScore) return 'ingreso';
  if(outScore>inScore) return 'egreso';
  if(/recib|cobr|gan[ae]|ingres|deposit|me (cay|lleg|entr|pag|abona|dier|manda|envia|pasa)|vend[ii]|transfer.*recib|punto.*adicional/i.test(text)) return 'ingreso';
  // Negocio — si está en modo negocio y mencionó un servicio, es ingreso
  if(state.modo==='negocio' && detectServicioNegocio(text)) return 'ingreso';
  // Negocio — verbos típicos de cobro del gasfitero
  if(state.modo==='negocio' && /\b(instal[eé]|conect[eé]|repar[eé]|convert[ií]|modifiqu[eé]|hice|realic[eé]|termin[eé]|cobr[eé]|atend[ií]|fui a|trabaj[eé])\b/i.test(text)) return 'ingreso';
  return 'egreso';
}

// ── Detectar categoría — incluye categorías creadas por el usuario ──
function detectCategory(text, type) {
  const t = nrm(text);
  const allCats = type==='ingreso' ? state.catsIn : state.catsEx;

  // Si el texto tiene patrón "me [verb] X para [purpose]" o "me [verb] X por [purpose]"
  // ignorar la parte posterior al "para/por" para no contaminar la categoría
  let catText = t;
  if (/\bme (dio|dieron|regalo|regalaron|presto|prestaron|mando|mandaron|envio|enviaron|deposito|depositaron|transfirieron|pasaron)\b/.test(t)) {
    catText = t.replace(/\b(para|por)\b.*/,'');
  }

  // 1. Coincidencia exacta por nombre de categoría
  for (const cat of allCats) {
    if(catText.includes(nrm(cat.name))) return cat;
  }

  // 2. Score por keywords del sistema
  let best=null, bestScore=0;
  for (const [catId, kws] of Object.entries(CAT_KEYWORDS)) {
    if(catId.startsWith('_')) continue;
    const cat = allCats.find(c=>c.id===catId);
    if(!cat) continue;
    let score=0;
    for (const kw of kws) if(catText.includes(nrm(kw))) score++;
    if(score>bestScore){bestScore=score;best=cat;}
  }
  if(best && bestScore>0) return best;

  // 3. Categorías extra
  const EXTRA_MAP = {
    '_cuidado': ['cuidado','personal','belleza','peluq','barber','gym','spa','higiene'],
    '_deporte': ['deporte','gym','gimnasio','sport','fitness','cancha','natacion'],
    '_familia': ['familia','familiar','envio','envíos','apoyo'],
    '_ahorro':  ['ahorro','ahorre','aparte','guarde','separe','fondo','meta']
  };
  for (const [key, nameHints] of Object.entries(EXTRA_MAP)) {
    const kws = CAT_KEYWORDS[key] || [];
    let score=0;
    for (const kw of kws) if(catText.includes(nrm(kw))) score++;
    if(score>0){
      const userCat = allCats.find(c=>{
        const cn=nrm(c.name);
        return nameHints.some(h=>cn.includes(h));
      });
      if(userCat) return userCat;
    }
  }

  // 4. Fallback inteligente
  if(type==='ingreso'){
    // "encontré/hallé" → Otro ingreso
    if(/\b(encontre|halle)\b/.test(t))
      return allCats.find(c=>c.id==='ci6') || allCats.find(c=>c.name==='Otro ingreso') || allCats.filter(c=>!c.negocio)[0];
    // "me [verb] de parte de persona" → Bono
    const receivedFromPerson = /\b(de parte de|me (mand[oo]|envi[oo]|dio|dieron|deposit[oo]|transfi|pas[oo]|regalo|regalaron))\b/.test(t);
    if(receivedFromPerson)
      return allCats.find(c=>c.id==='ci5') || allCats.find(c=>c.id==='ci6') || allCats.filter(c=>!c.negocio)[0];
    return allCats.find(c=>c.id==='ci6')
      || allCats.find(c=>c.name==='Otro ingreso')
      || allCats.filter(c=>!c.negocio).slice(-1)[0]
      || allCats[0];
  }
  return allCats.find(c=>c.id==='ce10')
    || allCats.find(c=>c.name==='Otro gasto')
    || allCats.filter(c=>!c.negocio).slice(-1)[0]
    || allCats[0];
}

// ── Extraer fecha del texto ──
function extractDate(text) {
  const t = nrm(text);
  const today = new Date();
  function toStr(d){
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  function shift(days){ const d=new Date(today); d.setDate(d.getDate()+days); return toStr(d); }

  // ── PRIORIDAD MÁXIMA: "este/para este + día" ──
  const DIAS_MAP = {domingo:0,lunes:1,martes:2,miercoles:3,jueves:4,viernes:5,sabado:6};
  const esteMatch = t.match(/\b(?:este|esta|para este|para esta|el este)\s+(domingo|lunes|martes|miercoles|jueves|viernes|sabado)\b/);
  if(esteMatch){
    const num = DIAS_MAP[esteMatch[1]];
    const d2=new Date(today);
    let diff=(num-d2.getDay()+7)%7;
    if(diff===0) diff=7;
    d2.setDate(d2.getDate()+diff);
    return toStr(d2);
  }
  // "el próximo + día"
  const proxMatch = t.match(/(?:el proximo|el próximo|proximo|próximo)\s+(domingo|lunes|martes|miercoles|jueves|viernes|sabado)/);
  if(proxMatch){
    const num = DIAS_MAP[proxMatch[1]];
    const d2=new Date(today);
    let diff=(num-d2.getDay()+7)%7||7;
    d2.setDate(d2.getDate()+diff);
    return toStr(d2);
  }

  // ── PRIORIDAD 2: días de la semana solos (antes que mañana/hoy) ──
  const DIAS = [['domingo',0],['lunes',1],['martes',2],['miercoles',3],['jueves',4],['viernes',5],['sabado',6]];
  const esFuturo = /\b(este|esta|el proximo|el próximo|proximo|próximo|para el|para esta|para este)\b/.test(t);
  for (const [nombre,num] of DIAS) {
    if(new RegExp('\\b'+nombre+'\\b').test(t)){
      const d=new Date(today);
      const hoy=d.getDay();
      let diff=(num-hoy+7)%7;
      if(diff===0) diff=7; // mismo día → próxima semana
      d.setDate(d.getDate()+diff);
      return toStr(d);
    }
  }

  // pasado mañana
  if(/pasado (manana|mañana)/.test(t)||t.includes('pasado manana')) return shift(+2);
  // antes de ayer / anteayer / antier
  if(/antes de ayer|anteayer|antier/.test(t)) return shift(-2);
  // ayer
  if(/\bayer\b/.test(t)) return shift(-1);
  // mañana
  if(/\bmanana\b/.test(t)) return shift(+1);
  // hoy
  if(/\bhoy\b/.test(t)) return toStr(today);
  // Expresiones futuras peruanas
  if(/\bla próxima semana\b|\bla proxima semana\b/.test(t)) return shift(+7);
  if(/\besta semana\b/.test(t)) return toStr(today);
  if(/\ben (\d+) días\b|en (\d+) dias\b/.test(t)){
    const mm=t.match(/en (\d+) d[ií]as/); if(mm) return shift(parseInt(mm[1]));
  }
  // esta semana → hoy
  if(/esta semana/.test(t)) return toStr(today);
  // semana pasada → hace 7 días
  if(/semana pasada|semana anterior/.test(t)) return shift(-7);
  // mes pasado → hace 30 días aprox
  if(/mes pasado|mes anterior/.test(t)) { const d=new Date(today); d.setMonth(d.getMonth()-1); return toStr(d); }
  return toStr(today); // por defecto: hoy
}

// ── Formato de fecha legible en español ──
function fmtDateLabel(ds) {
  if(!ds) return 'Hoy';
  const d=new Date(ds+'T00:00:00');
  const dias=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const today=new Date();
  const diff=Math.round((new Date(ds+'T12:00:00')-new Date(today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0')+'T12:00:00'))/(864e5));
  const label=diff===0?'Hoy':diff===-1?'Ayer':diff===-2?'Antes de ayer':diff===1?'Mañana':`${dias[d.getDay()]} ${d.getDate()} ${meses[d.getMonth()]}`;
  return `${label} · ${d.getDate().toString().padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

// ── Extraer descripción limpia ──
function extractDescription(text) {
  let t = text;
  // Quitar referencias temporales
  t = t.replace(/\b(pasado mañana|antes de ayer|anteayer|antier|mañana|ayer|hoy)\b/gi,'');
  t = t.replace(/\b(el\s+)?(lunes|martes|miércoles|miercoles|jueves|viernes|sábado|sabado|domingo)\b/gi,'');
  t = t.replace(/\b(esta semana|semana pasada|semana anterior|mes pasado|mes anterior)\b/gi,'');
  // Quitar montos
  t = t.replace(/s\/\.?\s*\d+(?:[.,]\d+)?/gi,'');
  t = t.replace(/\d+(?:[.,]\d+)?\s*(?:soles?|sol\b|nuevos?\s*soles?)?/gi,'');
  // Quitar verbos de registro
  t = t.replace(/\b(gast[eéo]|pagu[eéo]|compr[eéo]|recibi[oó]|cobr[eéo]|gan[eéo]|ingres[eéo]|deposit[aoó]|me\s+(deposit|pag|transfi|dier|cay|lleg|entr|abona|mand|envi|pas)[a-záéíóú]*|apunta|registra|anota|agrega|guard[ao]|entr[oó]|sali[oó]|se\s+fue|mand[eéo]|envi[eéo]|transferi[oó])\b/gi,'');
  // Quitar "concepto (de)", conectores, artículos
  t = t.replace(/\b(concepto\s+(de)?|por\s+concepto\s+de?|un\s+|una\s+|de\s+|en\s+|por\s+|para\s+|del\s+|al\s+|la\s+|el\s+|lo\s+|las\s+|los\s+|con\s+|que\s+|es\s+|fue\s+|hay\s+)\b/gi,' ');
  return t.replace(/\s+/g,' ').trim();
}

// ── Desambiguación GAS: ¿doméstico o del auto? ──
function isContextGasolinaAuto(text) {
  const t = nrm(text);
  // Verbos/contexto que indican recarga de combustible vehicular
  const autoPatterns = [
    'meti gas','meti gasolina','cargue gas','cargue gasolina',
    'puse gas','puse gasolina','llene el tanque','llene el carro',
    'llene el auto','llene la moto','llene el vehiculo',
    'gas del carro','gas del auto','gas de la moto','gas del vehiculo',
    'gasolina','combustible','petroleo','gnv','glp',
    'grifo','repsol','primax','pecsa','petroperu','petroperú'
  ];

  if (/\b(meti|eche|puse|cargue|llene|recargue)\b/.test(t) && t.includes('gas')) return true;

}

// Retorna el objeto servicio de state.servicios o null
function detectServiceMatch(text) {
  const t = nrm(text);
  // Mapeo de señales de voz → palabras clave del nombre del servicio
  const serviceSignals = [
    { signals: ['luz','enel','luz del sur','electricidad','recibo de luz','energia electrica'],
      nameKeys: ['luz','enel','electr'] },
    { signals: ['agua','sedapal','recibo de agua','servicio de agua'],
      nameKeys: ['agua','sedapal'] },
    { signals: ['gas de la casa','gas del hogar','gas domestico','gas domiciliario',
                'balon de gas','calidda','limagas','solgas','recibo de gas',
                'pague el gas','pague del gas','pague de gas','gas natural'],
      nameKeys: ['gas','calidda','limagas'] },
    { signals: ['internet','wifi','banda ancha','recibo de internet','pague el internet'],
      nameKeys: ['internet','wifi','banda'] },
    { signals: ['telefono','celular','movistar','claro','entel','bitel','wom',
                'plan celular','recibo del celular','pague el celular','pague el telefono'],
      nameKeys: ['telefono','celular','movil','movistar','claro','entel','bitel'] },
    { signals: ['cable','directv','claro tv','movistar tv','television','pague el cable'],
      nameKeys: ['cable','tv','directv','claro tv','movistar tv'] },
  ];

  // El gas del auto NO activa el servicio
  if (isContextGasolinaAuto(text)) return null;

  for (const { signals, nameKeys } of serviceSignals) {
    const signalMatch = signals.some(s => t.includes(nrm(s)));
    if (!signalMatch) continue;
    // Buscar en state.servicios el que coincida
    const svc = state.servicios.find(s => {
      const sn = nrm(s.name);
      return nameKeys.some(nk => sn.includes(nk));
    });
    if (svc) return svc;
  }
  return null;
}

// ── Descripción inteligente ──
function buildSmartDescription(text, cat, detectedService) {
  // Si es un pago de servicio conocido, usar nombre real del servicio
  if (detectedService) return 'Pago ' + detectedService.name;
  const raw = extractDescription(text);
  if (!raw || raw.length < 2) return cat?.name || '';
  // Capitalizar primera letra
  return raw.charAt(0).toUpperCase() + raw.slice(1);
}

// Extraer ubicación/distrito desde voz
function extractUbicacion(text){
  const norm = text.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'');

  // Ordenar distritos de mayor a menor longitud para que "San Juan de Miraflores"
  // tenga prioridad sobre "Miraflores" o "San Juan de Lurigancho"
  const distritosOrdenados = [...DISTRITOS_LIMA].sort((a,b)=>b.length-a.length);

  // 1. Coincidencia directa (buscar el distrito más largo primero)
  for(const d of distritosOrdenados){
    const dn = d.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    if(norm.includes(dn)) return d;
  }

  // 2. Patrones contextuales con captura amplia (hasta 35 chars)
  const patterns = [
    /(?:en el distrito de|en la zona de|distrito de|zona de)\s+([a-z\s]{3,35}?)(?:\s*[,.]|\s+a las|\s+\d|$)/i,
    /(?:en|por|en la|en el|hacia|queda en|vive en|domicilio en|ubicado en)\s+([a-z][a-z\s]{2,33}?)(?:\s*[,.]|\s+a las|\s+\d|\s+precio|\s+soles|\s+servicio|$)/i,
  ];
  for(const p of patterns){
    const m = norm.match(p);
    if(m){
      const candidate = m[1].trim();
      // Buscar el distrito más largo que sea substring del candidato
      for(const d of distritosOrdenados){
        const dn = d.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
        if(candidate.includes(dn) || dn.includes(candidate)) return d;
      }
    }
  }
  return null;
}

// Extraer nombre del cliente desde la voz
function extractCliente(text) {
  const t = text;
  // Detectar tratamiento para conservarlo (Sr./Sra.)
  const _tratMatch = text.match(/\b(señor|señora|don|doña|sr\.?|sra\.?)\s+/i);
  const _trat = _tratMatch ? (/(señora|doña|sra)/i.test(_tratMatch[1]) ? 'Sra.' : 'Sr.') : '';
  // ★ Palabras de servicio — cortar el nombre aquí
  const SERVICIO_STOP = /\b(punto\s+adicional|terma|cocina|horno|calefon|parrilla|secadora|instalacion|conexion|reparacion|modificacion|gasfiteria|documentacion|conversion|construccion|punto|adicional|tuberia|red|boca|servicio)\b/i;

  const patterns = [
    // Con preposición explícita — máxima prioridad
    /(?:al|para el|para la|a la|para|con el|con la)\s+(?:señor|señora|don|doña|sr\.?|sra\.?|ing\.?|ingeniero|ingeniera|doctor|doctora|prof\.?|profesor|profesora|arquitecto|arquitecta|licenciado|licenciada)\s+([A-Za-záéíóúñÁÉÍÓÚÑ][A-Za-záéíóúñÁÉÍÓÚÑ\s]{1,25}?)(?:\s*[,.]|\s+\d|\s+en\b|\s+de\b|\s+del\b|\s+por\b|\s+a las|\s+precio|\s+soles|\s+servicio|$)/i,
    /(?:para|al|a|con)\s+(?:el|la)\s+(?:cliente|clienta|señor|señora|vecino|vecina|casero|casera|propietario|propietaria|dueño|dueña)\s+([A-Za-záéíóúñÁÉÍÓÚÑ][A-Za-záéíóúñÁÉÍÓÚÑ\s]{1,20}?)(?:\s*[,.]|\s+en\b|\s+de\b|\s+precio|\s+soles|\s+servicio|$)/i,
    /(?:casa de|domicilio de|vivienda de|propiedad de)\s+([A-Za-záéíóúñÁÉÍÓÚÑ][A-Za-záéíóúñÁÉÍÓÚÑ\s]{1,25}?)(?:\s*[,.]|\s+en\b|\s+de\b|$)/i,
    /de(?:l|\s+la)?\s+(?:señor|señora|don|doña|sr\.?|sra\.?)\s+([A-Za-záéíóúñÁÉÍÓÚÑ][A-Za-záéíóúñÁÉÍÓÚÑ\s]{1,25}?)(?:\s*[,.]|\s+en\b|\s+de\b|\s+por\b|\s+precio|$)/i,
    /(?:para|al|con)\s+([A-ZÁÉÍÓÚÑ][a-záéíóúñ]+\s+[A-ZÁÉÍÓÚÑ][a-záéíóúñ]+)(?:\s+en\b|\s+de\b|\s*[,.]|\s+precio|$)/,
    // ★ Sin preposición: "señora Carmen Lince", "señor Pedro viernes"
    /(?:señora?|doña?|don|sr\.?|sra\.?)\s+([A-Za-záéíóúñÁÉÍÓÚÑ][A-Za-záéíóúñÁÉÍÓÚÑ\s]{1,20}?)(?:\s+en\b|\s+de\b|\s*[,.]|\s+\d|\s+este\b|\s+el\b|\s+la\b|\s+lunes|\s+martes|\s+miercoles|\s+jueves|\s+viernes|\s+sabado|\s+domingo|\s+hoy|\s+manana|\s+mañana|\s+servicio\b|\s+precio\b|\s+soles\b|\s+punto\b|\s+terma\b|\s+cocina\b|\s+horno\b|\s+calefon\b|\s+parrilla\b|\s+instalacion\b|\s+conexion\b|\s+reparacion\b|$)/i,
  ];
  for (const p of patterns) {
    const m = t.match(p);
    if (m && m[1]) {
      let nombre = m[1].trim().replace(/\s+/g,' ');
      // ★ Cortar en la primera palabra de servicio
      const svcIdx = nombre.search(SERVICIO_STOP);
      if(svcIdx > 0) nombre = nombre.slice(0, svcIdx).trim();
      // Limpiar preposiciones y días de semana
      nombre = nombre.replace(/\b(en|de|del|al|la|el|por|para|con|que|fue|era|un|una|este|esta|dia|día|lunes|martes|miercoles|jueves|viernes|sabado|domingo|hoy|manana|mañana|siguiente|proximo|próximo)\b/gi,'').trim();
      // ★ Si segunda palabra es inicio de distrito → solo primera
      const partes = nombre.split(/\s+/).filter(Boolean);
      const DISTW = /^(los|san|la|el|villa|santa|jesus|pueblo|puente|ate|callao|surco|lince|rimac|comas|barranco|lurin|chorrillos|breña|brena|miraflores|independencia|carabayllo|ventanilla)$/i;
      const DIASW = /^(lunes|martes|miercoles|jueves|viernes|sabado|domingo|hoy|manana|mañana)$/i;
      if(partes.length>1 && (DISTW.test(partes[1])||DIASW.test(partes[1]))) nombre=partes[0];
      else nombre=partes.slice(0,2).join(' ');
      if (nombre.length > 1) return (_trat ? _trat + ' ' + nombre : nombre);
    }
  }
  // ── FALLBACK ULTRASIMPLE: "señor/don + nombre" en cualquier posición ──
  // Cubre casos donde los patrones complejos fallan por orden desordenado
  const ULTRA_SVCSTOP = /^(servicio|punto|adicional|terma|cocina|horno|calefon|parrilla|secadora|instalacion|conexion|reparacion|modificacion|gasfiteria|documentacion|conversion|construccion|tuberia|red|precio|soles|para|en|de|del|al|la|el|a|las)$/i;
  const ultFallback = t.match(/(?:señora?|doña?|don|sr\.?|sra\.?)\s+([A-ZÁÉÍÓÚÑa-záéíóúñ][a-záéíóúñ]{1,20})/i);
  if(ultFallback && ultFallback[1]){
    const fn = ultFallback[1].trim();
    if(!ULTRA_SVCSTOP.test(fn) && fn.length > 1) return (_trat ? _trat + ' ' + fn : fn);
  }
  // ── FALLBACK 2: texto normalizado — "senor/don + nombre" ──
  const t3 = t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const nrmFall = t3.match(/(?:senora?|dona|don)\s+([a-z][a-z]{1,18})/i);
  if(nrmFall && nrmFall[1]){
    const fn2 = nrmFall[1].trim();
    if(!ULTRA_SVCSTOP.test(fn2) && fn2.length > 1) {
      const fn2cap = fn2.charAt(0).toUpperCase()+fn2.slice(1);
      return (_trat ? _trat + ' ' + fn2cap : fn2cap);
    }
  }
  return null;
}

          'instalacion_nueva':  'Instalación Nueva',
          'conversion_artefacto':'Conversión Artefacto',
          'conexion_artefacto': 'Conexión Artefacto',
          'reparacion_tuberia': 'Reparación Tubería',
          'gasfiteria':         'Gasfitería',
          'documentacion':      'Documentación',
          'cocina_artefacto':   'Cocina / Cocinilla',
          'horno_artefacto':    'Horno a Gas',
          'terma_artefacto':    'Terma',
          'secadora_artefacto': 'Secadora a Gas',
          'cafelon_artefacto':  'Calefón',
          'parrilla_artefacto': 'Parrilla a Gas',
        };
        const nombre = nombres[servicioNeg.id];
        cat = state.catsIn.find(c=>c.name===nombre) || state.catsIn[state.catsIn.length-1];
      } else {
        cat = state.catsIn[state.catsIn.length-1]; // Otro Servicio
      }
    } else {
      // Egreso en modo negocio → clasificar por tipo
      if (/\bgnv\b/.test(t))
        cat = state.catsEx.find(c=>c.id==='cne2') || state.catsEx[0];
      else if (/gasolina|combustible|meti gas|cargue gas|llene/.test(t))
        cat = state.catsEx.find(c=>c.id==='cne3') || state.catsEx[0];
      else if (/materiales?|insumos?/.test(t))
        cat = state.catsEx.find(c=>c.id==='cne1') || state.catsEx[0];
      else if (/herramienta|equipo|instrumento/.test(t))
        cat = state.catsEx.find(c=>c.id==='cne4') || state.catsEx[0];
      else if (/auto|carro|vehiculo|veh[ií]culo|moto\b|coche|reparacion|arreglo|mantenimiento|llanta|frenos|aceite|placa|soat|revision tecnica|servicio tecnico del auto|taller/.test(t))
        cat = state.catsEx.find(c=>c.id==='cne7') || state.catsEx[0];
      else if (/viatico|pasaje|movilidad|taxi|uber/.test(t))
        cat = state.catsEx.find(c=>c.id==='cne5') || state.catsEx[0];
      else
        cat = state.catsEx.find(c=>c.id==='cne6') || state.catsEx[0]; // Otro gasto negocio
    }
  } else {
    // ── MODO PERSONAL: lógica anterior ──
    if (servicioNeg && type === 'ingreso') {
      cat = state.catsIn.find(c=>c.id==='cneg_svc') || state.catsIn[state.catsIn.length-1];
    } else if (/\bmateriales?\b|\binsumos?\b/.test(t) && isContextoNegocioClear(text)) {
      cat = state.catsEx.find(c=>c.id==='cneg_mat') || state.catsEx[state.catsEx.length-1];
    } else if (/\bgnv\b/.test(t)) {
      cat = state.catsEx.find(c=>c.id==='cneg_gnv') || detectCategory(text, type);
    } else if (isContextGasolinaAuto(text) && isContextoNegocioClear(text)) {
      cat = state.catsEx.find(c=>c.id==='cneg_gas') || detectCategory(text, type);
    } else if (isContextGasolinaAuto(text)) {
      cat = state.catsEx.find(c=>c.id==='ce2') || detectCategory(text, type);
    } else if (isContextGasDomestico(text)) {
      cat = state.catsEx.find(c=>c.id==='ce6') || detectCategory(text, type);
    } else {
      cat = detectCategory(text, type);
    }
  }

  // Ambigüedad solo aplica en modo personal
  const needsNegocioConfirm = !esNegocio && detectNegocioAmbiguidad(text, cat?.id);
  const serviceMatch = type === 'egreso' && !esNegocio ? detectServiceMatch(text) : null;

  let desc = '';
  if (servicioNeg) {
    desc = servicioNeg.label + (cliente ? ` — ${cliente}` : '');
  } else {
    desc = buildSmartDescription(text, cat, serviceMatch);
  }

  const ubicacion = extractUbicacion(text);
  return { amount, type, cat, desc, date, serviceMatch,
           cliente, ubicacion, servicioNeg, negocio: esNegocio,
           needsNegocioConfirm, raw: text };
}

let _micContext = null;       // contexto actual detectado
let _ghostData  = {};         // datos detectados {campo: valor}
let _ghostHistory = [];       // historial para "rectifica" [{campo, valor}]

function detectMicContext(text) {
  const t = text.toLowerCase();
  if(/agenda\s*(visita|cita|vista)/.test(t))       return 'agenda_visita';
  if(/agenda\s*(construc|trabajo|instal|servicio|obra)/.test(t)) return 'agenda_construccion';
  if(/\b(gast[eé]|pagu[eé]|cobr[eé]|ingres|egres|compr[eé]|deposit|sueldo|bono|transfer)\b/.test(t)) return 'tx';
  if(/\b(deuda|cuota|pr[eé]stamo|banco|tarjeta|debo|me cobran)\b/.test(t)) return 'deuda';
  if(/\b(nota|lista|recordatorio|apunta|anota|no olvides)\b/.test(t)) return 'nota';
  return null;
}

function setMicContext(ctx) {
  if(_micContext === ctx) return; // ya está configurado
  _micContext = ctx;
  _ghostData = {};
  _ghostHistory = [];
  const def = MIC_CONTEXTS[ctx];
  if(!def) return;

  // Cambiar colores del header
  const header = document.getElementById('micHeader');
  const box    = document.getElementById('micBox');
  if(header) header.style.background = def.bg;
  if(box)    box.style.borderTop = '3px solid '+def.color;

  document.getElementById('micContextIcon').textContent  = def.icon;
  document.getElementById('micContextTitle').textContent = def.title;
  document.getElementById('micContextSub').textContent   = def.sub;

  // Renderizar campos fantasma
  renderGhostFields(ctx);
  document.getElementById('micGhostForm').style.display='block';
}

function renderGhostFields(ctx) {
  const def = MIC_CONTEXTS[ctx];
  if(!def) return;
  const container = document.getElementById('micGhostFields');
  container.innerHTML = def.fields.map(f=>`
    <div id="ghost-${f.id}" style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:10px;transition:all .25s">
      <span style="font-size:15px;min-width:20px">${f.icon}</span>
      <span class="ghost-label" style="font-size:12px;font-weight:500;color:#CBD5E1;flex:1">${f.label}${f.req?' *':''}</span>
      <span class="ghost-value" style="font-size:12px;font-weight:600;color:#CBD5E1"></span>
    </div>`).join('');
  updateMissingFields(ctx);
}

function fillGhostField(fieldId, value) {
  const el = document.getElementById('ghost-'+fieldId);
  if(!el) return;
  // Guardar historial para rectifica
  if(_ghostData[fieldId]) {
    _ghostHistory.push({campo: fieldId, valor: _ghostData[fieldId]});
  }
  _ghostData[fieldId] = value;
  _ghostHistory.push({campo: fieldId, valor: value});

  // Animar campo: gris → amarillo
  el.style.background    = '#FFFBEB';
  el.style.borderColor   = '#C9A84C';
  el.querySelector('.ghost-label').style.color = '#92400E';
  el.querySelector('.ghost-value').style.color = '#92400E';
  el.querySelector('.ghost-value').textContent = value;
  updateMissingFields(_micContext);
  _checkGhostSaveReady();
}

function clearLastGhostField() {
  if(_ghostHistory.length === 0) {
    toast('No hay datos para borrar','error'); return;
  }
  // Sacar el último del historial
  const last = _ghostHistory.pop();
  delete _ghostData[last.campo];

  // Resetear visualmente
  const el = document.getElementById('ghost-'+last.campo);
  if(el){
    el.style.background  = '#F8FAFC';
    el.style.borderColor = '#E2E8F0';
    el.querySelector('.ghost-label').style.color = '#CBD5E1';
    el.querySelector('.ghost-value').style.color = '#CBD5E1';
    el.querySelector('.ghost-value').textContent = '';
  }
  toast('Dato borrado — sigue hablando','info');
  updateMissingFields(_micContext);
}

function updateMissingFields(ctx) {
  const def = MIC_CONTEXTS[ctx]; if(!def) return;
  const cont = document.getElementById('micMissingFields'); if(!cont) return;
  const faltantes = def.fields.filter(f=>f.req && !_ghostData[f.id]);
  if(faltantes.length===0){
    cont.innerHTML='<span style="font-size:11px;color:var(--gold);font-weight:600">✓ Listo para guardar</span>';
  } else {
    cont.innerHTML = faltantes.map(f=>
      `<span style="font-size:10px;background:#FEF9EE;border:1px solid #C9A84C33;border-radius:6px;padding:2px 8px;color:#92400E">${f.icon} Falta: ${f.label}</span>`
    ).join('');
  }
}

function updateGhostFromText(text) {
  // Detectar contexto si aún no está definido
  if(!_micContext){
    const ctx = detectMicContext(text);
    if(ctx) setMicContext(ctx);
    else return;
  }

  const t = text.toLowerCase();

  // ★ Detectar comando rectifica/borra/corrije
  if(/\b(rectifica|rectifca|corrij[ae]|corrige|borra|cancela|eso no|no eso|error|elimina)\b/.test(t)){
    clearLastGhostField();
    return;
  }

  // Extraer datos según contexto
  if(_micContext==='agenda_visita'||_micContext==='agenda_construccion'){
    // Cliente: "para el señor/señora X" o "al señor X"
    const cl = text.match(/(?:para (?:el |la )?(?:señor|señora|sr\.?|sra\.?)?\s*)([A-ZÁÉÍÓÚÑ][a-záéíóúñ]+(?:\s[A-ZÁÉÍÓÚÑ][a-záéíóúñ]+)?)/i);
    if(cl && !_ghostData.cliente) fillGhostField('cliente', cl[1]);

    // Fecha
    const fecha = extractDate(text);
    if(fecha && !_ghostData.fecha) fillGhostField('fecha', fmtDateLabel(fecha));

    // Hora: "a las X" 
    const hr = text.match(/a\s+las?\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm)?/i);
    if(hr && !_ghostData.hora){
      let h=parseInt(hr[1]), m=parseInt(hr[2]||0);
      const ap=(hr[3]||'').toLowerCase();
      if(ap==='pm'&&h<12) h+=12;
      if(ap==='am'&&h===12) h=0;
      fillGhostField('hora', `${h}:${m<10?'0'+m:m} ${h>=12?'PM':'AM'}`);
    }

    // Ubicación: "en X" (excluir horario)
    const ub = text.match(/\ben\s+((?!las?\s+\d)[A-Za-záéíóúñÁÉÍÓÚÑ][a-záéíóúñ\s]{3,20})/i);
    if(ub && !_ghostData.ubicacion) fillGhostField('ubicacion', ub[1].trim());

    // Teléfono
    const tel = text.match(/\b(9\d{8})\b/);
    if(tel && !_ghostData.telefono) fillGhostField('telefono', tel[1]);

    // Servicio (solo construcción)
    if(_micContext==='agenda_construccion'){
      const servicios=['terma','calefón','cafelon','cocina','horno','parrilla','punto adicional','tubería','tuberia','gasfitería','gasfiteria','reparación','reparacion','instalación','instalacion','conexión','conexion'];
      for(const sv of servicios){
        if(t.includes(sv) && !_ghostData.servicio){
          fillGhostField('servicio', sv.charAt(0).toUpperCase()+sv.slice(1));
          break;
        }
      }
      // Precio
      const pr = extractAmount(text);
      if(pr && !_ghostData.precio) fillGhostField('precio', 'S/ '+pr.toFixed(2));
    }

  } else if(_micContext==='tx'){
    // Tipo
    if(/\b(gast[eé]|pagu[eé]|compr[eé]|egres|salió)\b/.test(t) && !_ghostData.tipo)
      fillGhostField('tipo','↓ Egreso');
    if(/\b(cobr[eé]|ingres[oó]|deposit|sueldo|bono|gané)\b/.test(t) && !_ghostData.tipo)
      fillGhostField('tipo','↑ Ingreso');
    // Monto
    const am = extractAmount(text);
    if(am && !_ghostData.monto) fillGhostField('monto','S/ '+am.toFixed(2));
    // Fecha
    const fe = extractDate(text);
    if(fe && !_ghostData.fecha) fillGhostField('fecha', fmtDateLabel(fe));

  } else if(_micContext==='deuda'){
    const am = extractAmount(text);
    if(am && !_ghostData.total) fillGhostField('total','S/ '+am.toFixed(2));
    const nc = text.match(/(\d+)\s*cuotas?/i);
    if(nc && !_ghostData.ncuotas) fillGhostField('ncuotas', nc[1]+' cuotas');

  } else if(_micContext==='nota'){
    if(/\blista\b/.test(t) && !_ghostData.tipo)        fillGhostField('tipo','✓ Lista');
    if(/\brecordatorio\b/.test(t) && !_ghostData.tipo) fillGhostField('tipo','⏰ Recordatorio');
    if(/\btexto\b/.test(t) && !_ghostData.tipo)        fillGhostField('tipo','📝 Texto');
  }
}

// ── Variables de control del micrófono ──
let micSilenceTimer   = null;
let micFullTranscript = '';
let micRestartLock    = false;
let _micSessionBase   = ''; // ★ texto acumulado ANTES del restart actual
let _micSessionFinals = ''; // ★ finales de la sesión actual (no del restart)
const MIC_SILENCE_MS  = /android/i.test(navigator.userAgent) ? 3500 : 2500; // ★ Android necesita más tiempo

function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('micText').textContent='⚠ Tu navegador no soporta reconocimiento de voz. Usa Chrome.';
    document.getElementById('micText').style.color='#E05252';
    return;
  }

  micFullTranscript = '';
  _micSessionBase   = '';
  _micSessionFinals = '';
  micRestartLock    = false;
  clearTimeout(micSilenceTimer);

  recognition = new SR();
  recognition.lang            = 'es-PE';
  recognition.interimResults  = true;
  recognition.maxAlternatives = 3;
  recognition.continuous      = true;

  micListening = true;
  document.getElementById('micBtn').style.background='linear-gradient(135deg,#E05252,#f87171)';
  document.getElementById('micBtnIcon').textContent='⏹';
  document.getElementById('micBtnTxt').textContent='Detener';
  document.getElementById('micFab').classList.add('listening');
  document.querySelectorAll('.wave-bar').forEach(b=>b.classList.add('active'));
  document.getElementById('micHint').innerHTML='<em>Escuchando... tómate tu tiempo 🎙</em>';
  document.getElementById('micText').style.color='#1E293B';
  document.getElementById('micText').textContent='...';

  startListeningHandlers(recognition);
  recognition.onstart = () => {
    document.getElementById('micText').textContent='🎙 Habla ahora...';
    document.getElementById('micText').style.color='#2A4455';
  };
  recognition.start();
}

function restartListening() {
  if (!micListening) return;
  micRestartLock = true;
  try { recognition.stop(); } catch(e) {}
  const _rDelay = /android/i.test(navigator.userAgent) ? 400 : 150;
  setTimeout(() => {
    if (!micListening) return;
    micRestartLock = false;
    // ★ Guardar lo acumulado hasta ahora como base de la nueva sesión
    _micSessionBase   = micFullTranscript.trim();
    _micSessionFinals = '';    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang           = 'es-PE';
    recognition.interimResults = true;
    recognition.maxAlternatives= 3;
    recognition.continuous     = true;
    startListeningHandlers(recognition);
    try { recognition.start(); } catch(e) {}
  }, 150);
}

function startListeningHandlers(rec) {
  // ★ Acumular solo los resultados NUEVOS de esta sesión.
  // _micSessionBase = todo lo dicho antes del último restart.
  // _micSessionFinals = finales confirmados de esta sesión.
  // micFullTranscript = base + sessionFinals (lo que se muestra y procesa).

    rec.onresult = (e) => {
    let sessionInterim = '';
    let sessionFinals  = '';
    let lastTr = '';

    // Reconstruir SIEMPRE desde 0 para evitar errores críticos de Android Chrome
    for(let i = 0; i < e.results.length; i++){
      let tr = e.results[i][0].transcript.trim();
      if(e.results[i].isFinal) {
        if(tr && tr !== lastTr) { // Evita que Chrome agregue el mismo sub-segmento varias veces
          sessionFinals += tr + ' ';
          lastTr = tr;
        }
      } else {
        sessionInterim += tr + ' ';
      }
    }

    _micSessionFinals = sessionFinals.trim();

    const base = _micSessionBase.trim();
    const finals = _micSessionFinals.trim();
    // Prevenir duplicación en el display visual
    let combinedFinal = (base + (base && finals ? ' ' : '') + finals).trim();
    combinedFinal = _deduplicarTranscript(combinedFinal); 
    micFullTranscript = combinedFinal;

    const interimClean = sessionInterim.trim();
    const display = (micFullTranscript + (micFullTranscript && interimClean ? ' ' : '') + interimClean).trim();

    document.getElementById('micText').textContent = display || '...';

    // Detección de contexto en tiempo real
    _actualizarContextoMic(display);

    // Formulario fantasma
    if(display) try { updateGhostFromText(display); } catch(err){}

    // Timer de silencio — procesar cuando para de hablar
    // ★ Usar display (finals + interim) — el FINAL puede llegar tarde o nunca
    // Guardar el último interim para usarlo si el timer dispara antes del FINAL
    window._micLastInterim = sessionInterim;

    clearTimeout(micSilenceTimer);
    const textoParaTimer = display; // finals + interim — lo que el usuario realmente dijo
    if(textoParaTimer.trim()){
      const esAgenda = isAgendaCommand(textoParaTimer);

      // ★ Lista/nota: detección local — procesar rápido sin esperar silencio largo
      if(isNotaCommand(textoParaTimer)){
        const _textoNota = display;
        micSilenceTimer = setTimeout(()=>{
          const texto = (micFullTranscript.trim() || _textoNota).trim();
          if(micListening && texto) processVoiceResult(texto);
        }, 800);
      } else if(esAgenda){
        const nrmText = textoParaTimer.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
        const tieneCliente  = /\b(se[nñ]or[a]?|don|do[nñ]a)\s+[a-z]/i.test(nrmText);
        const tieneServicio = /(punto adicional|terma|cocina|horno|calefon|parrilla|secadora|instalacion|conexion|reparacion|modificacion|gasfiteria|documentacion|conversion)/i.test(nrmText);
        const tieneFecha    = /\b(ma[nñ]ana|lunes|martes|mi[eé]rcoles|jueves|viernes|s[aá]bado|domingo|hoy|\d{4}-\d{2})\b/i.test(nrmText);
        const suficiente    = tieneCliente && (tieneServicio || tieneFecha);
        const esAndroid = /android/i.test(navigator.userAgent);
        const espera = esAndroid
          ? (suficiente ? 3500 : 6000)
          : (suficiente ? 2000 : 4000);
        const _textoAgenda = display;
        micSilenceTimer = setTimeout(()=>{
          const texto = (micFullTranscript.trim() || _textoAgenda).trim();
          if(micListening && texto) processVoiceResult(texto);
        }, espera);
      } else {
        const _textoGeneral = display;
        micSilenceTimer = setTimeout(()=>{
          const texto = (micFullTranscript.trim() || _textoGeneral).trim();
          if(micListening && texto) processVoiceResult(texto);
        }, MIC_SILENCE_MS);
      }
    }
    // ★ Guardar display completo para usar como fallback en el timer
    window._micLastDisplay = display;
  };

  rec.onerror = (e) => {
    if(e.error === 'no-speech'){ if(micListening && !micRestartLock) restartListening(); return; }
    if(e.error === 'aborted') return;
    if(e.error === 'not-allowed'){
      document.getElementById('micText').textContent = '⚠ Permiso de micrófono denegado.';
      document.getElementById('micText').style.color = '#E05252';
    }
    micRestartLock = false;
    stopListening();
  };

  rec.onend = () => {
    if(micListening && !micRestartLock) restartListening();
  };
}

// ── Detectar contexto en tiempo real mientras habla ──
function _actualizarContextoMic(texto){
  const header = document.getElementById('micHeader');
  const icon   = document.getElementById('micContextIcon');
  const title  = document.getElementById('micContextTitle');
  const sub    = document.getElementById('micContextSub');
  if(!header||!icon||!title||!sub) return;

  const t = texto.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();

  if(isNotaCommand(texto)){
    const esLista = t.includes('lista');
    header.style.background='#1E3A2E';
    icon.textContent  = esLista ? '📋' : '📝';
    title.textContent = esLista ? 'Modo Lista' : 'Nueva Nota';
    sub.textContent   = esLista ? 'Dictarás ítems uno por uno' : 'Se abrirá el editor de notas';
  } else if(isAgendaCommand(texto)){
    const esVis = /\b(visita|cotizar|presupuesto)\b/.test(t);
    header.style.background='#1A2B3E';
    icon.textContent  = esVis ? '👁' : '🔧';
    title.textContent = esVis ? 'Agenda — Visita' : 'Agenda — Trabajo';
    sub.textContent   = 'Gemini llenará los campos automáticamente';
  } else if(/\b(gast[eé]|pagu[eé]|compr[eé]|recib[ií]|cobr[eé]|gan[eé])\b/.test(t)){
    header.style.background='#1E293B';
    icon.textContent  = /\b(recib|cobr|gan)\b/.test(t) ? '↑' : '↓';
    title.textContent = /\b(recib|cobr|gan)\b/.test(t) ? 'Registrar Ingreso' : 'Registrar Gasto';
    sub.textContent   = 'Gemini analizará el monto y categoría';
  }
}

function stopListening() {
  micListening      = false;
  micRestartLock    = true;
  _micSessionBase   = '';
  _micSessionFinals = '';
  micFullTranscript = '';
  clearTimeout(micSilenceTimer);
  if(recognition){ try{ recognition.stop(); }catch(e){} }
  // ★ Null-safe: elementos pueden no existir cuando el panel de agenda está activo
  const micBtn  = document.getElementById('micBtn');
  const micIcon = document.getElementById('micBtnIcon');
  const micTxt  = document.getElementById('micBtnTxt');
  const micHint = document.getElementById('micHint');
  const micFab  = document.getElementById('micFab');
  if(micBtn)  micBtn.style.background = 'linear-gradient(135deg,var(--gold),#6A8494)';
  if(micIcon) micIcon.textContent = '🎙';
  if(micTxt)  micTxt.textContent  = 'Escuchar de nuevo';
  if(micFab)  micFab.classList.remove('listening');
  document.querySelectorAll('.wave-bar').forEach(b=>b.classList.remove('active'));
  if(micHint) micHint.innerHTML = 'Di algo como: <em>"Gasté 50 soles en comida"</em>';
}

function nedAddCheck(){
  const ed = document.getElementById('ned-editor');
  if(!ed) return;
  ed.focus();
  const row = document.createElement('div');
  row.className = 'ned-row';
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.addEventListener('change', function(){ row.classList.toggle('ned-done', this.checked); });
  const span = document.createElement('span');
  span.className = 'ned-txt';
  span.contentEditable = 'true';
  span.textContent = '';
  row.appendChild(cb); row.appendChild(span);
  // Insert at cursor or append
  const sel = window.getSelection();
  if(sel && sel.rangeCount){
    const r = sel.getRangeAt(0);
    r.deleteContents();
    r.insertNode(row);
    r.collapse(false);
    sel.removeAllRanges(); sel.addRange(r);
  } else {
    ed.appendChild(row);
  }
  span.focus();
  nedDirty();
}

function _ntInsertarTabla(rows, cols, headers, hasTotal){
  const ed = document.getElementById('ned-editor');
  if(!ed) return;

  const tableId = 'nt_'+Date.now();

  // Build header row
  const thRow = headers.map(h=>
    `<th contenteditable="true" style="min-width:${cols<=3?'100':'72'}px">${h}</th>`
  ).join('');

  // Build body rows
  const bodyRows = Array.from({length:rows},()=>
    `<tr>${Array.from({length:cols},(_,ci)=>
      `<td contenteditable="true">${ci===cols-1&&cols>1?' ':' '}</td>`
    ).join('')}</tr>`
  ).join('');

  // Total row
  const totalRow = hasTotal
    ? `<tr class="nt-total">${Array.from({length:cols},(_,ci)=>
        `<td contenteditable="false" data-total="${ci>0?'1':'0'}">${ci===0?'TOTAL':''}</td>`
      ).join('')}</tr>`
    : '';

  const tableHtml = `
<div class="nt-wrap" contenteditable="false">
  <table class="nt" id="${tableId}" data-cols="${cols}">
    <thead><tr>${thRow}</tr></thead>
    <tbody>${bodyRows}${totalRow}</tbody>
  </table>
  <div class="nt-ctrls">
    <button class="nt-cbtn" onmousedown="event.preventDefault();ntAddRow('${tableId}')">+ Fila</button>
    <button class="nt-cbtn danger" onmousedown="event.preventDefault();ntDelRow('${tableId}')">− Fila</button>
    <button class="nt-cbtn" onmousedown="event.preventDefault();ntAddCol('${tableId}')">+ Col</button>
    <button class="nt-cbtn" onmousedown="event.preventDefault();ntRecalc('${tableId}')">Σ Calcular</button>
    <button class="nt-cbtn danger" onmousedown="event.preventDefault();ntDelTable('${tableId}')">🗑 Tabla</button>
  </div>
</div><p><br></p>`;

  ed.focus();
  try{ document.execCommand('insertHTML', false, tableHtml); }catch(e){}

  // Attach tab navigation
  setTimeout(()=>{ _ntAttachTab(tableId); ntRecalc(tableId); }, 80);
  nedDirty();
}

function ntAddRow(id){

  if(!tbody) return;
  // Insert before total row if exists
  const totalRow = tbody.querySelector('tr.nt-total');
  const newRow = document.createElement('tr');
  newRow.innerHTML = Array.from({length:cols},()=>`<td contenteditable="true"> </td>`).join('');
  if(totalRow) tbody.insertBefore(newRow, totalRow);
  else tbody.appendChild(newRow);
  _ntAttachTab(id);
  nedDirty();
}

function ntDelRow(id){
  const tbl = document.getElementById(id);
  if(!tbl) return;
  const tbody = tbl.querySelector('tbody');
  if(!tbody) return;
  // Remove last non-total row
  const rows = Array.from(tbody.querySelectorAll('tr:not(.nt-total)'));
  if(rows.length > 1) rows[rows.length-1].remove();
  ntRecalc(id);
  nedDirty();
}

function ntAddCol(id){
  const tbl = document.getElementById(id);
  if(!tbl) return;
  const cols = parseInt(tbl.dataset.cols)||3;
  // Add header
  const thead = tbl.querySelector('thead tr');
  if(thead){
    const th = document.createElement('th');
    th.contentEditable = 'true';
    th.textContent = 'Col '+(cols+1);
    thead.appendChild(th);
  }
  // Add cell to each body row
  tbl.querySelectorAll('tbody tr').forEach(tr=>{
    if(tr.classList.contains('nt-total')){
      const td = document.createElement('td');
      td.contentEditable = 'false';
      td.dataset.total = '1';
      tr.appendChild(td);
    } else {
      const td = document.createElement('td');
      td.contentEditable = 'true';
      td.textContent = ' ';
      tr.appendChild(td);
    }
  });
  tbl.dataset.cols = cols+1;
  ntRecalc(id);
  nedDirty();
}

function ntDelTable(id){

  const wrap = tbl.closest('.nt-wrap');

}

function ntRecalc(id){
  const tbl = document.getElementById(id);
  if(!tbl) return;
  const totalRow = tbl.querySelector('tr.nt-total');
  if(!totalRow) return;
  const totalCells = Array.from(totalRow.querySelectorAll('td[data-total="1"]'));
  if(!totalCells.length) return;

  const allBodyRows = Array.from(tbl.querySelectorAll('tbody tr:not(.nt-total)'));
  const colCount = parseInt(tbl.dataset.cols)||3;

  totalCells.forEach((cell, idx)=>{
    // idx+1 porque col 0 es el label
    const colIndex = idx + 1;
    let sum = 0;
    let hasNum = false;
    allBodyRows.forEach(tr=>{
      const td = tr.querySelectorAll('td')[colIndex];
      if(!td) return;
      const raw = (td.textContent||'').replace(/[S/\s,]/g,'').replace(/[^0-9.]/g,'');
      const n = parseFloat(raw);
      if(!isNaN(n)){ sum+=n; hasNum=true; }
    });
    cell.textContent = hasNum ? 'S/ '+sum.toFixed(2) : '';
  });
}

function _ntAttachTab(id){
  const tbl = document.getElementById(id);
  if(!tbl || tbl._tabAttached) return;
  tbl._tabAttached = true;
  tbl.addEventListener('keydown', e=>{
    if(e.key !== 'Tab') return;
    e.preventDefault();
    const cells = Array.from(tbl.querySelectorAll('th[contenteditable=true], td[contenteditable=true]'));
    const cur = document.activeElement;
    const idx = cells.indexOf(cur);
    if(idx < 0) return;
    const next = e.shiftKey ? cells[idx-1] : cells[idx+1];
    if(next) next.focus();
    else if(!e.shiftKey){
      // Add new row on Tab after last cell
      ntAddRow(id);
      setTimeout(()=>{
        const updated = Array.from(tbl.querySelectorAll('td[contenteditable=true]'));
        if(updated.length) updated[updated.length-1].focus();
      }, 50);
    }
  });
  tbl.addEventListener('input', ()=>ntRecalc(id));
  tbl.addEventListener('blur', ()=>ntRecalc(id), true);
}

function nedKey(e){
  const mod = e.ctrlKey||e.metaKey;
  if(mod&&e.key==='z'&&!e.shiftKey){ e.preventDefault(); nedUndo(); return; }
  if(mod&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){ e.preventDefault(); nedRedo(); return; }
  if(mod&&e.key==='b'){ e.preventDefault(); nedExec('bold'); return; }
  if(mod&&e.key==='i'){ e.preventDefault(); nedExec('italic'); return; }
  if(mod&&e.key==='u'){ e.preventDefault(); nedExec('underline'); return; }
  if(e.key===' '||e.key==='Enter'){
    const ed=document.getElementById('ned-editor');
    if(ed){ _nedHistory.push(ed.innerHTML); if(_nedHistory.length>60) _nedHistory.shift(); _nedFuture=[]; }
  }
}

// ── Detectar si es comando de nota/lista ──
function isNotaCommand(text){
  const t = text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const notaKws = [
    // lista — variantes directas
    'crea una lista','crear una lista','nueva lista','haz una lista','hacer una lista',
    'has una lista','ase una lista','hase una lista','hazme una lista','hasme una lista',
    'crea lista','crear lista','crea la lista','hagame una lista','hazme una lista',
    'creame una lista','creamela lista','crea me una lista','armame una lista',
    'lista de compras','lista de materiales','lista de gastos','lista de tareas',
    'lista de precios','lista de cosas','lista de productos','lista de items',
    'crea una lista de','hacer una lista de','nueva lista de','nueva lista con',
    'abrir lista','iniciar lista','empezar lista','comenzar lista','nueva lista',
    'quiero una lista','quiero hacer una lista','quiero crear una lista',
    'abre una lista','ponme una lista','pon una lista',
    // nota
    'crea una nota','crear una nota','nueva nota','haz una nota','hacer una nota',
    'has una nota','crea nota','crear nota','anota esto','toma nota','escribe esto',
    'quiero una nota','abre una nota','ponme una nota','nueva nota de',
    // recordatorio
    'crea un recordatorio','nuevo recordatorio','crea recordatorio',
    // Variantes adicionales
    'dictame una lista','dictame una nota','dictame esto',
    'apuntame una lista','apuntame esto','apúntame',
    'escribeme una lista','escribeme esto','escríbeme',
    'pon una lista','ponme una lista','ponme esto',
    'quiero anotar','quiero una lista','necesito una lista',
    'arma una lista','armame una lista','armame esto',
    'preparame una lista','prepara una lista',
    'registra esto','memoriza esto','guarda esto como lista',
    'nueva nota rapida','nota rapida','nota rápida',
    // ★ Variantes naturales de habla casual peruana
    'anota una lista','apunta una lista','apuntame una lista',
    'quiero anotar','voy a dictar','voy a anotar una lista',
    'dame una lista','hace una lista','haceme una lista',
    'crea lista de','nueva lista de','haz lista de',
    'lista para el trabajo','lista del trabajo','lista de hoy',
    'lista rapida','lista rápida',
    // ★ Patrones cortos — "lista de X" al inicio o sola
    'lista de','lista para','mi lista','hacer mi lista',
    'anotar una lista','apuntar una lista','tomar nota de',
    'voy a anotar','voy a dictar','quiero dictar',
    'registrar lista','nueva lista rápida','empezar lista',
    // ★ Variantes fonéticas Chrome Android frecuentes
    'crea me','hazme','hace me','make lista','ase me una lista',
    'una lista de compras','una lista de materiales','una lista de trabajo',
    'lista de insumos','lista de herramientas','lista de gastos del dia',
  ];
  if(notaKws.some(k => t.includes(k.normalize('NFD').replace(/[\u0300-\u036f]/g,'')))) return true;

  // ★ DETECCIÓN ADICIONAL: si el texto empieza con "lista" directamente
  if(t.trim().startsWith('lista')) return true;

  // ★ DETECCIÓN POR PATRÓN: texto corto que parece ítems de lista
  //    Ej: "pan 5 soles, leche 3" → dictando una lista
  //    NO aplica si hay verbos de ingreso/egreso ("cobré", "gasté")
  const words = t.trim().split(/\s+/);
  const hasPrice = /\b(\d+(?:[.,]\d+)?\s*(?:soles?|sol\b)|s\/\.?\s*\d+)/i.test(t);
  const hasComa  = t.includes(',');
  const hasVerbTx = /\b(cobr[eé]|gast[eé]|pagu[eé]|deposit|ingres|gan[eé]|recibi)\b/.test(t);
  if(words.length <= 12 && hasPrice && hasComa && !hasVerbTx) return true;

  return false;
}

// MOTOR DE LISTA — mic continuo, separadores locales instantáneos
// Gemini solo al final para organizar/limpiar toda la lista
// ══════════════════════════════════════════════════════════════

// Palabras que separan ítems — capturadas localmente, NO se guardan como texto
const SEPARADORES_KW = [
  'aparte','siguiente','siguiente ítem','siguiente item','nueva','nuevo',
  'enter','punto','coma','y también','y tambien',
  'otro','otra','agrega','agregar','anota','añade',
  'también quiero','tambien quiero','y además','y ademas',
  'más adelante','mas adelante',
  'próximo','proximo','listo el ítem','listo el item','ok siguiente',
  'eso aparte','separa','separar','divide','divide eso'
];

// Buffer de texto acumulado para el ítem actual
let _listaBuf = '';
let _listaBufTimer = null;
const LISTA_PAUSA_MS = 3500; // ★ 3.5s — tiempo para pensar sin cortar

// ── Atajar handlers de lista a una instancia SR — permite reusar en onend ──
function _attachListaHandlers(rec){
  rec.onresult = (e) => {
    let newFinal = '', interim = '';
    for(let i = e.resultIndex; i < e.results.length; i++){
      if(e.results[i].isFinal) newFinal += e.results[i][0].transcript + ' ';
      else                     interim  += e.results[i][0].transcript;
    }
    if(newFinal){
      _listaBuf += newFinal;
      _setListaStatus('🎙 ' + _listaBuf.trim() + (interim ? ' '+interim : ''));
      _procesarBufLista(_listaBuf.trim());
    } else if(interim){
      _setListaStatus('🎙 ' + (_listaBuf+interim).trim() + ' …');
      const tNorm = (_listaBuf+interim).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      const esCierre = CERRAR_KWS.some(k=>tNorm.endsWith(k.normalize('NFD').replace(/[\u0300-\u036f]/g,'')));
      if(esCierre) return;
      clearTimeout(_listaBufTimer);
      if(_listaBuf.trim()){
        _listaBufTimer = setTimeout(()=>{
          if(_listaBuf.trim()) _confirmarItemActual();
        }, LISTA_PAUSA_MS);
      }
    }
  };
  rec.onerror = (e) => {
    if(e.error === 'no-speech') return;
    if(e.error === 'aborted')  return;
    if(e.error === 'not-allowed'){
      _setListaStatus('⚠ Permiso de micrófono denegado');
      pararListaMicDefinitivo();
    }
  };
  rec.onend = () => {
    if(listaMicActivo){
      clearTimeout(_listaBufTimer);
      _listaBuf = '';
      const delay = /android/i.test(navigator.userAgent) ? 350 : 150;
      setTimeout(()=>{
        if(!listaMicActivo) return;
        const SR2 = window.SpeechRecognition || window.webkitSpeechRecognition;
        listaRec = new SR2();
        listaRec.lang = 'es-PE';
        listaRec.interimResults = true;
        listaRec.continuous = true;
        listaRec.maxAlternatives = 1;
        _attachListaHandlers(listaRec);
        try{ listaRec.start(); }catch(err){}
      }, delay);
    }
  };
}

function iniciarListaMic(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ alert('Necesitás Chrome para usar el micrófono'); return; }

  listaMicActivo = true;
  _listaBuf = '';
  clearTimeout(_listaBufTimer);
  _setListaMicBtn(true);
  _setListaStatus('🎙 Escuchando... decí el primer ítem');

  listaRec = new SR();
  listaRec.lang           = 'es-PE';
  listaRec.interimResults = true;
  listaRec.continuous     = true;   // ★ UNA sola instancia, nunca para
  listaRec.maxAlternatives = 1;

  // ★ Usar helper centralizado — evita duplicar handlers en onend
  _attachListaHandlers(listaRec);

  try{ listaRec.start(); }catch(e){}
}

// ── Procesar buffer acumulado: detectar separadores, comandos y cierre ──
function _procesarBufLista(texto){
  if(!texto) return;
  const tNorm = texto.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

  // 1. CIERRE — procesar lo que haya ANTES de la palabra de cierre, luego cerrar
  const kwCierre = CERRAR_KWS.find(k=>tNorm.includes(k.normalize('NFD').replace(/[\u0300-\u036f]/g,'')));
  if(kwCierre){
    // ★ Extraer texto ANTES de la palabra de cierre y procesarlo como ítems
    const idxCierre = tNorm.indexOf(kwCierre.normalize('NFD').replace(/[\u0300-\u036f]/g,''));
    const antesDelCierre = texto.substring(0, idxCierre).trim();
    if(antesDelCierre.length > 1){
      // Procesar separadores en el texto previo al cierre
      let pendiente = antesDelCierre;
      while(pendiente && pendiente.length > 1){
        const rSep = SEPARADORES_KW.find(s=>pendiente.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').includes(s.normalize('NFD').replace(/[\u0300-\u036f]/g,'')));
        if(rSep){
          const sn = rSep.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
          const tn = pendiente.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
          const idx = tn.indexOf(sn);
          const antes = pendiente.substring(0, idx).trim();
          if(antes.length > 1) _agregarItemLocal(antes);
          pendiente = pendiente.substring(idx + rSep.length).trim();
        } else {
          if(pendiente.length > 1) _agregarItemLocal(pendiente);
          pendiente = null;
        }
      }
    }
    _listaBuf = '';
    clearTimeout(_listaBufTimer);
    renderListaItems();
    _cerrarListaConIA();
    return;
  }

  // 2. SEPARADOR — agregar ítem inmediatamente (local, sin IA)
  const sepEncontrado = SEPARADORES_KW.find(sep=>{
    const sNorm = sep.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    return tNorm.includes(sNorm);
  });
  if(sepEncontrado){
    const sNorm = sepEncontrado.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    // Texto antes del separador = el ítem
    const idx = tNorm.indexOf(sNorm);
    const itemTexto = texto.substring(0, idx).trim();
    if(itemTexto.length > 1) _agregarItemLocal(itemTexto);
    // Texto DESPUÉS del separador = inicio del próximo ítem
    _listaBuf = texto.substring(idx + sepEncontrado.length).trim() + ' ';
    clearTimeout(_listaBufTimer);
    _setListaStatus('🎙 Escuchando siguiente ítem...');
    renderListaItems();
    return;
  }

  // 3. Comandos de edición locales
  const esBorra = /\b(borra|borrar|elimina|eliminar|quita|quitar|borra (el|lo) (ultimo|último)|borra eso|cancela eso)\b/.test(tNorm);
  if(esBorra){
    for(let i=listaItems.length-1;i>=0;i--){
      if(listaItems[i].tipo==='item'){ listaItems.splice(i,1); break; }
    }
    _listaBuf = '';
    clearTimeout(_listaBufTimer);
    renderListaItems();
    _setListaStatus('🗑 Último ítem borrado');
    return;
  }

  const esSuma = /\b(suma|sumar|total|cuanto va|cuánto va|cuanto es|dame el total)\b/.test(tNorm);
  if(esSuma){
    const total = listaItems.filter(i=>i.tipo==='item'&&i.precio).reduce((s,i)=>s+i.precio,0);
    listaItems.push({tipo:'subtotal', texto:'Total', valor:total});
    listaTotal = total;
    _listaBuf = '';
    clearTimeout(_listaBufTimer);
    renderListaItems();
    _setListaStatus(`✓ Total: S/ ${total.toFixed(2)}`);
    return;
  }

  // 4. No es separador ni cierre — reiniciar timer de pausa
  clearTimeout(_listaBufTimer);
  _listaBufTimer = setTimeout(()=>{
    if(_listaBuf.trim()) _confirmarItemActual();
  }, LISTA_PAUSA_MS);
}

// ── Confirmar ítem por pausa de silencio ──
function _confirmarItemActual(){
  const texto = _listaBuf.trim();
  if(!texto || texto.length < 2) return;
  _agregarItemLocal(texto);
  _listaBuf = '';
  renderListaItems();
  _setListaStatus('✓ Ítem agregado — seguí dictando...');
}

// ── Agregar ítem inmediatamente con parser local de precio ──
function _agregarItemLocal(texto){
  const t = texto.trim();
  if(!t || t.length < 2) return;
  // ★ Solo bloquear duplicado EXACTO consecutivo
  const ultimos = listaItems.filter(i=>i.tipo==='item');
  if(ultimos.length > 0){
    const ultimo = ultimos[ultimos.length-1].texto.toLowerCase().trim();
    if(ultimo === t.toLowerCase().trim()) return; // exactamente igual → skip
  }

  // Extraer precio si lo dice: "pan 5 soles" / "leche s/ 3.50"
  const precioMatch = t.match(/s\/\.?\s*(\d+(?:[.,]\d+)?)/i)
    || t.match(/(\d+(?:[.,]\d+)?)\s*(?:soles?|sol\b)/i)
    || t.match(/\b(\d{2,5}(?:[.,]\d{1,2})?)\s*$/);
  const precio = precioMatch ? parseFloat(precioMatch[1].replace(',','.')) : null;

  // Limpiar precio del texto y palabras separadoras residuales al inicio
  let textoLimpio = t
    .replace(/^(más|mas|también|tambien|otro|otra|agrega|siguiente|aparte|y)\s+/i,'')
    .replace(/s\/\.?\s*\d+(?:[.,]\d+)?/gi,'')
    .replace(/\d+(?:[.,]\d+)?\s*(?:soles?|sol\b)\s*$/i,'')
    .replace(/\s+/g,' ').trim();
  if(!textoLimpio) textoLimpio = t;

  // Capitalizar primer letra
  textoLimpio = textoLimpio.charAt(0).toUpperCase() + textoLimpio.slice(1);

  listaItems.push({tipo:'item', texto:textoLimpio, precio});
  if(precio) listaTotal += precio;
}

function _setListaStatus(msg){
  const el = document.getElementById('lista-mic-status');
  if(el) el.textContent = msg;
}

// ── CIERRE CON IA — Gemini organiza todos los ítems al final ──
async function _cerrarListaConIA(){
  if(_listaSaved) return;  // ★ FIX: guard antes de cualquier async
  _listaSaved = true;
  pararListaMicDefinitivo();

  // Si no hay ítems, guardar directo
  if(listaItems.length === 0){
    guardarListaFinal();
    return;
  }

  const geminiKey = localStorage.getItem('fnz_gemini_key');

  // Sin Gemini → guardar directo automáticamente
  if(!geminiKey){
    renderListaItems();
    _setListaStatus('✓ Guardando...');
    window._listaGuardarTimer=setTimeout(()=>guardarListaFinal(),400);
    return;
  }

  // Con Gemini → organizar y mostrar preview
  _setListaStatus('✨ Gemini organizando la lista...');
  const btn = document.getElementById('lista-guardar-btn');
  if(btn){ btn.disabled = true; btn.textContent = '⏳ Organizando...'; }

  const rawItems = listaItems.map((it,i)=>
    `${i+1}. ${it.texto}${it.precio?' (S/ '+it.precio.toFixed(2)+')':''}`
  ).join('\n');

  const prompt = `Sos el asistente de lista de una app de finanzas en Lima, Perú.
El usuario dictó esta lista por voz. Puede tener errores de dictado, ítems desordenados o texto sucio.

Lista raw:
${rawItems}

Tarea:
1. Corregí errores de dictado (ej: "aseite" → "aceite")
2. Unificá ítems duplicados o muy similares
3. Ordená los ítems de forma lógica (categorías similares juntas)
4. Extraé cantidad si se mencionó (ej: "dos kilos de arroz" → nombre:"Arroz", cantidad:2, unidad:"kg")
5. Extraé precio unitario en soles si se mencionó
6. Calculá el subtotal (cantidad × precio) si tenés ambos datos
7. Calculá el total general de todos los ítems con precio
8. Extraé el título más apropiado (ej: "Lista del mercado", "Lista de materiales")

Respondé SOLO con JSON válido, sin explicaciones ni markdown:
{
  "titulo": "título sugerido",
  "total": número_o_null,
  "items": [
    {"texto": "nombre del ítem", "cantidad": número_o_null, "unidad": "unidad_o_null", "precio": precio_unitario_o_null, "subtotal": subtotal_o_null}
  ]
}`;

  try{
    const res = await fetch(GEMINI_URL(geminiKey),{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        contents:[{role:'user',parts:[{text:prompt}]}],
        generationConfig:{temperature:0.1, maxOutputTokens:500}
      })
    });
    const data = await res.json();
    const raw = data?.candidates?.[0]?.content?.parts?.[0]?.text||'';
    const parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());

    if(parsed.items && parsed.items.length > 0){
      // Reemplazar lista con versión organizada por Gemini (con qty/subtotal)
      listaItems = parsed.items.map(it=>{
        const precio = it.precio||null;
        const cantidad = it.cantidad||null;
        const unidad = it.unidad||null;
        const subtotal = it.subtotal||(precio&&cantidad?precio*cantidad:null);
        let textoDisplay = it.texto||'';
        if(cantidad) textoDisplay = `${cantidad}${unidad?' '+unidad:''} ${textoDisplay}`.trim();
        return { tipo:'item', texto: textoDisplay, precio: subtotal||precio||null, _precioUnit: precio, _cantidad: cantidad };
      });
      listaTotal = parsed.total || listaItems.reduce((s,i)=>s+(i.precio||0),0);

      if(parsed.titulo){
        listaTitulo = parsed.titulo;
        const tituloEl = document.getElementById('lista-titulo');
        if(tituloEl) tituloEl.value = parsed.titulo;
      }

      // Si hay precios, agregar fila de total
      if(listaTotal > 0){
        listaItems.push({tipo:'subtotal', texto:'TOTAL', valor: listaTotal});
      }

      renderListaItems();
      _setListaStatus('✨ Gemini organizó la lista — guardando...');
      // ★ Guardar automáticamente después de mostrar 1.5s
      window._listaGuardarTimer=setTimeout(()=>guardarListaFinal(),1500);
    } else {
      _setListaStatus('✓ Lista lista — guardando...');
      window._listaGuardarTimer=setTimeout(()=>guardarListaFinal(),500);
    }
  } catch(err){
    console.error('Gemini lista error:', err);
    _setListaStatus('⚠ Gemini falló — guardando como está...');
    window._listaGuardarTimer=setTimeout(()=>guardarListaFinal(),800);
  }

  if(btn){ btn.disabled = false; btn.textContent = '✓ Guardar lista'; btn.style.background='var(--gold)'; }
}

function pararListaMicDefinitivo(){
  listaMicActivo = false;
  clearTimeout(_listaBufTimer);
  _listaBuf = '';
  if(listaRec){ try{listaRec.stop();}catch(e){} listaRec=null; }
  _setListaMicBtn(false);
}

function detenerListaMic(){
  if(listaRec){ try{listaRec.stop();}catch(e){} listaRec=null; }
}

function _setListaMicBtn(activo){
  const btn = document.getElementById('lista-mic-btn');
  if(!btn) return;
  if(activo){
    btn.style.background = 'linear-gradient(135deg,#E05252,#f87171)';
    btn.innerHTML = '⏹ Pausar';
  } else {
    btn.style.background = 'linear-gradient(135deg,#C9A84C,#E8C96A)';
    btn.innerHTML = '🎙 Dictar';
  }
}

function guardarListaFinal(){
  if(_listaSaved) return;   // ★ anti-duplicado
  _listaSaved = true;
  clearTimeout(window._listaGuardarTimer); // ★ FIX: cancela timers pendientes
  // Deshabilitar botón para evitar doble tap
  const guardarBtn = document.getElementById('lista-guardar-btn');
  if(guardarBtn){ guardarBtn.disabled = true; guardarBtn.textContent = '⏳ Guardando...'; }

  pararListaMicDefinitivo();
  listaTitulo = document.getElementById('lista-titulo')?.value || listaTitulo;

  if(!state.notas) state.notas = [];
  // ★ Guardar ítems con texto limpio, precio, cantidad y subtotal
  const items = listaItems.map(it=>({
    texto: it.tipo==='subtotal'
      ? (it.texto + ': S/' + (it.valor||0).toFixed(2))
      : it.texto,
    precio: it.tipo==='subtotal' ? null : (it.precio||null),
    precioUnit: it._precioUnit||null,
    cantidad: it._cantidad||null,
    done: false
  }));

  // ★ Si venimos de "Dictar" en una nota existente → actualizar, no crear nueva
  const targetId = window._notaVozTargetId;
  if(targetId){
    const existing = state.notas.find(x=>x.id===targetId);
    if(existing){
      existing.items = items;
      existing.texto = items.map(i=>i.texto).join('\n');
      existing.titulo = listaTitulo;
      existing.modificado = new Date().toISOString();
      save('fnz_notas', state.notas);
      window._notaVozTargetId = null;
      toast('✓ Lista actualizada', 'success');
      cerrarListaModal();
      setTimeout(()=>{ switchPage('notas'); render(); }, 150);
      return;
    }
    window._notaVozTargetId = null;
  }

  const nota = {
    id: Date.now()+'',
    tipo: listaTipo==='nota' ? 'texto' : 'lista',
    titulo: listaTitulo,
    items,
    texto: items.map(i=>i.texto).join('\n'),
    creado: new Date().toISOString()
  };
  state.notas.unshift(nota);
  save('fnz_notas', state.notas);

  // ★ Generar imagen ANTES de cerrar modal (listaItems aún disponible)
  try{ generarNotaJPG(nota); }catch(e){}
  toast('✓ Lista guardada — ' + items.filter(i=>i.done===false||i.done===true).length + ' ítems', 'success');

  cerrarListaModal();
  setTimeout(()=>{ switchPage('notas'); render(); }, 150);
}

// ── Generar nota estilo A (papel amarillo) como imagen ──
function generarNotaJPG(nota){
  // Usar los items directos de listaItems si existen (más precisos que nota.items)
  const rawItems = listaItems.length > 0 ? listaItems : (nota.items||[]).map(it=>({
    tipo: (it.texto.includes('Subtotal')||it.texto.includes('Total')) ? 'subtotal' : 'item',
    texto: it.texto.split(' - S/')[0].replace(/:\s*S\/[\d.]+$/,'').trim(),
    precio: it.texto.includes(' - S/') ? parseFloat(it.texto.split(' - S/')[1]) : null,
    valor: it.texto.match(/:\s*S\/([\d.]+)/) ? parseFloat(it.texto.match(/:\s*S\/([\d.]+)/)[1]) : null,
  }));

  const titulo = (document.getElementById('lista-titulo')?.value || nota.titulo || 'Lista').trim();
  const W = 640;
  const PAD = 40;
  const TITLE_AREA = 80;
  const LINE_H = 38;
  const FOOTER_H = 50;
  const MIN_H = 300;
  const totalH = Math.max(MIN_H, TITLE_AREA + (rawItems.length * LINE_H) + FOOTER_H + PAD);

  const canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = totalH;
  const ctx = canvas.getContext('2d');

  // ── Color de hoja según nota ──
  const nc = NOTA_COLORES[nota.colorHoja||'amarillo'] || NOTA_COLORES.amarillo;
  ctx.fillStyle = nc.bg;
  ctx.fillRect(0, 0, W, totalH);

  // Líneas de fondo estilo cuaderno
  ctx.strokeStyle = '#F9A82522';
  ctx.lineWidth = 1;
  for(let y = TITLE_AREA + 10; y < totalH - FOOTER_H; y += LINE_H){
    ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(W-PAD, y); ctx.stroke();
  }

  // Borde exterior
  ctx.strokeStyle = nc.border;
  ctx.lineWidth = 2.5;
  roundRect(ctx, 2, 2, W-4, totalH-4, 8);
  ctx.stroke();

  // Franja amarilla superior
  ctx.fillStyle = nc.border;
  roundRect(ctx, 2, 2, W-4, 7, {tl:8,tr:8,br:0,bl:0});
  ctx.fill();

  // ── Emoji y título ──
  ctx.font = 'bold 26px Georgia, serif';
  ctx.fillStyle = nc.title;
  ctx.fillText('📋 ' + titulo, PAD, 52);

  // Línea bajo título
  ctx.strokeStyle = nc.border+'99';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(PAD, TITLE_AREA - 8);
  ctx.lineTo(W - PAD, TITLE_AREA - 8);
  ctx.stroke();

  // ── Ítems ──
  rawItems.forEach((item, i) => {
    const y = TITLE_AREA + (i * LINE_H) + LINE_H * 0.72;
    const isSub = item.tipo === 'subtotal';

    if(isSub){
      // Línea punteada antes del subtotal
      ctx.strokeStyle = '#F9A82577';
      ctx.lineWidth = 1;
      ctx.setLineDash([5, 4]);
      ctx.beginPath();
      ctx.moveTo(PAD, y - LINE_H * 0.6);
      ctx.lineTo(W - PAD, y - LINE_H * 0.6);
      ctx.stroke();
      ctx.setLineDash([]);

      // Fondo highlight para subtotal
      ctx.fillStyle = '#FFF9C4';
      ctx.fillRect(PAD - 4, y - 22, W - PAD * 2 + 8, 28);

      ctx.font = 'bold 15px Georgia, serif';
      ctx.fillStyle = '#2A4455';
      ctx.fillText(item.texto || 'Total', PAD + 4, y);

      const val = item.valor || 0;
      ctx.textAlign = 'right';
      ctx.fillStyle = '#1B5E20';
      ctx.font = 'bold 16px Georgia, serif';
      ctx.fillText('S/ ' + val.toFixed(2), W - PAD, y);
      ctx.textAlign = 'left';
    } else {
      // Checkbox
      ctx.strokeStyle = '#A1887F';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(PAD, y - 13, 13, 13);

      ctx.font = '15px Georgia, serif';
      ctx.fillStyle = nc.text;
      const textoItem = item.texto || '';
      ctx.fillText(textoItem, PAD + 22, y);

      if(item.precio){
        ctx.textAlign = 'right';
        ctx.fillStyle = '#5D4037';
        ctx.font = '15px Georgia, serif';
        ctx.fillText('S/ ' + item.precio.toFixed(2), W - PAD, y);
        ctx.textAlign = 'left';
      }
    }
  });

  // ── Footer — solo fecha ──
  const ahora = new Date();
  const fechaStr = ahora.toLocaleDateString('es-PE', {
    weekday:'long', day:'numeric', month:'long', year:'numeric'
  });
  ctx.strokeStyle = '#F9A82555';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(PAD, totalH - FOOTER_H + 8);
  ctx.lineTo(W - PAD, totalH - FOOTER_H + 8);
  ctx.stroke();

  ctx.font = '12px Georgia, serif';
  ctx.fillStyle = nc.footer;
  ctx.textAlign = 'right';
  ctx.fillText(fechaStr, W - PAD, totalH - 18);
  ctx.textAlign = 'left';

  window._listaCanvas = canvas;
  return canvas;
}

// Helper para roundRect compatible con todos los browsers
function roundRect(ctx, x, y, w, h, r){
  if(typeof r === 'number') r = {tl:r,tr:r,br:r,bl:r};
  ctx.beginPath();
  ctx.moveTo(x + r.tl, y);
  ctx.lineTo(x + w - r.tr, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r.tr);
  ctx.lineTo(x+w, y+h-r.br);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r.br, y+h);
  ctx.lineTo(x+r.bl, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r.bl);
  ctx.lineTo(x, y+r.tl);
  ctx.quadraticCurveTo(x, y, x+r.tl, y);
  ctx.closePath();
}

async function callGemini(prompt, keyOverride){
  const key = keyOverride || localStorage.getItem('fnz_gemini_key');
  if(!key) return null;
  const url = GEMINI_URL(key);
  const body = {
    contents:[{role:'user', parts:[{text: prompt}]}],
    generationConfig:{temperature:0.1, maxOutputTokens:600}
  };
  try{
    const res = await fetch(url, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if(!res.ok){
      console.error('Gemini API error:', res.status, JSON.stringify(data));
      return null;
    }
    return data?.candidates?.[0]?.content?.parts?.[0]?.text || null;
  } catch(e){
    console.error('Gemini fetch error:', e.message);
    return null;
  }
}

async function processVoiceWithGemini(text){
  try {
  // ── Chequeos locales PRIMERO — sin delay, sin Gemini ──
  const cleanText = text.replace(/^(oye|hey|ok|escucha|mira)\b/gi,'').trim();
  if(cleanText) text = cleanText;

  // 1. Nota/Lista → abrir modo lista INMEDIATO
  if(isNotaCommand(text)){
    processVoiceResult._busy = false;
    document.getElementById('micModal').style.display='none';
    const tLow = text.toLowerCase();
    const tipo = tLow.includes('nota') && !tLow.includes('lista') ? 'nota' : 'lista';
    let titulo = tipo==='lista' ? 'Lista de compras' : 'Nota';
    const matchTitulo2 = text.match(/(?:lista|nota)\s+de\s+([\w\s]{2,40}?)(?:\s*$|,|\s+para\b)/i) || text.match(/(?:lista|nota)\s+para\s+([\w\s]{2,40}?)(?:\s*$|,)/i);

    abrirModoLista(tipo, titulo);
    return;
  }

  // 2. Agenda → LOCAL parse INMEDIATO → mic PERMANECE ABIERTO con resumen de campos
  if(isAgendaCommand(text)){
    processVoiceResult._busy = false;
    const tLow2 = text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const esVisita = /\b(visita|vista|crea una visita|crear una visita|nueva visita|agendar visita|agenda visita|cotizar|cotizacion|presupuesto|pasar a ver|ir a ver|ir a revisar|revisar|chequear)\b/.test(tLow2);

  // 3. Movimiento → Gemini procesa
  const micText = document.getElementById('micText');
  if(micText) micText.textContent = '✨ Gemini analizando...';

  const result = await processWithGemini(text);

  if(!result){
    processVoiceResult._busy = false;
    if(micText) micText.textContent = '⚠ Gemini no respondió. Intentá de nuevo.';
    toast('Gemini no respondió — intentá de nuevo','error');
    return;
  }

  if(result.tipo === 'agenda'){
    document.getElementById('micModal').style.display='none';

      tipo:      result.subtipo || 'trabajo',

      hora:      result.hora,
      cliente:   result.cliente,
      servicio:  result.servicio,
      precio:    result.precio,
      ubicacion: result.ubicacion,
      notas:     result.notas,
    };

    openAddAgenda(pre.tipo, null, pre);

    document.getElementById('micModal').style.display='none';

      description: result.description,
      cliente:     result.cliente,

    if(micText) micText.textContent = '⚠ No entendí. Intentá de nuevo con más detalle.';

function _agendaMicGuardarDirecto(){

    if(!d.ubicacion){ toast('Falta la ubicación','error'); return; }
  }

  const item = {
    id:       Date.now()+'',
    tipo:     d.tipo||'trabajo',
    fecha:    d.fecha||hoy,
    hora:     d.hora||'',
    cliente:  d.cliente||'',
    servicio: d.servicio||'',
    precio:   d.precio||0,
    ubicacion:d.ubicacion||'',
    notas:    d.notas||'',
    telefono: d.telefono||'',
    estado:   'agendado',
    creado:   new Date().toISOString(),
  };

  if(!state.agenda) state.agenda=[];
  state.agenda.unshift(item);
  save('fnz_agenda', state.agenda);
  syncAgendaToSheets(item);

  // ── Push a Notion para Guardado Directo desde Micrófono ──
  const nToken = localStorage.getItem('fnz_notion_token');
  if (nToken) {
    const nDbidClientes = localStorage.getItem('fnz_notion_dbid_clientes');
    const nDbidFinanzas = localStorage.getItem('fnz_notion_dbid');

    // Sincronización comercial (Visita o Trabajo)
    if ((d.tipo === 'visita' || d.tipo === 'trabajo') && nDbidClientes) {
      _pushToNotionClientes(item).then(res => {
        if (res && res.id && !item._notionRowId) {
          item._notionRowId = res.id;
          state.agenda = state.agenda.map(x => x.id === item.id ? item : x);
          save('fnz_agenda', state.agenda);
        }
      }).catch(err => console.warn('Notion Clientes Mic (no crítico):', err.message));
    }

    // Sincronización financiera (Solo Trabajo)
    if (d.tipo === 'trabajo' && nDbidFinanzas) {
      _pushToNotion(item, 0).catch(err => console.warn('Notion Finanzas Mic (no crítico):', err.message));
    }
  }

  document.getElementById('micModal').style.display='none';
  switchPage('agenda');
  render();
  toast(`✓ ${d.tipo==='visita'?'Visita':'Trabajo'} agendado — ${d.cliente}`);
