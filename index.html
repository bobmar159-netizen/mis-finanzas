function setCobro(v){ document.getElementById('cobro-monto').value=v; }

async function guardarFinalizacion(id){
  const item=(state.agenda||[]).find(x=>x.id===id);
  if(!item) return;
  const fecha      = document.getElementById('cobro-fecha')?.value || item.fecha || todayStr();
  const cobrado    = parseFloat(document.getElementById('cobro-monto')?.value)||0;
  const movilidad  = parseFloat(document.getElementById('cobro-movilidad')?.value)||0;
  const materiales = parseFloat(document.getElementById('cobro-materiales')?.value)||0;
  const otros      = parseFloat(document.getElementById('cobro-otros')?.value)||0;
  const meta       = parseFloat(document.getElementById('cobro-meta')?.value)||0;
  const notas      = document.getElementById('cobro-notas')?.value.trim()||'';
  const formaPago  = document.getElementById('cobro-forma-pago')?.value||'Efectivo';
  const distrito   = document.getElementById('cobro-distrito')?.value.trim()||item.ubicacion||'';
  const svc1 = document.getElementById('cobro-svc1')?.value||item.servicio||'';
  const svc2 = document.getElementById('cobro-svc2')?.value||'';

  const precio   = parseFloat(item.precio)||0;
  item.fecha     = fecha;
  item.estado    = 'se_finalizo';
  item.montoPagado = cobrado;
  item.notas     = notas;
  item.servicio1 = svc1; item.servicio2 = svc2;
  item.formaPago = formaPago;
  item.ubicacion = distrito;

  const urlSh = localStorage.getItem('fnz_sheets_url')||'';
  if(urlSh){
    const itemTrabajo = {
      id: item.id, fecha: item.fecha, cliente: item.cliente, telefono: item.telefono,
      servicio1: svc1, servicio2: svc2, ubicacion: distrito, formaPago,
      ingreso: cobrado, movilidad, materiales, otros, meta, observaciones: notas
    };
    _sendToSheets(urlSh, { type:'trabajo', item: itemTrabajo, modo: state.modo });
    
    // --- Notion Sync ---
    const cobroObj = {
      ingreso: cobrado, movilidad, materiales, otros, meta,
      formaPago, observaciones: notas, svc1, svc2
    };
    // 1. Sync to Finance DB (Reporte Diario)
    _pushToNotion(item, cobroObj).catch(e => console.warn("Notion Finance Sync failed:", e));
    // 2. Sync to Clientes DB (Update status and info)
    _pushToNotionClientes(item).catch(e => console.warn("Notion Clientes Sync failed:", e));
  }

  saveAll(); render(); closeModal();
  toast('✓ Trabajo finalizado y guardado');
}

function _guardarFinalizacionLocal(lId, cobrado, movilidad, materiales, otros, baseTx, agDesc){
  if(cobrado>0)    state.transactions.unshift({id:lId,       type:'ingreso',amount:cobrado,...baseTx});
  if(movilidad>0)  state.transactions.unshift({id:lId+'_m',  type:'egreso', amount:movilidad,...baseTx,category:'Movilidad',description:'Movilidad · '+agDesc});
  if(materiales>0) state.transactions.unshift({id:lId+'_t',  type:'egreso', amount:materiales,...baseTx,category:'Materiales',description:'Materiales · '+agDesc});
  if(otros>0)      state.transactions.unshift({id:lId+'_o',  type:'egreso', amount:otros,...baseTx,category:'Mantenimiento o Rep',description:'Otros Gastos · '+agDesc});
  syncToSheets({id:lId,type:'ingreso',amount:cobrado,...baseTx});
}

function registrarIngresoAgenda(id){
  const item=(state.agenda||[]).find(x=>x.id===id);
  if(!item||!item.precio) return;
  // Evitar doble registro
  if(item._ingresoRegistrado) return toast('Ingreso ya registrado','error');
  const tx={
    id:Date.now()+'',
    type:'ingreso',
    amount:item.precio,
    category:item.servicio||'Otro Servicio',
    description:item.notas||item.servicio||'',
    date:item.fecha,
    cliente:item.cliente,
    ubicacion:item.ubicacion,
    negocio:true,
    moneda:'PEN',
  };
  if(!state.transactions) state.transactions=[];
  state.transactions.unshift(tx);
  item.estado='completado';
  item._ingresoRegistrado=true;
  saveAll();
  syncToSheets(tx);
  render();
  toast('Ingreso de '+fmt(item.precio)+' registrado en Mi Negocio ✓');
}

function toggleAgendaVoz(){
  if(window._avListening){ stopAgendaVoz(); return; }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ toast('Necesitás Chrome para usar el micrófono','error'); return; }
  const rec=new SR(); rec.lang='es-PE'; rec.interimResults=true; rec.continuous=false;
  window._avListening=true;
  document.getElementById('av-btn').style.background='linear-gradient(135deg,#E05252,#f87171)';
  document.getElementById('av-btn').textContent='⏹ Detener';
  rec.onresult=(e)=>{
    let txt='';
    for(let i=0;i<e.results.length;i++) txt+=e.results[i][0].transcript;
    document.getElementById('av-text').textContent=txt;
    document.getElementById('av-text').style.color='#1E293B';
    if(e.results[e.results.length-1].isFinal){ stopAgendaVoz(); parseAgendaVoz(txt); }
  };
  rec.onerror=()=>stopAgendaVoz();
  rec.onend=()=>{ if(window._avListening) stopAgendaVoz(); };
  rec.start();
  window._avRec=rec;
}

function stopAgendaVoz(){
  window._avListening=false;
  const btn=document.getElementById('av-btn');
  if(btn){ btn.style.background='#475569'; btn.textContent='🎙 Escuchar'; }
  if(window._avRec){ try{ window._avRec.stop(); }catch(e){} }
}


// Extractor de cliente específico para agenda — patrones más simples
function extractClienteAgenda(text){
  // Detectar tratamiento para conservarlo como Sr./Sra.
  const _tratAg = (() => {
    const m = text.match(/\b(señora|doña|sra\.?)\s+/i);
    if(m) return 'Sra.';
    const m2 = text.match(/\b(señor|don|sr\.?)\s+/i);
    if(m2) return 'Sr.';
    return '';
  })();
  // ── Intentar sobre texto ORIGINAL primero (preserva tildes y ñ) ──
  const SVCSTOP = /\b(servicio|punto|adicional|terma|cocina|horno|calefon|parrilla|secadora|instalacion|conexion|reparacion|modificacion|gasfiteria|documentacion|conversion|construccion|tuberia|red|boca|precio|soles|el|la|en|de|del|a|las)\b/i;
  const DISTSW  = /^(los|san|la|el|villa|santa|jesus|pueblo|puente|ate|callao|surco|lince|rimac|comas|barranco|lurin|chorrillos|brena|miraflores|independencia|carabayllo|ventanilla|bellavista)$/i;
  const DIASW   = /^(lunes|martes|miercoles|jueves|viernes|sabado|domingo|hoy|manana|mañana)$/i;

  // ── MÉTODO 1: Regex sobre texto original con ñ y tildes ──
  const patronesOrig = [
    /(?:para\s+el\s+|para\s+la\s+|al\s+|a\s+la\s+)(?:señora?|doña?|don|sr\.?|sra\.?)\s+([A-ZÁÉÍÓÚÑa-záéíóúñ][a-záéíóúñ]+(?:\s+[A-ZÁÉÍÓÚÑa-záéíóúñ][a-záéíóúñ]+)?)/i,
    /(?:señora?|doña?|don|sr\.?|sra\.?)\s+([A-ZÁÉÍÓÚÑa-záéíóúñ][a-záéíóúñ]{1,20})/i,
    /(?:para|al|con)\s+(?:el\s+|la\s+)?(?:cliente|clienta)\s+([A-ZÁÉÍÓÚÑa-záéíóúñ][a-záéíóúñ]+)/i,
  ];
  for(const p of patronesOrig){
    const m = text.match(p);
    if(m && m[1]){
      const partes = m[1].trim().split(/\s+/).filter(Boolean);
      // Cortar si segunda palabra es distrito o día
      let nombre = (partes.length > 1 && (DISTSW.test(partes[1])||DIASW.test(partes[1])))
        ? partes[0]
        : partes.slice(0,2).join(' ');
      // Verificar que no es palabra de servicio
      if(nombre.length > 1 && !SVCSTOP.test(nombre.split(' ')[0])) return (_tratAg ? _tratAg+' '+nombre : nombre);
    }
  }

  // ── MÉTODO 2: Texto normalizado (sin tildes) ──
  const t2 = text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const FIN = '(?:\\s+en\\b|\\s+de\\b|\\s*[,.]|\\s+servicio\\b|\\s+precio\\b|\\s+soles\\b|\\s+punto\\b|\\s+terma\\b|\\s+cocina\\b|\\s+horno\\b|\\s+calefon\\b|\\s+parrilla\\b|\\s+secadora\\b|\\s+instalacion\\b|\\s+conexion\\b|\\s+reparacion\\b|\\s+a las\\b|$)';
  const patronesNorm = [
    new RegExp('(?:para\\s+(?:la\\s+|el\\s+)?)(?:senora?|don|dona|sr\\.?|sra\\.?)\\s+([A-Za-z][A-Za-z]{1,18})' + FIN, 'i'),
    new RegExp('(?:senora?|dona|don|sr\\.?|sra\\.?)\\s+([A-Za-z][A-Za-z]{1,18})' + FIN, 'i'),
    new RegExp('(?:al|para el|para la)\\s+(?:cliente|clienta)\\s+([A-Za-z][A-Za-z\\s]{1,20}?)' + FIN, 'i'),
  ];
  const stopW2 = /^(en|de|del|al|la|el|por|para|con|que|los|las|un|una|dia|manana|hoy|ayer|servicio|precio|trabajo|visita|agenda|soles|sol|a|las|punto|adicional|terma|cocina|horno|secadora|calefon|parrilla|instalacion|conexion|reparacion|modificacion|gasfiteria|documentacion|conversion|construccion|tuberia|red|este|esta|ese|eso|esto)$/i;
  for(const p of patronesNorm){
    const m = t2.match(p);
    if(m && m[1]){
      const partes = m[1].trim().split(/\s+/).filter(w => !stopW2.test(w));
      if(partes.length > 1 && DISTSW.test(partes[1])) partes.length = 1;
      const nombre = partes.slice(0,2).join(' ').trim();
      if(nombre.length > 1 && !SVCSTOP.test(nombre.split(' ')[0])) return (_tratAg ? _tratAg+' '+nombre : nombre);
    }
  }

  // ── MÉTODO 3: Fallback ultrasimple — cualquier nombre propio después de "señor/don" ──
  const ultSimple = text.match(/(?:señora?|doña?|don|sr\.?|sra\.?)\s+([A-ZÁÉÍÓÚÑ][a-záéíóúñ]+)/i)
    || text.toLowerCase().match(/(?:senora?|dona|don)\s+([a-z][a-z]+)/i);
  if(ultSimple && ultSimple[1]){
    const n = ultSimple[1].trim();
    if(!SVCSTOP.test(n) && n.length > 1) {
      const nCap = n.charAt(0).toUpperCase()+n.slice(1);
      return (_tratAg ? _tratAg+' '+nCap : nCap);
    }
  }
  return null;
}

// Normalizar label del servicio para que coincida exactamente con AGENDA_SERVICIOS
function normalizeServicioLabel(label){
  if(!label) return '';
  const lNorm = label.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
  // 1. Coincidencia exacta
  const exact = AGENDA_SERVICIOS.find(s => {
    return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'') === lNorm;
  });
  if(exact) return exact;
  // 2. El label está contenido en el nombre del servicio
  const contains = AGENDA_SERVICIOS.find(s => {
    const sn = s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    return sn.includes(lNorm) || lNorm.includes(sn.split('/')[0].trim());
  });
  if(contains) return contains;
  // 3. Primera palabra coincide
  const firstWord = lNorm.split(' ')[0];
  if(firstWord.length >= 4){
    const byFirst = AGENDA_SERVICIOS.find(s => {
      const sn = s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      return sn.split(' ')[0] === firstWord || sn.includes(firstWord);
    });
    if(byFirst) return byFirst;
  }
  return label;
}

function parseAgendaVoz(text){

    .replace(/\bnuevo\s+(evento|trabajo|visita)\b/gi, '')
    .replace(/\b(agenda|agend[aá])\b/gi, '')
    .replace(/\b(construccion|construcción|construcion)\b/gi, '')
    .replace(/\b(oye|hey|escucha|ok|mira|anota|registra|apunta|guarda|crea)\b/gi, '')
    .replace(/\b(para el dia de|para el dia|el dia de|día de mañana|dia de manana)\b(?!\s*(?:domingo|lunes|martes|miercoles|jueves|viernes|sabado))/gi, 'mañana')
    .replace(/\bservicio\s+(punto|terma|cocina|horno|calefon|reparacion|instalacion|conexion|gasfiteria|documentacion|conversion|modificacion|parrilla|secadora)/gi, '$1')
    .replace(/\s+/g, ' ')
    .trim();
  if(!text2) text2 = text;
  text = text2;
  const t = nrm(text);
  const orig = text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

  // Visita = ir a ver/revisar/cotizar sin hacer trabajo aún
  // Palabras que fuerzan tipo TRABAJO (mayor prioridad)
  const trabajoKws = [
    'construccion','construcción','construcion','trabajo de','obra',
    'instalacion','instalación','conexion','conexión','reparacion','reparación',
    'punto adicional','terma','cocina','horno','calefon','calefón',
    'secadora','parrilla','gasfiteria','gasfitería','documentacion','documentación',
    'conversion','conversión','modificacion','modificación',
    // ★ Variantes fonéticas Chrome Android
    'coneccion','conección','combersion','comversion','combersión','comversión',
    'conbersion','conbersión','combercion','convercion',
  ];
  const esTrabajoExplicito = trabajoKws.some(k=>t.includes(nrm(k)));

  const visitaKws = [
    // Palabras exactas y variantes fonéticas del speech recognizer
    'visita','vista','vistar','visitar','bisita',
    'agenda visita','agenda vista','una visita','hacer visita',
    'pasar a ver','pasar por','pasar donde','pasaré','pasare',
    'ir a ver','ir a revisar','ir a cotizar','ir donde',
    'cotizacion','cotización','presupuesto','dar presupuesto',
    'ver al','ver a la','ver al señor','ver a la señora',
    'cita','tengo cita','una cita',
    'revisar','chequear','checar',
    'solo ver','nada mas ver','solo mirar',
  ];
  const isVisita = !esTrabajoExplicito && visitaKws.some(k=>t.includes(nrm(k)));
  const tipo = isVisita ? 'visita' : 'trabajo';
  // Fecha
  const fecha = extractDate(text);
  // Hora: "a las 3", "a las 3 pm", "a las 15", "3 de la tarde"
  let hora = '';
  {
    const t2 = text.toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'');

    // ── Mapa de números en palabras → dígito ──
    const HORA_PALABRAS = {
      'una':1,'uno':1,'dos':2,'tres':3,'cuatro':4,'cinco':5,'seis':6,
      'siete':7,'ocho':8,'nueve':9,'diez':10,'once':11,'doce':12,
      'trece':13,'catorce':14,'quince':15,'dieciseis':16,'diecisiete':17,
      'dieciocho':18,'diecinueve':19,'veinte':20,'veintiuno':21,'veintidos':22,
    };

    // Patrones de hora con dígitos
    const horaPatterns = [
      /a las\s+(\d{1,2})(?::(\d{2}))?\s*(?:horas?)?\s*(pm|am|p\.m|a\.m|de la tarde|de la manana|de la mañana|del mediodia|del mediodía|de la noche|de la madrugada)/i,
      /\b(\d{1,2})(?::(\d{2}))?\s*(pm|am|p\.m|a\.m|de la tarde|de la manana|de la mañana|de la noche|de la madrugada)\b/i,
      /a las\s+(\d{1,2})\s+y\s+(media|cuarto|quince|treinta|cuarenta|cuarenta y cinco)/i,
      /a las\s+(\d{1,2}):(\d{2})/i,
      /\b(\d{1,2}):(\d{2})\b/,
    ];

    for(const pat of horaPatterns){
      const m2 = t2.match(pat);
      if(!m2) continue;
      let h=parseInt(m2[1]), min=0;
      const rest = (m2[2]||'').toLowerCase();
      const period = (m2[3]||'').toLowerCase();
      if(rest==='media'||rest==='treinta') min=30;
      else if(rest==='cuarto'||rest==='quince') min=15;
      else if(rest==='cuarenta') min=40;
      else if(rest==='cuarenta y cinco') min=45;
      else min=parseInt(rest)||0;
      const isPM = period.includes('pm')||period.includes('tarde')||period.includes('noche')||period.includes('p.m');
      const isAM = period.includes('am')||period.includes('manana')||period.includes('madrugada')||period.includes('a.m');
      if(isPM && h!==12 && h<12) h+=12;
      if(isAM && h===12) h=0;
      if(!isPM&&!isAM&&h>=1&&h<=6) h+=12;
      hora = String(h).padStart(2,'0')+':'+String(min).padStart(2,'0');
      break;
    }

    // ★ Hora en palabras — "nueve de la mañana", "tres de la tarde", "a las ocho"
    if(!hora){
      const wordPat = /(?:a las\s+)?([a-z]+)\s+(?:y\s+(media|cuarto|quince|treinta))?\s*(?:de la\s+)?(manana|tarde|noche|madrugada|mediodia)?/i;
      // Buscar en contexto "a las [palabra]" o "[palabra] de la [periodo]"
      const wm = t2.match(/a las\s+([a-z]+)(?:\s+y\s+(media|cuarto|quince|treinta))?(?:\s+de la\s+(manana|tarde|noche|madrugada)|\s+(am|pm))?/i)
               || t2.match(/\b([a-z]+)\s+(?:y\s+(media|cuarto|quince|treinta)\s+)?de la\s+(manana|tarde|noche|madrugada)\b/i);
      if(wm){
        const numWord = (wm[1]||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
        const h = HORA_PALABRAS[numWord];
        if(h){
          const minWord = (wm[2]||'').toLowerCase();
          let min = 0;
          if(minWord==='media'||minWord==='treinta') min=30;
          else if(minWord==='cuarto'||minWord==='quince') min=15;
          const period = (wm[3]||wm[4]||'').toLowerCase();
          let hFinal = h;
          if((period.includes('tarde')||period.includes('noche')||period.includes('pm'))&&h<12) hFinal+=12;
          if((period.includes('manana')||period.includes('am'))&&h===12) hFinal=0;
          // Sin periodo explícito y h<=6 → tarde (heurística para trabajos)
          if(!period&&h>=1&&h<=6) hFinal+=12;
          hora = String(hFinal).padStart(2,'0')+':'+String(min).padStart(2,'0');
        }
      }
    }
  }
  // ── Extracción robusta independiente del orden ──

  // Cliente — múltiples patrones desordenados
  // extractCliente now returns with Sr./Sra. prefix when treatment detected
  const cliente = extractCliente(text) || extractClienteAgenda(text) || '';

  // Servicio — primero buscar con detectServicioNegocio,
  // si no encuentra usar extractor directo de agenda por nombre exacto
  const svcNeg = detectServicioNegocio(text);
  let servicio = svcNeg ? svcNeg.label : '';

  if(!servicio){
    // Extractor directo: mapa de palabras clave → label
    const SERVICIO_DIRECTO = [
      // ── Artefactos concretos primero (evitan falsos match con "conexion de cocina") ──
      { keys:['cocina','cocinilla','cocina a gas','instalar cocina','servicio cocina','cobré cocina','por cocina'], label:'Cocina / Cocinilla' },
      { keys:['horno','horno a gas','horno de gas','instalar horno','servicio horno','por horno'], label:'Horno a Gas' },
      { keys:['terma','terma a gas','terma de gas','instalar terma','servicio terma','cobré terma','por terma'], label:'Terma' },
      { keys:['secadora','secadora a gas','instalar secadora','servicio secadora'], label:'Secadora a Gas' },
      { keys:['calefon','calefón','calefon a gas','instalar calefon','servicio calefon'], label:'Calefón' },
      { keys:['parrilla','parrilla a gas','instalar parrilla','servicio parrilla'], label:'Parrilla a Gas' },
      // ── Servicios de instalación y reparación ──
      { keys:['punto adicional','punto extra','punto de gas','boca nueva','boca de gas','salida nueva','toma nueva','un punto adicional','servicio punto adicional','hacer un punto','poner un punto','un punto','hacer punto','poner punto','nuevo punto','instalar punto'], label:'Punto Adicional' },
      { keys:['modificacion de red','modificacion red','modificar red','cambio de red','rediseño de red','modificacion','modificar la red','mod de red','servicio modificacion','modificacion interna'], label:'Modificación Red' },
      { keys:['instalacion nueva','instalacion de gas','obra nueva','proyecto nuevo','instalacion completa','instalar gas nuevo'], label:'Instalación Nueva' },
      { keys:['conversion de artefacto','conversion a gas','converti artefacto','convertir artefacto','adaptar artefacto',
               'combersion','comversion','combersión','comversión','combercion','convercion','conbersion','conbersión',
               // ★ Claves cortas — solo la palabra sola ya es suficiente
               'conversion','conversión','hice una conversion','hice una conversión',
               'hice conversion','hice conversión','realice conversion','realicé conversión'], label:'Conversión Artefacto' },
      { keys:['conexion de artefacto','conectar artefacto','conexion nueva de artefacto',
               'coneccion','conección','coneccion de artefacto','konexion','conectar nueva','hice la conexion','hice la coneccion',
               // ★ Claves cortas
               'conexion','conexión','hice la conexión','hice conexion','hice conexión',
               'realice conexion','realicé conexión','nueva conexion','nueva conexión'], label:'Conexión Artefacto' },
      { keys:['reparacion de tuberia','reparar tuberia','tuberia rota','fuga de gas','escape de gas','arreglar tuberia','perdida de gas'], label:'Reparación Tubería' },
      { keys:['gasfiteria','gasfitería','desague','plomeria','tuberia de agua','trabajo de agua','gasfiter'], label:'Gasfitería' },
      { keys:['documentacion','documentación','tramite','certificado','planos','expediente','inspeccion','habilitacion'], label:'Documentación' },
      { keys:['construccion','construcción','construcion'], label:'_GEMINI_DECIDE' },
    ];
    for(const s of SERVICIO_DIRECTO){
      if(s.keys.some(k=>t.includes(nrm(k)))){
        // _GEMINI_DECIDE = no asignar localmente, Gemini lo determina por contexto
        if(s.label !== '_GEMINI_DECIDE') servicio=s.label;
        break;
      }
    }
  }

  // Ubicación — buscar distrito o dirección
  const ubicacion = extractUbicacion(text) || '';

  // Precio — buscar monto en cualquier parte
  const precio = extractAmount(text) || 0;

  // Teléfono — buscar número de 9 dígitos
  const telMatch = text.match(/\b(9\d{8})\b/);
  const telefono = telMatch ? telMatch[1] : '';

  // Notas — extraer texto después de "nota:" o "apuntar que" o "avisar que"
  const notasMatch = text.match(/(?:nota[:\s]+|apuntar que|avisar que|recordar que|importante[:\s]+)(.{5,60}?)(?:[,.]|$)/i);
  const notas = notasMatch ? notasMatch[1].trim() : '';

  window._avParsed = { tipo, fecha, hora, cliente, servicio: normalizeServicioLabel(servicio), ubicacion, precio, telefono, notas };

  const prev=document.getElementById('av-preview');
  if(prev){

  }
  const saveBtn=document.getElementById('av-save');
  if(saveBtn) saveBtn.style.display='block';
}

function exportData(){
  const data={
    version:2,
    exportDate: new Date().toLocaleString('es-PE'),
    transactions: state.transactions,
    debts: state.debts,
    servicios: state.servicios,
    catsIn: state.catsIn,
    catsEx: state.catsEx,
  };
  
  let numTx = state.transactions ? state.transactions.length : 0;
  
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const fecha=new Date().toISOString().split('T')[0];
  a.href=url;
  a.download=`MisFinanzas_${fecha}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  const now=new Date().toLocaleString('es-PE');
  localStorage.setItem('fnz_last_backup',now);
  render();
  toast(`⬇ Exportado exitosamente: ${numTx} movimientos descargados`, 'success');
}

function importData(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  toast('⏳ Importando copia de seguridad...');
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!data.transactions&&!data.debts)return toast('Archivo no válido','error');
      
      const numTx = data.transactions ? data.transactions.length : 0;
      if(!confirm(`¿Importar datos del ${data.exportDate||'archivo'}?\n\nEsto reemplazará tus datos actuales y restaurará ${numTx} movimientos.`))return;
      
      if(data.transactions) state.transactions=data.transactions;
      if(data.debts) state.debts=data.debts;
      if(data.servicios) state.servicios=data.servicios;
      if(data.catsIn) state.catsIn=data.catsIn;
      if(data.catsEx) state.catsEx=data.catsEx;
      saveAll();
      render();
      toast(`⬆ Importación completada: ${numTx} movimientos restaurados`, 'success');
    }catch{toast('Error al leer el archivo','error');}
  };
  reader.readAsText(file);
  event.target.value='';
}

cha','  Tipo','  T\u00edtulo','  Contenido / \u00cdtems','  Recordatorio','  Estado']);\n    aplicarEstiloNotion(sh4, {header:'#1C1C1C'}, 6);\n    sh4.setColumnWidth(1,110);sh4.setColumnWidth(2,130);sh4.setColumnWidth(3,200);\n    sh4.setColumnWidth(4,340);sh4.setColumnWidth(5,150);sh4.setColumnWidth(6,120);\n  }\n  limpiarHojasViejas();\n  Logger.log('Hojas inicializadas correctamente');\n}\n\nfunction limpiarHojasViejas() {\n  var ss = SpreadsheetApp.getActiveSpreadsheet();\n  var hojas = ss.getSheets();\n  for (var i = hojas.length - 1; i >= 0; i--) {\n    var nombre = hojas[i].getName();\n    var esValida = false;\n    for (var j = 0; j < HOJAS_VALIDAS.length; j++) {\n      if (nombre === HOJAS_VALIDAS[j]) { esValida = true; break; }\n    }\n    if (!esValida && ss.getSheets().length > 1) {\n      try { ss.deleteSheet(hojas[i]); } catch(e) {}\n    }\n  }\n}\n\n// \u2605 Anti-duplicado via PropertiesService \u2014 ver doGet\n\nfunction doGet(e) {\n  try {\n    var raw = e && e.parameter && e.parameter.data ? e.parameter.data : null;\n    if (!raw) return ContentService.createTextOutput('Mis Finanzas v6.4 activo');\n    var data = JSON.parse(decodeURIComponent(raw));\n    if (data.test) return jsonOk({ ok: true, version: '6.4' });\n\n    // Sin anti-duplicado \u2014 cada request se procesa siempre\n\n    var ss = SpreadsheetApp.getActiveSpreadsheet();\n\n    if      (data.type === 'agenda')            { handleAgenda(ss, data); }\n    else if (data.type === 'agenda_estado')     { handleAgendaEstado(ss, data); }\n    else if (data.type === 'agenda_delete')     { handleAgendaDelete(ss, data); }\n    else if (data.type === 'agenda_conversion') { handleAgendaConversion(ss, data); }\n    else if (data.type === 'tx')                { handleTx(ss, data); }\n    else if (data.type === 'deuda')             { handleDeuda(ss, data); }\n    else if (data.type === 'servicio')          { handleServicio(ss, data); }\n    else if (data.type === 'meta')              { handleMeta(ss, data); }\n    else if (data.type === 'prestamo')          { handlePrestamo(ss, data); }\n    else if (data.type === 'nota')              { handleNota(ss, data); }\n\n    return jsonOk({ ok: true });\n  } catch (err) {\n    Logger.log('Error: ' + err.message);\n    return jsonOk({ ok: false, error: err.message });\n  }\n}\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n// DISE\u00d1O NOTION \u2014 funciones de estilo\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n\n// Colores por hoja\nvar TEMAS = {\n  'Construcciones y Visitas': { header: '#1C1C1C', alt: '#FAFAFA', badge_a: '#FFF3E0', badge_b: '#E3F2FD', badge_ok: '#E8F5E9', badge_pen: '#FFF8E1' },\n  'Movimientos Negocio':      { header: '#1C1C1C', alt: '#FAFAFA', badge_ing: '#E8F5E9', badge_egr: '#FCE4EC' },\n  'Deudas y Movimientos':     { header: '#1C1C1C', alt: '#FAFAFA' }\n};\n\nfunction aplicarEstiloNotion(sh, tema, numCols) {\n  // Fila de encabezado\n  var hRange = sh.getRange(1, 1, 1, numCols);\n  hRange.setBackground(tema.header)\n        .setFontColor('#FFFFFF')\n        .setFontWeight('bold')\n        .setFontSize(11)\n        .setFontFamily('Arial')\n        .setHorizontalAlignment('left')\n        .setVerticalAlignment('middle')\n        .setBorder(false, false, false, false, false, false);\n  sh.setRowHeight(1, 36);\n  sh.setFrozenRows(1);\n\n  // Ocultar l\u00edneas de cuadr\u00edcula\n  sh.setHiddenGridlines(true);\n}\n\nfunction aplicarFilaNotion(sh, row, numCols, altBg) {\n  var bg = (row % 2 === 0) ? altBg : '#FFFFFF';\n  sh.getRange(row, 1, 1, numCols)\n    .setBackground(bg)\n    .setFontSize(10)\n    .setFontFamily('Arial')\n    .setVerticalAlignment('middle')\n    .setBorder(false, false, true, false, false, false, '#F0F0F0', SpreadsheetApp.BorderStyle.SOLID);\n  sh.setRowHeight(row, 32);\n}\n\nfunction badgeCell(sh, row, col, texto, bgColor, textColor) {\n  var cell = sh.getRange(row, col);\n  cell.setValue(texto);\n  cell.setBackground(bgColor || '#F5F5F5');\n  cell.setFontColor(textColor || '#333333');\n  cell.setFontWeight('bold');\n  cell.setFontSize(10);\n  cell.setHorizontalAlignment('center');\n}\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n// HOJA 1 \u2014 CONSTRUCCIONES Y VISITAS\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n\nfunction initConstrucciones(sh) {\n  if (sh.getLastRow() > 0) { return; }\n  var headers = ['  Fecha', '  Hora', '  Tipo', '  Cliente', '  Servicio', '  Ubicaci\u00f3n', '  Precio S/.', '  Estado', '  Tel\u00e9fono', '  Notas', 'CalID'];\n  sh.appendRow(headers);\n  aplicarEstiloNotion(sh, TEMAS['Construcciones y Visitas'], 11);\n  // Anchos estilo Notion\n  sh.setColumnWidth(1, 110);  // Fecha\n  sh.setColumnWidth(2, 80);   // Hora\n  sh.setColumnWidth(3, 120);  // Tipo\n  sh.setColumnWidth(4, 160);  // Cliente\n  sh.setColumnWidth(5, 170);  // Servicio\n  sh.setColumnWidth(6, 140);  // Ubicaci\u00f3n\n  sh.setColumnWidth(7, 110);  // Precio\n  sh.setColumnWidth(8, 120);  // Estado\n  sh.setColumnWidth(9, 120);  // Tel\u00e9fono\n  sh.setColumnWidth(10, 200); // Notas\n  sh.setColumnWidth(11, 20);  // CalID oculto\n  sh.hideColumns(11);\n}\n\nfunction handleAgenda(ss, data) {\n  var item = data.item || data.agenda;\n  if (!item) { return; }\n  var sh = getOrCreate(ss, 'Construcciones y Visitas');\n  initConstrucciones(sh);\n\n  var esVisita = item.tipo === 'visita';\n\n  // Buscar fila existente por ID\n  var foundRow = -1;\n  for (var i = 2; i <= sh.getLastRow(); i++) {\n    if (sh.getRange(i, 1).getNote() === item.id) { foundRow = i; break; }\n  }\n\n  var calId = '-';\n  if (foundRow > 0) {\n    // Edici\u00f3n \u2014 conservar CalID existente\n    calId = sh.getRange(foundRow, 11).getValue() || '-';\n    // Actualizar Calendar si existe\n    try {\n      if (calId && calId !== '-') {\n        var ev = CalendarApp.getEventById(calId);\n        if (ev) {\n          var p2 = item.fecha.split('-'), h2 = (item.hora||'09:00').split(':');\n          var inicio2 = new Date(Number(p2[0]),Number(p2[1])-1,Number(p2[2]),Number(h2[0]),Number(h2[1]||0),0);\n          ev.setTime(inicio2, new Date(inicio2.getTime()+7200000));\n          if (!esVisita && item.servicio) ev.setTitle(item.servicio+' \u2014 '+(item.cliente||'Cliente'));\n          if (item.ubicacion) ev.setLocation(item.ubicacion);\n        }\n      }\n    } catch(e) {}\n  } else {\n    // Nuevo \u2014 crear evento Calendar\n    try { calId = crearEventoCalendar(item) || '-'; } catch(e) {}\n  }\n\n  var valores = [\n    '  ' + fmtDate(item.fecha),\n    '  ' + (item.hora || '-'),\n    esVisita ? 'Visita' : 'Construcci\u00f3n',\n    '  ' + (item.cliente || '-'),\n    '  ' + (esVisita ? '-' : (item.servicio || '-')),\n    '  ' + (item.ubicacion || '-'),\n    esVisita ? '-' : (item.precio ? toNum(item.precio) : '-'),\n    item.estado === 'completado' ? 'Completado' : 'Pendiente',\n    '  ' + (item.telefono || '-'),\n    '  ' + (item.notas || '-'),\n    calId\n  ];\n\n  if (foundRow > 0) {\n    sh.getRange(foundRow, 1, 1, 11).setValues([valores]);\n    aplicarFilaNotion(sh, foundRow, 11, '#FAFAFA');\n    var row = foundRow;\n  } else {\n    sh.appendRow(valores);\n    var row = sh.getLastRow();\n    sh.getRange(row, 1).setNote(item.id || '');\n  }\n\n  if (esVisita) {\n    badgeCell(sh, row, 3, 'Visita', '#E3F2FD', '#1565C0');\n  } else {\n    badgeCell(sh, row, 3, 'Construcci\u00f3n', '#FFF3E0', '#E65100');\n  }\n  var esComp = item.estado === 'completado';\n  badgeCell(sh, row, 8, esComp ? '\u2713 Completado' : '\u25cb Pendiente', esComp ? '#E8F5E9' : '#FFF8E1', esComp ? '#2E7D32' : '#F57F17');\n  if (!esVisita && item.precio) {\n    sh.getRange(row, 7).setNumberFormat('\"S/ \"#,##0.00').setHorizontalAlignment('right').setFontWeight('bold').setFontColor('#2E7D32');\n  }\n}\n\nfunction handleAgendaEstado(ss, data) {\n  var ae = data.agenda_estado; if (!ae) { return; }\n  var sh = ss.getSheetByName('Construcciones y Visitas'); if (!sh) { return; }\n  for (var i = 2; i <= sh.getLastRow(); i++) {\n    if (sh.getRange(i, 1).getNote() === ae.id) {\n      var esComp = ae.estado === 'completado';\n      badgeCell(sh, i, 8, esComp ? '\u2713 Completado' : '\u25cb Pendiente', esComp ? '#E8F5E9' : '#FFF8E1', esComp ? '#2E7D32' : '#F57F17');\n      try {\n        var calId = sh.getRange(i, 11).getValue();\n        if (calId && calId !== '-') {\n          var ev = CalendarApp.getEventById(calId);\n          if (ev) {\n            var t = ev.getTitle();\n            if (esComp) { if (t.indexOf('[OK] ') < 0) ev.setTitle('[OK] ' + t); }\n            else { ev.setTitle(t.replace('[OK] ', '')); }\n          }\n        }\n      } catch(e) {}\n      break;\n    }\n  }\n}\n\nfunction handleAgendaDelete(ss, data) {\n  if (!data.id) { return; }\n  var sh = ss.getSheetByName('Construcciones y Visitas'); if (!sh) { return; }\n  for (var i = 2; i <= sh.getLastRow(); i++) {\n    if (sh.getRange(i, 1).getNote() === data.id) {\n      try {\n        var calId = sh.getRange(i, 11).getValue();\n        if (calId && calId !== '-') { var ev = CalendarApp.getEventById(calId); if (ev) ev.deleteEvent(); }\n      } catch(e) {}\n      badgeCell(sh, i, 8, '\u2717 Eliminado', '#F5F5F5', '#9E9E9E');\n      sh.getRange(i, 1, 1, 11).setBackground('#F9F9F9').setFontColor('#BDBDBD');\n      break;\n    }\n  }\n}\n\nfunction handleAgendaConversion(ss, data) {\n  var item = data.item;\n  if (!item || !data.id) { return; }\n  var sh = ss.getSheetByName('Construcciones y Visitas');\n  if (!sh) { handleAgenda(ss, data); return; } // si no existe la hoja, crear normal\n\n  // Buscar la fila por id (guardado en nota de celda A)\n  var foundRow = -1;\n  for (var i = 2; i <= sh.getLastRow(); i++) {\n    if (sh.getRange(i, 1).getNote() === data.id) { foundRow = i; break; }\n  }\n\n  var fechaConv = fmtDate(new Date().toISOString().split('T')[0]);\n\n  if (foundRow > 0) {\n    // Actualizar fila existente\n    sh.getRange(foundRow, 1, 1, 10).setValues([[\n      '  ' + fmtDate(item.fecha),\n      '  ' + (item.hora || '-'),\n      'Construcci\u00f3n',\n      '  ' + (item.cliente || '-'),\n      '  ' + (item.servicio || '-'),\n      '  ' + (item.ubicacion || '-'),\n      item.precio ? toNum(item.precio) : '-',\n      '\u25cb Pendiente',\n      '  ' + (item.telefono || '-'),\n      '  Convertido de Visita el ' + fechaConv + (item.fechaVisitaOriginal ? ' (visita: ' + fmtDate(item.fechaVisitaOriginal) + ')' : '')\n    ]]);\n    aplicarFilaNotion(sh, foundRow, 11, '#FAFAFA');\n    badgeCell(sh, foundRow, 3, 'Construcci\u00f3n', '#FFF3E0', '#E65100');\n    badgeCell(sh, foundRow, 8, '\u25cb Pendiente', '#FFF8E1', '#F57F17');\n    if (item.precio) {\n      sh.getRange(foundRow, 7).setNumberFormat('\"S/ \"#,##0.00').setHorizontalAlignment('right').setFontWeight('bold').setFontColor('#2E7D32');\n    }\n    // Actualizar Calendar si existe\n    try {\n      var calId = sh.getRange(foundRow, 11).getValue();\n      if (calId && calId !== '-') {\n        var ev = CalendarApp.getEventById(calId);\n        if (ev) {\n          var iconoConv = '\ud83d\udd27';\n          var servConv = (item.servicio || '').toLowerCase();\n          if (servConv.indexOf('terma') >= 0 || servConv.indexOf('calef') >= 0)       { iconoConv = '\ud83d\udebf'; }\n          else if (servConv.indexOf('cocina') >= 0 || servConv.indexOf('horno') >= 0) { iconoConv = '\ud83c\udf73'; }\n          else if (servConv.indexOf('parrilla') >= 0)                                 { iconoConv = '\ud83d\udd25'; }\n          else if (servConv.indexOf('punto') >= 0 || servConv.indexOf('conexi') >= 0) { iconoConv = '\u26a1'; }\n          else if (servConv.indexOf('modific') >= 0 || servConv.indexOf('red') >= 0)  { iconoConv = '\ud83d\udd29'; }\n          else if (servConv.indexOf('reparac') >= 0)                                  { iconoConv = '\ud83d\udee0\ufe0f'; }\n          else if (servConv.indexOf('gasfiter') >= 0)                                 { iconoConv = '\ud83d\udca7'; }\n          ev.setTitle(iconoConv + ' ' + (item.servicio || 'Construcci\u00f3n') + ' \u2014 ' + (item.cliente || 'Cliente'));\n          var p2 = item.fecha.split('-'), h2 = (item.hora || '09:00').split(':');\n          var inicio2 = new Date(Number(p2[0]), Number(p2[1])-1, Number(p2[2]), Number(h2[0]), Number(h2[1]||0), 0);\n          ev.setTime(inicio2, new Date(inicio2.getTime() + 7200000));\n          var desc2 = '\ud83d\udc64 ' + (item.cliente||'-') + '\\n' +\n                      iconoConv + ' ' + (item.servicio||'-') + '\\n' +\n                      (item.precio ? '\ud83d\udcb0 S/ ' + toNum(item.precio).toFixed(2) + '\\n' : '') +\n                      (item.ubicacion ? '\ud83d\udccd ' + item.ubicacion + '\\n' : '') +\n                      (item.hora ? '\ud83d\udd50 ' + item.hora + '\\n' : '') +\n                      (item.telefono ? '\ud83d\udcde ' + item.telefono + '\\n' : '') +\n                      '\ud83d\udd04 Convertido de Visita el ' + fechaConv;\n          ev.setDescription(desc2);\n        }\n      }\n    } catch(e) { Logger.log('Cal conversion error: ' + e.message); }\n  } else {\n    // No encontr\u00f3 la fila \u2014 crear como nueva construcci\u00f3n\n    handleAgenda(ss, data);\n  }\n}\n\nfunction crearEventoCalendar(item) {\n  var cal = CalendarApp.getDefaultCalendar();\n  if (!item.fecha) { return null; }\n  var p = item.fecha.split('-'), h = (item.hora || '09:00').split(':');\n  var inicio = new Date(Number(p[0]), Number(p[1])-1, Number(p[2]), Number(h[0]), Number(h[1]||0), 0);\n  var fin = new Date(inicio.getTime() + 7200000);\n  var esVisita = item.tipo === 'visita';\n\n  // \u00cdcono seg\u00fan servicio\n  var iconoServicio = '\ud83d\udd27';\n  var serv = (item.servicio || '').toLowerCase();\n  if (serv.indexOf('terma') >= 0 || serv.indexOf('calef') >= 0)      { iconoServicio = '\ud83d\udebf'; }\n  else if (serv.indexOf('cocina') >= 0 || serv.indexOf('horno') >= 0) { iconoServicio = '\ud83c\udf73'; }\n  else if (serv.indexOf('parrilla') >= 0)                             { iconoServicio = '\ud83d\udd25'; }\n  else if (serv.indexOf('secadora') >= 0)                             { iconoServicio = '\ud83c\udf00'; }\n  else if (serv.indexOf('punto') >= 0 || serv.indexOf('conexi') >= 0) { iconoServicio = '\u26a1'; }\n  else if (serv.indexOf('document') >= 0)                             { iconoServicio = '\ud83d\udccb'; }\n  else if (serv.indexOf('modific') >= 0 || serv.indexOf('red') >= 0)  { iconoServicio = '\ud83d\udd29'; }\n  else if (serv.indexOf('reparac') >= 0)                              { iconoServicio = '\ud83d\udee0\ufe0f'; }\n  else if (serv.indexOf('gasfiter') >= 0 || serv.indexOf('tuber') >= 0){ iconoServicio = '\ud83d\udca7'; }\n  else if (serv.indexOf('instalac') >= 0)                             { iconoServicio = '\ud83d\udd27'; }\n\n  // T\u00edtulo del evento\n  var titulo = esVisita\n    ? '\ud83d\udc41\ufe0f Visita \u2014 ' + (item.cliente || 'Cliente')\n    : iconoServicio + ' ' + (item.servicio || 'Construcci\u00f3n') + ' \u2014 ' + (item.cliente || 'Cliente');\n\n  // Hora formateada\n  var horaStr = item.hora || '09:00';\n  var hNum = Number(h[0]), mNum = Number(h[1] || 0);\n  var ampm = hNum >= 12 ? 'PM' : 'AM';\n  var h12 = hNum > 12 ? hNum - 12 : (hNum === 0 ? 12 : hNum);\n  var horaFmt = h12 + ':' + (mNum < 10 ? '0' : '') + mNum + ' ' + ampm;\n\n  // Descripci\u00f3n con \u00edconos por campo\n  var desc = '';\n  if (item.cliente)   { desc += '\ud83d\udc64 ' + item.cliente + '\\n'; }\n  if (!esVisita && item.servicio) { desc += iconoServicio + ' ' + item.servicio + '\\n'; }\n  if (!esVisita && item.precio)   { desc += '\ud83d\udcb0 S/ ' + toNum(item.precio).toFixed(2) + '\\n'; }\n  if (item.ubicacion) { desc += '\ud83d\udccd ' + item.ubicacion + '\\n'; }\n  if (item.hora)      { desc += '\ud83d\udd50 ' + horaFmt + '\\n'; }\n  if (item.telefono)  { desc += '\ud83d\udcde ' + item.telefono + '\\n'; }\n  if (item.notas)     { desc += '\ud83d\udcdd ' + item.notas + '\\n'; }\n  if (esVisita)       { desc += '\\n\u26a0\ufe0f Visita \u2014 pendiente confirmar trabajo'; }\n\n  var ev = cal.createEvent(titulo, inicio, fin, {\n    description: desc.trim(),\n    location: item.ubicacion || ''\n  });\n  return ev.getId();\n}\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n// HOJA 2 \u2014 MOVIMIENTOS NEGOCIO\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n\nfunction initMovNegocio(sh) {\n  if (sh.getLastRow() > 0) { return; }\n  var headers = ['  Fecha', '  Tipo', '  Categor\u00eda / Servicio', '  Cliente', '  Descripci\u00f3n', '  Monto S/.', '  Ubicaci\u00f3n'];\n  sh.appendRow(headers);\n  aplicarEstiloNotion(sh, TEMAS['Movimientos Negocio'], 7);\n  sh.setColumnWidth(1, 110); sh.setColumnWidth(2, 100);\n  sh.setColumnWidth(3, 180); sh.setColumnWidth(4, 160);\n  sh.setColumnWidth(5, 200); sh.setColumnWidth(6, 120); sh.setColumnWidth(7, 140);\n}\n\nfunction handleTx(ss, data) {\n  var tx = data.tx; if (!tx) { return; }\n  var neg = data.modo === 'negocio';\n  var esIng = tx.type === 'ingreso';\n  var monto = toNum(tx.amount);\n\n  if (neg) {\n    var sh = getOrCreate(ss, 'Movimientos Negocio');\n    initMovNegocio(sh);\n    var row = sh.getLastRow() + 1;\n    sh.appendRow(['  '+fmtDate(tx.date), esIng?'Ingreso':'Egreso', '  '+(tx.category||'-'), '  '+(tx.cliente||'-'), '  '+(tx.description||'-'), monto, '  '+(tx.ubicacion||'-')]);\n    aplicarFilaNotion(sh, row, 7, '#FAFAFA');\n    badgeCell(sh, row, 2, esIng ? '\u2191 Ingreso' : '\u2193 Egreso', esIng ? '#E8F5E9' : '#FCE4EC', esIng ? '#2E7D32' : '#C62828');\n    sh.getRange(row, 6).setNumberFormat('\"S/ \"#,##0.00').setHorizontalAlignment('right').setFontWeight('bold').setFontColor(esIng ? '#2E7D32' : '#C62828');\n  } else {\n    handleMovimientoPersonal(ss, data);\n  }\n}\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n// HOJA 3 \u2014 DEUDAS Y MOVIMIENTOS\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n\nfuncti , np+'/'+nc+' cuotas \u00b7 S/ '+toNum(d.cuotaMonto).toFixed(2)+' c/u', saldo, pct+'% pagado', interes > 0 ? interes : '-'];\n  if (foundRow > 0) {\n    sh.getRange(foundRow, 1, 1, 8).setValues([valores]);\n    _formatDeudasRow(sh, foundRow);\n  } else {\n    var row = sh.getLastRow() + 1;\n    sh.appendRow(valores);\n    aplicarFilaNotion(sh, row, 8, '#FAFAFA');\n    sh.getRange(row, 1).setNote(d.id||d.name||'');\n    _formatDeudasRow(sh, row);\n  }\n}\n\nfunction _formatDeudasRow(sh, row) {\n  badgeCell(sh, row, 2, '\u26a1 Deuda', '#EDE7F6', '#4527A0');\n  sh.getRange(row, 4).setNumberFormat('\"S/ \"#,##0.00').setHorizontalAlignment('right').setFontWeight('bold').setFontColor('#C62828');\n  sh.getRange(row, 6).setNumberFormat('\"S/ \"#,##0.00').setHorizontalAlignment('right').setFontColor('#E65100');\n  if (typeof sh.getRange(row, 8).getValue() === 'number') {\n    sh.getRange(row, 8).setNumberFormat('\"S/ \"#,##0.00').setHorizontalAlignment('right');\n  }\n}\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n// OTRAS SECCIONES\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n\nfunction handleServicio(ss, data) {\n  var s = data.item; if (!s) { return; }\n  var sh = getOrCreate(ss, 'Servicios Fijos');\n  if (sh.getLastRow() === 0) {\n    sh.appendRow(['  Servicio', '  Monto Mensual S/.', '  D\u00eda Vencimiento', '  Estado', '  Actualizado']);\n    aplicarEstiloNotion(sh, { header: '#1C1C1C' }, 5);\n    sh.setColumnWidth(1,160);sh.setColumnWidth(2,150);sh.setColumnWidth(3,150);sh.setColumnWidth(4,120);sh.setColumnWidth(5,130);\n  }\n  var foundRow = -1;\n  for (var i = 2; i <= sh.getLastRow(); i++) { if (sh.getRange(i,1).getValue().toString().trim() === s.name) { foundRow=i; break; } }\n  var vals = ['  '+s.name, toNum(s.monto), 'D\u00eda '+s.venceDia, s.pagado?'Pagado':'No pagado', '  '+fmtDate(new Date().toISOString().split('T')[0])];\n  if (foundRow > 0) { sh.getRange(foundRow,1,1,5).setValues([vals]); }\n  else { sh.appendRow(vals); aplicarFilaNotion(sh, sh.getLastRow(), 5, '#FAFAFA'); }\n  var r = foundRow > 0 ? foundRow : sh.getLastRow();\n  sh.getRange(r,2).setNumberFormat('\"S/ \"#,##0.00').setHorizontalAlignment('right').setFontWeight('bold');\n  badgeCell(sh, r, 4, s.pagado?'\u2713 Pagado':'\u25cb Pendiente', s.pagado?'#E8F5E9':'#FFF8E1', s.pagado?'#2E7D32':'#F57F17');\n}\n\nfunction handleMeta(ss, data) {\n  var m = data.item; if (!m) { return; }\n  var sh = getOrCreate(ss, 'Metas de Ahorro');\n  if (sh.getLastRow() === 0) {\n    sh.appendRow(['  Meta','  Objetivo S/.','  Ahorrado S/.','  Pendiente S/.','  Progreso','  Fecha L\u00edmite']);\n    aplicarEstiloNotion(sh, {header:'#1C1C1C'}, 6);\n    sh.setColumnWidth(1,180);sh.setColumnWidth(2,130);sh.setColumnWidth(3,130);sh.setColumnWidth(4,130);sh.setColumnWidth(5,120);sh.setColumnWidth(6,130);\n  }\n  var obj=toNum(m.objetivo),aho=toNum(m.ahorrado),pct=obj>0?Math.round(aho/obj*100):0;\n  var foundRow=-1;\n  for(var i=2;i<=sh.getLastRow();i++){if(sh.getRange(i,1).getValue().toString().trim()===m.nombre){foundRow=i;break;}}\n  var vals=['  '+(m.nombre||'-'),obj,aho,obj-aho,pct+'%','  '+(m.fechaLimite||'-')];\n  if(foundRow>0){sh.getRange(foundRow,1,1,6).setValues([vals]);}\n  else{sh.appendRow(vals);aplicarFilaNotion(sh,sh.getLastRow(),6,'#FAFAFA');}\n  var r=foundRow>0?foundRow:sh.getLastRow();\n  sh.getRange(r,2).setNumberFormat('\"S/ \"#,##0.00').setHorizontalAlignment('right');\n  sh.getRange(r,3).setNumberFormat('\"S/ \"#,##0.00'). function pnedRenderAll(){

function pnedMkEl(b){
  const wrap=document.createElement('div');
  wrap.className='pn-block-wrap';
  wrap.dataset.id=b.id;
  const handle=document.createElement('div');
  handle.className='pn-block-handle';
  handle.textContent='⋮';

  if(b.type==='check')  { wrap.appendChild(pnedMkCheck(b)); return wrap; }
  if(b.type==='bullet'||b.type==='numbered') { wrap.appendChild(handle); wrap.appendChild(pnedMkList(b)); return wrap; }
  if(b.type==='image')  { wrap.appendChild(pnedMkImg(b)); return wrap; }
  if(b.type==='table')  { wrap.appendChild(pnedMkTable(b)); return wrap; }
  if(b.type==='divider'){ const d=document.createElement('div'); d.style.cssText='border-top:1.5px dashed rgba(0,0,0,.2);margin:10px 0;width:100%'; wrap.appendChild(d); return wrap; }

  const el=document.createElement('div');
  el.className='pn-block';
  el.contentEditable='true';
  el.dataset.type=b.type||'paragraph';
  el.dataset.id=b.id;
  const PH={paragraph:'Escribe o usa / para insertar...',h1:'Título',h2:'Subtítulo',h3:'Sección',quote:'Cita...',code:'Código...'};
  el.dataset.ph=PH[b.type]||'Texto...';
  el.innerHTML=b.content||'';
  el.addEventListener('input',()=>{ b.content=el.innerHTML; window._pnedDirty=true; pnedWC(); pnedCheckSlash(el,b); });
  el.addEventListener('keydown',e=>pnedKD(e,el,b));
  el.addEventListener('mouseup',pnedTBState);
  el.addEventListener('keyup',pnedTBState);
  wrap.appendChild(handle);
  wrap.appendChild(el);
  return wrap;
}

  box.className='pn-check-box'+(b.done?' done':'');
  box.textContent=b.done?'✓':'';
  box.onclick=()=>{ b.done=!b.done; box.classList.toggle('done',b.done); box.textContent=b.done?'✓':''; txt.classList.toggle('done',b.done); window._pnedDirty=true; };

  const txt=document.createElement('div');
  txt.className='pn-check-txt'+(b.done?' done':'');
  txt.contentEditable='true';
  txt.innerHTML=b.content||'';
  txt.addEventListener('input',()=>{ b.content=txt.innerHTML; window._pnedDirty=true; pnedWC(); });
  txt.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();pnedAddAfter(b.id,'check');} if(e.key==='Backspace'&&!(txt.textContent||'').trim()){e.preventDefault();pnedDel(b.id);} });

function pnedMkTable(b){

          const pattern = pnDetectPattern(b.headers);
          if(pattern){
            setTimeout(() => pnShowAiSuggestion(pattern, b, ci), 300);
          }
        });
        
        td.addEventListener('blur',()=>{
          // Ocultar botones cuando pierde el focus
          setTimeout(() => {
            if(!_pnCurrentCell || _pnCurrentCell !== td){
              pnHideCellOps();
            }
          }, 150);
        });
        
        td.addEventListener('input',()=>{ 
          const text = td.textContent.trim();
          // ★ SISTEMA DE FÓRMULAS EXPANDIDO
          if(text.startsWith('=')){
            const formula = text.slice(1).toUpperCase().trim();
            const colIdx = ci;
            
            // =SUMA - sumar todos los valores de la columna
            if(formula === 'SUMA'){
              const sum = b.rows.reduce((total, r, idx) => {
                if(idx === ri) return total;
                return total + (parseFloat(r[keys[ci]]) || 0);
              }, 0);
              row[keys[ci]] = sum.toFixed(2);
              td.textContent = sum.toFixed(2);
              td.style.color = '#2E7D32';
              td.style.fontWeight = '700';
              td.title = '=SUMA';
              window._pnedDirty = true;
              pnedTableTotal(b,tid,tbody);
              return;
            }
            
            // =PROMEDIO - calcular promedio de la columna
            if(formula === 'PROMEDIO'){
              const vals = b.rows.map((r, idx) => {
                if(idx === ri) return null;
                return parseFloat(r[keys[ci]]) || 0;
              }).filter(v => v !== null);
              const avg = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
              row[keys[ci]] = avg.toFixed(2);
              td.textContent = avg.toFixed(2);
              td.style.color = '#1565C0';
              td.style.fontWeight = '700';
              td.title = '=PROMEDIO';
              window._pnedDirty = true;
              pnedTableTotal(b,tid,tbody);
              return;
            }
            
            // =MINIMO - valor mínimo de la columna
            if(formula === 'MINIMO' || formula === 'MIN'){
              const vals = b.rows.map((r, idx) => {
                if(idx === ri) return null;
                return parseFloat(r[keys[ci]]) || 0;
              }).filter(v => v !== null && v !== 0);
              const min = vals.length ? Math.min(...vals) : 0;
              row[keys[ci]] = min.toFixed(2);
              td.textContent = min.toFixed(2);
              td.style.color = '#E65100';
              td.style.fontWeight = '700';
              td.title = '=MINIMO';
              window._pnedDirty = true;
              return;
            }
            
            // =MAXIMO - valor máximo de la columna
            if(formula === 'MAXIMO' || formula === 'MAX'){
              const vals = b.rows.map((r, idx) => {
                if(idx === ri) return null;
                return parseFloat(r[keys[ci]]) || 0;
              }).filter(v => v !== null);
              const max = vals.length ? Math.max(...vals) : 0;
              row[keys[ci]] = max.toFixed(2);
              td.textContent = max.toFixed(2);
              td.style.color = '#C62828';
              td.style.fontWeight = '700';
              td.title = '=MAXIMO';
              window._pnedDirty = true;
              return;
            }
            
            // =CONTAR - contar valores no vacíos en la columna
            if(formula === 'CONTAR'){
              const count = b.rows.filter((r, idx) => {
                if(idx === ri) return false;
                const val = r[keys[ci]];
                return val && val.toString().trim() !== '';
              }).length;
              row[keys[ci]] = count.toString();
              td.textContent = count.toString();
              td.style.color = '#7C3AED';
              td.style.fontWeight = '700';
              td.title = '=CONTAR';
              window._pnedDirty = true;
              return;
            }
            
            // =MULTIPLICAR - multiplicar todos los valores de la columna
            if(formula === 'MULTIPLICAR' || formula === 'MULT'){
              const product = b.rows.reduce((total, r, idx) => {
                if(idx === ri) return total;
                const val = parseFloat(r[keys[ci]]);
                return val ? total * val : total;
              }, 1);
              row[keys[ci]] = product.toFixed(2);
              td.textContent = product.toFixed(2);
              td.style.color = '#D4537E';
              td.style.fontWeight = '700';
              td.title = '=MULTIPLICAR';
              window._pnedDirty = true;
              return;
            }
            
            // =IGV - calcular 18% IGV de la celda anterior en la fila
            if(formula === 'IGV'){
              const prevKey = keys[ci - 1];
              const baseVal = parseFloat(row[prevKey]) || 0;
              const igv = baseVal * 0.18;
              row[keys[ci]] = igv.toFixed(2);
              td.textContent = igv.toFixed(2);
              td.style.color = '#854F0B';
              td.style.fontWeight = '700';
              td.title = '=IGV (18%)';
              window._pnedDirty = true;
              return;
            }
            
            // =SUBTOTAL - suma sin IGV (suma de fila hasta aquí)
            if(formula === 'SUBTOTAL' || formula === 'SUB'){
              const sum = Object.keys(row).slice(0, ci).reduce((s, k) => {
                return s + (parseFloat(row[k]) || 0);
              }, 0);
              row[keys[ci]] = sum.toFixed(2);
              td.textContent = sum.toFixed(2);
              td.style.color = '#0F6E56';
              td.style.fontWeight = '700';
              td.title = '=SUBTOTAL';
              window._pnedDirty = true;
              return;
            }
            
            // =TOTAL - suma de toda la fila
            if(formula === 'TOTAL'){
              const sum = Object.keys(row).slice(0, ci).reduce((s, k) => {
                return s + (parseFloat(row[k]) || 0);
              }, 0);
              row[keys[ci]] = sum.toFixed(2);
              td.textContent = sum.toFixed(2);
              td.style.color = '#2E7D32';
              td.style.fontWeight = '700';
              td.title = '=TOTAL';
              window._pnedDirty = true;
              return;
            }
            
            // Operaciones entre celdas: =A1+B1, =A1*B1, =A1-B1, =A1/B1
            const cellOp = formula.match(/^([A-Z]+)([0-9]+)([\+\-\*\/])([A-Z]+)([0-9]+)$/);
            if(cellOp){
              const [_, col1, row1, op, col2, row2] = cellOp;
              const r1 = parseInt(row1) - 1;
              const r2 = parseInt(row2) - 1;
              const c1 = col1.charCodeAt(0) - 65;
              const c2 = col2.charCodeAt(0) - 65;
              
              if(r1 >= 0 && r1 < b.rows.length && r2 >= 0 && r2 < b.rows.length){
                const val1 = parseFloat(b.rows[r1][`c${c1}`]) || 0;
                const val2 = parseFloat(b.rows[r2][`c${c2}`]) || 0;
                let result = 0;
                if(op === '+') result = val1 + val2;
                else if(op === '-') result = val1 - val2;
                else if(op === '*') result = val1 * val2;
                else if(op === '/') result = val2 !== 0 ? val1 / val2 : 0;
                
                row[keys[ci]] = result.toFixed(2);
                td.textContent = result.toFixed(2);
                td.style.color = '#185FA5';
                td.style.fontWeight = '700';
                td.title = '=' + formula;
                window._pnedDirty = true;
                return;
              }
            }
            
            // Operación simple con columna actual: =*1.18 (IGV), =+100, =-50, =/2
            const simpleOp = formula.match(/^([\+\-\*\/])([\d.]+)$/);
            if(simpleOp){
              const [_, op, num] = simpleOp;
              const prevKey = keys[ci - 1];
              const baseVal = parseFloat(row[prevKey]) || 0;
              const opNum = parseFloat(num);
              let result = 0;
              if(op === '+') result = baseVal + opNum;
              else if(op === '-') result = baseVal - opNum;
              else if(op === '*') result = baseVal * opNum;
              else if(op === '/') result = opNum !== 0 ? baseVal / opNum : 0;
              
              row[keys[ci]] = result.toFixed(2);
              td.textContent = result.toFixed(2);
              td.style.color = '#639922';
              td.style.fontWeight = '700';
              td.title = '=' + formula;
              window._pnedDirty = true;
              return;
            }
          }
          
          // Sin fórmula - guardar normal
          row[keys[ci]]=td.textContent; window._pnedDirty=true; pnedTableTotal(b,tid,tbody); 
        });
        td.addEventListener('keydown',e=>{ if(e.key==='Tab'&&!e.shiftKey&&ci===b.headers.length-1&&ri===b.rows.length-1){e.preventDefault();const nr={};keys.forEach(k=>nr[k]='');b.rows.push(nr);drawRows();pnedTableTotal(b,tid,tbody);} });
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    pnedTableTotal(b,tid,tbody);
  };
  drawRows(); t.appendChild(tbody); tw.appendChild(t);
  // Controls
  const ctrls=document.createElement('div'); ctrls.className='pn-tbl-ctrls';
  const btn=(lbl,fn,red=false)=>{ const b2=document.createElement('button'); b2.className='pn-tbl-btn'; b2.textContent=lbl; if(red) b2.style.color='#E05252'; b2.onclick=fn; ctrls.appendChild(b2); };
  btn('+ Fila',()=>{ const nr={};Object.keys(b.rows[0]).forEach(k=>nr[k]='');b.rows.push(nr);drawRows(); });
  btn('− Fila',()=>{ if(b.rows.length>1){b.rows.pop();drawRows();} });
  // ★ BOTONES DE COLUMNAS
  btn('+ Col',()=>{ 
    const newColKey = `c${b.headers.length}`;
    b.headers.push(`Col ${b.headers.length}`);
    b.rows.forEach(row => row[newColKey] = '');
    drawRows();
  });
  btn('− Col',()=>{ 
    if(b.headers.length > 2){
      const lastKey = `c${b.headers.length - 1}`;
      b.headers.pop();
      b.rows.forEach(row => delete row[lastKey]);
      drawRows();
    }
  });
  btn('🎨 Bordes',()=>pnedCustomizeBorders(b));
  btn('🗑 Tabla',()=>pnedDel(b.id),true);
  outer.appendChild(handle); // ★ Handle primero
  outer.appendChild(tw); 
  outer.appendChild(ctrls);
  return outer;
}

function pnedTableTotal(b,tid,tbody){
  const lastKey=Object.keys(b.rows[0]||{}).slice(-1)[0];
  const total=b.rows.reduce((s,r)=>s+(parseFloat(r[lastKey])||0),0);
  let totRow=tbody.querySelector('tr.pn-total');
  if(!totRow){ totRow=document.createElement('tr'); totRow.className='pn-total'; b.headers.forEach((_,i)=>{ const td=document.createElement('td'); if(i===0)td.textContent='TOTAL'; if(i===b.headers.length-1){td.className='pcol';td.textContent='S/ '+total.toFixed(2);} totRow.appendChild(td); }); tbody.appendChild(totRow); }
  else { const cells=totRow.querySelectorAll('td'); if(cells.length) cells[cells.length-1].textContent='S/ '+total.toFixed(2); }
}

];

function pnedCheckSlash(el,b){
  const txt=el.textContent||'';
  const li=txt.lastIndexOf('/');
  if(li<0){pnedCloseSlash();return;}
  const q=txt.slice(li+1).toLowerCase();
  const filtered=SLASH_CMDS.filter(c=>!q||c.key.includes(q)||c.label.toLowerCase().includes(q));
  if(!filtered.length){pnedCloseSlash();return;}
  window._pnedSlashBlk=b;
  window._pnedSlashIdx=0;
  pnedCloseSlash();
  const rect=el.getBoundingClientRect();
  const menu=document.createElement('div');
  menu.id='pn-slash-menu';
  menu.style.cssText=`top:${Math.min(rect.bottom+4,window.innerHeight-280)}px;left:${Math.max(4,rect.left)}px;max-width:${window.innerWidth-Math.max(4,rect.left)-8}px`;
  menu.innerHTML=filtered.map((c,i)=>`<div class="pn-slash-item${i===0?' pn-active':''}" data-key="${c.key}" onclick="pnedSlashApply('${c.key}')"><div class="pn-slash-icon">${c.icon}</div><div><div class="pn-slash-label">${c.label}</div><div class="pn-slash-sub">${c.sub}</div></div></div>`).join('');
  document.body.appendChild(menu);
}

function pnedSlashNav(dir){
  const items=document.querySelectorAll('#pn-slash-menu .pn-slash-item');
  if(!items.length)return;
  window._pnedSlashIdx=Math.max(0,Math.min(items.length-1,(window._pnedSlashIdx||0)+dir));
  items.forEach((el,i)=>el.classList.toggle('pn-active',i===window._pnedSlashIdx));
}
function pnedCloseSlash(){ document.getElementById('pn-slash-menu')?.remove(); window._pnedSlashBlk=null; window._pnedSlashIdx=-1; }

function pnedSlashApply(key){
  pnedCloseSlash();
  const b=window._pnedSlashBlk; if(!b)return;
  const el=document.querySelector(`[data-id="${b.id}"].pn-block`);
  if(el){el.textContent='';b.content='';}
  if(key==='ia'){pnedIAPanel();return;}
  if(key==='image'){pnedAddPhoto();return;}
  if(key==='table'){if(el&&b) pnedDel(b.id); pnedInsTable();return;}
  if(key==='divider'){pnedAddAfter(b.id,'divider');if(el&&b)pnedDel(b.id);return;}
  if(key==='check'||key==='bullet'||key==='numbered'){
    b.type=key;b.content='';
    const wrap=el?.closest('.pn-block-wrap');
    if(wrap){const nb=pnedMkEl(b);wrap.replaceWith(nb);}
    window._pnedDirty=true;return;
  }
  b.type=key;
  if(el){el.dataset.type=key;const PH={h1:'Título',h2:'Subtítulo',h3:'Sección',quote:'Cita...',code:'Código...',paragraph:'Escribe...'};el.dataset.ph=PH[key]||'';el.focus();}
  window._pnedDirty=true;
}

// ★★★ SISTEMA DE OPERACIONES SIN FÓRMULAS (MÓVIL) ★★★
let _pnCellOps = null; // Botones flotantes
let _pnAiSug = null;   // Sugerencia IA
let _pnCurrentCell = null; // Celda actual seleccionada
let _pnCurrentBlock = null; // Bloque tabla actual
let _pnCurrentCellInfo = null; // Info de celda: {ri, ci, row, keys}

// Detectar patrones en headers de tabla
function pnDetectPattern(headers){
  const h = headers.map(x => x.toLowerCase().trim());
  
  // Patrón 1: Cantidad + Precio → Multiplicar
  const hasCant = h.some(x => x.includes('cant') || x.includes('qty') || x.includes('cantidad'));
  const hasPrice = h.some(x => x.includes('precio') || x.includes('price') || x.includes('p.unit') || x.includes('valor'));
  if(hasCant && hasPrice) return {type:'mult', text:'Detecté "Cantidad" y "Precio"', action:'¿Multiplicar (Cant × Precio)?'};
  
  // Patrón 2: Subtotal + IGV → IGV
  const hasSubtotal = h.some(x => x.includes('subtotal') || x.includes('sub') || x.includes('base'));
  const hasIGV = h.some(x => x.includes('igv') || x.includes('impuesto') || x.includes('tax'));
  if(hasSubtotal && hasIGV) return {type:'igv', text:'Detecté "Subtotal" e "IGV"', action:'¿Calcular IGV (18%)?'};
  
  // Patrón 3: Total → Sumar
  const hasTotal = h.some(x => x.includes('total') || x.includes('suma'));
  if(hasTotal) return {type:'suma', text:'Detecté columna "Total"', action:'¿Sumar toda la columna?'};
  
  return null;
}

// Mostrar sugerencia IA automática
function pnShowAiSuggestion(pattern, block, ci){
  if(!pattern) return;
  pnHideAiSuggestion();
  
  _pnAiSug = document.createElement('div');
  _pnAiSug.className = 'pn-ai-sug';
  _pnAiSug.innerHTML = `
    <button class="pn-ai-sug-close" onclick="pnHideAiSuggestion()">✕</button>
    <div class="pn-ai-sug-icon">💡</div>
    <div class="pn-ai-sug-text"><strong>${pattern.text}</strong><br>${pattern.action}</div>
    <button class="pn-ai-sug-btn" onclick="pnApplyAiSuggestion('${pattern.type}',${ci})">✓ Sí, aplicar</button>
  `;
  
  document.body.appendChild(_pnAiSug);
  setTimeout(() => _pnAiSug.classList.add('visible'), 50);
}

function pnHideAiSuggestion(){
  if(_pnAiSug){
    _pnAiSug.classList.remove('visible');
    setTimeout(() => _pnAiSug?.remove(), 300);
    _pnAiSug = null;
  }
}

// Aplicar sugerencia IA
function pnApplyAiSuggestion(type, ci){
  if(!_pnCurrentBlock || !_pnCurrentCellInfo) return;
  const b = _pnCurrentBlock;
  const {ri, row, keys} = _pnCurrentCellInfo;
  
  if(type === 'mult'){
    // Buscar columnas de Cantidad y Precio
    const cantIdx = b.headers.findIndex(h => h.toLowerCase().includes('cant') || h.toLowerCase().includes('qty'));
    const priceIdx = b.headers.findIndex(h => h.toLowerCase().includes('precio') || h.toLowerCase().includes('price') || h.toLowerCase().includes('p.unit'));
    if(cantIdx >= 0 && priceIdx >= 0){
      const cant = parseFloat(row[keys[cantIdx]]) || 0;
      const price = parseFloat(row[keys[priceIdx]]) || 0;
      const result = cant * price;
      row[keys[ci]] = result.toFixed(2);
      
      // Actualizar celda visualmente
      if(_pnCurrentCell){
        _pnCurrentCell.textContent = result.toFixed(2);
        _pnCurrentCell.style.color = '#1565C0';
        _pnCurrentCell.style.fontWeight = '700';
      }
      window._pnedDirty = true;
      toast('✅ Multiplicado: ' + cant + ' × ' + price + ' = ' + result.toFixed(2), 'success');
    }
  } else if(type === 'igv'){
    const prevKey = keys[ci - 1];
    const baseVal = parseFloat(row[prevKey]) || 0;
    const igv = baseVal * 0.18;
    row[keys[ci]] = igv.toFixed(2);
    
    if(_pnCurrentCell){
      _pnCurrentCell.textContent = igv.toFixed(2);
      _pnCurrentCell.style.color = '#854F0B';
      _pnCurrentCell.style.fontWeight = '700';
    }
    window._pnedDirty = true;
    toast('✅ IGV calculado: ' + igv.toFixed(2), 'success');
  } else if(type === 'suma'){
    const sum = b.rows.reduce((total, r, idx) => {
      if(idx === ri) return total;
      return total + (parseFloat(r[keys[ci]]) || 0);
    }, 0);
    row[keys[ci]] = sum.toFixed(2);
    
    if(_pnCurrentCell){
      _pnCurrentCell.textContent = sum.toFixed(2);
      _pnCurrentCell.style.color = '#2E7D32';
      _pnCurrentCell.style.fontWeight = '700';
    }
    window._pnedDirty = true;
    toast('✅ Suma total: ' + sum.toFixed(2), 'success');
  }
  
  pnHideAiSuggestion();
  pnHideCellOps();
}

// Mostrar botones flotantes
function pnShowCellOps(td, block, ri, ci, row, keys){
  pnHideCellOps();
  
  _pnCurrentCell = td;
  _pnCurrentBlock = block;
  _pnCurrentCellInfo = {ri, ci, row, keys};
  
  _pnCellOps = document.createElement('div');
  _pnCellOps.className = 'pn-cell-ops';
  _pnCellOps.innerHTML = `
    <button class="pn-op-btn suma" onclick="pnApplyOp('suma')" title="Sumar columna">+</button>
    <button class="pn-op-btn mult" onclick="pnApplyOp('mult')" title="Multiplicar">×</button>
    <button class="pn-op-btn div" onclick="pnApplyOp('div')" title="Dividir">÷</button>
    <button class="pn-op-btn resta" onclick="pnApplyOp('resta')" title="Restar">−</button>
    <button class="pn-op-btn igv" onclick="pnApplyOp('igv')" title="IGV 18%">%</button>

function pnHideCellOps(){
  if(_pnCellOps){
    _pnCellOps.classList.remove('visible');
    setTimeout(() => _pnCellOps?.remove(), 200);
    _pnCellOps = null;
  }
}

// Aplicar operación
function pnApplyOp(op){
  if(!_pnCurrentBlock || !_pnCurrentCellInfo || !_pnCurrentCell) return;
  
  const b = _pnCurrentBlock;
  const {ri, ci, row, keys} = _pnCurrentCellInfo;
  
  if(op === 'suma'){
    // Sumar toda la columna
    const sum = b.rows.reduce((total, r, idx) => {
      if(idx === ri) return total;
      return total + (parseFloat(r[keys[ci]]) || 0);
    }, 0);
    row[keys[ci]] = sum.toFixed(2);
    _pnCurrentCell.textContent = sum.toFixed(2);
    _pnCurrentCell.style.color = '#2E7D32';
    _pnCurrentCell.style.fontWeight = '700';
    _pnCurrentCell.title = 'Suma columna';
    toast('✅ Suma: ' + sum.toFixed(2), 'success');
    
  } else if(op === 'mult'){
    // Multiplicar con celda anterior
    if(ci > 0){
      const prevKey = keys[ci - 1];
      const prev2Key = keys[ci - 2];
      const val1 = parseFloat(row[prevKey]) || 0;
      const val2 = parseFloat(row[prev2Key]) || 0;
      const result = val1 * val2;
      row[keys[ci]] = result.toFixed(2);
      _pnCurrentCell.textContent = result.toFixed(2);
      _pnCurrentCell.style.color = '#1565C0';
      _pnCurrentCell.style.fontWeight = '700';
      _pnCurrentCell.title = 'Multiplicación';
      toast('✅ ' + val2 + ' × ' + val1 + ' = ' + result.toFixed(2), 'success');
    }
    
  } else if(op === 'div'){
    // Dividir celda anterior entre anterior-anterior
    if(ci > 1){
      const prevKey = keys[ci - 1];
      const prev2Key = keys[ci - 2];
      const num = parseFloat(row[prev2Key]) || 0;
      const den = parseFloat(row[prevKey]) || 1;
      const result = num / den;
      row[keys[ci]] = result.toFixed(2);
      _pnCurrentCell.textContent = result.toFixed(2);
      _pnCurrentCell.style.color = '#E65100';
      _pnCurrentCell.style.fontWeight = '700';
      _pnCurrentCell.title = 'División';
      toast('✅ ' + num + ' ÷ ' + den + ' = ' + result.toFixed(2), 'success');
    }
    
  } else if(op === 'resta'){
    // Restar celda anterior de anterior-anterior
    if(ci > 1){
      const prevKey = keys[ci - 1];
      const prev2Key = keys[ci - 2];
      const val1 = parseFloat(row[prev2Key]) || 0;
      const val2 = parseFloat(row[prevKey]) || 0;
      const result = val1 - val2;
      row[keys[ci]] = result.toFixed(2);
      _pnCurrentCell.textContent = result.toFixed(2);
      _pnCurrentCell.style.color = '#C62828';
      _pnCurrentCell.style.fontWeight = '700';
      _pnCurrentCell.title = 'Resta';
      toast('✅ ' + val1 + ' − ' + val2 + ' = ' + result.toFixed(2), 'success');
    }
    
  } else if(op === 'igv'){
    // Calcular IGV 18% de celda anterior
    if(ci > 0){
      const prevKey = keys[ci - 1];
      const baseVal = parseFloat(row[prevKey]) || 0;
      const igv = baseVal * 0.18;
      row[keys[ci]] = igv.toFixed(2);
      _pnCurrentCell.textContent = igv.toFixed(2);
      _pnCurrentCell.style.color = '#854F0B';
      _pnCurrentCell.style.fontWeight = '700';
      _pnCurrentCell.title = 'IGV 18%';
      toast('✅ IGV: ' + igv.toFixed(2), 'success');
    }
  }
  
  window._pnedDirty = true;
  pnHideCellOps();
}

function pnedKD(e,el,b){
  const sm=document.getElementById('pn-slash-menu');
  if(sm){
    if(e.key==='ArrowDown'){e.preventDefault();pnedSlashNav(1);return;}
    if(e.key==='ArrowUp'){e.preventDefault();pnedSlashNav(-1);return;}
    if(e.key==='Enter'){e.preventDefault();const a=document.querySelector('#pn-slash-menu .pn-active');if(a)pnedSlashApply(a.dataset.key);return;}
    if(e.key==='Escape'){pnedCloseSlash();return;}
  }
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();pnedAddAfter(b.id,'paragraph');}
  if(e.key==='Backspace'&&!(el.textContent||'').trim()){e.preventDefault();pnedDel(b.id);}
  if((e.ctrlKey||e.metaKey)&&e.key==='b'){e.preventDefault();pnedExec('bold');}
  if((e.ctrlKey||e.metaKey)&&e.key==='i'){e.preventDefault();pnedExec('italic');}
  if((e.ctrlKey||e.metaKey)&&e.key==='u'){e.preventDefault();pnedExec('underline');}
}

function pnedAddAfter(afterId,type){
  const nb={id:pnId(),type,content:'',done:false};
  const idx=window._pnedBlocks.findIndex(b=>b.id===afterId);
  if(idx>=0)window._pnedBlocks.splice(idx+1,0,nb);
  else window._pnedBlocks.push(nb);
  pnedSaveHistory(); // ★ Guardar en historial
  pnedRenderAll();
  setTimeout(()=>{
    const el=document.querySelector(`[data-id="${nb.id}"]`);
    if(!el)return;
    const inp=el.classList.contains('pn-block')?el:el.querySelector('.pn-check-txt,.pn-list-txt,.pn-block');
    if(inp){inp.focus();if(inp.contentEditable==='true')try{const r=document.createRange();r.selectNodeContents(inp);r.collapse(false);const s=window.getSelection();s.removeAllRanges();s.addRange(r);}catch(e){}}
  },30);
}

function pnedAddBlock(type){
  const last=window._pnedBlocks.slice(-1)[0];
  if(last)pnedAddAfter(last.id,type);
  else{window._pnedBlocks.push({id:pnId(),type,content:'',done:false});pnedSaveHistory();pnedRenderAll();}
}

function pnedDel(id){
  if(window._pnedBlocks.length<=1){window._pnedBlocks[0].content='';pnedSaveHistory();pnedRenderAll();return;}
  const idx=window._pnedBlocks.findIndex(b=>b.id===id);
  if(idx<0)return;
  window._pnedBlocks.splice(idx,1);
  pnedSaveHistory(); // ★ Guardar en historial
  pnedRenderAll();
  setTimeout(()=>{
    const prev=window._pnedBlocks[Math.max(0,idx-1)];
    if(!prev)return;
    const el=document.querySelector(`[data-id="${prev.id}"]`);
    const inp=el?.classList.contains('pn-block')?el:el?.querySelector('.pn-check-txt,.pn-list-txt,.pn-block');
    if(inp)inp.focus();
  },30);
  window._pnedDirty=true;
}

function pnedBuildCustomTable(numRows, numCols){
  const headers = [];
  for(let i=0; i<numCols; i++){
    if(i===0) headers.push('Concepto');
    else if(i===numCols-1) headers.push('Precio S/');
    else headers.push(`Col ${i}`);
  }
  const rows = [];
  for(let i=0; i<numRows; i++){
    const row = {};
    for(let j=0; j<numCols; j++) row[`c${j}`] = '';
    rows.push(row);
  }
  return {headers, rows};
}

// ★ UNDO/REDO SYSTEM
window._pnedHistory = [];
window._pnedHistoryIndex = -1;

function pnedSaveHistory(){
  if(!window._pnedBlocks) return;
  const snapshot = JSON.parse(JSON.stringify(window._pnedBlocks));
  window._pnedHistory = window._pnedHistory.slice(0, window._pnedHistoryIndex + 1);
  window._pnedHistory.push(snapshot);
  window._pnedHistoryIndex = window._pnedHistory.length - 1;
  if(window._pnedHistory.length > 50) window._pnedHistory.shift();
}

function pnedUndo(){
  if(window._pnedHistoryIndex <= 0) return;
  window._pnedHistoryIndex--;
  window._pnedBlocks = JSON.parse(JSON.stringify(window._pnedHistory[window._pnedHistoryIndex]));
  pnedRenderAll();
  window._pnedDirty = true;
}

function pnedRedo(){
  if(window._pnedHistoryIndex >= window._pnedHistory.length - 1) return;
  window._pnedHistoryIndex++;
  window._pnedBlocks = JSON.parse(JSON.stringify(window._pnedHistory[window._pnedHistoryIndex]));
  pnedRenderAll();
  window._pnedDirty = true;
}

function pnedChangeFontSize(delta){
  const sel = document.getElementById('pned-font-size');
  if(!sel) return;
  const current = parseInt(sel.value) || 15;
  const sizes = [12,14,15,17,20,24,28,32];
  const idx = sizes.indexOf(current);
  let newIdx = idx + (delta > 0 ? 1 : -1);
  newIdx = Math.max(0, Math.min(sizes.length - 1, newIdx));
  sel.value = sizes[newIdx];
  pnedSetFontSz(sizes[newIdx]);
  // ★ Forzar actualización visual
  const focused = document.activeElement;
  if(focused && focused.classList.contains('pn-block')){
    focused.style.fontSize = sizes[newIdx] + 'px';
  }
}

function pnedCollect(){
  document.querySelectorAll('#pned-blocks .pn-block-wrap').forEach(wrap=>{
    const id=wrap.dataset.id;
    const b=window._pnedBlocks.find(x=>x.id===id);
    if(!b)return;
    const el=wrap.querySelector('.pn-block');if(el)b.content=el.innerHTML;
    const ct=wrap.querySelector('.pn-check-txt');if(ct)b.content=ct.innerHTML||ct.textContent;
    const lt=wrap.querySelector('.pn-list-txt');if(lt)b.content=lt.value||lt.textContent;
  });
  return window._pnedBlocks;
}

function pnedAutoSave(){if(!window._pnedDirty)return;pnedSave(false);const sv=document.getElementById('pned-wc');if(sv)sv.textContent+=' · guardado';}

function pnedSave(close){
  const titulo=document.getElementById('pned-title-inp')?.value.trim()||'Nota';
  const blocks=pnedCollect();
  const htmlTexto=blocks.map(b=>{
    if(b.type==='h1')return`<h2>${b.content}</h2>`;
    if(b.type==='h2')return`<h3>${b.content}</h3>`;
    if(b.type==='h3')return`<h3>${b.content}</h3>`;
    if(b.type==='check')return`<div>${b.done?'✓':'○'} ${b.content}${b.price?' - S/'+b.price:''}</div>`;
    if(b.type==='bullet')return`<div>• ${b.content}</div>`;
    if(b.type==='numbered')return`<div>${b.content}</div>`;
    if(b.type==='quote')return`<blockquote>${b.content}</blockquote>`;
    if(b.type==='code')return`<code>${b.content}</code>`;
    if(b.type==='image')return`<img src="${b.src}" alt="${b.caption||''}">`;
    if(b.type==='table')return`<p>[Tabla]</p>`;
    if(b.type==='divider')return'<hr>';
    return`<p>${b.content}</p>`;
  }).join('');
  if(!state.notas)state.notas=[];
  // ★ FIX: construir n.items desde blocks para compatibilidad con renderNotaCard
  const checkBlks = blocks.filter(b=>b.type==='check');
  const syncedItems = checkBlks.map(b=>({texto:b.content||'',precio:b.price||null,done:b.done||false}));
  const tipoFinal = checkBlks.length > 0 ? 'lista' : 'texto';

  if(window._pnedNota){
    const n=state.notas.find(x=>x.id===window._pnedNota.id);
    if(n) Object.assign(n,{
      titulo, blocks, texto:htmlTexto,
      colorHoja:window._pnedColor, fontFamily:window._pnedFont,
      fotos:window._pnedFotos, modificado:new Date().toISOString(),
      items: syncedItems.length ? syncedItems : (n.items||[]),
      tipo: n.tipo==='audio' ? 'audio' : (syncedItems.length ? 'lista' : (n.tipo||'texto')),
    });
  } else {
    const nota={
      id:Date.now()+'', tipo:tipoFinal, titulo, blocks, texto:htmlTexto,
      colorHoja:window._pnedColor, fontFamily:window._pnedFont,
      fotos:window._pnedFotos, creado:new Date().toISOString(),
      items: syncedItems,
    };
    state.notas.unshift(nota);
    window._pnedNota=state.notas[0];
  }
  save('fnz_notas',state.notas);
  window._pnedDirty=false;
  if(close){pnedClose();toast('Nota guardada ✓');}
}
