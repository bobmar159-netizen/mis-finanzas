function _iniciarNotaVozRec(){
  if(!_notaVozEscuchando)return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;
  try{
    _notaVozRec=new SR();
    _notaVozRec.lang='es-PE';
    _notaVozRec.interimResults=true;
    _notaVozRec.continuous=true;
    _notaVozRec.maxAlternatives=1;
    _notaVozRec.onresult=(e)=>{
      let interim='',finalPart='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal)finalPart+=e.results[i][0].transcript+' ';
        else interim+=e.results[i][0].transcript;
      }
      const display=(_notaVozBuffer+finalPart+interim).trim();
      const el=document.getElementById('nv-text');
      if(el){el.textContent=display||'Escuchando...';el.style.color='#1E293B';}
      if(finalPart){
        if(_notaVozIgnoreNext){_notaVozIgnoreNext=false;return;} // skip repeated title phrase
        _notaVozBuffer=appendWithoutOverlap(_notaVozBuffer,finalPart);
        _procesarFragmentoNota(_notaVozBuffer);
      }
    };
    _notaVozRec.onerror=(e)=>{if(e.error==='aborted'||e.error==='no-speech')return;_stopNotaVoz();};
    _notaVozRec.onend=()=>{if(_notaVozEscuchando)setTimeout(()=>{if(_notaVozEscuchando)_iniciarNotaVozRec();},200);};
    _notaVozRec.start();
  }catch(e){_stopNotaVoz();}
}

function _stopNotaVoz(){_notaVozEscuchando=false;_setBtnMicNota(false);try{if(_notaVozRec){_notaVozRec.onend=null;_notaVozRec.stop();}}catch(e){}}
function _setBtnMicNota(on){const btn=document.getElementById('nv-mic-btn');if(!btn)return;if(on){btn.style.background='linear-gradient(135deg,#E05252,#f87171)';btn.textContent='⏹ Detener';}else{btn.style.background='linear-gradient(135deg,var(--gold),var(--gold2))';btn.textContent='🎙 Escuchar';}}

function _procesarFragmentoNota(texto){
  const t=nrm(texto);
  if(/\b(listo|ya\s+listo|termine|terminar|termino|fin\b|guardar|eso\s+es\s+todo|nada\s+mas|hasta\s+ahi|eso\s+nomas)\b/.test(t)){_stopNotaVoz();_notaVozBuffer='';setTimeout(saveNotaVoz,400);return;}
  if(/\b(borra(r)?|elimina(r)?|quita(r)?|cancela(r)?)\s+(el\s+)?(ultimo|ultim[oa]|anterior|ese|eso)\b/.test(t)||/\b(eso\s+no|ese\s+no)\b/.test(t)){if(_notaVozItems.length>0)_notaVozItems.pop();_notaVozBuffer='';_refreshNotaPreview();return;}
  const recM=texto.match(/(?:recordatorio|recordarme|alarma|av[ií]same)\s+(?:a\s+las?\s+)?(\d{1,2}(?::\d{2})?)\s*(am|pm|de la tarde|de la mañana)?/i);
  if(recM){let h=parseInt(recM[1]),min=0;const per=(recM[2]||'').toLowerCase();if(recM[1].includes(':'))min=parseInt(recM[1].split(':')[1]);if(per.includes('pm')||per.includes('tarde'))if(h<12)h+=12;if(!per&&h>=1&&h<=6)h+=12;_notaVozRecordatorio=`Hoy a las ${h}:${String(min).padStart(2,'0')}${h>=12?'pm':'am'}`;if(_notaVozTipo==='texto')_notaVozTipo='recordatorio';_notaVozBuffer='';_refreshNotaPreview();return;}
  const PATS=[
    // Título + dos puntos (modo clásico)
    /^(.+?)[,\s]+(?:dos\s*puntos?|2\s*puntos?)\s*$/i,
    /^(.+?)\s*:\s*$/i,
    // "voy a crear/hacer/anotar una lista de..."
    /voy\s+a\s+(?:crear|hacer|anotar|armar|preparar|poner)\s+(?:una?\s+)?lista\s+(?:de\s+|para\s+|del?\s+)?(.+)/i,
    // "anota/crea/haz una lista de..."
    /(?:anota(?:me)?|crea(?:me)?|haz(?:me)?|arma(?:me)?|prepara(?:me)?)\s+(?:una?\s+)?lista\s+(?:de\s+|para\s+|del?\s+)?(.+)/i,
    // "quiero una lista de..."
    /quiero\s+(?:una?\s+)?lista\s+(?:de\s+|para\s+|del?\s+)?(.+)/i,
    // "necesito una lista de..."
    /necesito\s+(?:una?\s+)?lista\s+(?:de\s+|para\s+|del?\s+)?(.+)/i,
    // "lista de..." simple
    /^lista\s+(?:de\s+|del?\s+|para\s+)?(.{2,40})\s*$/i,
    // "nueva lista de..."
    /nueva\s+lista\s+(?:de\s+|para\s+|del?\s+)?(.+)/i,
    // "hacer lista de..."
    /hacer\s+(?:una?\s+)?lista\s+(?:de\s+|para\s+|del?\s+)?(.+)/i,
    // "ponme una lista de..."
    /p[oó]n(?:me)?\s+(?:una?\s+)?lista\s+(?:de\s+|para\s+|del?\s+)?(.+)/i,
    // "lista para..." (sin "de")
    /^lista\s+para\s+(.{2,40})\s*$/i,
    // "voy a anotar las cosas de..."
    /voy\s+a\s+anotar\s+(?:las?\s+)?(?:cosas?|items?|puntos?)\s+(?:de\s+|para\s+|del?\s+)?(.+)/i,
    // "apunta una lista de..."
    /apunta(?:me)?\s+(?:una?\s+)?lista\s+(?:de\s+|para\s+|del?\s+)?(.+)/i,
  ];
  if(_notaVozTipo==='texto'){for(const p of PATS){const m=texto.match(p);if(m){const titulo=(m[2]||m[1]||'').trim().replace(/^(de\s+|del?\s+|una?\s+)/i,'').trim();if(titulo.length>1){
          // ★ Redirigir al nuevo sistema de lista (más robusto)
          _stopNotaVoz();
          closeModal();
          setTimeout(()=>abrirModoLista('lista', titulo.charAt(0).toUpperCase()+titulo.slice(1)), 200);
          return;
        }}}}
  if(_notaVozTipo==='lista'||_notaVozTipo==='recordatorio'){
    const SEP=/\b(?:aparte|a\s+parte|siguiente|despu[eé]s|y\s+despu[eé]s|tambi[eé]n|y\s+tambi[eé]n|adem[aá]s|y\s+luego|luego|finalmente|otro\s+(?:es|ser[ií]a)|el\s+(?:siguiente|otro|pr[oó]ximo)|por\s+[uú]ltimo|uno\s+m[aá]s|y\s+por\s+[uú]ltimo|igualmente|por\s+otra\s+parte|y\s+tambi[eé]n|y\s+adem[aá]s|punto\s+y|coma|agrega|a[ñn]ade|a[ñn]adir|m[aá]s\s+uno|otro\s+m[aá]s|otra\s+cosa|otra\s+m[aá]s|y\s+otro|y\s+otra|separar|nueva\s+l[ií]nea|nuevo\s+[ií]tem|nueva\s+entrada)\b/gi;
    const partes=t.split(SEP).map(p=>p.trim()).filter(p=>p.length>0);
    if(partes.length>1||(partes.length===1&&texto.trim().length>2)){
      const RUIDO=/^(um+|eh+|ah+|ok|oye|este|bueno|entonces|pues)$/i;
      partes.forEach(p=>{const limpio=p.replace(/^[,.\s]+|[,.\s]+$/g,'').trim();if(limpio.length<2||RUIDO.test(limpio))return;const limp2=nrm(limpio);const yaExiste=_notaVozItems.some(it=>nrm(it.texto)===limp2);if(!yaExiste)_notaVozItems.push({texto:limpio.charAt(0).toUpperCase()+limpio.slice(1),done:false});});
      _notaVozBuffer='';_refreshNotaPreview();return;
    }
  }
  _refreshNotaPreview();
}

function _refreshNotaPreview(){
  const prev=document.getElementById('nv-preview');if(!prev)return;
  const saveBtn=document.getElementById('nv-save-btn');
  if(_notaVozTipo==='lista'||_notaVozTipo==='recordatorio'){
    prev.style.display='block';
    const COLS={lista:'#C9A84C',recordatorio:'#DC2626'};const BGS={lista:'#FFF8EC',recordatorio:'#FEF2F2'};const LBS={lista:'✓ Lista',recordatorio:'⏰ Recordatorio'};

    prev.innerHTML=`<div style="background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px 14px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="font-size:10px;padding:2px 8px;border-radius:8px;font-weight:600;background:${BGS[_notaVozTipo]};color:${COLS[_notaVozTipo]}">${LBS[_notaVozTipo]}</span><span style="font-size:13px;font-weight:600;color:#1E293B">${_notaVozTitulo||'Mi lista'}</span></div>${itemsHtml||'<div style="font-size:12px;color:#94A3B8">Di el primer ítem...</div>'}${_notaVozRecordatorio?`<div style="font-size:11px;color:#DC2626;background:#FEF2F2;padding:3px 8px;border-radius:8px;margin-top:6px;display:inline-block">⏰ ${_notaVozRecordatorio}</div>`:''}</div>`;
    if(saveBtn&&_notaVozItems.length>0)saveBtn.style.display='block';
  } else { prev.style.display='none'; }
}

function saveNotaVoz(){
  _stopNotaVoz();
  if(!state.notas)state.notas=[];
  let nota=null;

  if(_notaVozEditId){
    const n=state.notas.find(x=>x.id===_notaVozEditId);
    if(n&&_notaVozItems.length>0){
      const existentes=n.items?n.items.length:0;
      if(!n.items)n.items=[];
      _notaVozItems.slice(existentes).forEach(it=>n.items.push(it));
      save('fnz_notas',state.notas);
      syncSeccionToSheets('nota', n);
      closeModal();render();toast('Ítems agregados ✓');return;
    }
  }

  const titulo=_notaVozTitulo||(document.getElementById('nv-text')?document.getElementById('nv-text').textContent.slice(0,30):'Nota de voz');

  if(_notaVozTipo==='lista'){
    if(_notaVozItems.length===0){toast('No detecté ningún ítem','error');return;}
    nota={id:Date.now()+'',tipo:'lista',titulo,items:_notaVozItems,creado:new Date().toISOString()};
    state.notas.unshift(nota);
  } else if(_notaVozTipo==='recordatorio'){
    if(_notaVozItems.length===0){toast('No detecté ningún ítem','error');return;}
    nota={id:Date.now()+'',tipo:'recordatorio',titulo,items:_notaVozItems,recordatorio:_notaVozRecordatorio||'',creado:new Date().toISOString()};
    state.notas.unshift(nota);
    if(_notaVozRecordatorio)_programarRecordatorio(_notaVozRecordatorio,titulo);
  } else {
    const texto=document.getElementById('nv-text')?document.getElementById('nv-text').textContent:'';
    if(!texto||texto==='Presiona el micrófono y habla...'){toast('No detecté ningún texto','error');return;}
    nota={id:Date.now()+'',tipo:'texto',titulo,texto,creado:new Date().toISOString()};
    state.notas.unshift(nota);
  }

  save('fnz_notas',state.notas);
  if(nota) syncSeccionToSheets('nota', nota);
  closeModal();
  if(state.page==='notas')render();
  toast('Nota guardada ✓');
}

function _programarRecordatorio(textoHora,titulo){
  const m=textoHora.match(/(\d{1,2}):(\d{2})(am|pm)/i);if(!m)return;
  let h=parseInt(m[1]),min=parseInt(m[2]);if(m[3].toLowerCase()==='pm'&&h<12)h+=12;
  const ahora=new Date();const objetivo=new Date(ahora.getFullYear(),ahora.getMonth(),ahora.getDate(),h,min,0);
  const diff=objetivo-ahora;if(diff>0&&diff<86400000)setTimeout(()=>{toast(`⏰ Recordatorio: ${titulo}`,'success');if('vibrate'in navigator)navigator.vibrate([200,100,200]);},diff);
}

async function _fetchNotionSchema(token, dbId) {
  // Caché por dbId — cada base de datos tiene su propio schema
  const cacheKey = 'fnz_notion_schema_' + (dbId || '').slice(-8);
  try {
    const cached = sessionStorage.getItem(cacheKey);
    if (cached) {
      const parsed = JSON.parse(cached);
      // Verificar que tiene al menos una propiedad de tipo 'title'
      const hasTitle = Object.values(parsed).some(v => v && v.type === 'title');
      if (hasTitle) return parsed;
      // Caché inválido → descartar
      sessionStorage.removeItem(cacheKey);
    }
  } catch(e) {
    sessionStorage.removeItem(cacheKey);
  }

  const notionUrl = 'https://api.notion.com/v1/databases/' + dbId;
  const proxyUrl  = 'https://corsproxy.io/?' + encodeURIComponent(notionUrl);

  const res = await fetch(proxyUrl, {
    method: 'GET',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Notion-Version': '2022-06-28',
      'Content-Type': 'application/json'
    }
  });
  if (!res.ok) {
    const errText = await res.text().catch(()=>'');
    throw new Error('Schema Notion HTTP ' + res.status + ' — ' + errText.slice(0,120));
  }
  const db = await res.json();
  if (!db.properties || !Object.keys(db.properties).length) {
    throw new Error('La base de datos de Notion no tiene propiedades visibles. Verificá los permisos de la integración.');
  }
  sessionStorage.setItem(cacheKey, JSON.stringify(db.properties));
  return db.properties;
}

async function _pushToNotion(item, cobrado) {
  const token = localStorage.getItem('fnz_notion_token');
  const dbId  = localStorage.getItem('fnz_notion_dbid');
  if (!token || !dbId) throw new Error('Notion no configurado');

  const ingreso    = typeof cobrado === 'object' ? (cobrado.ingreso    || 0) : (cobrado || 0);
  const movilidad  = typeof cobrado === 'object' ? (cobrado.movilidad  || 0) : 0;
  const materiales = typeof cobrado === 'object' ? (cobrado.materiales || 0) : 0;
  const otros      = typeof cobrado === 'object' ? (cobrado.otros      || 0) : 0;
  const meta       = typeof cobrado === 'object' ? (cobrado.meta       || 0) : 0;
  const formaPago  = typeof cobrado === 'object' ? (cobrado.formaPago  || '') : '';
  const observaciones = typeof cobrado === 'object' ? (cobrado.observaciones || '') : '';
  const svc1 = typeof cobrado === 'object' ? (cobrado.svc1 || item.servicio || '') : (item.servicio || '');
  const svc2 = typeof cobrado === 'object' ? (cobrado.svc2 || '') : '';

  const props = await _fetchNotionSchema(token, dbId);
  const payload = { parent: { database_id: dbId }, properties: {} };

      const findCol = (...names) => {
    const normalize = (s) => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, "");
    for (const n of names) {
      const match = Object.keys(props).find(k => normalize(k) === normalize(n));
      if (match) return { name: match, type: props[match].type };
    }
    return null;
  };

    const setProp = (col, value) => {
    if (!col || value === null || value === undefined || value === '') return;
    const strVal = String(value);
    if (col.type === 'title')        payload.properties[col.name] = { title: [{ text: { content: strVal } }] };
    else if (col.type === 'rich_text') payload.properties[col.name] = { rich_text: [{ text: { content: strVal } }] };
    else if (col.type === 'number')  payload.properties[col.name] = { number: parseFloat(value) || 0 };
    else if (col.type === 'select')  payload.properties[col.name] = { select: { name: strVal } };
    else if (col.type === 'date')    payload.properties[col.name] = { date: { start: strVal } };
    else if (col.type === 'phone_number') payload.properties[col.name] = { phone_number: strVal };
  };

  const pTitle = Object.entries(props).find(([,v]) => v.type === 'title')?.[0];
  if (pTitle) payload.properties[pTitle] = { title: [{ text: { content: item.cliente || '(Sin cliente)' } }] };

  setProp(findCol('fecha'), item.fecha);
  setProp(findCol('ingreso'), ingreso);
  setProp(findCol('movilidad'), movilidad);
  setProp(findCol('materiales'), materiales);
  setProp(findCol('otros'), otros);
  setProp(findCol('meta'), meta);
  setProp(findCol('forma de pago'), formaPago);
  setProp(findCol('observaciones','notas'), observaciones);
  setProp(findCol('servicio 1','svc1'), svc1);
  setProp(findCol('servicio 2','svc2'), svc2);
  setProp(findCol('distrito','ubicacion','ubicación'), item.ubicacion);

    console.log("Pushing to Notion Finance:", payload);
  const res = await fetch('https://corsproxy.io/?' + encodeURIComponent('https://api.notion.com/v1/pages'), {
    method: 'POST',
    headers: { 'Authorization': 'Bearer '+token, 'Notion-Version': '2022-06-28', 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  return res.json();
}

let _notionPollTimer = null;

// ══════════════════════════════════════════════════════════════════════
// 📥 CARGA MANUAL DESDE NOTION CON DEDUPLICACIÓN
// ══════════════════════════════════════════════════════════════════════
async function notionCargarManual() {
  const token = localStorage.getItem('fnz_notion_token');
  const dbId  = localStorage.getItem('fnz_notion_dbid');
  if (!token || !dbId) { toast('Configurá primero las credenciales de Notion', 'error'); return; }

  const statusEl = document.getElementById('notion-load-status');
  if (statusEl) statusEl.textContent = '⏳ Consultando Notion...';

  try {
    // ── 1. Traer registros de Notion (Finanzas + Clientes) ──
    const dbIdFinanzas = localStorage.getItem('fnz_notion_dbid');
    const dbIdClientes = localStorage.getItem('fnz_notion_dbid_clientes');
    const dbs = [dbIdFinanzas, dbIdClientes].filter(Boolean);
    
    let allResults = [];
    for (const dbId of dbs) {
      const notionUrl = 'https://api.notion.com/v1/databases/' + dbId + '/query';
      const proxyUrl  = 'https://corsproxy.io/?' + encodeURIComponent(notionUrl);
      let cursor = undefined, page = 0;

      do {
        page++;
        const bodyObj = { page_size: 100, ...(cursor ? { start_cursor: cursor } : {}) };
        const res = await fetch(proxyUrl, {
          method: 'POST',
          headers: { 'Authorization': 'Bearer '+token, 'Notion-Version': '2022-06-28', 'Content-Type': 'application/json' },
          body: JSON.stringify(bodyObj)
        });
        if (!res.ok) throw new Error('HTTP ' + res.status + ' en DB ' + dbId);
        const data = await res.json();
        if (data.results) allResults = allResults.concat(data.results);
        cursor = data.has_more ? data.next_cursor : undefined;
        if (statusEl) statusEl.textContent = '⏳ Cargando... ' + allResults.length + ' registros';
      } while (cursor);
    }

    if (!allResults.length) {
      if (statusEl) statusEl.textContent = '⚠ Bases de datos vacías';
      toast('Notion no tiene registros', 'error'); return;
    }

    // ── 2. Motor de deduplicación ──
    const txExistentes = state.transactions || [];

    // Índice de IDs de Notion ya en la app
    const notionIdsEnApp = new Set(
      txExistentes
        .filter(t => t._notionRowId)
        .map(t => {
          // Normalizar: quitar sufijos -ing, -mov, -mat, -otr
          const id = t._notionRowId;
          return id.includes('-') ? id.split('-').slice(0,-1).join('-') : id;
        })
    );

    const yaExisten   = [];  // Tienen el mismo PageId → no importar
    const posibleDup  = [];  // Misma fecha+cliente+monto ±5% → advertir
    const soloNuevos  = [];  // No coincide nada → importar normalmente

    for (const page of allResults) {
      const pageId = page.id;
      const props  = page.properties || {};

      // Helper de lectura rápida
      const getPropVal = (...names) => {
        for (const n of names) {
          const p = Object.entries(props).find(([k]) => k.toLowerCase() === n.toLowerCase())?.[1];
          if (!p) continue;
          if (p.type==='title')      return (p.title||[]).map(t=>t.plain_text).join('').trim();
          if (p.type==='rich_text')  return (p.rich_text||[]).map(t=>t.plain_text).join('').trim();
          if (p.type==='date')       return p.date?.start||'';
          if (p.type==='number')     return p.number!=null ? p.number : null;
          if (p.type==='select')     return p.select?.name||'';
          if (p.type==='phone_number') return p.phone_number||'';
        }
        return '';
      };

      const titleEntry = Object.entries(props).find(([,v]) => v.type==='title');
      const cliente = titleEntry ? (titleEntry[1].title||[]).map(t=>t.plain_text).join('').trim()
                                 : getPropVal('cliente','nombre','name');
      const fecha   = getPropVal('fecha','date') || page.created_time?.split('T')[0] || '';
      const precio  = parseFloat(getPropVal('precio del servicio','precio','monto','total')) || 0;

      // Capa 1: Notion Page ID exacto
      const pureId = pageId.replace(/-/g,'');
      if (notionIdsEnApp.has(pureId) || notionIdsEnApp.has(pageId)) {
        yaExisten.push({ pageId, cliente, fecha, precio });
        continue;
      }

      // Capa 2: fecha + cliente + monto ±5%
      const dupPorDatos = txExistentes.find(t => {
        const mismaFecha   = t.date === fecha;
        const mismoCliente = (t.cliente||'').toLowerCase() === (cliente||'').toLowerCase();
        const montoRef     = parseFloat(t.amount) || 0;
        const montoMatch   = precio > 0 && montoRef > 0
                           && Math.abs(montoRef - precio) / Math.max(montoRef, precio) < 0.05;
        return mismaFecha && mismoCliente && montoMatch;
      });

      if (dupPorDatos) {
        posibleDup.push({ pageId, cliente, fecha, precio, txLocal: dupPorDatos });
      } else {
        soloNuevos.push(page);
      }
    }

    window._notionCache = allResults;
    if (statusEl) statusEl.textContent = '';

    // ── 3. Mostrar modal de preview ──
    const total = allResults.length;
    document.getElementById('modal-content').innerHTML = `
      <div class="modal-title" style="color:#6B46C1">📥 Preview — Cargar desde Notion</div>

      <!-- RESUMEN -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
        <div style="background:#F0FDF4;border:1px solid #4CAF8533;border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:22px;font-weight:800;color:#27500A">${soloNuevos.length}</div>
          <div style="font-size:10px;font-weight:700;color:#27500A;text-transform:uppercase">Nuevos</div>
        </div>
        <div style="background:#FFFBEB;border:1px solid #EF9F2733;border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:22px;font-weight:800;color:#633806">${posibleDup.length}</div>
          <div style="font-size:10px;font-weight:700;color:#633806;text-transform:uppercase">Posibles Dup.</div>
        </div>
        <div style="background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:22px;font-weight:800;color:#64748B">${yaExisten.length}</div>
          <div style="font-size:10px;font-weight:700;color:#64748B;text-transform:uppercase">Ya en App</div>
        </div>
      </div>

      <!-- DETALLE NUEVOS -->
      ${soloNuevos.length > 0 ? `
        <div style="background:#F0FDF4;border:1px solid #4CAF8522;border-radius:8px;padding:10px;margin-bottom:10px;max-height:140px;overflow-y:auto">
          <div style="font-size:11px;font-weight:700;color:#27500A;margin-bottom:6px">✅ Se importarán (${soloNuevos.length})</div>
          ${soloNuevos.slice(0,10).map(p => {
            const ps = p.properties||{};
            const tEnt = Object.entries(ps).find(([,v])=>v.type==='title');
            const cl = tEnt ? (tEnt[1].title||[]).map(t=>t.plain_text).join('') : '—';
            const fe = Object.entries(ps).find(([k])=>k.toLowerCase()==='fecha')?.[1]?.date?.start || p.created_time?.split('T')[0] || '—';
            return `<div style="font-size:12px;padding:4px 0;border-bottom:1px solid #E2E8F0">${cl} · ${fe}</div>`;
          }).join('')}
          ${soloNuevos.length>10?`<div style="font-size:11px;color:var(--muted);margin-top:4px">... y ${soloNuevos.length-10} más</div>`:''}
        </div>` : ''}

      <!-- DETALLE POSIBLES DUP -->
      ${posibleDup.length > 0 ? `
        <div style="background:#FFFBEB;border:1px solid #EF9F2733;border-radius:8px;padding:10px;margin-bottom:10px">
          <div style="font-size:11px;font-weight:700;color:#633806;margin-bottom:6px">⚠ Posibles duplicados — misma fecha, cliente y monto (±5%)</div>
          ${posibleDup.slice(0,5).map(d => `
            <div style="font-size:12px;padding:4px 0;border-bottom:1px solid #EF9F2722">
              ${d.cliente} · ${d.fecha} · S/${d.precio}
            </div>`).join('')}
          ${posibleDup.length>5?`<div style="font-size:11px;color:var(--muted);margin-top:4px">... y ${posibleDup.length-5} más</div>`:''}
          <div style="margin-top:8px">
            <label style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#633806;cursor:pointer">
              <input type="checkbox" id="incluir-posibles-dup" style="width:16px;height:16px">
              Importar también los posibles duplicados
            </label>
          </div>
        </div>` : ''}

      <div style="font-size:11px;color:var(--muted);margin-bottom:12px;text-align:center">
        Total en Notion: <strong>${total}</strong> · Ya en app: <strong>${yaExisten.length}</strong> (no se tocarán)
      </div>

      <div class="btn-row">
        <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
        <button style="flex:2;background:#475569;color:#fff;border:none;border-radius:8px;padding:13px;font-weight:700;font-family:'Inter', system-ui, sans-serif;font-size:14px;cursor:pointer"
          onclick='notionConfirmarCarga(${JSON.stringify(soloNuevos.map(p=>p.id))}, ${JSON.stringify(posibleDup.map(d=>d.pageId))}, ${JSON.stringify(allResults.map(p=>p.id))})'>
          ✓ Importar ${soloNuevos.length} nuevos
        </button>
      </div>`;
    showModal();

  } catch(err) {
    if (statusEl) statusEl.textContent = '⚠ ' + err.message;
    toast('Error al conectar con Notion: ' + err.message.slice(0,80), 'error');
    console.error('[Notion] Error carga manual:', err);
  }
}

async function notionConfirmarCarga(soloNuevosIds, posibleDupIds, allIds) {
  const incluirDup = document.getElementById('incluir-posibles-dup')?.checked || false;
  closeModal();

  const token = localStorage.getItem('fnz_notion_token');
  const dbIdFinanzas = localStorage.getItem('fnz_notion_dbid');
  const dbIdClientes = localStorage.getItem('fnz_notion_dbid_clientes');
  const dbs = [dbIdFinanzas, dbIdClientes].filter(Boolean);

  if (!token || dbs.length === 0) return;

  const statusEl = document.getElementById('notion-load-status');
  if (statusEl) statusEl.textContent = '⏳ Importando...';
  toast('⏳ Importando desde Notion...', 'info');

  try {
    // Re-fetch solo los que necesitamos para no guardar referencias obsoletas
    const idsAImportar = new Set([
      ...soloNuevosIds,
      ...(incluirDup ? posibleDupIds : [])
    ]);
    if (idsAImportar.size === 0) {
      toast('No hay registros nuevos para importar', 'info');
      if (statusEl) statusEl.textContent = '✓ Nada que importar';
      return;
    }

    // Usar la caché de la vista previa para no descargar todo de nuevo (Evita el error y la demora)
    const itemsToImport = (window._notionCache || []).filter(p => idsAImportar.has(p.id));

    if (!itemsToImport.length) {
      toast('No se encontraron registros en caché para importar', 'error'); return;
    }

    // Convert to mock allResults format
    const allResults = itemsToImport;

    const csvText = _notionResultsToCSV(allResults);
    const result  = _procesarCsvNotionTexto(csvText, 'notion-load-status', false);

    if (result && result.ok) {
      localStorage.setItem('fnz_notion_last_sync', new Date().toISOString());
      const msg = '✅ ' + (result.txImportadas||0) + ' registros importados desde Notion';
      if (statusEl) statusEl.textContent = msg;
      toast(msg, 'success');
    }
  } catch(err) {
    if (statusEl) statusEl.textContent = '⚠ Error: ' + err.message;
    toast('Error importando: ' + err.message.slice(0,80), 'error');
  }
}

function notionApiSyncStart(){
  const token = localStorage.getItem('fnz_notion_token');
  const dbId  = localStorage.getItem('fnz_notion_dbid');
  const mins  = +(localStorage.getItem('fnz_notion_interval')||15);
  if(!token||!dbId){ toast('Configurá el token y la base de datos de Notion','error'); return; }
  if(_notionPollTimer) clearInterval(_notionPollTimer);
  notionApiPoll();
  _notionPollTimer = setInterval(notionApiPoll, mins*60*1000);
  localStorage.setItem('fnz_notion_polling','1');
  toast('✓ Notion sync activo — cada '+mins+' min');
  render();
}

function notionApiSyncStop(){
  if(_notionPollTimer){ clearInterval(_notionPollTimer); _notionPollTimer=null; }
  localStorage.removeItem('fnz_notion_polling');
  toast('Notion sync pausado');
  render();
}

async function notionApiPoll(){
  const token = localStorage.getItem('fnz_notion_token');
  const dbId  = localStorage.getItem('fnz_notion_dbid');
  if(!token||!dbId) return;
  const statusEl = document.getElementById('notion-api-status');
  if(statusEl) statusEl.textContent = '↻ Consultando Notion...';
  _notionBadgeSyncing();

  try{
    const sheetsUrl = localStorage.getItem('fnz_sheets_url');
    const lastSync  = localStorage.getItem('fnz_notion_last_sync')||'2000-01-01T00:00:00.000Z';

    let csvText = null;

    if(sheetsUrl){
      // ── Ruta 1: Apps Script como proxy (recomendado) ──
      const url = sheetsUrl
        + '?action=notionQuery'
        + '&token=' + encodeURIComponent(token)
        + '&dbId='  + encodeURIComponent(dbId)
        + '&since=' + encodeURIComponent(lastSync);
      try {
        const res = await fetch(url, {method:'GET'});
        if(res.ok){
          const ct = res.headers.get('content-type')||'';
          if(ct.includes('csv')||ct.includes('text/plain')){
            csvText = await res.text();
          } else {
            const data = await res.json().catch(()=>({}));
            csvText = data.csv || null;
            if(!csvText && data.rows === 0){
              if(statusEl) statusEl.textContent = '✓ Sin cambios · '+new Date().toLocaleTimeString('es-PE');
              localStorage.setItem('fnz_notion_last_sync', new Date().toISOString());
              _notionBadgeOk(0);
              return;
            }
          }
        }
      } catch(_){} // Si falla el Apps Script, seguir con el proxy CORS
    }

    if(!csvText){
      // ── Ruta 2: Notion API directamente via proxy CORS ──
      // corsproxy.io soporta POST + headers personalizados correctamente
      const notionUrl = 'https://api.notion.com/v1/databases/' + dbId + '/query';
      const proxyUrl  = 'https://corsproxy.io/?' + encodeURIComponent(notionUrl);
      const bodyObj = {
        filter: {
          timestamp: 'last_edited_time',
          last_edited_time: { after: lastSync }
        },
        sorts: [{ timestamp: 'last_edited_time', direction: 'descending' }],
        page_size: 100
      };

      let res, data;
      try {
        res = await fetch(proxyUrl, {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Notion-Version': '2022-06-28',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(bodyObj)
        });
        if(!res.ok) {
          const errTxt = await res.text().catch(()=>'');
          throw new Error('Notion API HTTP ' + res.status + (errTxt ? ': ' + errTxt.slice(0,120) : ''));
        }
        data = await res.json();
      } catch(proxyErr) {
        // Intentar proxy alternativo si corsproxy.io falla
        const proxy2 = 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(notionUrl);
        try {
          res = await fetch(proxy2, {
            method: 'POST',
            headers: {
              'Authorization': 'Bearer ' + token,
              'Notion-Version': '2022-06-28',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(bodyObj)
          });
          if(!res.ok) throw new Error('Proxy alternativo HTTP ' + res.status);
          data = await res.json();
        } catch(e2) {
          throw proxyErr; // lanzar error original
        }
      }

      if(!data || !data.results || data.results.length === 0){
        if(statusEl) statusEl.textContent = '✓ Sin cambios · '+new Date().toLocaleTimeString('es-PE');
        localStorage.setItem('fnz_notion_last_sync', new Date().toISOString());
        _notionBadgeOk(0);
        return;
      }
      // Convertir resultados de Notion API al mismo formato CSV que exporta Notion
      csvText = _notionResultsToCSV(data.results);
    }

    if(!csvText || csvText.trim().length < 10){
      if(statusEl) statusEl.textContent = '✓ Sin cambios · '+new Date().toLocaleTimeString('es-PE');
      localStorage.setItem('fnz_notion_last_sync', new Date().toISOString());
      _notionBadgeOk(0);
      return;
    }

    // Usar EXACTAMENTE el mismo núcleo que la importación manual
    const result = _procesarCsvNotionTexto(csvText, 'notion-api-status');
    if(result && result.ok){
      localStorage.setItem('fnz_notion_last_sync', new Date().toISOString());
      const importados = result.txImportadas || 0;
      if(statusEl) statusEl.textContent =
        '✓ '+importados+' nuevos · '+new Date().toLocaleTimeString('es-PE');
      _notionBadgeOk(importados > 0 ? importados : 0);
      // Sincronizar lo nuevo a Sheets también
      if(importados > 0) syncAllTxToSheets(true);
    } else {
      _notionBadgeOk(0);
    }

  } catch(err){
    if(statusEl) statusEl.textContent = '⚠ Error: '+err.message;
    _notionBadgeError(err.message);
    console.error('Notion poll error:', err);
  }
}

// Convierte resultados de Notion API al formato CSV que espera _procesarCsvNotionTexto
function _notionResultsToCSV(results){
  if(!results||!results.length) return '';
  // Encabezado exacto que usa el importador + NotionId para espejo
  const headers = ['Fecha','Cliente','Servicio 1','Servicio 2','Servicio 3','Servicio 4',
                   'Precio del servicio','Movilidad','Materiales','Otros',
                   'Distrito','Forma de pago','Observaciones','Contacto','NotionId'];

  function getProp(props, ...names){
    for(const name of names){
      const p = props[name] ||
                props[name.toLowerCase()] ||
                Object.entries(props).find(([k])=>k.toLowerCase()===name.toLowerCase())?.[1];
      if(!p) continue;
      if(p.type==='title')       return (p.title||[]).map(t=>t.plain_text).join('').trim();
      if(p.type==='rich_text')   return (p.rich_text||[]).map(t=>t.plain_text).join('').trim();
      if(p.type==='date')        return p.date?.start||'';
      if(p.type==='number')      return p.number!=null ? p.number.toString() : '';
      if(p.type==='select')      return p.select?.name||'';
      if(p.type==='multi_select')return (p.multi_select||[]).map(s=>s.name).join(', ');
      if(p.type==='formula')     return p.formula?.number!=null ? p.formula.number.toString() : (p.formula?.string||'');
      if(p.type==='phone_number')return p.phone_number||'';
      if(p.type==='checkbox')    return p.checkbox ? 'Si' : '';
      if(p.type==='url')         return p.url||'';
    }
    return '';
  }

  // Helper: buscar el titulo (type=title) en cualquier columna
  function getTitleProp(props){
    const titleEntry = Object.entries(props).find(([,v])=>v.type==='title');
    if(!titleEntry) return '';
    return (titleEntry[1].title||[]).map(t=>t.plain_text).join('').trim();
  }

  const rows = [headers.join(',')];
  for(const page of results){
    const p = page.properties||{};

    // Cliente: buscar por nombre o usar el campo title de la página
    const cliente = getProp(p,'Cliente','cliente','Nombre','nombre','Name','name') || getTitleProp(p);

    // Servicio: soportar nombre de columna "Servicio X", "servicio", "Tipo", "Categoría", "categoria", "Categoria", "Category"
    const servicio1 = getProp(p,'Servicio 1','servicio 1','Servicio1','Servicio','servicio','Tipo','tipo','Categoría','Categoria','categoria','Category','category');
    const servicio2 = getProp(p,'Servicio 2','servicio 2','Servicio2');
    const servicio3 = getProp(p,'Servicio 3','servicio 3','Servicio3');
    const servicio4 = getProp(p,'Servicio 4','servicio 4','Servicio4');

    // Precio: soportar "Precio del servicio", "Precio", "precio", "Monto", "monto", "Importe", "Total"
    const precio = getProp(p,'Precio del servicio','Precio del servicio','precio del servicio','Precio','precio','Monto','monto','Importe','importe','Total','total','Amount','amount');

    const row = [
      getProp(p,'Fecha','fecha','Date','date') || (page.created_time||'').split('T')[0],
      cliente,
      servicio1, servicio2, servicio3, servicio4,
      precio,
      getProp(p,'Movilidad','movilidad','Transporte','transporte'),
      getProp(p,'Materiales','materiales','Material','material'),
      getProp(p,'Otros','otros','Extra','extra','Adicional','adicional'),
      getProp(p,'Distrito','distrito','Ubicacion','ubicacion','Ubicación','Zona','zona'),
      getProp(p,'Forma de pago','forma de pago','Pago','pago','Payment','payment','Método de pago'),
      getProp(p,'Observaciones','observaciones','Nota','nota','Notas','notas','Notes','notes','Descripcion','Descripción','descripcion'),
      getProp(p,'Contacto','contacto','Telefono','Teléfono','telefono','tel','Tel','Phone','phone'),
      page.id
    ].map(v => '"' + (v||'').replace(/"/g,'""') + '"');
    rows.push(row.join(','));
  }
  return rows.join('\n');
}

// ── Subir sonido desde PC ──
function uploadSound(input){
  const file = input.files[0];
  if(!file) return;
  const maxSize = 2 * 1024 * 1024; // 2MB máx
  if(file.size > maxSize) return toast('El archivo es muy grande. Máximo 2MB','error');
  const reader = new FileReader();
  reader.onload = (e) => {
    const id = 'snd_' + Date.now();
    const name = file.name.replace(/\.[^.]+$/, '');
    if(!state.sonidos) state.sonidos = {};
    state.sonidos[id] = { id, name, data: e.target.result, type: file.type };
    save('fnz_sonidos', state.sonidos);
    toast('Sonido "' + name + '" guardado ✓');
    render();
  };
  reader.readAsDataURL(file);
}


// ── Sonidos predeterminados (generados con Web Audio API) ──
const SONIDOS_DEFAULT = [
  { id:'default_campana',   name:'🔔 Campana',      type:'default' },
  { id:'default_alerta',    name:'⚠️ Alerta',        type:'default' },
  { id:'default_suave',     name:'🎵 Tono suave',    type:'default' },
  { id:'default_urgente',   name:'🚨 Urgente',       type:'default' },
  { id:'default_positivo',  name:'✅ Positivo',      type:'default' },
  { id:'default_mensaje',   name:'💬 Mensaje',       type:'default' },
];

function playSoundDefault(id){
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  const g = ctx.createGain();
  g.connect(ctx.destination);

  const patterns = {
    default_campana: ()=>{
      [523,659,784,1047].forEach((f,i)=>{
        const o=ctx.createOscillator(); o.type='sine';
        o.frequency.value=f; o.connect(g);
        g.gain.setValueAtTime(0.3,ctx.currentTime+i*0.15);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.15+0.3);
        o.start(ctx.currentTime+i*0.15); o.stop(ctx.currentTime+i*0.15+0.3);
      });
    },
    default_alerta: ()=>{
      [880,440,880].forEach((f,i)=>{
        const o=ctx.createOscillator(); o.type='square';
        o.frequency.value=f; o.connect(g);
        g.gain.setValueAtTime(0.2,ctx.currentTime+i*0.2);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.2+0.18);
        o.start(ctx.currentTime+i*0.2); o.stop(ctx.currentTime+i*0.2+0.18);
      });
    },
    default_suave: ()=>{
      [440,494,523].forEach((f,i)=>{
        const o=ctx.createOscillator(); o.type='sine';
        o.frequency.value=f; o.connect(g);
        g.gain.setValueAtTime(0,ctx.currentTime+i*0.25);
        g.gain.linearRampToValueAtTime(0.2,ctx.currentTime+i*0.25+0.1);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.25+0.4);
        o.start(ctx.currentTime+i*0.25); o.stop(ctx.currentTime+i*0.25+0.4);
      });
    },
    default_urgente: ()=>{
      for(let i=0;i<4;i++){
        const o=ctx.createOscillator(); o.type='sawtooth';
        o.frequency.value=660; o.connect(g);
        g.gain.setValueAtTime(0.25,ctx.currentTime+i*0.12);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.12+0.1);
        o.start(ctx.currentTime+i*0.12); o.stop(ctx.currentTime+i*0.12+0.1);
      }
    },
    default_positivo: ()=>{
      [523,659,784,1047,1319].forEach((f,i)=>{
        const o=ctx.createOscillator(); o.type='sine';
        o.frequency.value=f; o.connect(g);
        g.gain.setValueAtTime(0.25,ctx.currentTime+i*0.1);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.1+0.2);
        o.start(ctx.currentTime+i*0.1); o.stop(ctx.currentTime+i*0.1+0.2);
      });
    },
    default_mensaje: ()=>{
      [784,1047].forEach((f,i)=>{
        const o=ctx.createOscillator(); o.type='sine';
        o.frequency.value=f; o.connect(g);
        g.gain.setValueAtTime(0.25,ctx.currentTime+i*0.18);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.18+0.25);
        o.start(ctx.currentTime+i*0.18); o.stop(ctx.currentTime+i*0.18+0.25);
      });
    },
  };
  if(patterns[id]) patterns[id]();
}

function playSound(id){
  if(!id) return;
  // Sonido predeterminado
  if(id.startsWith('default_')){ playSoundDefault(id); return; }
  // Sonido personalizado
  const snd = state.sonidos && state.sonidos[id];
  if(!snd) return;
  const audio = new Audio(snd.data);
  audio.play().catch(()=>toast('No se pudo reproducir el sonido','error'));
}


// ── Eliminar sonido ──
function deleteSound(id){
  if(!confirm('¿Eliminar este sonido?')) return;
  delete state.sonidos[id];
  save('fnz_sonidos', state.sonidos);
  // También limpiar de recordatorios
  (state.recordatorios||[]).forEach(r=>{ if(r.sonidoId===id) r.sonidoId=''; });
  save('fnz_recordatorios', state.recordatorios);
  render();
  toast('Sonido eliminado');
}

function saveReminder(){
  const nombre = document.getElementById('rem-nombre')?.value.trim();
  const fecha  = document.getElementById('rem-fecha')?.value;
  const dias   = parseInt(document.getElementById('rem-dias')?.value||0);
  const sonidoId = document.getElementById('rem-sonido')?.value||'';
  const repetir  = document.getElementById('rem-repetir')?.value||'no';
  if(!nombre||!fecha) return toast('Completa nombre y fecha','error');
  if(!state.recordatorios) state.recordatorios=[];
  state.recordatorios.push({id:Date.now()+'', nombre, fecha, diasAntes:dias, sonidoId, repetir});
  save('fnz_recordatorios', state.recordatorios);
  closeModal();
  render();
  toast('Recordatorio guardado ✓');
}

function deleteReminder(id){
  state.recordatorios = (state.recordatorios||[]).filter(r=>r.id!==id);
  save('fnz_recordatorios', state.recordatorios);
  render();
  toast('Eliminado');
}

// ── Notificaciones del navegador ──
function requestNotifPermission(){
  if(!('Notification' in window)) return toast('Tu navegador no soporta notificaciones','error');
  Notification.requestPermission().then(perm=>{
    if(perm==='granted'){
      toast('✓ Notificaciones activadas');
      document.getElementById('notif-btn').textContent='✓ Activadas';
      document.getElementById('notif-btn').style.background='var(--green)';
    } else {
      toast('Permiso denegado — activalo manualmente en tu navegador','error');
    }
  });
}

// ── Verificar recordatorios al abrir la app ──
function checkReminders(){
  const hoy = new Date().toISOString().split('T')[0];
  const recs = state.recordatorios||[];
  const activos = recs.filter(r=>{
    const diasFalta = Math.ceil((new Date(r.fecha+'T00:00:00')-new Date(hoy+'T00:00:00'))/(1000*60*60*24));
    return diasFalta >= 0 && diasFalta <= (r.diasAntes||1);
  });
  if(!activos.length) return;

  // Mostrar toast por cada recordatorio activo
  activos.forEach((r, idx) => {
    setTimeout(()=>{
      const dias = Math.ceil((new Date(r.fecha+'T00:00:00')-new Date(hoy+'T00:00:00'))/(1000*60*60*24));
      const msg = dias===0 ? '🔔 Hoy: '+r.nombre : '⚠ '+r.nombre+' en '+dias+' día(s)';
      toast(msg, dias===0?'error':'success');
      if(r.sonidoId && state.sonidos && state.sonidos[r.sonidoId]){
        playSound(r.sonidoId);
      }
      // Notificación del navegador
      if(Notification.permission==='granted'){
        new Notification('Mis Finanzas', {
          body: msg,
          icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🔔</text></svg>'
        });
      }
    }, idx * 2500);
  });
}

  const btn = document.getElementById('notif-btn');
  if(!btn) return;
  if(Notification.permission==='granted'){
    btn.textContent='✓ Activadas';
    btn.style.background='var(--green)';
    btn.style.color='#fff';
  }
}

  pendiente:     { label:'Pendiente',     bg:'#FAEEDA', color:'#633806', border:'#EF9F27' },
  reprogramo:    { label:'Reprogramó',    bg:'#EEEDFE', color:'#3C3489', border:'#7F77DD' },
  se_desanimo:   { label:'Se desanimó',   bg:'#F1EFE8', color:'#444441', border:'#888780' },
  se_finalizo:   { label:'Se finalizó',   bg:'#EAF3DE', color:'#27500A', border:'#639922' },
};
// Estados del PAGO (solo aplica cuando estado=se_finalizo)
const AGENDA_PAGO = {
  completo:  { label:'Cobro completo',  bg:'#EAF3DE', color:'#27500A' },
  parcial:   { label:'Cobro parcial',   bg:'#FAEEDA', color:'#633806' },
  sin_cobro: { label:'Sin cobro',       bg:'#FCEBEB', color:'#791F1F' },
};

const AGENDA_SERVICIOS = [
  'Instalación Nueva',
  'Punto Adicional',
  'Modificación de Red',
  'Reparación de Tubería',
  'Conversión de Artefacto',
  'Conexión de Artefacto',
  'Documentación',
  'Gasfitería',
  'Otros',
];

function getAgendaHoy(){
  const hoy = new Date().toISOString().split('T')[0];
  return hoy;
}

function diasHastaLabel(fecha){
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const d = new Date(fecha+'T00:00:00'); d.setHours(0,0,0,0);
  const diff = Math.round((d-hoy)/(1000*60*60*24));
  if(diff<0) return { txt:'Vencido '+Math.abs(diff)+'d', color:'#791F1F', bg:'#FCEBEB' };
  if(diff===0) return { txt:'Hoy', color:'#0C447C', bg:'#E6F1FB' };
  if(diff===1) return { txt:'Mañana', color:'#27500A', bg:'#EAF3DE' };
  return { txt:'En '+diff+' días', color:'#444441', bg:'#F1EFE8' };
}

function parseUbicacionLink(ubicacion){
  if(!ubicacion) return { display:'—', link:null };
  // Detectar si es URL de Google Maps
  if(ubicacion.includes('maps.google') || ubicacion.includes('goo.gl/maps') || ubicacion.includes('maps.app.goo')) {
    return { display:'📍 Ver en Maps', link:ubicacion };
  }
  // Detectar coordenadas: -12.0464,-77.0428
  const coordMatch = ubicacion.match(/(-?\d{1,3}\.\d+)[,\s]+(-?\d{1,3}\.\d+)/);
  if(coordMatch) {
    const link = 'https://maps.google.com/?q='+coordMatch[1]+','+coordMatch[2];
    return { display:'📍 '+coordMatch[1].substring(0,8)+'...', link };
  }
  // Texto de dirección — generar link de búsqueda
  const query = encodeURIComponent(ubicacion + ', Lima, Peru');
  return { display:'📍 '+ubicacion, link:'https://maps.google.com/?q='+query };
}

function renderAgenda(){
  if(!window._agendaFiltro) window._agendaFiltro='todos';
  if(!window._agendaVista) window._agendaVista='lista';

  const todos = (state.agenda||[]).slice().sort((a,b)=>{
    const da=a.fecha+(a.hora||'00:00'), db=b.fecha+(b.hora||'00:00');
    return da.localeCompare(db);
  });

  // Aplicar filtro con nuevos estados
  const _migEst = s => ({completado:'se_finalizo',cancelado:'se_desanimo'}[s]||s||'agendado');
  const items = todos.filter(x=>{
    const est = _migEst(x.estado);
    if(window._agendaFiltro==='activos')       return ['agendado','pendiente','reprogramo'].includes(est);
    if(window._agendaFiltro==='finalizados')   return est==='se_finalizo';
    if(window._agendaFiltro==='no_realizados') return est==='se_desanimo';
    return true;
  });
  const visitas  = items.filter(x=>x.tipo==='visita');
  const trabajos = items.filter(x=>x.tipo==='trabajo');

  // Vista semanal
  const hoy=new Date();
  const semana=[];
  for(let i=0;i<7;i++){
    const d=new Date(hoy);d.setDate(hoy.getDate()+i);
    semana.push(d);
  }
  const DIAS_CORTO=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const semanaHtml=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px">
    ${semana.map(d=>{
      const ds=d.toISOString().split('T')[0];
      const hayTrab=todos.some(a=>a.fecha===ds&&a.tipo==='trabajo');
      const hayVis=todos.some(a=>a.fecha===ds&&a.tipo==='visita');
      const esHoy=ds===hoy.toISOString().split('T')[0];
      return `<div style="background:${esHoy?'var(--gold)':'var(--card)'};border:1px solid ${esHoy?'var(--gold)':'var(--border)'};border-radius:8px;padding:6px 2px;text-align:center;cursor:pointer" onclick="switchPage('agenda')">
        <div style="font-size:9px;color:${esHoy?'#0D0D0F':'var(--muted)'};text-transform:uppercase;letter-spacing:.04em">${DIAS_CORTO[d.getDay()]}</div>
        <div style="font-size:15px;font-weight:600;color:${esHoy?'#0D0D0F':'var(--text)'};margin:2px 0">${d.getDate()}</div>
        <div style="display:flex;justify-content:center;gap:2px;min-height:8px">
          ${hayTrab?`<div style="width:6px;height:6px;border-radius:50%;background:#6C3483"></div>`:''}
          ${hayVis?`<div style="width:6px;height:6px;border-radius:50%;background:#475569"></div>`:''}
        </div>
      </div>`;
    }).join('')}
  </div>
  <div style="display:flex;gap:12px;margin-bottom:14px;font-size:11px;color:var(--muted)">
    <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#6C3483;margin-right:4px"></span>Trabajo</span>
    <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#475569;margin-right:4px"></span>Visita</span>
  </div>`;

  function agendaCard(item){
    const est = AGENDA_ESTADOS[_migEst(item.estado)] || AGENDA_ESTADOS['agendado'];
    const dias = diasHastaLabel(item.fecha);
    const ubic = parseUbicacionLink(item.ubicacion);
    const isVisita = item.tipo==='visita';
    const cardId = 'agcard_'+item.id;
    const estaActivo = ['agendado','pendiente','reprogramo'].includes(_migEst(item.estado));

    const icono = isVisita ? '👁' : '🔧';
    const iconBg = isVisita ? '#EFF6FF' : '#F3F0FF';

    const [y,m,d] = (item.fecha||'').split('-');
    const meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    const fechaLbl = y ? `${parseInt(d)} ${meses[parseInt(m)-1]}` : '—';
    const horaLbl = item.hora ? horaTo12(item.hora) : '';

    const precioBadge = !isVisita && item.precio
      ? `<span class="ag-card-pill" style="background:#F3F0FF;color:#534AB7">S/ ${fmt(item.precio).replace('S/ ','')}</span>`
      : '';

    const ubicHtml = ubic.link
      ? `<a href="${ubic.link}" target="_blank" onclick="event.stopPropagation()" style="display:inline-flex;align-items:center;gap:5px;background:#EEF4FF;border:1px solid #2E86AB33;border-radius:8px;padding:6px 11px;font-size:12px;color:#1565C0;text-decoration:none;font-weight:600">${ubic.display} ↗</a>`
      : `<div style="font-size:12px;color:var(--muted)">${ubic.display}</div>`;

    const precioHtml = !isVisita && item.precio
      ? `<div style="background:#F3F0FF;border-radius:8px;padding:9px 13px;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:11px;color:#534AB7;font-weight:600">Precio acordado</span>
          <span style="font-size:17px;font-weight:700;color:#534AB7;font-family:'Inter', system-ui, sans-serif">${fmt(item.precio)}</span>
        </div>` : '';

    const telHtml = item.telefono
      ? `<a href="tel:${item.telefono}" onclick="event.stopPropagation()" style="display:inline-flex;align-items:center;gap:6px;background:#F0FDF4;border:1px solid #4CAF8533;border-radius:8px;padding:6px 11px;font-size:12px;color:#27500A;text-decoration:none;font-weight:600">📞 ${item.telefono}</a>` : '';

    const notasHtml = item.notas
      ? `<div style="background:#FFFBEB;border:1px solid #EF9F2733;border-radius:8px;padding:8px 11px;font-size:12px;color:#633806">📝 ${item.notas}</div>` : '';

    const pagoBadge = item.estadoPago
      ? `<span class="ag-card-pill" style="background:${(AGENDA_PAGO[item.estadoPago]||{}).bg||'#F5F5F5'};color:${(AGENDA_PAGO[item.estadoPago]||{}).color||'#333'}">${(AGENDA_PAGO[item.estadoPago]||{}).label||''}</span>` : '';
    const montoP = item.montoPendienteCobro>0
      ? `<span class="ag-card-pill" style="background:#FAEEDA;color:#633806">Pendiente: S/ ${item.montoPendienteCobro.toFixed(2)}</span>` : '';

    const accionesHtml = `
      <div class="ag-card-actions" style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 4px">
        <button class="ag-act-btn" style="background:#EEEDFE;border:1px solid #AFA9EC;color:#3C3489;padding:10px;font-size:11px;font-weight:700;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px"
          onclick="event.stopPropagation();cambiarEstadoAgenda('${item.id}','reprogramo')">🔄 Reprogramar</button>
        <button class="ag-act-btn" style="background:#F1EFE8;border:1px solid #B4B2A9;color:#444441;padding:10px;font-size:11px;font-weight:700;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px"
          onclick="event.stopPropagation();cambiarEstadoAgenda('${item.id}','se_desanimo')">✗ Desanimó</button>
        ${!isVisita
          ? `<button class="ag-act-btn" style="background:#EAF3DE;border:1px solid #97C459;color:#27500A;grid-column: span 2;padding:12px;font-size:12px;font-weight:800;border-radius:8px;cursor:pointer"
              onclick="event.stopPropagation();abrirModalCobro('${item.id}')">✓ Finalizar y Cobrar</button>`
          : `<button class="ag-act-btn" style="background:#FFF3E0;border:1px solid #FFCC80;color:#BF360C;grid-column: span 2;padding:12px;font-size:12px;font-weight:800;border-radius:8px;cursor:pointer"
              onclick="event.stopPropagation();convertirVisitaATrabajo('${item.id}')">🔨 Agendó Construcción</button>`}
      </div>`;

    const secundariosHtml = `
      <div style="display:flex;gap:6px;margin-top:4px">
        <button onclick="event.stopPropagation(); ${item.estado === 'se_finalizo' ? `abrirModalCobro('${item.id}')` : `editAgendaItem('${item.id}')`}"
          style="flex:1;padding:9px;background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;font-family:'Inter', system-ui, sans-serif;font-size:12px;font-weight:600;cursor:pointer">✎ Editar</button>
        ${item.telefono ? `<button onclick="event.stopPropagation();abrirWhatsAppAgenda('${item.id}')"
          style="width:40px;background:#E8F5E2;border:1px solid #9FE1CB;color:#085041;border-radius:8px;cursor:pointer;font-size:18px">💬</button>` : ''}
        <button onclick="event.stopPropagation();deleteAgendaItem('${item.id}')"
          style="width:40px;background:#FCEBEB;border:1px solid #F09595;color:#791F1F;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700">✕</button>
      </div>`;

    return `
    <div class="ag-card" id="${cardId}">
      <!-- ENCABEZADO: CLICK PARA DESPLEGAR TODO -->
      <div class="ag-card-head" onclick="toggleAgendaCard('${cardId}')" style="padding:14px 16px; display:flex; gap:12px; align-items:center; cursor:pointer">
        <div class="ag-card-icon" style="width:48px; height:48px; border-radius:8px; background:${iconBg}; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0">${icono}</div>
        <div class="ag-card-body" style="flex:1; min-width:0">
          <div class="ag-card-nombre" style="font-family:'Inter', system-ui, sans-serif; font-size:18px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.2; margin-bottom:5px">${item.cliente||'Sin cliente'}</div>
          <div class="ag-card-meta" style="display:flex; flex-wrap:wrap; gap:5px; align-items:center; margin-bottom:4px">
            <span class="ag-card-pill" style="background:${dias.bg};color:${dias.color}; font-size:11px; font-weight:600; padding:3px 9px; border-radius:8px">${dias.txt}</span>
            <span style="font-size:12px; color:var(--muted); font-weight:600">${fechaLbl}${horaLbl?' · '+horaLbl:''}</span>
            <span class="ag-card-pill" style="background:${est.bg};color:${est.color}; font-size:11px; font-weight:600; padding:3px 9px; border-radius:8px">${est.label}</span>
          </div>
          ${item.ubicacion ? `<div style="font-size:11px;color:var(--muted);margin-top:3px">📍 ${item.ubicacion}</div>` : ''}
        </div>
        <div class="ag-card-chevron" style="font-size:12px; color:var(--muted); transition:transform .22s">▾</div>
      </div>

      <!-- DETALLE DESPLEGABLE -->
      <div class="ag-card-expand" style="max-height:0; overflow:hidden; transition:max-height .28s ease">
        <div class="ag-card-detail" style="padding:0 16px 16px; display:flex; flex-direction:column; gap:10px; border-top:1px solid var(--border); padding-top:12px">
          ${ubicHtml}
          ${telHtml}
          ${notasHtml}
          
          <!-- BOTONES OPERATIVOS REUBICADOS DENTRO DEL DESPLIEGUE -->
          <div style="margin-top:6px">
            ${accionesHtml}
          </div>

          <!-- ACCIONES SECUNDARIAS -->
          <div style="border-top:1px solid #F1F5F9; margin-top:6px; padding-top:10px">
            ${secundariosHtml}
          </div>
        </div>
      </div>
    </div>`;
  }

  // Filtros
  const filtroHtml=`<div style="display:flex;gap:6px;margin-bottom:14px">
    ${[['todos','Todos'],['activos','Activos'],['finalizados','Finalizados'],['no_realizados','No realizados']].map(([k,l])=>
      `<button onclick="window._agendaFiltro='${k}';render()" style="font-size:11px;padding:5px 12px;border-radius:8px;border:1px solid ${window._agendaFiltro===k?'var(--gold)':'var(--border)'};background:${window._agendaFiltro===k?'#FFF8EC':'transparent'};color:${window._agendaFiltro===k?'var(--gold)':'var(--muted)'};font-weight:${window._agendaFiltro===k?'600':'400'};cursor:pointer;font-family:'Inter', system-ui, sans-serif">${l}</button>`
    ).join('')}
  </div>`;

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-family:'Inter', system-ui, sans-serif;font-size:18px;color:var(--gold)">Agenda</div>
      <div style="display:flex;gap:6px">
        <button onclick="openAddAgenda('visita')" style="background:#EFF6FF;border:1px solid #1565C044;color:#0C447C;border-radius:8px;padding:7px 12px;font-family:'Inter', system-ui, sans-serif;font-size:12px;font-weight:600;cursor:pointer">＋ Visita</button>
        <button onclick="openAddAgenda('trabajo')" style="background:#F3F0FF;border:1px solid #9B59B644;color:#6C3483;border-radius:8px;padding:7px 12px;font-family:'Inter', system-ui, sans-serif;font-size:12px;font-weight:600;cursor:pointer">＋ Trabajo</button>
      </div>
    </div>
    ${semanaHtml}
    ${filtroHtml}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="font-size:13px;font-weight:600;color:#1565C0">👁 Visitas (${visitas.length})</div>
    </div>
    ${visitas.length===0
      ?`<div class="card" style="text-align:center;color:var(--dim);padding:16px 0;font-size:13px;margin-bottom:14px">Sin visitas</div>`
      :visitas.map(agendaCard).join('')}
    <div style="display:flex;justify-content:space-between;align-items:center;margin:14px 0 8px">
      <div style="font-size:13px;font-weight:600;color:#6C3483">🔧 Trabajos (${trabajos.length})</div>
    </div>
    ${trabajos.length===0
      ?`<div class="card" style="text-align:center;color:var(--dim);padding:16px 0;font-size:13px">Sin trabajos</div>`
      :trabajos.map(agendaCard).join('')}`;
}

// ── Formulario agregar/editar ──
function openAddAgenda(tipo, editId, preData){
  const isEdit = !!editId;
  const item = isEdit ? (state.agenda||[]).find(x=>x.id===editId) : null;
  const isVisita = (item?item.tipo:tipo) === 'visita';
  const colorTitle = isVisita ? '#1565C0' : '#6C3483';
  const pre = preData || {};
  const serviciosOpts = AGENDA_SERVICIOS.map(s=>{
    const isSelected = (item&&item.servicio===s) || (!item&&pre.servicio&&s===pre.servicio);
    return `<option value="${s}" ${isSelected?'selected':''}>${s}</option>`;
  }).join('');
  const estadosOpts = Object.entries(AGENDA_ESTADOS).map(([k,v])=>`<option value="${k}" ${item&&item.estado===k?'selected':k==='agendado'&&!item?'selected':''}>${v.label}</option>`).join('');
  const visitasEstados = ['agendado','en proceso','interesado','convertido','no interesado'];
  const visitasEstadosOpts = visitasEstados.map(e=>`<option value="${e}" ${item&&item.estado===e?'selected':e==='en proceso'&&!item?'selected':''}>${e.charAt(0).toUpperCase()+e.slice(1)}</option>`).join('');
  const visitasAcciones = ['se agendó construcción', 'se envió mensaje', 'se llamó', 'se envió precio', 'se agendó visita', 'se hizo visita', 'se construyó', 'se desanimó'];

  document.getElementById('modal-content').innerHTML=`
    <div class="modal-title" style="color:${colorTitle};font-family:'Inter', system-ui, sans-serif">${isEdit?'Editar':(isVisita?'Nueva':'Nuevo')} ${isVisita?'Visita':'Construcción'}</div>
    <div class="field"><label class="field-label">Cliente</label>
      <input id="ag-cliente" type="text" placeholder="Nombre del cliente" value="${item?item.cliente||'':pre.cliente||''}" 
        style="font-family:'Inter', system-ui, sans-serif;font-weight:600;padding:14px;background:#F1F5F9;border-color:transparent">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
      <div class="field" style="margin-bottom:0"><label class="field-label">${isVisita ? 'Fecha de Visita' : 'Fecha de Construcción'}</label>
        <input id="ag-fecha" type="date" value="${item?item.fecha:pre.fecha||getAgendaHoy()}"
          style="padding:12px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px">
      </div>
      <div class="field" style="margin-bottom:0"><label class="field-label">Hora (12h)</label>
        <div style="display:flex;gap:6px;align-items:center">
          <input id="ag-hora-txt" type="text" inputmode="numeric" placeholder="Ej: 9:00"
            value="${item&&item.hora?horaTo12(item.hora).replace(' AM','').replace(' PM',''):(pre.hora?horaTo12(pre.hora).replace(' AM','').replace(' PM',''):'')}"
            style="flex:1;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:12px;color:var(--text);font-family:'Inter', system-ui, sans-serif;font-size:14px"
            oninput="formatHoraInput(this)">
          <div style="display:flex;gap:4px;flex-shrink:0">
            <button type="button" id="ag-ampm-am" onclick="setAgAmpm('AM')" style="padding:10px;border-radius:8px;border:1px solid #E2E8F0;font-size:11px;font-weight:700;cursor:pointer">AM</button>
            <button type="button" id="ag-ampm-pm" onclick="setAgAmpm('PM')" style="padding:10px;border-radius:8px;border:1px solid #E2E8F0;font-size:11px;font-weight:700;cursor:pointer">PM</button>
          </div>
        </div>
      </div>
    </div>
    ${isVisita?`
    <div style="background:#F0F9FF;border:1px solid #1565C022;border-radius:8px;padding:12px;margin-bottom:12px">
      <div style="font-size:10px;font-weight:800;color:#1565C0;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">👥 Gestión Comercial</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${['1','2','3','4'].map(i=>`
          <div class="field" style="margin-bottom:0"><label class="field-label" style="font-size:10px">${i}ª Acción</label>
            <select id="ag-accion${i}" style="background:#fff;border:1px solid #E2E8F0;border-radius:8px;padding:10px;color:var(--text);font-family:'Inter', system-ui, sans-serif;font-size:12px;width:100%">
              <option value="">—</option>
              ${visitasAcciones.map(a=>`
                <option value="${a}" ${
                  (item && item['accion'+i]===a) || 
                  (!item && (
                    (i==='1' && ((isVisita && a==='se agendó visita') || (!isVisita && a==='se agendó visita'))) ||
                    (i==='2' && (!isVisita && a==='se agendó construcción'))
                  ))
                  ?'selected':''
                }>${a}</option>
              `).join('')}
            </select>
          </div>
        `).join('')}
      </div>
    </div>` : ''}
    ${!isVisita?`
    <div style="background:#F8F0FF;border:1px solid #9B59B622;border-radius:8px;padding:12px;margin-bottom:8px">
      <div style="font-size:11px;font-weight:700;color:#6C3483;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">🔧 Servicios</div>
      <div class="field" style="margin-bottom:8px"><label class="field-label">Servicio 1 <span style="color:#E74C3C">*</span></label>
        <select id="ag-servicio" style="background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:'Inter', system-ui, sans-serif;font-size:14px;width:100%">
          <option value="">Seleccionar servicio...</option>
          ${serviciosOpts}
        </select>
      </div>

function setAgAmpm(period){
  window._agAmpm = period;
  const am = document.getElementById('ag-ampm-am');
  const pm = document.getElementById('ag-ampm-pm');
  if(am){ am.style.background=period==='AM'?'#1565C0':'transparent'; am.style.color=period==='AM'?'#fff':'var(--muted)'; am.style.borderColor=period==='AM'?'#1565C0':'var(--border)'; }
  if(pm){ pm.style.background=period==='PM'?'#1565C0':'transparent'; pm.style.color=period==='PM'?'#fff':'var(--muted)'; pm.style.borderColor=period==='PM'?'#1565C0':'var(--border)'; }
}

function formatHoraInput(input){
  // Auto-insertar : al escribir el segundo dígito si no lo tiene
  let v = input.value.replace(/[^0-9:]/g,'');
  if(v.length===2 && !v.includes(':')) v = v+':';
  if(v.length>5) v=v.substring(0,5);
  input.value = v;
}

function getAgHora(){
  const txt = (document.getElementById('ag-hora-txt')?.value||'').trim();
  const period = window._agAmpm||'AM';
  if(!txt) return '';
  // Parsear HH:MM o H
  const parts = txt.split(':');
  let h = parseInt(parts[0])||0;
  const m = parseInt(parts[1])||0;
  if(h<1||h>12) return '';
  if(period==='PM' && h!==12) h+=12;
  if(period==='AM' && h===12) h=0;
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
}

function horaTo12(hora24){
  if(!hora24) return '';
  const [hh,mm] = hora24.split(':');
  let h = parseInt(hh);
  const period = h>=12 ? 'PM' : 'AM';
  if(h===0) h=12;
  else if(h>12) h=h-12;
  return h+':'+(mm||'00')+' '+period;
}

// DISTRITO COMBOBOX — reutilizable en agenda y modal de cobro
// InputId: id del <input>, DropId: id del contenedor del dropdown
// ══════════════════════════════════════════════════════════════════
function distritoComboShow(inputId, dropId) {
  const inp = document.getElementById(inputId);
  const dd  = document.getElementById(dropId);
  if (!inp || !dd) return;

  const val = inp.value.trim().toLowerCase();
  // Si es URL → no mostrar distritos
  if (val.includes('http') || val.includes('maps') || val.includes('goo.gl')) {
    dd.style.display = 'none'; return;
  }

  const distOrdenados = [...DISTRITOS_LIMA].sort((a, b) => a.localeCompare(b, 'es'));
  const matches = val
    ? distOrdenados.filter(d => d.toLowerCase().includes(val))
    : distOrdenados;

  if (!matches.length) { dd.style.display = 'none'; return; }

  dd.innerHTML = matches.map((d, i) => {
    // Resaltar la parte que coincide
    let display = d;
    if (val) {
      const idx = d.toLowerCase().indexOf(val);
      if (idx >= 0) {
        display = d.slice(0, idx)
          + '<span style="background:#FFF3CD;border-radius:8px;font-weight:700">'
          + d.slice(idx, idx + val.length)
          + '</span>'
          + d.slice(idx + val.length);
      }
    }
    return `<div class="ubic-opt" 
      data-dist="${d}" 
      data-idx="${i}"
      onmousedown="event.preventDefault();distritoComboSelect('${inputId}','${dropId}','${d.replace(/'/g,"\\'")}')"
      style="padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid #F1F5F9;display:flex;align-items:center;gap:8px"
    >📍 ${display}</div>`;
  }).join('');

  dd.style.display = 'block';
  // Reset selected index
  dd._selIdx = -1;
}

function distritoComboSelect(inputId, dropId, val) {
  const inp = document.getElementById(inputId);
  if (inp) inp.value = val;
  const dd = document.getElementById(dropId);
  if (dd) dd.style.display = 'none';
  inp?.focus();
}

function distritoComboKey(e, inputId, dropId) {
  const dd = document.getElementById(dropId);
  if (!dd || dd.style.display === 'none') return;
  const opts = dd.querySelectorAll('.ubic-opt');
  let idx = dd._selIdx ?? -1;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    idx = Math.min(idx + 1, opts.length - 1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    idx = Math.max(idx - 1, 0);
  } else if (e.key === 'Enter' && idx >= 0) {
    e.preventDefault();
    const d = opts[idx]?.dataset?.dist || '';
    if (d) distritoComboSelect(inputId, dropId, d);
    return;
  } else if (e.key === 'Escape') {
    dd.style.display = 'none'; return;
  } else {
    return;
  }
  dd._selIdx = idx;
  opts.forEach((o, i) => {
    o.style.background = i === idx ? '#EFF6FF' : '';
    o.style.color      = i === idx ? '#1565C0' : '';
    o.style.fontWeight = i === idx ? '700' : '';
    if (i === idx) o.scrollIntoView({ block: 'nearest' });
  });
}

function saveAgendaItem(editId, tipo){
  const clienteEl   = document.getElementById('ag-cliente');
  const fechaEl     = document.getElementById('ag-fecha');
  const servicioEl  = document.getElementById('ag-servicio');
  const servicio2El = document.getElementById('ag-servicio2');
  const servicio3El = document.getElementById('ag-servicio3');
  const servicio4El = document.getElementById('ag-servicio4');
  const precioEl    = document.getElementById('ag-precio');
  const ubicEl      = document.getElementById('ag-ubicacion');
  const telEl       = document.getElementById('ag-telefono');
  const notasEl     = document.getElementById('ag-notas');
  const estadoEl    = document.getElementById('ag-estado');

  const cliente   = (clienteEl?.value||'').trim();
  const fecha     = fechaEl?.value||'';
  const hora      = getAgHora();
  
  const vServ     = document.getElementById('ag-servicio-visita');
  const servicio  = tipo==='visita' ? (vServ?.value||'') : (servicioEl?.value||'');
  
  const servicio2 = servicio2El?.value||'';
  const servicio3 = servicio3El?.value||'';
  const servicio4 = servicio4El?.value||'';
  const precio    = parseFloat(precioEl?.value)||0;
  const ubicacion = (ubicEl?.value||'').trim();
  const telefono  = (telEl?.value||'').trim();
  const notas     = (notasEl?.value||'').trim();
  const estado    = estadoEl?.value||(tipo==='visita'?'en proceso':'pendiente');

  // Valores exclusivos de visita
  const prioridad = document.getElementById('ag-prioridad')?.value || 'media';
  const accion1 = document.getElementById('ag-accion1')?.value || '';
  const accion2 = document.getElementById('ag-accion2')?.value || '';
  const accion3 = document.getElementById('ag-accion3')?.value || '';
  const accion4 = document.getElementById('ag-accion4')?.value || '';
  const fechaVisita = document.getElementById('ag-fecha-visita')?.value || '';
  const fechaConstruccion = document.getElementById('ag-fecha-construccion')?.value || '';

  if(!cliente || !fecha){
    if(clienteEl) clienteEl.style.borderColor = !cliente ? '#E05252' : 'var(--border)';
    if(fechaEl)   fechaEl.style.borderColor   = !fecha   ? '#E05252' : 'var(--border)';
    toast('Completá al menos cliente y fecha','error');
    return;
  }

  const markRed = (el) => { if(el) el.style.borderColor = '#E05252'; };
  const markOk  = (el) => { if(el) el.style.borderColor = 'var(--border)'; };
  !ubicacion && tipo!=='visita' ? markRed(ubicEl) : markOk(ubicEl);
  !telefono ? markRed(telEl) : markOk(telEl);
  tipo==='trabajo' && !servicio ? markRed(servicioEl) : markOk(servicioEl);

  if(!state.agenda) state.agenda=[];

  let isConversion = false;
  let finalId = editId || Date.now()+'';
  if(!editId && window._conversionVisita) {
    isConversion = true;
    finalId = window._conversionVisita.id;
  }

  // Preservar campos que no están en el form (montoPagado, _notionRowId, etc.)
  const existente = (editId || isConversion) ? (state.agenda.find(x=>x.id===finalId)||{}) : {};
  const item = {
    ...existente,
    id: finalId,
    tipo, cliente, fecha, hora,
    servicio, servicio1: servicio,
    servicio2, servicio3, servicio4,
    precio, ubicacion, telefono, notas, estado,
    // Add visita fields
    prioridad: prioridad || existente.prioridad || 'media',
    accion1: accion1 || existente.accion1 || ((!editId && !isConversion && tipo === 'trabajo') ? 'se agendó construcción' : (!editId && !isConversion && tipo === 'visita') ? 'se agendó visita' : ''),
    accion2: accion2 || existente.accion2 || '',
    accion3: accion3 || existente.accion3 || '',
    accion4: accion4 || existente.accion4 || '',
    fechaVisita: (tipo === 'visita') ? fecha : (existente.fechaVisita || ''),
    fechaConstruccion: (tipo === 'trabajo' && !isConversion) ? fecha : (existente.fechaConstruccion || '')
  };

  if(isConversion) {
    item.accion1 = 'se agendó visita';
    item.accion2 = 'se agendó construcción';
    item.fechaConstruccion = fecha; // El nuevo Trabajo guarda su fecha principal como fecha de construcción
    item._notionRowId = window._conversionVisita._notionRowId;
    window._conversionVisita = null; // Reset
  }

  if(editId || isConversion){
    state.agenda = state.agenda.map(x=>x.id===finalId ? item : x);
  } else {
    state.agenda.unshift(item);
  }
  save('fnz_agenda', state.agenda);
  syncAgendaToSheets(item);

  // ── Push a Notion al crear/editar ────────────────────────────────────────
  const nToken = localStorage.getItem('fnz_notion_token');
  if (nToken && localStorage.getItem('fnz_notion_dbid_clientes')) {
    _pushToNotionClientes(item).then(res => {
      // SIEMPRE guardar el ID que Notion devuelve (sea POST o PATCH)
      if (res && res.id) {
        // Actualizar el item en state.agenda con el notionRowId
        state.agenda = state.agenda.map(x => {
          if (x.id === item.id) return { ...x, _notionRowId: res.id };
          return x;
        });
        save('fnz_agenda', state.agenda);
        console.log('Notion ID guardado:', res.id, '| acción:', res.object === 'page' ? (item._notionRowId ? 'PATCH' : 'POST') : '?');
      }
    }).catch(err => console.warn('Notion error:', err.message));
  }


  closeModal(); render();
  const faltantes=[];
  if(!ubicacion) faltantes.push('ubicación');
  if(!telefono)  faltantes.push('teléfono');
  if(tipo==='trabajo'&&!servicio) faltantes.push('servicio');
  toast((tipo==='visita'?'Visita':'Trabajo')+' guardado ✓'+(faltantes.length?' · Falta: '+faltantes.join(', '):''));
}

function abrirWhatsAppAgenda(id) {
  const item = (state.agenda||[]).find(x=>x.id===id);
  if(!item||!item.telefono) return toast('Este trabajo no tiene teléfono registrado','error');

  const meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const fechaLabel = (() => {
    const hoy = new Date().toISOString().split('T')[0];
    const man = new Date(new Date().setDate(new Date().getDate()+1)).toISOString().split('T')[0];
    if(item.fecha===hoy) return 'hoy';
    if(item.fecha===man) return 'mañana';
    try{ const[y,m,d]=item.fecha.split('-'); return `el ${parseInt(d)} de ${meses[parseInt(m)-1]}`; }
    catch(e){ return item.fecha; }
  })();
  const hora = item.hora ? ` a las ${horaTo12(item.hora)}` : '';
  const servicio = item.servicio || 'el servicio';
  const cliente = item.cliente ? `Hola ${item.cliente.split(' ')[0]}` : 'Hola';

  const msg = `${cliente}, le confirmo mi visita ${fechaLabel}${hora} para ${servicio}.${item.ubicacion?' En '+item.ubicacion+'.':''} Cualquier consulta estoy a sus órdenes. - ${state.nombreUsuario||'Servicio Gas'}`;

  const tel = item.telefono.replace(/\D/g,'');
  const url = `https://wa.me/51${tel}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}

function deleteAgendaItem(id){
  if(!confirm('¿Eliminar este registro? También se eliminarán los movimientos e ingresos asociados.')) return;
  const url=localStorage.getItem('fnz_sheets_url')||'';

  // ★ Buscar y eliminar transacciones asociadas (sufijo _ag o descripción que contenga el id)
  const txAsociadas = (state.transactions||[]).filter(t=>
    t.id === id+'_ag' ||
    t.id.startsWith(id+'_') ||
    (t.description && t.description.includes && state.agenda && (() => {
      const item = (state.agenda||[]).find(x=>x.id===id);
      return item && t.description.includes(item.cliente||'__NO__') && t.negocio;
    })())
  );

  // ★ Eliminar deudas automáticas asociadas (sufijo _dag)
  const deudasAsociadas = (state.debts||[]).filter(d=>
    d.id === id+'_dag' || d.id.startsWith(id+'_dag')
  );

  // Eliminar del state local
  state.transactions = (state.transactions||[]).filter(t=> !txAsociadas.some(tx=>tx.id===t.id));
  state.debts        = (state.debts||[]).filter(d=> !deudasAsociadas.some(da=>da.id===d.id));
  state.agenda       = (state.agenda||[]).filter(x=>x.id!==id);

  // Sync eliminaciones a Sheets
  if(url){
    // Eliminar agenda de Construcciones y Visitas
    _sendToSheets(url,{type:'agenda_delete', id});
    // Eliminar tx asociadas de Movimientos
    txAsociadas.forEach(tx=>{
      setTimeout(()=>_sendToSheets(url,{type:'tx_delete', id:tx.id, modo:'negocio'}), 300);
    });
    // Eliminar deudas asociadas de Deudas y Movimientos
    deudasAsociadas.forEach(d=>{
      setTimeout(()=>_sendToSheets(url,{type:'deuda_delete', id:d.id}), 600);
    });
  }

  saveAll(); render();
  toast('Eliminado' + (txAsociadas.length||deudasAsociadas.length ? ' · Movimientos e ingresos relacionados también eliminados' : ''));
}

function confirmarReprogramacion(id){
  const item=(state.agenda||[]).find(x=>x.id===id);
  if(!item) return;
  const nFecha = document.getElementById('reprog-fecha')?.value||'';
  const nHora  = document.getElementById('reprog-hora')?.value||'';
  const motivo = document.getElementById('reprog-motivo')?.value.trim()||'';
  if(!nFecha){ toast('Seleccioná la nueva fecha','error'); return; }
  
  item.fecha = nFecha;
  item.hora  = nHora;
  if(item.tipo === 'visita') item.fechaVisita = nFecha;
  if(item.tipo === 'trabajo') item.fechaConstruccion = nFecha;
  item.estado = 'reprogramo';
  item.motivoReprogramacion = motivo;
  
  save('fnz_agenda',state.agenda);
  closeModal();
  render();

  syncAgendaToSheets(item);

  // ── Actualizar Notion al reprogramar ──
  if(localStorage.getItem('fnz_notion_token') && localStorage.getItem('fnz_notion_dbid_clientes')){
    _pushToNotionClientes(item).then(res=>{
      if(res && res.id){
        state.agenda = state.agenda.map(x => x.id===item.id ? {...x, _notionRowId: res.id} : x);
        save('fnz_agenda', state.agenda);
        console.log('Notion reprogramado:', res.id);
      }
    }).catch(e=>console.warn('Notion reprogramar:', e.message));
  }

  toast('↻ Reprogramado para '+nFecha);
}

function _aplicarEstadoAgenda(id, estado){
  const item=(state.agenda||[]).find(x=>x.id===id);
  if(!item) return;
  item.estado=estado;
  save('fnz_agenda',state.agenda);
  const url=localStorage.getItem('fnz_sheets_url')||'';
  if(url){
    const payload={ type:'agenda_estado', agenda_estado:{ id:item.id, estado, estadoPago:item.estadoPago||'-', montoPagado:item.montoPagado||0, montoPendienteCobro:item.montoPendienteCobro||0, tipo:item.tipo, fechaReprogramado:item.fechaReprogramado||'' } };

  // ── Actualizar estado en Notion ──
  if(localStorage.getItem('fnz_notion_token') && localStorage.getItem('fnz_notion_dbid_clientes')){
    _pushToNotionClientes(item).then(res=>{
      if(res && res.id){

}
