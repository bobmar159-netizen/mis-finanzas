function _removeMatRow(i){
  window._matUsadosTemp.splice(i,1);
  const agId = window._cobroAgendaId||'';
  const item = (state.agenda||[]).find(x=>x.id===agId);
  _renderMatUsadosForm(agId, item?.servicio||'');
}

function _updateMatRow(i, field, val){
  if(!window._matUsadosTemp[i]) return;
  window._matUsadosTemp[i][field] = parseFloat(val)||0;
  // Re-render to update totals and validation
  const agId = window._cobroAgendaId||'';
  const item = (state.agenda||[]).find(x=>x.id===agId);
  _renderMatUsadosForm(agId, item?.servicio||'');
}

function _addMatRow(){
  const sel = document.getElementById('new-mat-sel');
  const matId = sel?.value;
  if(!matId) return;
  const mat = getMaterialById(matId);
  if(!mat) return;
  window._matUsadosTemp = window._matUsadosTemp||[];
  // Evitar duplicados — sumar cantidad
  const existing = window._matUsadosTemp.find(r=>r.material_id===matId);
  if(existing){ existing.cantidad+=1; }
  else { window._matUsadosTemp.push({ material_id:matId, nombre:mat.nombre, unidad:mat.unidad, cantidad:1, costo:mat.costo_actual, stock:mat.stock_actual }); }
  const agId = window._cobroAgendaId||'';
  const item = (state.agenda||[]).find(x=>x.id===agId);
  _renderMatUsadosForm(agId, item?.servicio||'');
}

// ── FASE 5-8: Confirmar uso — validar, descontar, guardar historial ──
function _confirmarMatUsados(agendaId){
  const rows = window._matUsadosTemp||[];
  // FASE 5: Validar stock
  const insuf = rows.filter(r=>r.cantidad>r.stock);
  if(insuf.length){ toast('Stock insuficiente en: '+insuf.map(r=>r.nombre).join(', '),'error'); return; }

  const totalCosto = rows.reduce((s,r)=>s+(r.cantidad*r.costo),0);

  // FASE 6: Descontar stock
  rows.forEach(r=>{
    const idx = state.inventario.findIndex(m=>m.id===r.material_id);
    if(idx>=0){
      state.inventario[idx].stock_actual = Math.max(0, state.inventario[idx].stock_actual - r.cantidad);
      syncMaterialToSheets(state.inventario[idx]);
    }
  });

  // FASE 8: Guardar historial
  const fecha = todayStr();
  rows.forEach(r=>{
    const reg = { id:'mu_'+Date.now()+'_'+Math.random().toString(36).slice(2,6), tipo:'uso', id_servicio:agendaId, material_id:r.material_id, material:r.nombre, cantidad:r.cantidad, costo_unitario_usado:r.costo, costo_total:r.cantidad*r.costo, fecha };
    state.movimientosMateriales = state.movimientosMateriales||[];
    state.movimientosMateriales.push(reg);
    syncMovimientoToSheets(reg);
  });

  // FASE 7: Actualizar campo materiales en cobro form
  const campoMat = document.getElementById('cobro-materiales');
  if(campoMat){
    campoMat.value = `S/ ${totalCosto.toFixed(2)} (${rows.length} material${rows.length!==1?'es':''})`;
    campoMat.dataset.total = totalCosto.toFixed(2);
    campoMat.dataset.rows  = JSON.stringify(rows);
  }

  saveAll();
  closeModal();
  toast(`✅ ${rows.length} materiales descontados · S/ ${totalCosto.toFixed(2)}`);

  // Alertas de stock bajo
  rows.forEach(r=>{
    const mat = getMaterialById(r.material_id);
    if(mat){
      if(mat.stock_actual<=0) toast(`🔴 ${mat.nombre}: Sin stock`,'error');
      else if(mat.stock_actual<=mat.stock_minimo) toast(`🟡 ${mat.nombre}: Stock bajo`,'info');
    }
  });
}

// ── FASE 11: Procesar imagen de boleta ──────────────────────────────
function procesarBoleta(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    window._boletaBase64 = e.target.result.split(',')[1];
    window._boletaMimeType = file.type;
    document.getElementById('boleta-img').src = e.target.result;
    document.getElementById('boleta-preview').style.display='block';
  };
  reader.readAsDataURL(file);
}

// ── FASE 12-14: Gemini Vision para boletas ──────────────────────────
async function analizarBoletaGemini(){
  if(!window._boletaBase64){ toast('Primero selecciona una imagen','error'); return; }
  const geminiKey = localStorage.getItem('fnz_gemini_key')||'';
  if(!geminiKey){ toast('Configura tu API key de Gemini en Ajustes','error'); return; }

  const btn = document.querySelector('#boleta-preview button');
  if(btn){ btn.textContent='⏳ Analizando...'; btn.disabled=true; }

  try {
    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiKey}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        contents:[{ parts:[
          { text:`Analiza esta boleta o ticket de compra. Extrae SOLO materiales/productos comprados. Para cada uno devuelve un JSON array con estos campos: nombre, cantidad (número decimal), precio_unitario (número decimal). Si no puedes extraer algún campo usa null. Responde SOLO el JSON array, sin markdown ni explicaciones. Ejemplo: [{"nombre":"Tubo cobre 1/2","cantidad":5,"precio_unitario":8.5}]` },
          { inline_data:{ mime_type:window._boletaMimeType, data:window._boletaBase64 } }
        ]}]
      })
    });
    const data = await resp.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text||'[]';

    let parsed = [];
    try { parsed = JSON.parse(text.replace(/```json|```/g,'').trim()); } catch(e){}

    // ── FASE 13: Matching con materiales existentes ──────────────────
    const matched = parsed.map(item=>{
      const inv = state.inventario||[];
      const found = inv.find(m=> m.nombre.toLowerCase().includes((item.nombre||'').toLowerCase().slice(0,5)) || (item.nombre||'').toLowerCase().includes(m.nombre.toLowerCase().slice(0,5)));
      return { ...item, material_id: found?.id||null, matched: !!found, material_nombre: found?.nombre||item.nombre };
    });

    window._boletaParsed = matched;
    _renderBoletaResultados(matched);

  } catch(err){
    toast('Error al analizar: '+err.message,'error');
    if(btn){ btn.textContent='✨ Analizar con IA'; btn.disabled=false; }
  }
}

          <button onclick="_removeGeminiRow(${i})" style="margin-top:6px;background:#FEF2F2;border:none;border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer;color:#C62828">✕ Eliminar línea</button>
        </div>`).join('')}
      <button onclick="_addGeminiRow()" style="width:100%;background:#EBF1F5;border:1px dashed #A8BCC9;border-radius:10px;padding:8px;font-size:12px;font-weight:700;cursor:pointer;color:var(--gold);margin-bottom:8px">＋ Agregar línea</button>
    </div>
    <button onclick="_confirmarCompraGemini()" style="width:100%;background:linear-gradient(135deg,#F47C3C,#C8520A);color:#fff;border:none;border-radius:14px;padding:14px;font-weight:700;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer">✅ Confirmar y actualizar stock</button>`;
}

function _removeGeminiRow(i){
  window._boletaParsed.splice(i,1);
  _renderBoletaResultados(window._boletaParsed);
}

function _addGeminiRow(){
  window._boletaParsed = window._boletaParsed||[];
  window._boletaParsed.push({ nombre:'', cantidad:1, precio_unitario:0, material_id:null, matched:false });
  _renderBoletaResultados(window._boletaParsed);
}

// ── FASE 15: Confirmación final compra Gemini ───────────────────────
function _confirmarCompraGemini(){
  const items = window._boletaParsed||[];
  const fecha = todayStr();
  let confirmados = 0;
  items.forEach((it,i)=>{
    const matId   = document.getElementById(`gr-mat-${i}`)?.value;
    const cant    = parseFloat(document.getElementById(`gr-cant-${i}`)?.value)||0;
    const precio  = parseFloat(document.getElementById(`gr-precio-${i}`)?.value)||0;
    if(!matId||!cant) return;
    _registrarCompra(matId, cant, precio, fecha, window._boletaBase64);
    confirmados++;
  });
  if(!confirmados){ toast('Selecciona al menos un material','error'); return; }
  closeModal(); render();
  toast(`✅ ${confirmados} compra${confirmados!==1?'s':''} registrada${confirmados!==1?'s':''}`);
}

function confirmarCompraManual(){
  const matId  = document.getElementById('cmp-mat')?.value;
  const cant   = parseFloat(document.getElementById('cmp-cant')?.value)||0;
  const precio = parseFloat(document.getElementById('cmp-precio')?.value)||0;
  const fecha  = document.getElementById('cmp-fecha')?.value||todayStr();
  if(!matId){ toast('Selecciona un material','error'); return; }
  if(!cant||!precio){ toast('Ingresa cantidad y precio','error'); return; }
  _registrarCompra(matId, cant, precio, fecha, null);
  closeModal(); render();
  toast('✅ Compra registrada y stock actualizado');
}

function _registrarCompra(matId, cantidad, precio_unitario, fecha, imagenBase64){
  const mat = getMaterialById(matId);
  if(!mat) return;

  // FASE 15: Registrar compra
  const compra = { id:'cmp_'+Date.now(), fecha, material_id:matId, material:mat.nombre, cantidad, precio_unitario, imagen_boleta: imagenBase64?'data:image/jpeg;base64,'+imagenBase64:null };
  state.comprasMateriales = state.comprasMateriales||[];
  state.comprasMateriales.push(compra);

  // Actualizar stock y costo
  const idx = state.inventario.findIndex(m=>m.id===matId);
  if(idx>=0){
    state.inventario[idx].stock_actual = (state.inventario[idx].stock_actual||0) + cantidad;
    state.inventario[idx].costo_actual = precio_unitario; // Actualizar costo al último precio pagado
    syncMaterialToSheets(state.inventario[idx]);
  }

  // Registrar movimiento
  const mov = { id:'mov_'+Date.now(), tipo:'compra', material_id:matId, material:mat.nombre, cantidad, costo_unitario_usado:precio_unitario, costo_total:cantidad*precio_unitario, fecha };
  state.movimientosMateriales = state.movimientosMateriales||[];
  state.movimientosMateriales.push(mov);

  saveAll();
  syncCompraToSheets(compra);
  syncMovimientoToSheets(mov);
}

function verBoleta(id){
  const c = (state.comprasMateriales||[]).find(x=>x.id===id);
  if(!c?.imagen_boleta) return;
  document.getElementById('modal-content').innerHTML=`
    <div class="modal-title">📷 Boleta de compra</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:10px">${c.material} · ${c.fecha}</div>
    <img src="${c.imagen_boleta}" style="width:100%;border-radius:12px;border:1px solid var(--border)">
    <button onclick="closeModal()" style="width:100%;margin-top:14px;background:var(--gold);color:#fff;border:none;border-radius:14px;padding:13px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer">Cerrar</button>`;
  showModal();
}

// ── SYNC con Google Sheets ──────────────────────────────────────────
function syncMaterialToSheets(mat){
  const url = localStorage.getItem('fnz_sheets_url')||'';
  if(!url) return;
  _sendToSheets(url, { type:'inventario_material', item:mat });
}
function syncMovimientoToSheets(mov){
  const url = localStorage.getItem('fnz_sheets_url')||'';
  if(!url) return;
  _sendToSheets(url, { type:'inventario_movimiento', item:mov });
}
function syncCompraToSheets(compra){
  const url = localStorage.getItem('fnz_sheets_url')||'';
  if(!url) return;
  // No enviamos imagen base64 a Sheets (muy pesado)
  const { imagen_boleta, ...sinImg } = compra;
  _sendToSheets(url, { type:'inventario_compra', item:sinImg });
}




</script>
