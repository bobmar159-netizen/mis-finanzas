<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#F9F7F3">
<title>Mis Finanzas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js">
</script>
<style>
:root {
  --gold:#475569;--gold2:#64748B;--red:#E05252;--green:#4CAF85;--blue:#2E86AB;
  --bg:#F9FAFB;--card:#FFFFFF;--border:#E5E7EB;--text:#1F2937;--muted:#6B7280;--dim:#9CA3AF;
  --ing-color:#64748B;--ing-bg:#EAF3DE;--ing-text:#3B6D11;
}

/* ── 6 TEMAS — variables CSS completas ── */
#app.tema-oceano {
  --gold:#1565C0;--gold2:#2E86AB;--red:#E05252;--green:#1D9E75;--blue:#2E86AB;
  --bg:#F0F4FF;--card:#FFFFFF;--border:#BBDEFB;--text:#0D1B3E;--muted:#5B8DB8;--dim:#90CAF9;
  --ing-color:#185FA5;--ing-bg:#E6F1FB;--ing-text:#0C447C;
}
#app.tema-ambar {
  --gold:#854F0B;--gold2:#EF9F27;--red:#C62828;--green:#0F6E56;--blue:#185FA5;
  --bg:#FFF8F0;--card:#FFFFFF;--border:#E8C88044;--text:#2C1A00;--muted:#BA7517;--dim:#EF9F27;
  --ing-color:#854F0B;--ing-bg:#FAEEDA;--ing-text:#633806;
}
#app.tema-ambar .mv-card{border-left:3px solid #EF9F27;border-radius:8px}
#app.tema-ambar .mv-card.open{border-left-color:#854F0B}
#app.tema-noche {
  --gold:#9F5AE5;--gold2:#7C3AED;--red:#EF5350;--green:#1D9E75;--blue:#378ADD;
  --bg:#0F0F1A;--card:#1A1A2E;--border:#534AB744;--text:#E8E6FF;--muted:#7F77DD;--dim:#534AB7;
  --ing-color:#9FE1CB;--ing-bg:#1E2A3A;--ing-text:#CECBF6;
}
#app.tema-noche #header{background:#0F0F1A}
#app.tema-noche .modal{background:#1A1A2E;border-color:#534AB744}
#app.tema-noche .card{background:#1A1A2E;border-color:#534AB744}
#app.tema-noche .mv-card{background:#1A1A2E;border-color:#534AB744}
#app.tema-noche .field input,#app.tema-noche .field select,#app.tema-noche .field textarea{background:#262640;border-color:#534AB766;color:#E8E6FF}
#app.tema-noche .modo-toggle{background:#262640}
#app.tema-rosa {
  --gold:#993556;--gold2:#D4537E;--red:#C62828;--green:#0F6E56;--blue:#185FA5;
  --bg:#FDF0F5;--card:#FFFFFF;--border:#F4C0D144;--text:#2C0A18;--muted:#D4537E;--dim:#ED93B1;
  --ing-color:#993556;--ing-bg:#FBEAF0;--ing-text:#72243E;
}
#app.tema-rosa .mv-card{border-radius:8px}
#app.tema-rosa .mv-icon-box{border-radius:50%}
#app.tema-rosa .card{border-radius:8px}
#app.tema-slate {
  --gold:#3B6D11;--gold2:#639922;--red:#A32D2D;--green:#0F6E56;--blue:#185FA5;
  --bg:#F5F5F0;--card:#FFFFFF;--border:#D3D1C7;--text:#2C2C2A;--muted:#5F5E5A;--dim:#B4B2A9;
  --ing-color:#3B6D11;--ing-bg:#EAF3DE;--ing-text:#27500A;
}
#app.tema-slate .mv-card{border:none;border-bottom:2px solid #D3D1C7;border-radius:8px;background:transparent}
#app.tema-slate .mv-card.open{border-bottom-color:var(--gold)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Inter', system-ui, sans-serif;color:var(--text)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#E2E8F0;border-radius:8px}
#app{height:100vh;display:flex;flex-direction:column;max-width:430px;margin:0 auto}
#header{background:var(--bg);border-bottom:1px solid var(--border);padding:16px 20px 0;flex-shrink:0}
#content{flex:1;overflow-y:auto;padding:18px 18px 100px}
.h-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.h-title{font-family:'Inter', system-ui, sans-serif;font-size:24px;font-weight:700;color:var(--gold)}
.h-subtitle{font-size:11px;color:var(--muted);margin-top:2px}
.h-balance{text-align:right}
.h-balance-label{font-size:10px;color:var(--muted)}
.h-balance-val{font-family:'Inter', system-ui, sans-serif;font-size:20px;font-weight:600}
.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:0;padding-bottom:0;border-bottom:1px solid var(--border)}
.tabs-row2{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border-bottom:1px solid var(--border)}
.tab{width:100%;padding:9px 4px 10px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'Inter', system-ui, sans-serif;font-size:10px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);background:var(--ing-bg,#E8F5E9)}
.tabs-row2 .tab{background:transparent}
.tabs-row2 .tab.active{background:var(--ing-bg,#E8F5E9)}
.tab-icon{font-size:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:24px;box-shadow:none;font-size:17px;color:var(--gold);margin-bottom:6px}
.section-sub{font-size:11px;color:var(--muted);margin-bottom:14px}
.summary-card{border-radius:8px;padding:22px 20px}
.summary-label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.summary-amount{font-family:'Inter', system-ui, sans-serif;font-size:38px}
.summary-detail{font-size:12px;color:var(--muted);margin-top:6px}
.progress-bar{background:#F1F5F9;border-radius:8px;height:6px;overflow:hidden;margin-top:12px}
.progress-fill{height:100%;border-radius:8px;transition:width 1s ease}
.debt-card{background:var(--card);border:1px solid var(--border);border-radius:8px;box-shadow:none;padding:18px;margin-bottom:12px;position:relative;overflow:hidden}
.debt-accent{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:8px 0 0 3px}
.debt-body{display:flex;align-items:flex-start;gap:12px}
.debt-info{flex:1}
.debt-name{font-family:'Inter', system-ui, sans-serif;font-size:15px;color:var(--text)}
.debt-cat{font-size:11px;color:var(--muted);margin-top:2px}
.debt-pending{text-align:right}
.debt-pending-amt{font-family:'Inter', system-ui, sans-serif;font-size:17px}
.debt-pending-lbl{font-size:10px;color:var(--muted)}
.cuotas-track{display:flex;gap:4px;flex-wrap:wrap;margin-top:12px}
.cuota-dot{height:6px;border-radius:8px;transition:background .3s;flex-shrink:0}
.cuotas-meta{display:flex;justify-content:space-between;margin-top:7px;font-size:11px;color:var(--muted)}
.motivation{margin-top:10px;background:#F0FDF4;border:1px solid #4CAF8533;border-radius:8px;padding:7px 10px;font-size:11px;color:var(--green)}
.circle-wrap{position:relative;flex-shrink:0}
.circle-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.service-card{background:var(--card);border:1px solid var(--border);border-radius:8px;box-shadow:none;padding:14px 16px;display:flex;align-items:center;gap:14px;margin-bottom:10px;transition:border-color .2s}
.service-card.urgent{border-color:#E0525255}
.service-icon{width:44px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.service-name{font-size:15px;font-weight:600}
.service-name.paid{color:var(--muted);text-decoration:line-through}
.service-sub{font-size:11px;color:var(--muted);margin-top:2px}
.service-amount{font-family:'Inter', system-ui, sans-serif;font-size:16px;margin-left:auto;flex-shrink:0}
.tx-row{display:flex;align-items:center;gap:14px;padding:15px 0;border-bottom:1px solid var(--border)}
.tx-row:last-child{border-bottom:none}
.tx-icon{width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-sub{font-size:12px;color:var(--muted);margin-top:3px}
.tx-amount{font-weight:700;font-size:15px;flex-shrink:0}
.tx-actions{display:flex;gap:4px;flex-shrink:0}
.tx-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:4px;opacity:.6}
.tx-btn:hover{opacity:1}

/* ── Nueva tarjeta de movimiento desplegable ── */
.mv-card{background:var(--card);border:0.5px solid var(--border);border-radius:8px;padding:18px 20px;margin-bottom:8px;cursor:pointer;transition:border-color .2s}
.mv-card:active{opacity:.92}
.mv-card.open{border-color:var(--gold)}
.mv-top{display:flex;align-items:center;gap:12px}
.mv-icon-box{width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.mv-icon-ing{background:var(--ing-bg,#EAF3DE)}
.mv-icon-egr{background:#FFEBEE}
.mv-main{flex:1;min-width:0}
.mv-row1{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.mv-svc{font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.mv-badge-ing{background:var(--ing-bg,#EAF3DE);color:var(--ing-text,#3B6D11);font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;flex-shrink:0;white-space:nowrap}
.mv-badge-egr{background:#FFEBEE;color:#791F1F;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;flex-shrink:0;white-space:nowrap}
.mv-cli{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mv-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.mv-amt{font-size:16px;font-weight:700}
.mv-amt-ing{color:var(--ing-color,#64748B)}
.mv-amt-egr{color:#C62828}
.mv-chevron{font-size:10px;color:var(--muted);transition:transform .2s}
.mv-card.open .mv-chevron{transform:rotate(180deg)}

/* ── AGENDA CARD v2 — colapsable ── */
.ag-card{background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden;transition:border-color .2s;-webkit-tap-highlight-color:transparent}
.ag-card.open{border-color:var(--gold)}
.ag-card-head{padding:18px 20px;cursor:pointer;display:flex;gap:12px;align-items:flex-start}
.ag-card-head:active{opacity:.9}
.ag-card-icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;color:#3B82F6}
.ag-card-body{flex:1;min-width:0}
.ag-card-nombre{font-family:'Inter', system-ui, sans-serif;font-size:18px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;margin-bottom:5px}
.ag-card-meta{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-bottom:4px}
.ag-card-pill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:8px;white-space:nowrap}
.ag-card-servicio{font-size:12px;font-weight:600;color:#185FA5;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ag-card-chevron{font-size:12px;color:var(--muted);margin-top:4px;flex-shrink:0;transition:transform .22s}
.ag-card.open .ag-card-chevron{transform:rotate(180deg)}
.ag-card-expand{max-height:0;overflow:hidden;transition:all 0.3s ease}
.ag-card.open .ag-card-expand{max-height:500px}
.ag-card-detail{padding:0 16px 14px;display:flex;flex-direction:column;gap:7px;border-top:1px solid var(--border);padding-top:12px}
.ag-card-actions{display:flex;gap:6px;flex-wrap:wrap}
.ag-act-btn{flex:1;min-width:80px;border:1px solid;border-radius:8px;padding:10px 8px;font-family:'Inter', system-ui, sans-serif;font-size:12px;font-weight:700;cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent}
.ag-act-btn:active{opacity:.8;transform:scale(.97)}
.mv-expand{max-height:0;overflow:hidden;transition:max-height .28s ease}
.mv-card.open .mv-expand{max-height:300px}
.mv-detail{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;padding-top:10px;margin-top:10px;border-top:0.5px solid var(--border)}
.mv-d-item{display:flex;flex-direction:column;gap:2px}
.mv-d-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.mv-d-val{font-size:13px;font-weight:600;color:var(--text)}
.mv-d-actions{display:flex;gap:6px;padding-top:8px;margin-top:4px;border-top:0.5px solid var(--border);grid-column:1/-1}
.mv-d-btn{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:600;border:0.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer}
.mv-d-btn:active{opacity:.7}
.mv-d-btn.del{color:#C62828;border-color:#C6282833}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;border:none;border-radius:8px;padding:15px 18px;font-weight:700;font-family:'Inter', system-ui, sans-serif;font-size:15px;cursor:pointer;transition:opacity .2s}
.btn-gold:hover{opacity:.85}
.btn-blue{background:linear-gradient(135deg,#1A6B8A,var(--blue));color:#fff;border:none;border-radius:8px;padding:13px 18px;font-weight:700;font-family:'Inter', system-ui, sans-serif;font-size:14px;cursor:pointer}
.btn-green{background:linear-gradient(135deg,#2d7a57,var(--green));color:#fff;border:none;border-radius:8px;padding:13px 18px;font-weight:700;font-family:'Inter', system-ui, sans-serif;font-size:14px;cursor:pointer}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:14px 18px;font-family:'Inter', system-ui, sans-serif;font-size:15px;cursor:pointer;transition:all .2s}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn-row{display:flex;gap:8px;margin-top:6px}
.btn-row>*{flex:1}
.overlay{position:fixed;inset:0;background:#00000066;z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s}
.modal{background:#FFFFFF;border:1px solid var(--border);border-radius:8px 24px 0 0;padding:28px 22px 40px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease}
.modal-title{font-family:'Inter', system-ui, sans-serif;font-size:20px;margin-bottom:22px}
.field{margin-bottom:16px}
.field-label{font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;display:block}
.field input,.field select,.field textarea{background:#F8FAFC;border:1px solid var(--border);border-radius:8px;padding:14px 16px;color:var(--text);font-family:'Inter', system-ui, sans-serif;font-size:15px;width:100%;transition:border-color .2s}
.field input:focus,.field select:focus{outline:none;border-color:#47556966}
.field select option{background:#FFFFFF}
.type-toggle{display:flex;gap:8px}
.type-btn{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Inter', system-ui, sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s}
.type-btn.sel-in{border-color:var(--green);background:#F0FDF4;color:var(--green)}
.type-btn.sel-out{border-color:var(--red);background:#FEF2F2;color:var(--red)}
.month-nav{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.month-nav button{background:#FFFFFF;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 12px;font-size:16px;cursor:pointer}
.month-nav span{flex:1;text-align:center;font-size:14px;color:var(--text)}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:200;padding:11px 22px;border-radius:8px;font-size:13px;font-weight:500;white-space:nowrap;animation:fadeUp .3s ease;pointer-events:none}
.group-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 8px}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-mini{background:#FFFFFF;border:1px solid var(--border);border-radius:8px;padding:16px;box-shadow:none;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.stat-mini-val{font-family:'Inter', system-ui, sans-serif;font-size:22px}
.chart-wrap{position:relative}

/* ── CATEGORY MANAGER ── */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.cat-chip{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:all .2s;position:relative}
.cat-chip:active{transform:scale(.96)}
.cat-chip.selected{border-color:var(--gold);background:#E8F5E9}
.cat-chip-icon{font-size:26px;line-height:1}
.cat-chip-name{font-size:11px;color:var(--text);font-weight:500;text-align:center;line-height:1.2;word-break:break-word}
.cat-chip-del{position:absolute;top:4px;right:4px;background:none;border:none;color:#E0525266;font-size:12px;cursor:pointer;padding:2px;display:none}
.cat-chip:hover .cat-chip-del{display:block}
.cat-type-toggle{display:flex;gap:6px;margin-bottom:16px}
.cat-type-btn{flex:1;padding:9px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Inter', system-ui, sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.cat-type-btn.active-in{border-color:var(--green);background:#F0FDF4;color:var(--green)}
.cat-type-btn.active-out{border-color:var(--red);background:#FEF2F2;color:var(--red)}

/* Emoji picker */
.emoji-section{margin-bottom:10px}
.emoji-section-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.emoji-grid{display:flex;flex-wrap:wrap;gap:4px}
.emoji-btn{width:38px;height:38px;border-radius:8px;border:1px solid transparent;background:#F8FAFC;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.emoji-btn:hover{background:#F1F5F9}
.emoji-btn.picked{border-color:var(--gold);background:#E8F5E9}
.emoji-preview{width:56px;height:56px;border-radius:8px;background:#F8FAFC;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.color-dot.picked{border-color:#fff;transform:scale(1.15)}
.cat-select-wrap{position:relative}
.cat-select-wrap select{padding-left:42px !important}
.cat-select-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none;z-index:1}


.ubic-wrap{position:relative}
.ubic-dropdown{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #C9A84C66;border-radius:8px;max-height:180px;overflow-y:auto;z-index:300;box-shadow:none;font-size:13px;cursor:pointer;border-bottom:0.5px solid var(--border)}
.ubic-opt:last-child{border-bottom:none}
.ubic-opt:hover{background:#E8F5E9}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s infinite}

/* ── MODO NEGOCIO — solo badge del toggle, no pisa el tema ── */
#app.modo-negocio .active-negocio { background:var(--gold); color:#fff; box-shadow:none; }

/* ── MODO TOGGLE ── */
.modo-toggle { display:flex; align-items:center; background:#DFF0DF; border-radius:8px; padding:3px; gap:2px; margin-bottom:10px; }
.modo-btn { flex:1; padding:6px 10px; border:none; border-radius:8px; font-family:'Inter', system-ui, sans-serif; font-size:11px; font-weight:700; cursor:pointer; transition:all .25s; background:transparent; color:var(--muted); }
.modo-btn.active-personal { background:var(--gold); color:#fff; box-shadow:none; }
.modo-btn.active-negocio  { background:var(--gold); color:#fff; box-shadow:none; }

/* ── MIC FAB ── */
.mic-chip{background:#F1F5F9;border:1px solid #E2E8F0;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:500;color:#475569;cursor:pointer;font-family:'Inter', system-ui, sans-serif;transition:all .2s}
.mic-chip:hover{background:#E2E8F0;color:#1E293B}
.mic-chip:active{background:#CBD5E1}
#micFab {
  position: fixed;
  bottom: 24px;
  left: 16px;
  right: auto;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: #0D0D0F;
  border: none;
  font-size: 22px;
  cursor: grab;
  box-shadow:none;

#micFab.listening { background: linear-gradient(135deg, #E05252, #f87171); box-shadow:none; animation: micPulse 1s infinite; }

@keyframes micPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }

/* ── NOTAS ── */

/* Notas fullscreen */

/* ── NOTA TYPE POPUP ── */
.nota-type-popup{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:302;animation:slideUp .22s ease}

/* ── AUDIO RECORDING ── */
.aud-mic-btn{width:112px;height:112px;border-radius:8px;background:linear-gradient(135deg,#E05252,#f87171);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:50px;margin:0 auto;box-shadow:none;transition:transform .15s}

.chat-ia-bubble{max-width:84%;padding:11px 14px;border-radius:8px;font-size:14px;line-height:1.55;word-break:break-word}

/* ── SMART TABLE — nota editor ── */
.nt-wrap{margin:14px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
table.nt{border-collapse:collapse;width:100%;font-size:13px;font-family:'Inter', system-ui, sans-serif;min-width:200px}

.nt-modal{position:fixed;inset:0;z-index:510;display:flex;align-items:center;justify-content:center;background:#00000066;animation:fadeIn .15s}
.nt-modal-box{background:#fff;border-radius:8px;padding:22px 20px 18px;width:calc(100% - 40px);max-width:380px;box-shadow:none;
  width: 5px;
  height: 8px;
  background: #E2E8F0;
  border-radius:8px;
  transition: background .3s;
}

  background: linear-gradient(180deg, #C9A84C, #E8C96A);

/* Mic overlay notas */

.pn-ai-sug-icon{font-size:22px;margin-bottom:6px;text-align:center}

.pn-ai-sug-btn{width:100%;padding:12px;background:linear-gradient(135deg,#FF9800,#F57C00);color:#FFF;border:none;border-radius:8px;font-weight:700;font-size:15px;cursor:pointer;transition:all 0.2s;box-shadow:none;box-shadow:none;top:8px;right:10px;background:none;border:none;font-size:20px;color:#999;cursor:pointer;padding:2px 8px;font-weight:700}

/* ═══════════════════════════════════════════════════════════════════
   🚀 NUEVAS FEATURES PREMIUM - NOTAS 5.0

/* 🔍 BÚSQUEDA INTELIGENTE */
.search-bar{position:sticky;top:0;background:var(--bg);padding:12px 18px;border-bottom:1px solid var(--border);z-index:100}
.search-input-wrap{position:relative}
.search-input{width:100%;padding:10px 14px 10px 40px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--card);color:var(--text);font-family:'Inter', system-ui, sans-serif}

.tag.obra{background:#FFF3E0;color:#E65100}
.tag.cliente{background:#E3F2FD;color:#1565C0}
.tag.urgente{background:#FFEBEE;color:#C62828}
.tag.factura{background:#E8F5E9;color:#2E7D32}
.tag.pendiente{background:#FFF9C4;color:#F57F17}

.tag-suggestions{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-top:4px;max-height:200px;overflow-y:auto;box-shadow:none;z-index:1000}

.share-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}

.share-close:active{color:var(--text);transform:scale(0.9)}

/* ── EDITOR PLANO/BOCETO ── */

#tabla-wrap{flex:1;overflow:auto;padding:10px}
#tabla-sheet{border-collapse:collapse;min-width:100%}
#tabla-sheet th,#tabla-sheet td{border:0.5px solid #CBD5E1;padding:0;min-width:80px}
#tabla-sheet th{background:#F1F5F9;height:26px;font-size:11px;font-weight:700;color:#444;text-align:center;user-select:none;cursor:default;font-family:'Inter', system-ui, sans-serif}
#tabla-sheet th.rh{width:34px;min-width:34px;font-size:10px;color:#94A3B8}
#tabla-sheet td{height:28px;background:var(--card);vertical-align:middle}
#tabla-sheet td.rh-td{background:#F8FAFC;text-align:center;font-size:10px;color:#94A3B8;user-select:none}
#tabla-sheet td.sel-td{outline:2px solid #3B82F6;outline-offset:-1px;background:#EFF6FF;position:relative;z-index:1}
.tbl-cell-inp{width:100%;height:100%;border:none;background:transparent;font-family:'Inter', system-ui, sans-serif;font-size:12px;padding:2px 6px;color:var(--text);outline:none}
.tbl-cell-inp.tw-bold{font-weight:700}
.tbl-cell-inp.tw-italic{font-style:italic}
#tabla-gemini-bar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:#EAF3DE;border-top:1px solid #C0DD97;flex-shrink:0}
#tabla-gemini-bar span{font-size:12px;color:#27500A;flex:1}
#tabla-gemini-bar button{background:#2A7A44;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter', system-ui, sans-serif}

/* ── A4 EXPORT LOADER ── */
#a4-loader{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.7);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#a4-loader .a4-spin{width:44px;height:44px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spinA4 .8s linear infinite}
#a4-loader p{color:#fff;font-size:14px;font-family:'Inter', system-ui, sans-serif}
@keyframes spinA4{to{transform:rotate(360deg)}}

/* 📸 GALERÍA MÚLTIPLE */
.photo-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-top:12px}
.gallery-item{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;cursor:pointer;background:var(--bg)}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform .2s}
.gallery-item:active img{transform:scale(0.95)}
.gallery-delete{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.7);color:#FFF;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;opacity:0;transition:opacity .2s}
.gallery-item:hover .gallery-delete{opacity:1}
.gallery-add{display:flex;align-items:center;justify-content:center;background:var(--border);color:var(--muted);font-size:32px;cursor:pointer;transition:all .2s}
.gallery-add:active{background:var(--gold);color:#FFF}
.photo-zoom{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:1001;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.photo-zoom img{max-width:90%;max-height:90%;object-fit:contain}
.photo-zoom-close{position:absolute;top:20px;right:20px;background:rgba(255,255,255,0.2);color:#FFF;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;border:none}

/* 🔗 VINCULACIÓN MOVIMIENTOS */
.linked-items{margin-top:12px;padding:12px;background:var(--ing-bg);border-radius:8px;border:1px solid var(--border)}
.linked-header{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.linked-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.linked-item:last-child{border-bottom:none}
.linked-desc{flex:1;color:var(--text)}
.linked-amount{font-weight:700;color:var(--ing-color)}
.linked-amount.egreso{color:var(--red)}
.linked-remove{margin-left:8px;opacity:0.6;cursor:pointer;font-size:16px}
.linked-remove:hover{opacity:1;color:var(--red)}
.add-link-btn{width:100%;padding:10px;background:var(--bg);border:1px dashed var(--border);border-radius:8px;cursor:pointer;font-size:13px;color:var(--muted);margin-top:8px;transition:all .2s;font-family:'Inter', system-ui, sans-serif}
.add-link-btn:active{background:var(--border)}

/* 📋 TEMPLATES RÁPIDOS */
.templates-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.template-card{padding:16px;background:var(--card);border:1px solid var(--border);border-radius:8px;text-align:center;cursor:pointer;transition:all .2s}
.template-card:active{transform:scale(0.96);box-shadow:none;margin-bottom:8px}
.template-name{font-size:12px;font-weight:600;color:var(--text);font-family:'Inter', system-ui, sans-serif}
.template-desc{font-size:10px;color:var(--muted);margin-top:4px}

/* ⭐ FAVORITOS */
.nota-star{position:absolute;top:12px;right:48px;font-size:20px;cursor:pointer;opacity:0.3;transition:all .2s;z-index:10}
.nota-star:active{transform:scale(0.9)}
.nota-star.active{opacity:1;color:#FFB300;filter:drop-shadow(0 2px 4px rgba(255,179,0,0.4))}

/* 📊 ESTADÍSTICAS */
.stats-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px}
.stats-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px;font-family:'Inter', system-ui, sans-serif}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.stat-item{text-align:center;padding:12px;background:var(--bg);border-radius:8px}
.stat-value{font-size:24px;font-weight:700;color:var(--gold);font-family:'Inter', system-ui, sans-serif}
.stat-label{font-size:11px;color:var(--muted);margin-top:4px;font-family:'Inter', system-ui, sans-serif}

/* 📑 DUPLICAR BADGE */
.duplicate-badge{position:absolute;top:12px;left:12px;background:var(--blue);color:#FFF;padding:4px 8px;border-radius:8px;font-size:10px;font-weight:700;opacity:0;transition:opacity .2s}
.nc2:hover .duplicate-badge{opacity:1}

/* 🎨 NOTA COLOR PICKER */
.color-picker-wrap{margin-top:12px}
.color-picker-label{font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600}
.color-picker-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.color-option{width:100%;aspect-ratio:1;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all .2s}
.color-option:active{transform:scale(0.9)}
.color-option.selected{border-color:var(--text);box-shadow:none;top:-4px;right:-4px;background:var(--red);color:#FFF;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;box-shadow:none;bottom:20px;right:20px;background:rgba(0,0,0,0.8);color:#FFF;padding:8px 12px;border-radius:8px;font-size:11px;z-index:999;opacity:0;pointer-events:none;transition:opacity .2s}
.keyboard-hint.show{opacity:1}
.kbd{background:rgba(255,255,255,0.2);padding:2px 6px;border-radius:8px;font-family:monospace;margin:0 2px}

// IMPORTANTE: modo negocio usa prefijo 'fnz_neg_' para coincidir con loadFromSheets
function getKeys(modo){
  const neg = modo === 'negocio';
  return {
    tx:                  neg ? 'fnz_neg_tx'       : 'fnz_tx',
    debts:               neg ? 'fnz_neg_debts'    : 'fnz_debts',
    services:            neg ? 'fnz_neg_services' : 'fnz_services',
    catsIn:              neg ? 'fnz_neg_cats_in'  : 'fnz_cats_in',
    catsEx:              neg ? 'fnz_neg_cats_ex'  : 'fnz_cats_ex',
    prestamos:           neg ? 'fnz_neg_prestamos': 'fnz_prestamos',
    prestamosPersonales: neg ? 'fnz_neg_prestpers': 'fnz_prestpers',
    metas:               neg ? 'fnz_neg_metas'    : 'fnz_metas',
    presupuesto:         neg ? 'fnz_neg_presup'   : 'fnz_presup',
    recordatorios:       'fnz_recordatorios',
    sonidos:             'fnz_sonidos',
  };
}

// ── Migración única: mover datos de claves viejas (_neg) a claves nuevas (neg_) ──
(function _migrateOldKeys(){
  const oldToNew = {
    'fnz_tx_neg':       'fnz_neg_tx',
    'fnz_debts_neg':    'fnz_neg_debts',
    'fnz_services_neg': 'fnz_neg_services',
    'fnz_cats_in_neg':  'fnz_neg_cats_in',
    'fnz_cats_ex_neg':  'fnz_neg_cats_ex',
    'fnz_prestamos_neg':'fnz_neg_prestamos',
    'fnz_prestpers_neg':'fnz_neg_prestpers',
    'fnz_metas_neg':    'fnz_neg_metas',
    'fnz_presup_neg':   'fnz_neg_presup',
  };
  let migrated = false;
  Object.entries(oldToNew).forEach(([oldKey, newKey]) => {
    const old = localStorage.getItem(oldKey);
    if(old !== null && localStorage.getItem(newKey) === null){
      localStorage.setItem(newKey, old);
      localStorage.removeItem(oldKey);
      migrated = true;
    }
  });
  if(migrated) console.log('[MisFinanzas] Keys migrados a formato fnz_neg_*');
})();

// ── Cargar estado según modo ──
function loadStateForModo(modo){
  const k = getKeys(modo);
  const isNeg = modo==='negocio';
  state.transactions = load(k.tx,[]);
  state.debts        = load(k.debts,[]);
  state.servicios    = load(k.services, isNeg ? DEFAULT_SERVICES_NEG : DEFAULT_SERVICES);
  state.catsIn       = load(k.catsIn,   isNeg ? DEFAULT_CATS_NEG_IN  : DEFAULT_CATS_IN);
  state.catsEx       = load(k.catsEx,   isNeg ? DEFAULT_CATS_NEG_EX  : DEFAULT_CATS_EX);
  state.prestamos           = load(k.prestamos, []);
  state.prestamosPersonales = load(k.prestamosPersonales, []);
  state.metas               = load(k.metas, []);
  state.recordatorios       = load('fnz_recordatorios', []);
  state.sonidos             = load('fnz_sonidos', {});
  state.agenda              = load('fnz_agenda', []);
  state.notas               = load('fnz_notas', []);
  state.presupuesto         = load(k.presupuesto, []);

  // ── Migración: inyectar categorías negocio que no existan ──
  if(isNeg){
    // ★ Siempre asegurar que los defaults de negocio estén presentes
    const defaults = [...DEFAULT_CATS_NEG_IN, ...DEFAULT_CATS_NEG_EX];
    defaults.forEach(def => {
      const inIn = state.catsIn.some(c=>c.id===def.id);
      const inEx = state.catsEx.some(c=>c.id===def.id);
      if(!inIn && !inEx){
        if(def.type==='ingreso') state.catsIn.push(def);
        else state.catsEx.push(def);
      }
    });
    // ★ También guardar para que estén disponibles la próxima vez
    save(getKeys('negocio').catsIn, state.catsIn);
    save(getKeys('negocio').catsEx, state.catsEx);
  } else {
    const defaults = [...DEFAULT_CATS_IN, ...DEFAULT_CATS_EX];
    defaults.forEach(def => {
      const inIn = state.catsIn.some(c=>c.id===def.id);
      const inEx = state.catsEx.some(c=>c.id===def.id);
      if(!inIn && !inEx){
        if(def.type==='ingreso') state.catsIn.push(def);
        else state.catsEx.push(def);
      }
    });
  }
}

// ── Guardar todo según modo activo ──
function saveAll(){
  const k = getKeys(state.modo);
  save(k.tx,        state.transactions);
  save(k.debts,     state.debts);
  save(k.services,  state.servicios);
  save(k.catsIn,    state.catsIn);
  save(k.catsEx,    state.catsEx);
  save(k.prestamos,           state.prestamos);
  save(k.prestamosPersonales, state.prestamosPersonales);
  save(k.metas,               state.metas);
  save('fnz_recordatorios',   state.recordatorios);
  save('fnz_sonidos',         state.sonidos);
  save('fnz_agenda',          state.agenda);
  save('fnz_notas',           state.notas);
  save(k.presupuesto,         state.presupuesto);
  save('fnz_nombre_usuario',  state.nombreUsuario||'');
  // NO llamar syncToSheets() aquí — cada función llama su propio sync
}

// ── Cambiar de modo ──
function switchModo(nuevo){
  if(state.modo===nuevo) return;
  saveAll(); // guardar estado actual antes de cambiar
  state.modo = nuevo;
  save('fnz_modo', nuevo);
  loadStateForModo(nuevo);
  state.page = 'dashboard';
  applyModoTheme();
  render();
}

// ── Aplicar tema visual según modo ──
function applyModoTheme(){
  const app = document.getElementById('app');
  const btnP = document.getElementById('btn-modo-personal');
  const btnN = document.getElementById('btn-modo-negocio');
  const title = document.getElementById('header-title');
  const isNeg = state.modo === 'negocio';

  // Tabs visibility
  const tabsP  = document.getElementById('tabs-personal-row1');
  const tabsN1 = document.getElementById('tabs-negocio-row1');
  const tabsN2 = document.getElementById('tabs-negocio-row2');
  if(tabsP)  tabsP.style.display  = isNeg ? 'none' : 'grid';
  if(tabsN1) tabsN1.style.display = isNeg ? 'grid' : 'none';
  if(tabsN2) tabsN2.style.display = isNeg ? 'grid' : 'none';

  // Redirect to valid page for current mode if needed
  const pagesPersonal = ['dashboard','movimientos','categorias','metas','presupuesto','notas','ajustes','graficos'];
  const pagesNegocio  = ['dashboard','movimientos','deudas','agenda','servicios','categorias','graficos','notas','ajustes'];
  const validPages    = isNeg ? pagesNegocio : pagesPersonal;
  if(!validPages.includes(state.page)) state.page = 'dashboard';

  // Active tab highlight — mark both personal and negocio tab sets
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const activeTabId = 'tab-' + state.page;
  // Mark all tabs with matching page (handles duplicate IDs in both tab rows)
  [activeTabId, activeTabId+'-n', activeTabId+'-p'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.classList.add('active');
  });

  if(isNeg){
    app.classList.add('modo-negocio');
    if(btnP) btnP.className='modo-btn';
    if(btnN) btnN.className='modo-btn active-negocio';
    if(title) title.textContent='Mi Negocio';
  } else {
    app.classList.remove('modo-negocio');
    if(btnP) btnP.className='modo-btn active-personal';
    if(btnN) btnN.className='modo-btn';
    if(title) title.textContent='Mis Finanzas';
  }
}

function catSelectHtml(id, type, selected, selectedCatId){
  // En modo negocio usar las categorías del negocio (state + defaults)
  const isNeg = state.modo === 'negocio';
  let cats;
  if(type==='ingreso'){
    cats = isNeg
      ? [...state.catsIn, ...DEFAULT_CATS_NEG_IN.filter(d => !state.catsIn.some(c=>c.id===d.id))]
      : state.catsIn;
  } else {
    cats = isNeg
      ? [...state.catsEx, ...DEFAULT_CATS_NEG_EX.filter(d => !state.catsEx.some(c=>c.id===d.id))]
      : state.catsEx;
  }
  // Eliminar duplicados por id
  const seen = new Set();
  cats = cats.filter(c => { if(seen.has(c.id)) return false; seen.add(c.id); return true; });

  const norm = s => (s||'').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const selNorm = norm(selected);
  const opts = cats.map(c=>{
    const isSelected =
      (selectedCatId && c.id === selectedCatId) ||
      c.id === selected ||
      c.name === selected ||
      norm(c.name) === selNorm;
    return `<option value="${c.id}" ${isSelected?'selected':''}>${c.icon||''} ${c.name}</option>`;
  }).join('');
  return `<div class="cat-select-wrap"><select id="${id}" style="background:#F8FAFC;border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:'Inter', system-ui, sans-serif;font-size:14px;width:100%">${opts}</select></div>`;
}

      <div style="text-align:center"><div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:3px">Egresos</div><div style="font-size:15px;font-weight:600;color:var(--red)">-${fmt(egr)}</div></div>
      <div style="text-align:center"><div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:3px">Balance</div><div style="font-size:15px;font-weight:600;color:${bal>=0?'var(--green)':'var(--red)'}">${bal>=0?'+':''}${fmt(bal)}</div></div>
    </div>
    ${alertas.length?`<div style="background:#FEF2F2;border-radius:8px;padding:8px;margin-top:4px">
      ${alertas.map(p=>{const g=getGastadoCategoria(p.categoria);const over=g>p.limite;return `<div style="font-size:12px;color:${over?'var(--red)':'#E67E22'}">${over?'⚠':'⚡'} ${p.icon} ${p.categoria}: ${fmt(g)} / ${fmt(p.limite)}</div>`;}).join('')}
    </div>`:''}
  </div>`;
}

function renderDashboard(){
  const bal=balance(),balColor=bal>=0?'var(--green)':'var(--red)';
  const inc=totalIncome(),exp=totalExpense();
  const filtered=filteredTx();
  const urgent=state.servicios.filter(s=>!s.pagado&&daysUntil(s.venceDia)<=5);

  // Alerta cuotas de deuda próximas
  const hoy=new Date();
  const deudaUrgente=(state.debts||[]).filter(d=>{
    if(d.cuotasPagadas>=d.cuotasTotales) return false;
    // Si tiene fecha de vencimiento, avisar con 5 días de anticipación
    if(d.fechaVencimiento){
      const fv=new Date(d.fechaVencimiento);
      const diff=Math.ceil((fv-hoy)/(1000*60*60*24));
      return diff>=0&&diff<=5;
    }
    return false;
  });

  const urgentHtml=urgent.length?`<div class="card pulse" style="border-color:#E0525244;background:#FEF2F2;margin-bottom:12px">
    <div style="font-size:12px;color:var(--red);font-weight:600;margin-bottom:8px">⚠ Servicios próximos a vencer</div>
    ${urgent.map(s=>`<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>${s.icon} ${s.name}</span><span style="color:var(--red)">${daysUntil(s.venceDia)} día(s) · ${fmt(s.monto)}</span></div>`).join('')}
  </div>`:'';

  const deudaUrgHtml=deudaUrgente.length?`<div class="card pulse" style="border-color:#9B59B644;background:#F3F0FF;margin-bottom:12px">
    <div style="font-size:12px;color:#6C3483;font-weight:600;margin-bottom:8px">⚠ Cuota de deuda próxima</div>
    ${deudaUrgente.map(d=>`<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>🏦 ${d.name}</span><span style="color:#6C3483">${fmt(d.cuotaMonto)}/mes</span></div>`).join('')}
  </div>`:'';

  // Próximo trabajo — el más cercano con fecha futura
  const manana=new Date(hoy); manana.setDate(hoy.getDate()+1);
  const hoyStr=hoy.toISOString().split('T')[0];
  const manStr=manana.toISOString().split('T')[0];
  const meses2=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const fmtAgFecha=(f)=>{
    if(!f)return '';
    if(f===hoyStr)return 'Hoy';
    if(f===manStr)return 'Mañana';
    try{const [y,m,d]=f.split('-');return `${parseInt(d)} ${meses2[parseInt(m)-1]}`;}catch(e){return f;}
  };
  const proxFechas=(state.agenda||[])
    .filter(a=>a.estado!=='completado'&&a.fecha>=hoyStr)
    .sort((a,b)=>a.fecha.localeCompare(b.fecha)||(a.hora||'').localeCompare(b.hora||''));
  const proxTrab=proxFechas[0];
  const otrosTrab=proxFechas.slice(1,4);
  const trabHtml=proxTrab?`
    <div class="card" style="margin-bottom:12px;border-color:var(--gold)44;overflow:hidden">
      <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:10px">📅 Próximo trabajo</div>
      <div style="display:flex;gap:12px;align-items:flex-start">
        <div style="background:var(--gold);border-radius:8px;padding:8px 10px;text-align:center;flex-shrink:0;min-width:48px">
          <div style="font-size:20px;font-weight:700;color:#fff;line-height:1">${proxTrab.fecha?parseInt(proxTrab.fecha.split('-')[2]):'?'}</div>
          <div style="font-size:9px;color:rgba(255,255,255,.7);text-transform:uppercase">${proxTrab.fecha?meses2[parseInt(proxTrab.fecha.split('-')[1])-1]:''}</div>
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px">${proxTrab.servicio||'Sin servicio'}</div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:6px">👤 ${proxTrab.cliente||'Sin cliente'}${proxTrab.ubicacion?' · '+proxTrab.ubicacion:''}</div>
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
            ${proxTrab.hora?`<span style="font-size:11px;background:var(--ing-bg,#EAF3DE);color:var(--gold);padding:2px 8px;border-radius:8px;font-weight:600">🕐 ${horaTo12(proxTrab.hora)}</span>`:''}
            <span style="font-size:11px;background:${proxTrab.fecha===hoyStr?'#FFF3E0':'var(--bg)'};color:${proxTrab.fecha===hoyStr?'#E65100':'var(--muted)'};padding:2px 8px;border-radius:8px;font-weight:600">${fmtAgFecha(proxTrab.fecha)}</span>
            ${proxTrab.precio?`<span style="font-size:11px;color:var(--gold);font-weight:700">S/ ${proxTrab.precio}</span>`:''}
          </div>
        </div>
      </div>
      ${proxTrab.telefono?`<button onclick="abrirWhatsAppAgenda('${proxTrab.id}')" style="width:100%;margin-top:10px;background:#25D366;color:#fff;border:none;border-radius:8px;padding:9px;font-weight:700;font-family:'Inter', system-ui, sans-serif;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px">💬 Confirmar por WhatsApp</button>`:''}
      ${otrosTrab.length?`<div style="margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border)">
        ${otrosTrab.map(a=>`<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:3px 0;color:var(--muted)">
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.tipo==='visita'?'👁':'🔧'} ${a.cliente||''} — ${a.servicio||''}</span>
          <span style="flex-shrink:0;margin-left:8px">${fmtAgFecha(a.fecha)}${a.hora?' '+horaTo12(a.hora):''}</span>
        </div>`).join('')}
        <div style="text-align:center;font-size:11px;color:var(--muted);margin-top:6px;cursor:pointer" onclick="switchPage('agenda')">Ver agenda completa →</div>
      </div>`:''}
    </div>`:'';

  const recentHtml=filtered.length?`<div class="card" style="margin-bottom:12px">
    <div class="section-title">Últimos movimientos</div>
    ${filtered.slice(0,5).map(t=>{
      const cat=getCatByName(t.category,t.type);
      return `<div class="tx-row">
        <div class="tx-icon" style="background:${cat?cat.color+'18':'#66666618'}">${cat?iconHtml(cat.icon):(t.type==='ingreso'?'↑':'↓')}</div>
        <div class="tx-info"><div class="tx-name">${t.description||t.category}</div><div class="tx-sub">${t.category} · ${t.date}</div></div>
        <div class="tx-amount" style="color:${t.type==='ingreso'?'var(--green)':'var(--red)'}">${t.type==='ingreso'?'+':'-'}${fmt(t.amount)}</div>
      </div>`;
    }).join('')}
    ${filtered.length>5?`<div style="text-align:center;font-size:12px;color:var(--muted);margin-top:10px;cursor:pointer" onclick="switchPage('movimientos')">Ver todos (${filtered.length}) →</div>`:''}
  </div>`:'';

  // Pre-compute mode-dependent button to avoid nested template literals
  const _isNeg = state.modo==='negocio';
  const _btn2nd = _isNeg
    ? '<button class="btn-ghost" onclick="openAddDebt()" style="border-color:#2E86AB44;color:var(--blue)">＋ Deuda</button>'
    : '<button class="btn-ghost" onclick="openPresupuesto()" style="border-color:#C9A84C44;color:var(--gold)">📋 Presup.</button>';

  return `
    <div class="month-nav"><button onclick="prevMonth()">‹</button><span>${monthName()}</span><button onclick="nextMonth()">›</button></div>
    <div class="summary-card" style="background:var(--card);border:1.5px solid var(--border);text-align:center;margin-bottom:12px;box-shadow:none;font-size:11px;text-transform:uppercase;letter-spacing:.07em">Balance del mes</div>
      <div class="summary-amount" style="color:${balColor};font-size:42px;margin:4px 0">${fmtSign(bal)}</div>
      <div style="display:flex;gap:0;justify-content:center;margin-top:14px;background:var(--bg);border-radius:8px;overflow:hidden">
        <div style="flex:1;padding:10px 8px;border-right:1px solid var(--border)">
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Ingresos</div>
          <div style="color:var(--green);font-weight:700;font-size:15px">+${fmt(inc)}</div>
        </div>
        <div style="flex:1;padding:10px 8px">
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Egresos</div>
          <div style="color:var(--red);font-weight:700;font-size:15px">-${fmt(exp)}</div>
        </div>
      </div>
    </div>
    <!-- Acceso rápido al micrófono -->
    <button onclick="document.getElementById('micFab').click()" style="width:100%;margin-bottom:12px;background:var(--card);color:var(--gold);border:2px solid var(--gold);border-radius:8px;padding:14px;font-weight:700;font-family:'Inter', system-ui, sans-serif;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px">
      🎙 Registrar por voz
    </button>
    <div class="stat-row">
      <div class="stat-mini" style="background:#EFF6FF;border-color:#2E86AB33">
        <div class="stat-mini-label" style="color:#2E86AB88">Deuda total</div>
        <div class="stat-mini-val" style="color:var(--blue)">${fmt(totalDebt())}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:3px">${pendingDebts().length} deuda(s)</div>
      </div>
      <div class="stat-mini" style="background:#FFFDE7;border-color:#F9A82533">
        <div class="stat-mini-label" style="color:#F9A82588">Servicios</div>
        <div class="stat-mini-val" style="color:var(--gold)">${fmt(totalPendingServices())}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:3px">${pendingServices().length} pendiente(s)</div>
      </div>
    </div>
    ${renderResumenSemanal()}
    ${trabHtml}
    ${urgentHtml}
    ${deudaUrgHtml}
    ${renderNegocioCard()}
    <div class="btn-row" style="margin-bottom:8px">
      <button class="btn-gold" onclick="openAddTx()">＋ Movimiento</button>
      ${_btn2nd}
    </div>
    <button onclick="openTransferModal()" style="width:100%;margin-bottom:14px;background:#475569;color:#fff;border:none;border-radius:8px;padding:11px;font-weight:700;font-family:'Inter', system-ui, sans-serif;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
      ⇄ Transferir entre cuentas
    </button>
    ${recentHtml}`;
}

function renderMovimientos(){
  if(!window._movBusqueda) window._movBusqueda='';
  if(!window._movFiltro) window._movFiltro='todos';
  let filtered=filteredTx();
  // Filtro por tipo
  if(window._movFiltro==='ingresos') filtered=filtered.filter(t=>t.type==='ingreso');
  if(window._movFiltro==='egresos')  filtered=filtered.filter(t=>t.type==='egreso');
  // Filtro por búsqueda
  if(window._movBusqueda.trim()){
    const q=window._movBusqueda.toLowerCase();
    filtered=filtered.filter(t=>
      (t.description||'').toLowerCase().includes(q)||
      (t.category||'').toLowerCase().includes(q)||
      (t.cliente||'').toLowerCase().includes(q)||
      String(t.amount).includes(q)
    );
  }
  const inc=totalIncome(),exp=totalExpense();

  // ── Icono y color según categoría ──
  const getIconAndColor=(t)=>{
    const allCats=[...state.catsIn,...state.catsEx,...DEFAULT_CATS_NEG_IN,...DEFAULT_CATS_NEG_EX,...DEFAULT_CATS_IN,...DEFAULT_CATS_EX];
    const cat=allCats.find(c=>c.name===t.category||(c.id&&c.id===t.catId));
    if(cat) return {icon:iconHtml(cat.icon), color:cat.color};
    const c=(t.category||'').toLowerCase();
    if(c.includes('movilidad')||c.includes('transport')||c.includes('viatico')) return {icon:'🚗',color:'#3498DB'};
    if(c.includes('material')||c.includes('insumo')) return {icon:'🧰',color:'#E65100'};
    if(c.includes('herramienta')) return {icon:'🔨',color:'#4E342E'};
    if(c.includes('gnv')||c.includes('gasolina')) return {icon:'⛽',color:'#1A237E'};
    if(c.includes('punto adi')||c.includes('punto adicional')) return {icon:'🔵',color:'#1565C0'};
    if(c.includes('terma')) return {icon:'♨️',color:'#0288D1'};
    if(c.includes('conexion')||c.includes('conexión')) return {icon:'🔌',color:'#039BE5'};
    if(c.includes('modificacion')||c.includes('modificación')||c.includes('red')) return {icon:'🔧',color:'#0277BD'};
    if(c.includes('reparacion')||c.includes('reparación')||c.includes('tuberia')) return {icon:'🚿',color:'#00838F'};
    if(c.includes('gasfiter')) return {icon:'🪠',color:'#00695C'};
    if(c.includes('cocina')) return {icon:'🍳',color:'#FF6B35'};
    if(c.includes('horno')) return {icon:'🔥',color:'#E65100'};
    if(c.includes('calefon')||c.includes('calefón')) return {icon:'🌡️',color:'#2E86AB'};
    if(c.includes('parrilla')) return {icon:'🥩',color:'#C0392B'};
    if(c.includes('secadora')) return {icon:'💨',color:'#607D8B'};
    if(c.includes('instalac')) return {icon:'🏗️',color:'#01579B'};
    if(c.includes('conversion')||c.includes('conversión')) return {icon:'🔄',color:'#0288D1'};
    if(c.includes('document')) return {icon:'📄',color:'#37474F'};
    return {icon:t.type==='ingreso'?'⬆':'⬇', color:t.type==='ingreso'?'#475569':'#C62828'};
  };

  // ── Fecha legible ──
  const fmtFecha=(d)=>{
    if(!d) return '—';
    try{
      const [y,m,day]=d.split('-');
      const meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      return `${parseInt(day)} ${meses[parseInt(m)-1]} ${y}`;
    }catch(e){return d;}
  };

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-family:'Inter', system-ui, sans-serif;font-size:18px;color:var(--gold)">Movimientos</div>
      <button class="btn-gold" style="padding:8px 14px;font-size:13px" onclick="openAddTx()">＋ Agregar</button>
    </div>
    <div class="month-nav"><button onclick="prevMonth()">‹</button><span>${monthName()}</span><button onclick="nextMonth()">›</button></div>
    <!-- Filtros rápidos -->
    <div style="display:flex;gap:6px;margin-bottom:10px">
      ${['todos','ingresos','egresos'].map(f=>`
        <button onclick="window._movFiltro='${f}';render()" style="flex:1;padding:7px 4px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Inter', system-ui, sans-serif;
          border:1px solid ${window._movFiltro===f?'var(--gold)':'var(--border)'};
          background:${window._movFiltro===f?'var(--gold)':'transparent'};
          color:${window._movFiltro===f?'#fff':'var(--muted)'}">
          ${f==='todos'?'Todos':f==='ingresos'?'↑ Ingresos':'↓ Egresos'}
        </button>`).join('')}
    </div>
    <div style="position:relative;margin-bottom:12px">
      <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted)">🔍</span>
      <input type="text" placeholder="Buscar por descripción, cliente o monto..."
        value="${window._movBusqueda}"
        oninput="window._movBusqueda=this.value;render()"
        style="width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px 10px 36px;color:var(--text);font-family:'Inter', system-ui, sans-serif;font-size:13px">
      ${window._movBusqueda?`<button onclick="window._movBusqueda='';render()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px">✕</button>`:''}
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <div onclick="window._movFiltro='ingresos';render()" style="flex:1;background:${window._movFiltro==='ingresos'?'var(--ing-bg,#EAF3DE)':'#EAF3DE'};border:1px solid ${window._movFiltro==='ingresos'?'var(--gold)':'#4CAF8533'};border-radius:8px;padding:12px;cursor:pointer;transition:all .2s">
        <div style="font-size:10px;color:#27500A88;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Ingresos</div>
        <div style="color:#475569;font-weight:700;font-size:15px">+${fmt(inc)}</div>
      </div>
      <div onclick="window._movFiltro='egresos';render()" style="flex:1;background:${window._movFiltro==='egresos'?'#FFCDD2':'#FFEBEE'};border:1px solid ${window._movFiltro==='egresos'?'#C62828':'#E0525233'};border-radius:8px;padding:12px;cursor:pointer;transition:all .2s">
        <div style="font-size:10px;color:#C6282888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Egresos</div>
        <div style="color:#C62828;font-weight:700;font-size:15px">-${fmt(exp)}</div>
      </div>
    </div>
    ${filtered.length===0
      ?`<div style="text-align:center;color:var(--dim);padding:40px 0;font-size:14px">${window._movBusqueda?'Sin resultados para "'+window._movBusqueda+'"':'Sin movimientos este mes'}</div>`
      :(() => {
        // Agrupar por fecha
        const grupos = {};
        filtered.forEach(t => {
          const k = t.date || 'Sin fecha';
          if(!grupos[k]) grupos[k] = [];
          grupos[k].push(t);
        });
        const fechasOrdenadas = Object.keys(grupos).sort((a,b) => b.localeCompare(a));

        return fechasOrdenadas.map(fecha => {
          const txs = grupos[fecha];
          const fechaLabel = fmtFecha(fecha);
          const cards = txs.map(t => {
            const esIng = t.type==='ingreso';
            const {icon, color} = getIconAndColor(t);
            const clienteTxt = t.cliente ? `👤 ${t.cliente}` : '';
            const ubicTxt = t.ubicacion ? ` · ${t.ubicacion}` : '';
            const subTxt = clienteTxt ? (clienteTxt+ubicTxt) : (t.category||'');
            const cardId = 'mvcard_'+t.id;
            return `
            <div class="mv-card" id="${cardId}" onclick="toggleMvCard('${cardId}')">
              <div class="mv-top">
                <div class="mv-icon-box ${esIng?'mv-icon-ing':'mv-icon-egr'}" style="background:${color}18">${icon}</div>
                <div class="mv-main">
                  <div class="mv-row1">
                    <span class="mv-svc">${t.category||t.description||'Sin categoría'}</span>
                    <span class="${esIng?'mv-badge-ing':'mv-badge-egr'}">${esIng?'↑ Ingreso':'↓ Egreso'}</span>
                  </div>
                  <div class="mv-cli">${subTxt}</div>
                </div>
                <div class="mv-right">
                  <span class="mv-amt ${esIng?'mv-amt-ing':'mv-amt-egr'}">${esIng?'+':'-'}${fmt(t.amount)}</span>
                  <span class="mv-chevron">▼</span>
                </div>
              </div>
              <div class="mv-expand">
                <div class="mv-detail">
                  <div class="mv-d-item"><span class="mv-d-lbl">Fecha</span><span class="mv-d-val">${fechaLabel}</span></div>
                  ${t.ubicacion?`<div class="mv-d-item"><span class="mv-d-lbl">Ubicación</span><span class="mv-d-val">${t.ubicacion}</span></div>`:'<div></div>'}
                  ${t.description&&t.description!==t.category?`<div class="mv-d-item" style="grid-column:1/-1"><span class="mv-d-lbl">Descripción</span><span class="mv-d-val">${t.description}</span></div>`:''}
                  ${t.cliente?`<div class="mv-d-item"><span class="mv-d-lbl">Cliente</span><span class="mv-d-val">${t.cliente}</span></div>`:''}
                  <div class="mv-d-actions">
                    <button class="mv-d-btn" onclick="event.stopPropagation();openEditTx('${t.id}')">✎ Editar</button>
                    <button class="mv-d-btn del" onclick="event.stopPropagation();deleteTx('${t.id}')">✕ Eliminar</button>
                  </div>
                </div>
              </div>
            </div>`;
          }).join('');

          return `
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;padding:8px 2px 6px;margin-top:4px">${fechaLabel}</div>
            ${cards}`;
        }).join('');
      })()}`;
}

function toggleMvCard(id){
  const el=document.getElementById(id);
  if(el) el.classList.toggle('open');
}

function toggleAgendaCard(id){
  const el=document.getElementById(id);
  if(!el) return;
  // Cerrar todas las demás antes de abrir esta
  document.querySelectorAll('.ag-card.open').forEach(c=>{ if(c.id!==id) c.classList.remove('open'); });
  el.classList.toggle('open');
}

// ── CATEGORIES PAGE ──
let catPageType = 'ingreso';
function renderCategorias(){

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-family:'Inter', system-ui, sans-serif;font-size:18px;color:var(--gold)">Categorías</div>
      <button class="btn-gold" style="padding:8px 14px;font-size:13px" onclick="openAddCat()">＋ Nueva</button>
    </div>
    <div class="cat-type-toggle">
      <button class="cat-type-btn ${catPageType==='ingreso'?'active-in':''}" onclick="setCatType('ingreso')">↑ Ingresos</button>
      <button class="cat-type-btn ${catPageType==='egreso'?'active-out':''}" onclick="setCatType('egreso')">↓ Egresos</button>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px">${list.length} categoría${list.length!==1?'s':''} · Mantén presionado para eliminar</div>
    <div class="cat-grid">
      ${list.map(c=>`
        <div class="cat-chip" onclick="openEditCat('${c.id}')">
          <button class="cat-chip-del" onclick="event.stopPropagation();deleteCat('${c.id}')">✕</button>
          <div style="width:48px;height:48px;border-radius:8px;background:${c.color}15;border:1px solid ${c.color}44;display:flex;align-items:center;justify-content:center;font-size:24px">${iconHtml(c.icon)}</div>
          <div class="cat-chip-name" style="color:var(--text)">${c.name}</div>
          <div style="width:8px;height:8px;border-radius:50%;background:${c.color}"></div>
        </div>`).join('')}
      <div class="cat-chip" style="border-style:dashed;opacity:.5" onclick="openAddCat()">
        <div style="width:48px;height:48px;border-radius:8px;background:#F1F5F9;display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--muted)">＋</div>
        <div class="cat-chip-name" style="color:var(--muted)">Nueva</div>
      </div>
    </div>
    <div class="card" style="background:#FFFBEB;border-color:#C9A84C33;margin-top:4px">
      <div style="font-size:12px;color:var(--muted);line-height:1.6">
        💡 <strong style="color:var(--text)">Tip:</strong> Crea categorías personalizadas para clasificar mejor tus ${catPageType==='ingreso'?'ingresos':'gastos'}. Elige un emoji y color que te ayuden a identificarlas rápido.
      </div>
    </div>`;
}

function setCatType(type){
  catPageType=type;
  render();
}

function openAddCat(){ openCatModal(null); }
function openEditCat(id){
  const all=[...state.catsIn,...state.catsEx];
  openCatModal(all.find(c=>c.id===id));
}

function openCatModal(cat){
  const isEdit=!!cat;
  const type=cat?cat.type:catPageType;
  const ic=cat?cat.icon:'🏷';
  const col=cat?cat.color:CAT_COLORS[0];

  document.getElementById('modal-content').innerHTML=`
    <div class="modal-title" style="color:var(--gold)">${isEdit?'Editar':'Nueva'} Categoría</div>
    
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
      <div id="cat-preview-box" class="emoji-preview">${iconHtml(ic)}</div>
      <div style="flex:1">
        <div class="field" style="margin-bottom:8px">
          <label class="field-label">Nombre</label>
          <input id="cat-name" type="text" placeholder="Ej: Mascotas, Gym..." value="${cat?cat.name:''}">
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap" id="color-dots">
          ${CAT_COLORS.map(c=>`<div class="color-dot ${c===col?'picked':''}" style="background:${c}" data-color="${c}" onclick="pickColor(this,'${c}')"></div>`).join('')}
        </div>
      </div>
    </div>

    <div class="field">
      <label class="field-label">Tipo</label>
      <div class="type-toggle">
        <button class="type-btn ${type==='ingreso'?'sel-in':''}" id="ctype-in" onclick="setCatModalType('ingreso')">↑ Ingreso</button>
        <button class="type-btn ${type==='egreso'?'sel-out':''}" id="ctype-out" onclick="setCatModalType('egreso')">↓ Egreso</button>
      </div>
    </div>

    <div class="field">
      <label class="field-label">Ícono (elige un emoji)</label>
      <div id="emoji-picker">
        <div class="emoji-section">
          <div class="emoji-section-title">🔧 Artefactos de Gas</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px">
            ${[
              {key:'IMG:cocina', label:'Cocina'},
              {key:'IMG:horno', label:'Horno'},
              {key:'IMG:terma', label:'Terma'},
              {key:'IMG:secadora', label:'Secadora'},
            ].map(a=>`<button class="appliance-btn ${ic===a.key?'picked':''}" onclick="pickApplianceIcon('${a.key}')" style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 10px;border-radius:8px;border:1px solid ${ic===a.key?'var(--gold)':'var(--border)'};background:${ic===a.key?'#FFFBEB':'#F8FAFC'};cursor:pointer;min-width:58px;transition:all .15s">
              <span style="display:flex;align-items:center;justify-content:center;width:28px;height:28px">${APPLIANCE_SVG[a.key]}</span>
              <span style="font-size:10px;color:var(--text);font-weight:500">${a.label}</span>
            </button>`).join('')}
          </div>
        </div>
        ${EMOJI_GROUPS.map(g=>`
          <div class="emoji-section">
            <div class="emoji-section-title">${g.label}</div>
            <div class="emoji-grid">${g.emojis.map(e=>`<button class="emoji-btn ${e===ic?'picked':''}" onclick="pickEmoji(this,'${e}')">${e}</button>`).join('')}</div>
          </div>`).join('')}
      </div>
    </div>

    <div class="btn-row" style="margin-top:8px;position:sticky;bottom:0;background:#FFFFFF;padding-top:10px">
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn-gold" onclick="saveCat('${isEdit?cat.id:''}','${type}')">Guardar</button>
    </div>`;

  window._catIcon=ic;
  window._catColor=col;
  window._catType=type;
  showModal();
}

function pickEmoji(el,emoji){
  document.querySelectorAll('.emoji-btn,.appliance-btn').forEach(b=>b.classList.remove('picked'));
  el.classList.add('picked');
  window._catIcon=emoji;
  document.getElementById('cat-preview-box').innerHTML=iconHtml(emoji);
}
function pickApplianceIcon(key){
  document.querySelectorAll('.emoji-btn,.appliance-btn').forEach(b=>{
    b.classList.remove('picked');
    b.style.borderColor='var(--border)';
    b.style.background='#F8FAFC';
  });
  const btn=document.querySelector(`.appliance-btn[onclick="pickApplianceIcon('${key}')"]`);
  if(btn){btn.classList.add('picked');btn.style.borderColor='var(--gold)';btn.style.background='#FFFBEB';}
  window._catIcon=key;
  document.getElementById('cat-preview-box').innerHTML=iconHtml(key);
}
function pickColor(el,color){
  document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('picked'));
  el.classList.add('picked');
  window._catColor=color;
  document.getElementById('cat-preview-box').style.borderColor=color;
}
function setCatModalType(type){
  window._catType=type;
  document.getElementById('ctype-in').className='type-btn'+(type==='ingreso'?' sel-in':'');
  document.getElementById('ctype-out').className='type-btn'+(type==='egreso'?' sel-out':'');
  // update save button reference
  const saveBtn=document.querySelector('.btn-row .btn-gold');
  if(saveBtn){
    const match=saveBtn.getAttribute('onclick').match(/saveCat\('([^']*)',/);
    if(match)saveBtn.setAttribute('onclick',`saveCat('${match[1]}','${type}')`);
  }
}

function saveCat(editId,type){
  const name=document.getElementById('cat-name').value.trim();
  if(!name)return toast('Escribe un nombre para la categoría','error');
  const finalType=window._catType||type;
  const item={id:editId||Date.now()+'',name,icon:window._catIcon||'🏷',color:window._catColor||CAT_COLORS[0],type:finalType};
  if(finalType==='ingreso'){
    if(editId)state.catsIn=state.catsIn.map(c=>c.id===editId?item:c);
    else state.catsIn.push(item);
  } else {
    if(editId)state.catsEx=state.catsEx.map(c=>c.id===editId?item:c);
    else state.catsEx.push(item);
  }
  catPageType=finalType;
  saveAll();closeModal();render();toast(editId?'Categoría actualizada':'Categoría creada ✓');
}

function deleteCat(id){
  if(!confirm('¿Eliminar esta categoría?'))return;
  state.catsIn=state.catsIn.filter(c=>c.id!==id);
  state.catsEx=state.catsEx.filter(c=>c.id!==id);
  saveAll();render();toast('Categoría eliminada');
}

// ── DEUDAS ──
function renderDeudas(){
  const debts=state.debts;
  const prestPers=state.prestamosPersonales||[];
  const total=totalDebt();
  const totalPaid=debts.reduce((s,d)=>s+d.cuotasPagadas*d.cuotaMonto,0);
  const grandTotal=total+totalPaid;
  const pctPaid=grandTotal>0?Math.round((totalPaid/grandTotal)*100):0;

  // Calcular cuota préstamo personal (sistema francés)
  function calcCuota(capital, tasaMensual, plazo){
    if(!tasaMensual) return capital/plazo;
    const r=tasaMensual/100;
    return parseFloat((capital*r*Math.pow(1+r,plazo)/(Math.pow(1+r,plazo)-1)).toFixed(2));
  }
  function calcMesActual(p){
    const r=p.tasaMensual/100;
    const interes=parseFloat((p.capitalPendiente*r).toFixed(2));
    const sistema=p.sistema||'solo_interes';
    const pagosHechos=(p.pagos||[]).length;
    const esUltimoMes=(pagosHechos===p.plazo-1);
    let capitalMes, cuota;
    if(sistema==='solo_interes'){
      // Solo interés cada mes, capital al final
      capitalMes = esUltimoMes ? p.capitalPendiente : 0;
      cuota = parseFloat((interes + capitalMes).toFixed(2));
    } else if(sistema==='aleman'){
      // Capital fijo
      capitalMes = parseFloat((p.capital/p.plazo).toFixed(2));
      if(esUltimoMes) capitalMes = p.capitalPendiente;
      cuota = parseFloat((interes + capitalMes).toFixed(2));
    } else {
      // Francés — cuota fija
      cuota = calcCuota(p.capital, p.tasaMensual, p.plazo);
      capitalMes = parseFloat((cuota - interes).toFixed(2));
    }
    return {interes, capitalMes, cuota};
  }

  const debtCards = debts.length===0
    ? `<div class="card" style="text-align:center;color:var(--dim);padding:20px 0;font-size:13px">Sin préstamos registrados</div>`
    : debts.map(d=>{
      const restantes=d.cuotasTotales-d.cuotasPagadas;
      const pendiente=restantes*d.cuotaMonto;
      const pct=Math.round((d.cuotasPagadas/d.cuotasTotales)*100);
      const msg=motivationMsg(restantes,d.name);
      const done=restantes===0;
      const dw=d.cuotasTotales<=12?16:d.cuotasTotales<=24?12:8;
      return `<div class="debt-card" style="opacity:${done?.6:1}">
        <div class="debt-accent" style="background:${d.color}"></div>
        <div class="debt-body">
          ${circleProgress(pct,62,5,d.color,`<span style="font-size:10px;font-weight:700">${pct}%</span>`)}
          <div class="debt-info">
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
              <div><div class="debt-name">${d.name}</div><div class="debt-cat">${d.categoria}</div></div>
              <div class="debt-pending"><div class="debt-pending-amt" style="color:${d.color}">${done?'✓ Pagada':fmt(pendiente)}</div>${!done?`<div class="debt-pending-lbl">pendiente</div>`:''}</div>
            </div>
            <div class="cuotas-track">${Array.from({length:d.cuotasTotales},(_,i)=>`<div class="cuota-dot" style="width:${dw}px;background:${i<d.cuotasPagadas?d.color:'#E2E8F0'}"></div>`).join('')}</div>
            <div class="cuotas-meta"><span><span style="color:var(--green);font-weight:600">${d.cuotasPagadas}</span> pagadas · <span style="color:var(--red);font-weight:600">${restantes}</span> restantes</span><span>${fmt(d.cuotaMonto)}/mes</span></div>
          </div>
        </div>
        ${msg?`<div class="motivation">${msg}</div>`:''}
        <div style="display:flex;gap:6px;margin-top:12px">
          ${!done?`<button onclick="pagarCuota('${d.id}')" style="flex:1;background:#F0FDF4;border:1px solid #4CAF8544;color:var(--green);border-radius:8px;padding:8px;font-family:'Inter', system-ui, sans-serif;font-size:12px;font-weight:600;cursor:pointer">✓ Pagar cuota</button>`:''}
          <button onclick="openEditDebt('${d.id}')" style="width:36px;height:36px;background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;cursor:pointer;font-size:13px">✎</button>
          <button onclick="deleteDebt('${d.id}')" style="width:36px;height:36px;background:none;border:none;color:#E0525266;cursor:pointer;font-size:14px">✕</button>
        </div>
      </div>`;
    }).join('');

  const ppCards = prestPers.length===0
    ? `<div class="card" style="text-align:center;color:var(--dim);padding:20px 0;font-size:13px">Sin préstamos personales</div>`
    : prestPers.map(p=>{
      const {interes,capitalMes,cuota}=calcMesActual(p);
      const totalIntPagado=parseFloat((p.pagos||[]).reduce((s,pg)=>s+pg.montoInteres,0).toFixed(2));
      const pagosH=(p.pagos||[]).length;
      const pct=Math.round(((p.capital-p.capitalPendiente)/p.capital)*100);
      const done=p.capitalPendiente<=0;
      const restantes=p.plazo-pagosH;
      return `<div class="debt-card" style="border-color:${done?'#4CAF8533':'var(--border)'}">
        <div class="debt-accent" style="background:${done?'#4CAF85':'#9B59B6'}"></div>
        <!-- Fila 1: círculo + nombre + monto -->
        <div class="debt-body">
          ${circleProgress(pct,62,5,done?'#4CAF85':'#9B59B6',`<span style="font-size:10px;font-weight:700">${pct}%</span>`)}
          <div class="debt-info">
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
              <div>
                <div class="debt-name">${p.nombre}</div>
                <div class="debt-cat">${p.tipo==='debo'?'Yo debo':'Me deben'} · ${p.tasaMensual}% mensual</div>
                <div style="font-size:11px;color:#9B59B6;margin-top:2px;font-weight:500">${{solo_interes:'Solo interés mensual',frances:'Cuota fija (francés)',aleman:'Capital fijo (alemán)'}[p.sistema||'solo_interes']}</div>
              </div>
              <div class="debt-pending">
                <div class="debt-pending-amt" style="color:${done?'#4CAF85':'#9B59B6'}">${done?'✓ Saldado':fmt(p.capitalPendiente)}</div>
                ${!done?`<div class="debt-pending-lbl">capital pendiente</div>`:''}
              </div>
            </div>
            <!-- Cuotas -->
            <div class="cuotas-meta" style="margin-top:8px">
              <span><span style="color:#9B59B6;font-weight:600">${pagosH}</span> pagadas · <span style="color:var(--red);font-weight:600">${restantes}</span> restantes</span>
              <span style="color:var(--muted)">de ${p.plazo} cuotas</span>
            </div>
          </div>
        </div>
        <!-- Fila 2: cajas de montos (ancho completo) -->
        ${done
          ?`<div style="background:#F0FDF4;border:1px solid #4CAF8533;border-radius:8px;padding:8px;margin-top:10px;text-align:center;font-size:12px;color:#4CAF85;font-weight:600">🎉 Préstamo cancelado · Total pagado en intereses: ${fmt(totalIntPagado)}</div>`
          :`<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px">
              <div style="background:#FEF2F2;border-radius:8px;padding:8px;text-align:center">
                <div style="font-size:9px;color:#A32D2D;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px">Interés del mes</div>
                <div style="font-size:14px;font-weight:600;color:#C62828">${fmt(interes)}</div>
              </div>
              <div style="background:#FFF3E0;border-radius:8px;padding:8px;text-align:center">
                <div style="font-size:9px;color:#E65100;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px">Total interés pagado</div>
                <div style="font-size:14px;font-weight:600;color:#E65100">${fmt(totalIntPagado)}</div>
              </div>
            </div>
            <div style="background:#F3F0FF;border-radius:8px;padding:8px;margin-top:6px;display:flex;justify-content:space-between;align-items:center">
              <div>
                <div style="font-size:9px;color:#6C3483;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px">Cuota del mes (interés + capital)</div>
                <div style="font-size:15px;font-weight:700;color:#6C3483">${fmt(cuota)}</div>
              </div>
              <div style="text-align:right">
                <div style="font-size:10px;color:#9B59B6">${fmt(interes)} interés</div>
                <div style="font-size:10px;color:#2E7D32">+ ${fmt(capitalMes)} capital</div>
              </div>
            </div>`}
        <!-- Botones -->
        <div style="display:flex;gap:6px;margin-top:12px">
          ${!done?`<button onclick="pagarPrestPers('${p.id}')" style="flex:1;background:#F3F0FF;border:1px solid #9B59B644;color:#6C3483;border-radius:8px;padding:8px;font-family:'Inter', system-ui, sans-serif;font-size:12px;font-weight:600;cursor:pointer">✓ Registrar pago</button>`:''}
          <button onclick="editPrestPers('${p.id}')" style="width:36px;height:36px;background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;cursor:pointer;font-size:13px" title="Editar">✎</button>
          <button onclick="deletePrestPers('${p.id}')" style="width:36px;height:36px;background:#FEF2F2;border:1px solid #E0525244;color:#E05252;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700" title="Eliminar">✕</button>
        </div>
      </div>`;
    }).join('');

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-family:'Inter', system-ui, sans-serif;font-size:18px;color:var(--gold)">Deudas</div>
    </div>

    <!-- Resumen general -->
    <div class="summary-card" style="background:linear-gradient(135deg,#EFF6FF,#F8FAFC);border:1px solid #2E86AB33;margin-bottom:16px">
      <div class="summary-label" style="color:#2E86AB88">Total por pagar</div>
      <div class="summary-amount" style="color:var(--blue)">${fmt(total)}</div>
      <div class="summary-detail">${debts.length} préstamo(s) banco · ${prestPers.length} personal(es)</div>
      <div style="margin-top:12px">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px">
          <span style="font-size:11px;color:var(--muted)">Progreso general</span>
          <span style="font-size:11px;color:var(--blue)">${pctPaid}% pagado</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pctPaid}%;background:linear-gradient(90deg,var(--blue),#5BA3C9)"></div></div>
      </div>
    </div>

    <!-- SECCIÓN 1: Banco / Tarjeta -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-size:13px;font-weight:600;color:var(--blue)">🏦 Banco / Tarjeta</div>

      <button class="btn-ghost" style="border-color:#9B59B644;color:#6C3483;padding:6px 12px;font-size:12px" onclick="openAddPrestPers()">＋ Agregar</button>
    </div>
    ${ppCards}`;
}
