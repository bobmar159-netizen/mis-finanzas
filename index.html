// ── Calcular tabla de amortización según sistema ──
function calcTablaAmort(capital, tasa, plazo, sistema){
  const r = tasa/100;
  const tabla = [];
  let saldo = capital;
  for(let i=1; i<=plazo; i++){
    const interes = parseFloat((saldo*r).toFixed(2));
    let capitalMes, cuota;
    if(sistema === 'solo_interes'){
      // Solo interés cada mes, capital al final
      capitalMes = (i===plazo) ? saldo : 0;
      cuota = interes + capitalMes;
    } else if(sistema === 'fijo' || sistema === 'frances'){
      // Cuota fija (francés)
      const cuotaFija = r===0 ? capital/plazo : capital*r*Math.pow(1+r,plazo)/(Math.pow(1+r,plazo)-1);
      capitalMes = Math.min(parseFloat((cuotaFija-interes).toFixed(2)), saldo);
      cuota = parseFloat((interes+capitalMes).toFixed(2));
    } else {
      // Capital fijo (alemán)
      capitalMes = parseFloat((capital/plazo).toFixed(2));
      if(i===plazo) capitalMes = saldo; // ajuste último mes
      cuota = parseFloat((interes+capitalMes).toFixed(2));
    }
    saldo = parseFloat((saldo-capitalMes).toFixed(2));
    if(saldo<0) saldo=0;
    tabla.push({mes:i, interes, capitalMes, cuota, saldo});
  }
  return tabla;
}

    <div class="field">
      <label class="field-label">Quién debe</label>
      <div class="type-toggle">
        <button class="type-btn" id="pp-debo" onclick="setPPTipo('debo')" style="border-color:#E05252;background:#FEF2F2;color:#E05252">Yo debo</button>
        <button class="type-btn" id="pp-meden" onclick="setPPTipo('meden')" style="border-color:#4CAF85;background:#F0FDF4;color:#4CAF85">Me deben</button>
      </div>
    </div>

function togglePPTabla(){
  const div=document.getElementById('pp-tabla');
  const btn=document.getElementById('pp-tabla-toggle');
  if(!div||!btn) return;
  const visible=div.style.display!=='none';
  div.style.display=visible?'none':'block';
  btn.textContent=visible?'▼ Ver tabla':'▲ Ocultar tabla';
}

function setPPTipo(tipo){
  window._ppTipo=tipo;
  document.getElementById('pp-debo').style.background=tipo==='debo'?'#FEF2F2':'transparent';
  document.getElementById('pp-debo').style.color=tipo==='debo'?'#E05252':'var(--muted)';
  document.getElementById('pp-meden').style.background=tipo==='meden'?'#F0FDF4':'transparent';
  document.getElementById('pp-meden').style.color=tipo==='meden'?'#4CAF85':'var(--muted)';
}

function calcPPPreview(){
  const capital=parseFloat(document.getElementById('pp-capital')?.value||0);
  const tasa=parseFloat(document.getElementById('pp-tasa')?.value||0);
  const plazo=parseInt(document.getElementById('pp-plazo')?.value||0);
  const sistema=document.getElementById('pp-sistema')?.value||'solo_interes';
  if(!capital||!plazo) return;

  const tabla=calcTablaAmort(capital,tasa,plazo,sistema);
  const totalInt=parseFloat(tabla.reduce((s,r)=>s+r.interes,0).toFixed(2));

  const etiquetas={
    'solo_interes':'Solo interés mensual + capital al final',
    'frances':'Cuota fija — sistema francés',
    'aleman':'Capital fijo — sistema alemán'
  };
  const lbl=document.getElementById('pp-sistema-label');
  if(lbl) lbl.textContent=etiquetas[sistema]||'';

  const prev=document.getElementById('pp-preview');
  if(prev) prev.style.display='block';

  const el1=document.getElementById('pp-cuota'); if(el1) el1.textContent='S/ '+tabla[0].cuota.toFixed(2);
  const el2=document.getElementById('pp-interes-mes'); if(el2) el2.textContent='S/ '+tabla[0].interes.toFixed(2);
  const el3=document.getElementById('pp-total-int'); if(el3) el3.textContent='S/ '+totalInt.toFixed(2);

  const tbody=document.getElementById('pp-tabla-body');
  const tfoot=document.getElementById('pp-tabla-foot');
  if(tbody){
    // Filas de datos — si hay más de 6 meses, mostrar todas con scroll
    tbody.innerHTML=tabla.map((r,i)=>`<tr style="background:${i%2===0?'#F8F5FF':'#fff'}">
      <td style="padding:4px 6px;text-align:center;color:#6C3483;font-weight:600">${r.mes}</td>
      <td style="padding:4px 6px;text-align:right;color:#C62828">S/ ${r.interes.toFixed(2)}</td>
      <td style="padding:4px 6px;text-align:right;color:#2E7D32">S/ ${r.capitalMes.toFixed(2)}</td>
      <td style="padding:4px 6px;text-align:right;font-weight:600;color:#6C3483">S/ ${r.cuota.toFixed(2)}</td>
      <td style="padding:4px 6px;text-align:right;color:var(--muted)">S/ ${r.saldo.toFixed(2)}</td>
    </tr>`).join('');

    // Fila de totales
    const sumInt=parseFloat(tabla.reduce((s,r)=>s+r.interes,0).toFixed(2));
    const sumCap=parseFloat(tabla.reduce((s,r)=>s+r.capitalMes,0).toFixed(2));
    const sumCuota=parseFloat(tabla.reduce((s,r)=>s+r.cuota,0).toFixed(2));
    if(tfoot){
      tfoot.innerHTML=`<tr style="background:#4A235A;color:#fff;font-weight:700">
        <td style="padding:5px 6px;text-align:center">Total</td>
        <td style="padding:5px 6px;text-align:right">S/ ${sumInt.toFixed(2)}</td>
        <td style="padding:5px 6px;text-align:right">S/ ${sumCap.toFixed(2)}</td>
        <td style="padding:5px 6px;text-align:right">S/ ${sumCuota.toFixed(2)}</td>
        <td style="padding:5px 6px;text-align:right">S/ 0.00</td>
      </tr>`;
    }

    // Altura dinámica según cantidad de meses
    const tablaDiv=document.getElementById('pp-tabla');
    if(tablaDiv) tablaDiv.style.maxHeight = tabla.length>6 ? '200px' : 'none';
    if(tablaDiv) tablaDiv.style.overflowY = tabla.length>6 ? 'auto' : 'visible';
  }
}

function savePrestPers(){
  const nombre=document.getElementById('pp-nombre')?.value.trim();
  const capital=parseFloat(document.getElementById('pp-capital')?.value);
  const tasa=parseFloat(document.getElementById('pp-tasa')?.value||0);
  const plazo=parseInt(document.getElementById('pp-plazo')?.value);
  const fecha=document.getElementById('pp-fecha')?.value;
  const sistema=document.getElementById('pp-sistema')?.value||'solo_interes';
  if(!nombre||!capital||!plazo||!fecha) return toast('Completa todos los campos','error');
  const p={
    id:Date.now()+'',
    nombre, tipo:window._ppTipo||'debo',
    capital, capitalPendiente:capital,
    tasaMensual:tasa, plazo, sistema,
    fechaInicio:fecha,
    pagos:[]
  };
  if(!state.prestamosPersonales) state.prestamosPersonales=[];
  state.prestamosPersonales.unshift(p);
  saveAll();
  console.log('Sincronizando préstamo personal:', p.nombre, p.id);
  syncSeccionToSheets('prestamo', p);
  closeModal();render();
  toast('Préstamo personal registrado ✓ · Enviando a Sheets...');
}

function pagarPrestPers(id){
  const p=state.prestamosPersonales.find(x=>x.id===id);
  if(!p||p.capitalPendiente<=0) return;
  const tabla=calcTablaAmort(p.capital,p.tasaMensual,p.plazo,p.sistema||'solo_interes');
  const pagosHechos=p.pagos.length;
  if(pagosHechos>=tabla.length) return toast('Todos los pagos ya fueron registrados','error');
  const fila=tabla[pagosHechos];
  const interes=fila.interes;
  const capitalMes=fila.capitalMes;
  p.capitalPendiente=parseFloat((p.capitalPendiente-capitalMes).toFixed(2));
  if(p.capitalPendiente<0) p.capitalPendiente=0;
  p.pagos.push({id:Date.now()+'',fecha:new Date().toISOString().split('T')[0],montoInteres:interes,montoCapital:capitalMes,capitalPendiente:p.capitalPendiente});
  saveAll();
  syncSeccionToSheets('prestamo', p);
  render();
  toast('Pago registrado · Capital: S/ '+capitalMes.toFixed(2)+' · Interés: S/ '+interes.toFixed(2));
}

function deletePrestPers(id){
  if(!confirm('¿Eliminar este préstamo?')) return;
  state.prestamosPersonales=state.prestamosPersonales.filter(p=>p.id!==id);
  saveAll();
  syncSeccionToSheets('prestamo_delete',{id});
  render();toast('Eliminado');
}

    <div class="field"><label class="field-label">Sistema de pago</label>
      <select id="ep-sistema" style="background:#F8FAFC;border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:'Inter', system-ui, sans-serif;font-size:14px;width:100%">
        ${sistemas.map(s=>`<option value="${s.val}" ${p.sistema===s.val?'selected':''}>${s.lbl}</option>`).join('')}

function renderMetas(){
  const metas = state.metas||[];
  const metaCards = metas.length===0
    ? `<div class="card" style="text-align:center;color:var(--dim);padding:24px 0;font-size:13px">Sin metas registradas</div>`
    : metas.map(m=>{
        const pct=Math.min(Math.round((m.ahorrado/m.objetivo)*100),100);
        const restante=Math.max(m.objetivo-m.ahorrado,0);
        const done=pct>=100;
        return `<div class="card" style="margin-bottom:10px;opacity:${done?.8:1}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
            <div>
              <div style="font-family:'Inter', system-ui, sans-serif;font-size:15px">${m.icon||'🎯'} ${m.nombre}</div>
              <div style="font-size:11px;color:var(--muted);margin-top:2px">Fecha límite: ${m.fechaLimite||'—'}</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:16px;font-weight:600;color:${done?'var(--green)':'var(--gold)'}">${fmt(m.ahorrado)}</div>
              <div style="font-size:10px;color:var(--muted)">de ${fmt(m.objetivo)}</div>
            </div>
          </div>
          <div class="progress-bar" style="height:8px"><div class="progress-fill" style="width:${pct}%;background:${done?'var(--green)':'var(--gold)'}"></div></div>
          <div style="display:flex;justify-content:space-between;margin-top:6px">
            <span style="font-size:11px;color:${done?'var(--green)':'var(--muted)'}">
              ${done?'🎉 ¡Meta alcanzada!':'Faltan '+fmt(restante)}
            </span>
            <span style="font-size:11px;color:var(--gold);font-weight:600">${pct}%</span>
          </div>
          ${!done?`<div style="display:flex;gap:6px;margin-top:10px">
            <button onclick="abonarMeta('${m.id}')" style="flex:1;background:#FFFBEB;border:1px solid #C9A84C44;color:var(--gold);border-radius:8px;padding:8px;font-family:'Inter', system-ui, sans-serif;font-size:12px;font-weight:600;cursor:pointer">＋ Abonar</button>
            <button onclick="deleteMeta('${m.id}')" style="width:36px;height:36px;background:none;border:none;color:#E0525266;cursor:pointer;font-size:14px">✕</button>
          </div>`:`<button onclick="deleteMeta('${m.id}')" style="width:100%;margin-top:8px;background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px;font-size:12px;cursor:pointer">Eliminar</button>`}
        </div>`;
      }).join('');

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-family:'Inter', system-ui, sans-serif;font-size:18px;color:var(--gold)">Metas de Ahorro</div>
      <button class="btn-ghost" style="border-color:#C9A84C44;color:var(--gold);padding:8px 14px;font-size:13px" onclick="openAddMeta()">＋ Nueva meta</button>
    </div>
    ${metaCards}`;
}

function openAddMeta(){
  document.getElementById('modal-content').innerHTML=`
    <div class="modal-title" style="color:var(--gold)">Nueva Meta de Ahorro</div>
    <div class="field"><label class="field-label">Nombre de la meta</label><input id="m-nombre" type="text" placeholder="Ej: Viaje a Cusco, Laptop nueva"></div>
    <div class="field"><label class="field-label">Monto objetivo (S/)</label><input id="m-objetivo" type="number" inputmode="decimal" placeholder="0.00"></div>
    <div class="field"><label class="field-label">Monto inicial ahorrado (S/)</label><input id="m-ahorrado" type="number" inputmode="decimal" placeholder="0.00" value="0"></div>
    <div class="field"><label class="field-label">Fecha límite</label><input id="m-fecha" type="date"></div>
    <div class="field"><label class="field-label">Ícono</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">
        ${['🎯','✈️','🏠','🚗','💻','📱','🎓','💍','🏖','💰'].map(e=>`<button onclick="selectMetaIcon('${e}',this)" style="width:38px;height:38px;border-radius:8px;border:1px solid var(--border);background:#F8FAFC;font-size:20px;cursor:pointer">${e}</button>`).join('')}
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn-gold" onclick="saveMeta()">Guardar</button>
    </div>`;
  window._metaIcon='🎯';
  showModal();
}

function selectMetaIcon(icon, btn){
  window._metaIcon=icon;
  document.querySelectorAll('#modal-content button[onclick^="selectMetaIcon"]').forEach(b=>b.style.borderColor='var(--border)');
  btn.style.borderColor='var(--gold)';
  btn.style.background='#FFFBEB';
}

function saveMeta(){
  const nombre=document.getElementById('m-nombre')?.value.trim();
  const objetivo=parseFloat(document.getElementById('m-objetivo')?.value);
  const ahorrado=parseFloat(document.getElementById('m-ahorrado')?.value||0);
  const fecha=document.getElementById('m-fecha')?.value;
  if(!nombre||!objetivo) return toast('Completa nombre y monto objetivo','error');
  if(!state.metas) state.metas=[];
  state.metas.push({id:Date.now()+'',nombre,objetivo,ahorrado,fechaLimite:fecha||'',icon:window._metaIcon||'🎯'});
  saveAll();
  syncSeccionToSheets('meta', state.metas[state.metas.length-1]);
  closeModal();render();toast('Meta creada ✓');
}

function abonarMeta(id){
  const m=state.metas.find(x=>x.id===id);
  if(!m) return;
  const monto=parseFloat(prompt('¿Cuánto querés abonar a "'+m.nombre+'"? (S/)'));
  if(!monto||monto<=0) return;
  m.ahorrado=parseFloat((m.ahorrado+monto).toFixed(2));
  saveAll();
  syncSeccionToSheets('meta', m);
  render();toast('Abono registrado ✓');
}

function deleteMeta(id){
  if(!confirm('¿Eliminar esta meta?')) return;
  const meta=state.metas.find(x=>x.id===id);
  state.metas=state.metas.filter(x=>x.id!==id);
  saveAll();
  if(meta) syncSeccionToSheets('meta_delete',{id,nombre:meta.nombre});
  render();toast('Meta eliminada');
}

function getWeekRange(){
  const now=new Date();
  const day=now.getDay()||7;
  const mon=new Date(now); mon.setDate(now.getDate()-day+1);
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  const fmt=d=>d.toISOString().split('T')[0];
  return {start:fmt(mon),end:fmt(sun)};
}

function getWeekLabel(){
  const {start,end}=getWeekRange();
  const s=new Date(start+'T00:00:00'), e=new Date(end+'T00:00:00');
  return `${s.getDate()} ${MONTHS_SHORT[s.getMonth()]} — ${e.getDate()} ${MONTHS_SHORT[e.getMonth()]}`;
}

function getGastadoCategoria(catName){
  const {start,end}=getWeekRange();
  return state.transactions
    .filter(t=>t.type==='egreso'&&t.category===catName&&t.date>=start&&t.date<=end)
    .reduce((s,t)=>s+t.amount,0);
}

function renderPresupuesto(){
  const presup=state.presupuesto||[];
  const allCats=[...state.catsEx].filter(c=>!['transfer_out','transfer_retiro','transfer_neg_out','transfer_neg_retiro_out'].includes(c.id));

  const rows=presup.map(p=>{
    const gastado=getGastadoCategoria(p.categoria);
    const disponible=Math.max(p.limite-gastado,0);
    const pct=Math.min(Math.round((gastado/p.limite)*100),100);
    const over=gastado>p.limite;
    return `<div class="card" style="margin-bottom:8px;border-color:${over?'#E0525244':'var(--border)'}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-size:14px;font-weight:500">${p.icon||''} ${p.categoria}</div>
        <div style="text-align:right">
          <div style="font-size:13px;font-weight:600;color:${over?'var(--red)':'var(--text)'}">${fmt(gastado)} <span style="font-size:11px;color:var(--muted)">/ ${fmt(p.limite)}</span></div>
          ${over?`<div style="font-size:10px;color:var(--red)">⚠ Excedido por ${fmt(gastado-p.limite)}</div>`:`<div style="font-size:10px;color:var(--green)">Disponible: ${fmt(disponible)}</div>`}
        </div>
      </div>
      <div class="progress-bar" style="height:6px">
        <div class="progress-fill" style="width:${pct}%;background:${over?'var(--red)':pct>80?'#E67E22':'var(--green)'}"></div>
      </div>
      <button onclick="deletePresup('${p.id}')" style="position:absolute;top:8px;right:8px;background:none;border:none;color:#E0525244;cursor:pointer;font-size:12px">✕</button>
    </div>`;
  }).join('');

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div style="font-family:'Inter', system-ui, sans-serif;font-size:18px;color:var(--gold)">Presupuesto Semanal</div>
      <button class="btn-ghost" style="border-color:#C9A84C44;color:var(--gold);padding:8px 14px;font-size:13px" onclick="openAddPresup()">＋ Agregar</button>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px">Semana: ${getWeekLabel()}</div>
    ${presup.length===0
      ?`<div class="card" style="text-align:center;color:var(--dim);padding:24px 0;font-size:13px">Sin límites configurados</div>`
      :rows}`;
}

function openAddPresup(){
  const allCats=[...state.catsEx].filter(c=>!['transfer_out','transfer_retiro','transfer_neg_out','transfer_neg_retiro_out'].includes(c.id));
  const opts=allCats.map(c=>`<option value="${c.name}" data-icon="${c.icon}">${c.icon} ${c.name}</option>`).join('');
  document.getElementById('modal-content').innerHTML=`
    <div class="modal-title" style="color:var(--gold)">Límite Semanal</div>
    <div class="field"><label class="field-label">Categoría</label><select id="ps-cat">${opts}</select></div>
    <div class="field"><label class="field-label">Límite semanal (S/)</label><input id="ps-limite" type="number" inputmode="decimal" placeholder="0.00"></div>
    <div class="btn-row">
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn-gold" onclick="savePresup()">Guardar</button>
    </div>`;
  showModal();
}

function savePresup(){
  const catName=document.getElementById('ps-cat')?.value;
  const limite=parseFloat(document.getElementById('ps-limite')?.value);
  if(!catName||!limite||limite<=0) return toast('Completa los datos','error');
  if(!state.presupuesto) state.presupuesto=[];
  const cat=state.catsEx.find(c=>c.name===catName);
  const existing=state.presupuesto.find(p=>p.categoria===catName);
  if(existing){ existing.limite=limite; }
  else { state.presupuesto.push({id:Date.now()+'',categoria:catName,limite,icon:cat?.icon||''}); }
  saveAll();closeModal();render();toast('Límite guardado ✓');
}

function deletePresup(id){
  const p=state.presupuesto.find(x=>x.id===id);
  state.presupuesto=state.presupuesto.filter(x=>x.id!==id);
  saveAll();
  // FIX: sync eliminación a Sheets marcando gastado como -1 para indicar borrado
  if(p){ syncSeccionToSheets('presupuesto',{...p,gastado:-1,semana:getWeekLabel()}); }
  render();toast('Eliminado');
}

      <div class="service-icon" style="background:${s.pagado?'#F0FDF4':urgent?'#FEF2F2':'#F8FAFC'}">${iconHtml(s.icon)}</div>

          <button onclick="openEditService('${s.id}')" style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;width:28px;height:28px;cursor:pointer;font-size:12px">✎</button>
          <button onclick="deleteService('${s.id}')" style="background:none;border:none;color:#E0525266;cursor:pointer;font-size:13px;width:28px;height:28px">✕</button>

    </div>
    <div class="group-label">Pendientes (${pending.length})</div>
    ${pending.length===0?`<div style="text-align:center;color:var(--dim);padding:16px 0;font-size:13px">🎉 ¡Todos pagados!</div>`:pending.map(serviceCard).join('')}
    <div class="group-label" style="margin-top:16px">Pagados (${paid.length})</div>
    ${paid.length===0?`<div style="text-align:center;color:var(--dim);padding:16px 0;font-size:13px">Sin pagos registrados</div>`:paid.map(serviceCard).join('')}

// PRÉSTAMOS CON INTERÉS MENSUAL
// ─────────────────────────────────────────────
function interesEsperado(p){ return parseFloat((p.capitalPendiente * p.tasaMensual / 100).toFixed(2)); }
function totalInteresesPagados(p){ return p.pagos.reduce((s,pg)=>s+pg.montoInteres,0); }
function totalCapitalPagado(p){ return p.capital - p.capitalPendiente; }

function renderPrestamos(){
  const lista = state.prestamos;
  const totalCapitalPend = lista.reduce((s,p)=>s+p.capitalPendiente,0);
  const totalIntPagado   = lista.reduce((s,p)=>s+totalInteresesPagados(p),0);

  const cards = lista.map(p=>{
    const intEsp = interesEsperado(p);
    const capPag = totalCapitalPagado(p);
    const pct    = p.capital>0?Math.round(capPag/p.capital*100):0;
    const ulPago = p.pagos.length ? p.pagos[p.pagos.length-1] : null;
    return `<div class="debt-card" style="margin-bottom:12px">
      <div class="debt-accent" style="background:#9B59B6"></div>
      <div class="debt-body">
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
            <div>
              <div class="debt-name">💸 ${p.nombre}</div>
              <div class="debt-cat">${p.tipo} · ${p.tasaMensual}% mensual</div>
            </div>
            <div style="text-align:right">
              <div style="font-family:'Inter', system-ui, sans-serif;font-size:17px;color:#E05252">${fmt(p.capitalPendiente)}</div>
              <div style="font-size:10px;color:var(--muted)">capital pendiente</div>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px">
            <div style="background:#F8FAFC;border-radius:8px;padding:8px;text-align:center">
              <div style="font-size:10px;color:var(--muted)">Capital original</div>
              <div style="font-size:13px;font-weight:600;color:var(--text)">${fmt(p.capital)}</div>
            </div>
            <div style="background:#FEF2F2;border-radius:8px;padding:8px;text-align:center">
              <div style="font-size:10px;color:#E05252">Interés este mes</div>
              <div style="font-size:13px;font-weight:600;color:#E05252">${fmt(intEsp)}</div>
            </div>
            <div style="background:#F0FDF4;border-radius:8px;padding:8px;text-align:center">
              <div style="font-size:10px;color:var(--green)">Total intereses pagados</div>
              <div style="font-size:13px;font-weight:600;color:var(--green)">${fmt(totalInteresesPagados(p))}</div>
            </div>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:#9B59B6"></div></div>
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:5px">
            <span>Capital pagado: <strong style="color:#9B59B6">${fmt(capPag)}</strong></span>
            <span>${pct}% del capital</span>
          </div>
          ${ulPago?`<div style="font-size:11px;color:var(--muted);margin-top:6px">Último pago: ${ulPago.fecha} · ${ulPago.tipo==='interes'?'Solo interés':'Cuota completa'}</div>`:''}
          ${p.pagos.length===0?`<div style="font-size:11px;color:#E67E22;margin-top:6px;background:#FFF3CD;border-radius:8px;padding:5px 8px">⚠ Sin pagos registrados aún</div>`:''}
        </div>
      </div>
      <div style="display:flex;gap:6px;margin-top:12px">
        <button onclick="openRegistrarPago('${p.id}')" style="flex:2;background:#F0FDF4;border:1px solid #4CAF8544;color:var(--green);border-radius:8px;padding:9px;font-family:'Inter', system-ui, sans-serif;font-size:12px;font-weight:600;cursor:pointer">💳 Registrar pago</button>
        <button onclick="verHistorialPrestamo('${p.id}')" style="flex:1;background:#F8FAFC;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:9px;font-family:'Inter', system-ui, sans-serif;font-size:12px;cursor:pointer">📋 Historial</button>
        <button onclick="openEditPrestamo('${p.id}')" style="width:36px;background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;cursor:pointer;font-size:13px">✎</button>
        <button onclick="deletePrestamo('${p.id}')" style="width:36px;background:none;border:none;color:#E0525266;cursor:pointer;font-size:14px">✕</button>
      </div>
    </div>`;
  }).join('');

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-family:'Inter', system-ui, sans-serif;font-size:18px;color:var(--gold)">Préstamos con interés</div>
      <button class="btn-gold" style="padding:8px 14px;font-size:13px" onclick="openAddPrestamo()">＋ Nuevo</button>
    </div>
    ${lista.length>0?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
      <div style="background:#FEF2F2;border:1px solid #E0525233;border-radius:8px;padding:12px;text-align:center">
        <div style="font-size:10px;color:#E05252;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Capital pendiente total</div>
        <div style="font-family:'Inter', system-ui, sans-serif;font-size:20px;color:#E05252">${fmt(totalCapitalPend)}</div>
      </div>
      <div style="background:#FEF9EC;border:1px solid #C9A84C33;border-radius:8px;padding:12px;text-align:center">
        <div style="font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Total intereses pagados</div>
        <div style="font-family:'Inter', system-ui, sans-serif;font-size:20px;color:var(--gold)">${fmt(totalIntPagado)}</div>
      </div>
    </div>`:''}
    ${lista.length===0?`<div style="text-align:center;color:var(--dim);padding:40px 0;font-size:14px">Sin préstamos registrados<br><span style="font-size:12px">Agrega un préstamo para rastrear capital e intereses</span></div>`:cards}
    <div class="card" style="background:#EFF6FF;border-color:#2E86AB33;margin-top:4px">
      <div style="font-size:12px;color:var(--muted);line-height:1.6">
        💡 <strong style="color:var(--text)">¿Cómo funciona?</strong> Registra préstamos con tasa mensual. Cada mes puedes pagar <strong>solo interés</strong> (el capital no baja) o <strong>cuota completa</strong> (abonando al capital). El sistema calcula todo automáticamente.
      </div>
    </div>`;
}

function openAddPrestamo(){ openPrestamoModal(null); }
function openEditPrestamo(id){ openPrestamoModal(state.prestamos.find(p=>p.id===id)); }

function openPrestamoModal(p){
  const isEdit=!!p;
  const d=p||{nombre:'',tipo:'Persona',capital:'',tasaMensual:'',fechaInicio:new Date().toISOString().split('T')[0],capitalPendiente:0,pagos:[]};
  document.getElementById('modal-content').innerHTML=`
    <div class="modal-title" style="color:#9B59B6">${isEdit?'Editar':'Nuevo'} Préstamo</div>
    <div class="field"><label class="field-label">Nombre / Acreedor</label><input id="p-nombre" type="text" placeholder="Ej: Juan Pérez, BCP, Financiera..." value="${d.nombre}"></div>
    <div class="field"><label class="field-label">Tipo</label>
      <select id="p-tipo" style="background:#F8FAFC;border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:'Inter', system-ui, sans-serif;font-size:14px;width:100%">
        ${['Persona','Banco','Financiera','Caja','Otro'].map(t=>`<option ${t===d.tipo?'selected':''}>${t}</option>`).join('')}
      </select>
    </div>
    <div class="field"><label class="field-label">Capital prestado (S/)</label><input id="p-capital" type="number" inputmode="decimal" placeholder="0.00" value="${d.capital||''}"></div>
    <div class="field"><label class="field-label">Capital pendiente actual (S/)</label><input id="p-pendiente" type="number" inputmode="decimal" placeholder="Igual al capital si es nuevo" value="${d.capitalPendiente||d.capital||''}"></div>
    <div class="field"><label class="field-label">Tasa de interés mensual (%)</label><input id="p-tasa" type="number" inputmode="decimal" placeholder="Ej: 5 para 5% mensual" value="${d.tasaMensual||''}"></div>
    <div class="field"><label class="field-label">Fecha inicio</label><input id="p-fecha" type="date" value="${d.fechaInicio}"></div>
    <div id="p-interes-preview" style="background:#FEF2F2;border:1px solid #E0525233;border-radius:8px;padding:12px;margin-bottom:14px;display:none">
      <div style="font-size:11px;color:var(--muted)">Interés mensual estimado</div>
      <div id="p-interes-val" style="font-family:'Inter', system-ui, sans-serif;font-size:22px;color:#E05252"></div>
    </div>
    <div class="btn-row">
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
      <button style="flex:1;background:linear-gradient(135deg,#9B59B6,#8E44AD);color:#fff;border:none;border-radius:8px;padding:13px;font-weight:700;font-family:'Inter', system-ui, sans-serif;font-size:14px;cursor:pointer" onclick="savePrestamo('${isEdit?d.id:''}')">Guardar</button>
    </div>`;
  // Preview interés en tiempo real
  function upd(){
    const cap=parseFloat(document.getElementById('p-pendiente').value)||parseFloat(document.getElementById('p-capital').value)||0;
    const tasa=parseFloat(document.getElementById('p-tasa').value)||0;
    const prev=document.getElementById('p-interes-preview');
    const val=document.getElementById('p-interes-val');
    if(cap>0&&tasa>0){prev.style.display='block';val.textContent=fmt(cap*tasa/100)+' / mes';}
    else prev.style.display='none';
  }
  showModal();
  setTimeout(()=>{
    document.getElementById('p-capital').addEventListener('input',upd);
    document.getElementById('p-pendiente').addEventListener('input',upd);
    document.getElementById('p-tasa').addEventListener('input',upd);
    upd();
  },100);
}

function savePrestamo(editId){
  const nombre=document.getElementById('p-nombre').value.trim();
  const capital=parseFloat(document.getElementById('p-capital').value);
  const pendiente=parseFloat(document.getElementById('p-pendiente').value)||capital;
  const tasa=parseFloat(document.getElementById('p-tasa').value);
  if(!nombre||!capital||!tasa)return toast('Completa nombre, capital y tasa','error');
  const existing=editId?state.prestamos.find(p=>p.id===editId):null;
  const item={
    id:editId||Date.now()+'',
    nombre,
    tipo:document.getElementById('p-tipo').value,
    capital,
    capitalPendiente:pendiente,
    tasaMensual:tasa,
    fechaInicio:document.getElementById('p-fecha').value,
    pagos:existing?existing.pagos:[],
  };
  if(editId)state.prestamos=state.prestamos.map(p=>p.id===editId?item:p);
  else state.prestamos.push(item);
  saveAll();
  syncSeccionToSheets('prestamo', item);
  closeModal();render();toast(editId?'Préstamo actualizado':'Préstamo registrado ✓');
}

function deletePrestamo(id){
  if(!confirm('¿Eliminar este préstamo y todo su historial?'))return;
  state.prestamos=state.prestamos.filter(p=>p.id!==id);
  saveAll();render();toast('Préstamo eliminado');
}

function openRegistrarPago(id){
  const p=state.prestamos.find(x=>x.id===id);
  if(!p)return;
  const intEsp=interesEsperado(p);
  document.getElementById('modal-content').innerHTML=`
    <div class="modal-title" style="color:#9B59B6">Registrar pago — ${p.nombre}</div>

function guardarPagoPrestamo(prestamoId){
  const p=state.prestamos.find(x=>x.id===prestamoId);
  if(!p)return;
  const tipo=window._pagoTipo||'interes';
  const montoInteres=parseFloat(document.getElementById('pago-interes').value)||0;
  const montoCapital=tipo==='completa'?(parseFloat(document.getElementById('pago-capital').value)||0):0;
  const fecha=document.getElementById('pago-fecha').value;
  const nota=document.getElementById('pago-nota').value.trim();
  if(!montoInteres&&!montoCapital)return toast('Ingresa al menos el monto del interés','error');
  const nuevoCapital=Math.max(0,p.capitalPendiente-montoCapital);
  const pago={id:Date.now()+'',fecha,tipo,montoInteres,montoCapital,capitalPendiente:nuevoCapital,nota};
  p.pagos.push(pago);
  p.capitalPendiente=nuevoCapital;
  // Registrar también como movimiento (egreso categoría Deuda)
  const totalPago=montoInteres+montoCapital;
  const desc=tipo==='interes'?`Interés ${p.nombre}`:`Cuota ${p.nombre} (capital S/${montoCapital.toFixed(2)} + interés S/${montoInteres.toFixed(2)})`;
  state.transactions.unshift({id:Date.now()+'_pt',type:'egreso',amount:totalPago,category:'Deuda',description:desc,date:fecha,catId:'ce9'});

  syncSeccionToSheets('prestamo', p);

  closeModal();render();
  toast(tipo==='interes'?`Solo interés registrado · ${fmt(montoInteres)}`:`Pago completo registrado · ${fmt(totalPago)} ✓`);
}

let _syncTimer=null;

// ── Deduplicador de solapamiento para reconocimiento de voz ──
// Cuando Chrome reinicia la sesión de speech, el texto "interim" del final
// de la sesión anterior a veces se repite al inicio de la nueva.
function appendWithoutOverlap(existing, newText) {
  const e = existing.trimEnd();
  const n = newText.trim();
  if (!n) return existing;
  if (!e) return n + ' ';
  const eWords = e.split(/\s+/);
  const nWords = n.split(/\s+/);
  let overlapLen = 0;
  const maxCheck = Math.min(8, eWords.length, nWords.length);
  for (let len = maxCheck; len >= 1; len--) {
    const tail = eWords.slice(-len).join(' ').toLowerCase();
    const head = nWords.slice(0, len).join(' ').toLowerCase();
    if (tail === head) { overlapLen = len; break; }
  }
  const uniqueNew = nWords.slice(overlapLen).join(' ');
  return e + (uniqueNew ? ' ' + uniqueNew : '') + ' ';
}

function syncSeccionToSheets(type,item){
  const url=localStorage.getItem('fnz_sheets_url')||'';
  if(!url) return; // sin Sheets configurado → silencio, no error
  const ts=type+'_'+(item.id||item.nombre||'')+'_'+Date.now();
  _sendToSheets(url,{type,item,modo:state.modo,timestamp:ts});
}

function _sendToSheets(url,payload){
  if(!url){ toast('⚠ URL de Sheets no configurada','error'); return; }
  _syncStatus='syncing';
  _updateSyncBadge();
  const fullUrl = url+'?data='+encodeURIComponent(JSON.stringify(payload));
  fetch(fullUrl, {method:'GET', mode:'no-cors'})
    .then(()=>{
      _syncStatus='ok';_updateSyncBadge();
      setTimeout(()=>{_syncStatus='idle';_updateSyncBadge();},4000);
    })
    .catch(()=>{
      // no-cors siempre llega aquí pero el request SÍ se envió
      _syncStatus='ok';_updateSyncBadge();
      setTimeout(()=>{_syncStatus='idle';_updateSyncBadge();},4000);
    });
}

function syncToSheets(lastTx){
  const url=localStorage.getItem('fnz_sheets_url')||'';
  if(!url) return;
  clearTimeout(_syncTimer);
  _syncTimer=setTimeout(()=>{
    _syncStatus='syncing';
    _updateSyncBadge();
    // Siempre enviar la tx específica que cambió (insert/update)
    const tx = lastTx || (state.transactions.length ? state.transactions[0] : null);
    if(!tx) return;
    const payload={type:'tx',modo:state.modo,timestamp:'tx_'+tx.id+'_'+Date.now(),tx};
    _sendToSheets(url,payload);
  },200);
}

// ── Sincronizar TODO el historial de transacciones a Sheets (batch) ──
function syncAllTxToSheets(silencioso){
  const url=localStorage.getItem('fnz_sheets_url')||'';
  if(!url) return;
  const txs=state.transactions||[];
  if(!txs.length) return;
  if(!silencioso) toast('⬆ Enviando '+txs.length+' movimientos a Sheets...');
  _syncStatus='syncing'; _updateSyncBadge();
  // Enviar en batch de 20, con delay entre cada uno
  let idx=0;
  function sendNext(){
    if(idx>=txs.length){
      _syncStatus='ok';_updateSyncBadge();
      setTimeout(()=>{_syncStatus='idle';_updateSyncBadge();},4000);
      if(!silencioso) toast('✓ '+txs.length+' movimientos sincronizados a Sheets');
      return;
    }
    const tx=txs[idx++];
    const payload={type:'tx',modo:state.modo,timestamp:'tx_'+tx.id+'_'+Date.now(),tx};
    const fullUrl=url+'?data='+encodeURIComponent(JSON.stringify(payload));
    fetch(fullUrl,{method:'GET',mode:'no-cors'}).finally(()=>setTimeout(sendNext,120));
  }
  sendNext();
}

  const notionActive = localStorage.getItem('fnz_notion_polling')==='1';

  const cfg={idle:{t:'',bg:'transparent',c:'transparent'},syncing:{t:'↑ Sincronizando...',bg:'#EFF6FF',c:'#1565C0'},ok:{t:'✓ Guardado en Sheets',bg:'#F0FDF4',c:'#4CAF85'},error:{t:'⚠ Error al sincronizar',bg:'#FEF2F2',c:'#E05252'}};
  const s=cfg[_syncStatus]||cfg.idle;
  if(notionActive){
    const hora = notionLast ? new Date(notionLast).toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'}) : '--:--';

    el.style.color=s.c;
    el.style.border='1px solid '+(s.c==='transparent'?'transparent':s.c+'44');

}

// ★ Enviar TODOS los datos de la app a Sheets de una vez
function enviarTodoASheets() {
  const url = localStorage.getItem('fnz_sheets_url') || '';
  if (!url) return toast('Primero configura la URL de Sheets en Ajustes', 'error');

  const txs    = state.transactions || [];
  const agenda = state.agenda || [];
  const deudas = state.debts || [];

  // 1. AGRUPAR TRANSACCIONES POR ID DE NOTION
  const mergedMap = new Map();
  const independentTxs = [];
  
  txs.forEach(tx => {
    if (tx.negocio && tx._notionRowId) {
      const nid = tx._notionRowId;
      if (!mergedMap.has(nid)) {
        mergedMap.set(nid, {
          id: tx.id.replace(/-ing$|-mov$|-mat$|-otr$/, ''), 
          fecha: tx.date,
          cliente: tx.cliente || '-',
          contacto: tx.contacto || tx.telefono || '-',
          servicio1: tx.servicio1 || tx.category || '-',
          servicio2: tx.servicio2 || '-',
          servicio3: tx.servicio3 || '-',
          servicio4: tx.servicio4 || '-',
          ubicacion: tx.ubicacion || '-',
          formaPago: tx.formaPago || '-',
          ingreso: 0, movilidad: 0, materiales: 0, otros: 0, meta: 0,
          description: tx.description || '-',
          _notionRowId: nid
        });
      }
      const m = mergedMap.get(nid);
      const val = parseFloat(tx.amount) || 0;
      const cat = (tx.category || '').toLowerCase();
      
      if (tx.type === 'ingreso') {
        m.ingreso += val;
      } else {
        if (cat.includes('movilidad')) m.movilidad += val;
        else if (cat.includes('material')) m.materiales += val;
        else m.otros += val;
      }
      if (tx.servicio1 && tx.servicio1 !== '-') m.servicio1 = tx.servicio1;
      if (tx.servicio2 && tx.servicio2 !== '-') m.servicio2 = tx.servicio2;
      if (tx.servicio3 && tx.servicio3 !== '-') m.servicio3 = tx.servicio3;
      if (tx.servicio4 && tx.servicio4 !== '-') m.servicio4 = tx.servicio4;
    } else {
      independentTxs.push(tx);
    }
  });

  const queue = [];
  mergedMap.forEach(item => queue.push({ type: 'trabajo', item }));
  independentTxs.forEach(tx => queue.push({ type: 'tx', modo: tx.negocio?'negocio':'personal', tx }));
  agenda.forEach(item => queue.push({ type: 'agenda', item, modo: 'negocio' }));
  deudas.forEach(item => queue.push({ type: 'deuda', item, modo: 'negocio' }));

  const total = queue.length;
  if (total === 0) return toast('No hay datos para enviar', 'error');

  if (!confirm(`Se han agrupado los datos para que coincidan con Notion.\n\n· ${mergedMap.size} Registros agrupados (Cobros+Gastos)\n· ${independentTxs.length} Movimientos sueltos\n· ${agenda.length} Agenda\n· ${deudas.length} Deudas\n\nTotal a enviar: ${total} filas.\n\n¿Deseas continuar?`)) return;

  const status = document.getElementById('notion-sync-status');
  if (status) {
    status.style.display = 'block';
    status.innerHTML = `
      <div id="sync-panel" style="position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:90%; max-width:400px; z-index:10000; background:white; border-radius:16px; padding:24px; box-shadow:0 20px 50px rgba(0,0,0,0.3); border-top:6px solid var(--blue); text-align:left">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
          <div style="font-weight:700; color:var(--text); font-size:16px">⬆ Sincronizando con Google Sheets</div>
          <div id="sync-counter" style="font-family:monospace; font-weight:800; color:var(--blue); font-size:18px; background:rgba(46,134,171,0.1); padding:4px 12px; border-radius:20px">0 / ${total}</div>
        </div>
        <div style="width:100%; height:10px; background:#edf2f7; border-radius:10px; overflow:hidden; margin-bottom:10px">
          <div id="sync-progress-bar" style="width:0%; height:100%; background:linear-gradient(90deg, var(--blue), #4fd1c5); transition:width 0.4s"></div>
        </div>
        <div id="sync-status-msg" style="font-size:13px; color:var(--muted)">Iniciando transferencia...</div>
      </div>
    `;
  }

  let enviados = 0;
  let errores = 0;

  async function processSequential() {
    for (const task of queue) {
      try {
        const payload = { ...task, timestamp: 'sync_' + Date.now() + '_' + enviados };
        const fullUrl = url + '?data=' + encodeURIComponent(JSON.stringify(payload));
        await fetch(fullUrl, { method: 'GET', mode: 'no-cors' });
        enviados++;
        if (status) {
          const bar = document.getElementById('sync-progress-bar');
          const counter = document.getElementById('sync-counter');
          const msg = document.getElementById('sync-status-msg');
          if (bar) bar.style.width = Math.round((enviados/total)*100) + '%';
          if (counter) counter.textContent = enviados + ' / ' + total;
          if (msg) msg.textContent = 'Enviando fila ' + enviados + '...';
        }
      } catch (e) {
        errores++;
      }
      await new Promise(r => setTimeout(r, 150));
    }

    if (status) {
      document.getElementById('sync-panel').innerHTML = `
        <div style="text-align:center">
          <div style="font-size:30px">✅</div>
          <div style="font-weight:700">Sincronización Finalizada</div>
          <div style="margin:10px 0">Se enviaron ${enviados} de ${total} registros.</div>
          <button onclick="document.getElementById('notion-sync-status').style.display='none'" style="background:var(--blue); color:white; border:none; padding:8px 20px; border-radius:8px; cursor:pointer">Cerrar</button>
        </div>
      `;
    }
    toast('✓ Sincronización completa');
  }

  processSequential();
}

// ══════════════════════════════════════════════════════
// IMPORTADOR DE NOTION CSV
// Mapea columnas del CSV "Reporte Diario- Servicios Gas Natural"
// al formato interno de transacciones de la app
// ══════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════
// NÚCLEO de importación Notion — usado por manual Y automático
// statusElId: id del elemento donde mostrar el estado (puede ser null)
// ══════════════════════════════════════════════════════════════════
function _procesarCsvNotionTexto(csv, statusElId, isFullSync = false) {
  const status = statusElId ? document.getElementById(statusElId) : null;
  try {
      const rows = _parseCsv(csv);
      if (rows.length < 2) {
        if (status) status.textContent = '⚠ El archivo está vacío o no es válido';
        return;
      }

      // ── Detectar columnas automáticamente ──
      const headers = rows[0].map(h => h.trim().toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g,''));

      const col = (names) => {
        for (const n of names) {
          const idx = headers.findIndex(h => h.includes(n) || h.replace(/\s/g,'').includes(n.replace(/\s/g,'')));
          if (idx >= 0) return idx;
        }
        return -1;
      };

      const iDate     = col(['fecha','date']);
      const iCliente  = col(['cliente','cue','client','nombre']);
      const iContacto = col(['contacto','conta','contact','tel','celular']);
      const iSvc1     = col(['servicio 1','service 1','servicio1']);
      const iSvc2     = col(['servicio 2','service 2','servicio2']);
      const iSvc3     = col(['servicio 3','service 3','servicio3']);
      const iSvc4     = col(['servicio 4','service 4','servicio4']);
      const iDistrito = col(['distrito','district','zona','ubicacion']);
      const iForma    = col(['forma de pago','forma','pago','payment']);
      const iMovil    = col(['movilidad','movil','transport']);
      const iMaterial = col(['materiales','material','materi']);
      const iOtros    = col(['otros','other','extra']);
      // ★ Precio del servicio — columna exacta del CSV de Notion
      const iPrecio   = col(['precio del servicio','precio serv','precio s','precio']);
      const iGanancia = col(['ganancia']); // ignorado — es columna calculada
      const iObs      = col(['observaciones','observ','nota','comment','descripcion']);
      const iNotionId = col(['notionid']); // La columna oculta generada por nuestro proxy

      let txImportadas = 0;
      let egresosMov = 0;
      let egresosMat = 0;
      const nuevasTx = [];

      for (let i = 1; i < rows.length; i++) {
        const r = rows[i];
        if (r.length < 2) continue;

        // Fecha
        const fechaRaw = iDate >= 0 ? r[iDate]?.trim() : '';
        const fecha = _parseFechaNotion(fechaRaw) || todayStr();

        // Cliente (si está en blanco le ponemos 'Desconocido' para no perder gastos)
        const cliente = iCliente >= 0 ? r[iCliente]?.trim().replace(/^\s+/,'') : '';
        const clienteFinal = cliente || '(Sin cliente)';

        // Notion ID original
        const rawNotionId = iNotionId >= 0 ? r[iNotionId]?.trim() : '';
        const nId = rawNotionId || ('not_' + fecha + '_r' + i);

        // Servicio — tomar el primer servicio reconocido (no concatenar)
        const svcs = [iSvc1,iSvc2,iSvc3,iSvc4]
          .filter(idx => idx >= 0)
          .map(idx => r[idx]?.trim())
          .filter(v => v && v !== '-' && v !== '');
        // ★ Mapear cada servicio y tomar el primero que no sea genérico
        let servicio = 'Servicio Gas';
        for (const s of svcs) {
          const mapped = _mapearCategoriaNotion(s);
          if (mapped && mapped !== 'Servicio Gas' && mapped !== s) {
            servicio = mapped;
            break;
          }
        }
        if (servicio === 'Servicio Gas' && svcs.length > 0) {
          servicio = _mapearCategoriaNotion(svcs[0]) || svcs[0];
        }

        // Precio / ingreso principal
        // ★ Parsear formato Notion: "10,00 PEN" o "1.200,00 PEN" → número
        const precio = _parseMonto(iPrecio >= 0 ? r[iPrecio] : '');

        // Observaciones
        const obs = iObs >= 0 ? r[iObs]?.trim() : '';

        // Forma de pago
        const forma = iForma >= 0 ? r[iForma]?.trim() : '';

        // ── Crear tx de INGRESO ──
        if (precio > 0) {
          // Descripción limpia: servicio real, cliente separado, obs solo si aporta info nueva
          const descBase = servicio; // nombre del servicio (ya mapeado)
          const clienteLimpio = clienteFinal.split('@')[0].trim(); // quitar emails si vienen
          // Solo agregar obs si tiene contenido distinto al servicio y al cliente
          const obsFiltrado = obs && obs.toLowerCase() !== servicio.toLowerCase() && obs.toLowerCase() !== clienteLimpio.toLowerCase() ? obs : '';
          const descripcion = descBase + (clienteLimpio && clienteLimpio !== '(Sin cliente)' ? ' — ' + clienteLimpio : '') + (obsFiltrado ? ' · ' + obsFiltrado : '');

          nuevasTx.push({
            id: nId + '-ing',
            type: 'ingreso',
            amount: precio,
            category: servicio,
            catId: _getCatIdByName(servicio),
            description: descripcion,
            date: fecha,
            cliente: clienteLimpio,
            contacto: iContacto >= 0 ? r[iContacto]?.trim() : '',
            ubicacion: iDistrito >= 0 ? r[iDistrito]?.trim() : '',
            formaPago: forma,
            negocio: true,
            moneda: 'PEN',
            _importadoDeNotion: true,
            _notionRowId: rawNotionId
          });
          txImportadas++;
        }

        // ── Crear egreso de MOVILIDAD si tiene valor ──
        const movil = _parseMonto(iMovil >= 0 ? r[iMovil] : '');
        if (movil > 0) {
          nuevasTx.push({
            id: nId + '-mov',
            type: 'egreso',
            amount: movil,
            servicio1: servicio,
            servicio2: iSvc2 >= 0 ? r[iSvc2]?.trim() : '',
            servicio3: iSvc3 >= 0 ? r[iSvc3]?.trim() : '',
            servicio4: iSvc4 >= 0 ? r[iSvc4]?.trim() : '',

            category: 'Movilidad',
            catId: 'cne5',
            description: 'Movilidad — ' + (clienteFinal !== '(Sin cliente)' ? clienteFinal : fecha),
            date: fecha,
            negocio: true,
            moneda: 'PEN',
            _importadoDeNotion: true,
            _notionRowId: rawNotionId
          });
          egresosMov++;
        }

        // ── Crear egreso de MATERIALES si tiene valor ──
        const mat = _parseMonto(iMaterial >= 0 ? r[iMaterial] : '');
        if (mat > 0) {
          nuevasTx.push({
            id: nId + '-mat',
            type: 'egreso',
            amount: mat,
            servicio1: servicio,
            servicio2: iSvc2 >= 0 ? r[iSvc2]?.trim() : '',
            servicio3: iSvc3 >= 0 ? r[iSvc3]?.trim() : '',
            servicio4: iSvc4 >= 0 ? r[iSvc4]?.trim() : '',

            category: 'Materiales',
            catId: 'cne1',
            description: 'Materiales — ' + (clienteFinal !== '(Sin cliente)' ? clienteFinal : fecha),
            date: fecha,
            negocio: true,
            moneda: 'PEN',
            _importadoDeNotion: true,
            _notionRowId: rawNotionId
          });
          egresosMat++;
        }

        // ── Crear egreso de OTROS si tiene valor ──
        const otros = _parseMonto(iOtros >= 0 ? r[iOtros] : '');
        if (otros > 0) {
          nuevasTx.push({
            id: nId + '-otr',
            type: 'egreso',
            amount: otros,
            servicio1: servicio,
            servicio2: iSvc2 >= 0 ? r[iSvc2]?.trim() : '',
            servicio3: iSvc3 >= 0 ? r[iSvc3]?.trim() : '',
            servicio4: iSvc4 >= 0 ? r[iSvc4]?.trim() : '',

            category: 'Otro gasto negocio',
            catId: 'cne6',
            description: 'Otros gastos — ' + (clienteFinal !== '(Sin cliente)' ? clienteFinal : fecha),
            date: fecha,
            negocio: true,
            moneda: 'PEN',
            _importadoDeNotion: true,
            _notionRowId: rawNotionId
          });
        }
      }

      if (nuevasTx.length === 0) {
        if (status) status.textContent = '⚠ No se encontraron datos válidos. Revisa el CSV.';
        return;
      }

      // ── Importar: FUSIONAR O ESPEJO ──
      const existing = load('fnz_neg_tx', []);
      let merged = [];

      if (isFullSync) {
        // MODO ESPEJO: Preservar solo los registros manuales. TODO lo de Notion se borra y se reemplaza entero
        const manuales = existing.filter(t => !t._importadoDeNotion);
        // Validar duplicados dentro del lote de importación (por si acaso Notion manda el mismo ID dos veces)
        const idsExistentes = new Set(manuales.map(t => t.id)); // manuales
        const sinDuplicar = [];
        for (const t of nuevasTx) {
          if (idsExistentes.has(t.id)) continue; 
          idsExistentes.add(t.id);
          sinDuplicar.push(t);
        }
        merged = [...manuales, ...sinDuplicar];
      } else {
        // MODO INCREMENTAL: Preservar todos, solo agregar/actualizar los que entran
        // (Sobrescribe si hay IDs idénticos, por si cambió el monto, sino agrega)
        const map = new Map(existing.map(t => [t.id, t]));
        for (const t of nuevasTx) {
          map.set(t.id, t);
        }
        merged = Array.from(map.values());
      }

      save('fnz_neg_tx', merged);
      if (state.modo === 'negocio') state.transactions = merged;

      // Sincronizar cada tx a Sheets si hay URL
      const url = localStorage.getItem('fnz_sheets_url') || '';
      if (url) {
        nuevasTx.forEach((tx, idx) => {
          setTimeout(() => syncToSheets(tx), idx * 150);
        });
      }

      saveAll(); render();
      const msg = `✓ Importado: ${txImportadas} ingresos · ${egresosMov} movilidad · ${egresosMat} materiales`;
      if (status) status.textContent = msg;
      toast(msg);
      return { ok: true, txImportadas, egresosMov, egresosMat };

  } catch(err) {
    console.error('Error procesando CSV Notion:', err);
    if (status) status.textContent = '⚠ Error al procesar el CSV: ' + err.message;
    return { ok: false, error: err.message };
  }
}

// ── Importación manual (input file) — usa el mismo núcleo ──────────
function importarNotion(input) {
  const file = input.files ? input.files[0] : null;
  if (!file) return;
  const statusEl = document.getElementById('notion-import-status');
  if (statusEl) statusEl.textContent = '⏳ Leyendo archivo...';
  const reader = new FileReader();
  reader.onload = function(e) {
    _procesarCsvNotionTexto(e.target.result, 'notion-import-status');
    // Limpiar el input solo si es un elemento real del DOM
    try { if (input.value !== undefined) input.value = ''; } catch(_) {}
  };
  reader.readAsText(file, 'UTF-8');
}

// ★ Mapear texto de Notion (truncado o completo) → categoría real de la app
function _mapearCategoriaNotion(texto) {
  if (!texto) return 'Servicio Gas';
  const t = texto.toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  // ★ Valores exactos del CSV de Notion (mayúsculas normalizadas)
  if (t === 'punto adicional')  return 'Punto Adicional';
  if (t === 'conexion')         return 'Conexión Artefacto';
  if (t === 'conversion')       return 'Conversión Artefacto';
  if (t === 'modificacion')     return 'Modificación Red';
  if (t === 'reparacion')       return 'Reparación Tubería';
  if (t === 'instalacion nueva')return 'Instalación Nueva';
  if (t === 'instalacion')      return 'Instalación Nueva';
  if (t === 'gasfiteria')       return 'Gasfitería';
  if (t === 'documentacion')    return 'Documentación';
  if (t === 'terma')            return 'Terma';
  if (t === 'cocina')           return 'Cocina / Cocinilla';
  if (t === 'horno')            return 'Horno a Gas';
  if (t === 'parrilla')         return 'Parrilla a Gas';
  if (t === 'secadora')         return 'Secadora a Gas';
  if (t === 'calefon')          return 'Calefón';
  if (t === 'rejilla')          return 'Otro Servicio';
  if (t === 'gestion')          return 'Documentación';
  // Búsqueda parcial como respaldo
  if (t.includes('punto adi'))  return 'Punto Adicional';
  if (t.includes('conexion'))   return 'Conexión Artefacto';
  if (t.includes('conversion')) return 'Conversión Artefacto';
  if (t.includes('modific'))    return 'Modificación Red';
  if (t.includes('reparac'))    return 'Reparación Tubería';
  if (t.includes('instalac'))   return 'Instalación Nueva';
  if (t.includes('gasfiter'))   return 'Gasfitería';
  if (t.includes('document'))   return 'Documentación';
  if (t.includes('terma') || t.includes('calefon')) return 'Terma';
  if (t.includes('cocina'))     return 'Cocina / Cocinilla';
  if (t.includes('horno'))      return 'Horno a Gas';
  if (t.includes('parrilla'))   return 'Parrilla a Gas';
  if (t.includes('secadora'))   return 'Secadora a Gas';
  return texto.trim(); // devolver original si no hay mapeo
}

// ★ Forzar sincronización a Sheets de todos los movimientos importados de Notion
function sincronizarNotionASheets() {
  const url = localStorage.getItem('fnz_sheets_url') || '';
  if (!url) return toast('Primero configura la URL de Sheets en Ajustes', 'error');

  const txNotion = (state.transactions || []).filter(t => t._importadoDeNotion);
  if (txNotion.length === 0) return toast('No hay movimientos importados de Notion para sincronizar', 'error');

  if (!confirm(`¿Sincronizar ${txNotion.length} movimientos de Notion a Sheets?\n\nSolo se envían los que NO están ya en Sheets (sin duplicaciones).`)) return;

  const status = document.getElementById('notion-sync-status');
  if (status) status.textContent = `⏳ Enviando ${txNotion.length} registros...`;

  let enviados = 0;
  txNotion.forEach((tx, idx) => {
    setTimeout(() => {
      const payload = { type: 'tx', modo: 'negocio', timestamp: 'tx_' + tx.id + '_' + Date.now(), tx };
      const fullUrl = url + '?data=' + encodeURIComponent(JSON.stringify(payload));
      fetch(fullUrl, { method: 'GET', mode: 'no-cors' })
        .then(() => {
          enviados++;
          if (status) status.textContent = `↑ Enviando... ${enviados}/${txNotion.length}`;
          if (enviados === txNotion.length) {
            if (status) status.textContent = `✓ ${enviados} registros enviados a Sheets`;
            toast(`✓ ${enviados} movimientos sincronizados a Sheets`);
          }
        })
        .catch(() => { enviados++; });
    }, idx * 200); // 200ms entre cada envío para no saturar
  });
}

// ★ Limpiar duplicados de movimientos importados de Notion
function limpiarDuplicadosNotion() {
  const txs = state.transactions || [];
  const vistas = new Set();
  const limpias = [];
  let borrados = 0;

  txs.forEach(t => {
    // Huella: fecha + tipo + monto + categoría normalizada + cliente
    const huella = [
      t.date || '',
      t.type || '',
      Math.round((t.amount||0) * 100),
      _mapearCategoriaNotion(t.category||'').toLowerCase().trim(),
      (t.cliente||'').toLowerCase().trim()
    ].join('|');

    if (vistas.has(huella)) {
      borrados++;
    } else {
      vistas.add(huella);
      limpias.push(t);
    }
  });

  if (borrados === 0) {
    toast('✓ No hay duplicados — todo limpio');
    return;
  }
  if (!confirm(`Se encontraron ${borrados} registros duplicados.\n¿Eliminarlos?`)) return;
  state.transactions = limpias;
  saveAll();
  render();
  toast(`✓ ${borrados} duplicados eliminados`);
}

function _getCatIdByName(nombre) {
  const n = (nombre||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if(n.includes('punto adicional')) return 'cn1';
  if(n.includes('modificacion')) return 'cn2';
  if(n.includes('instalacion')) return 'cn3';
  if(n.includes('conversion')) return 'cn4';
  if(n.includes('conexion')) return 'cn5';
  if(n.includes('reparacion')||n.includes('tuberia')) return 'cn6';
  if(n.includes('gasfiteria')) return 'cn7';
  if(n.includes('documentacion')) return 'cn8';
  if(n.includes('cocina')) return 'cn10';
  if(n.includes('horno')) return 'cn11';
  if(n.includes('terma')) return 'cn12';
  if(n.includes('secadora')) return 'cn13';
  if(n.includes('calefon')) return 'cn14';
  if(n.includes('parrilla')) return 'cn15';
  if(n.includes('movilidad')||n.includes('viatico')) return 'cne5';
  if(n.includes('material')) return 'cne1';
  if(n.includes('herramienta')) return 'cne4';
  if(n.includes('gnv')||n.includes('gasolina')) return 'cne2';
  return 'cn9';
}

// ★ Parsear montos de Notion: "10,00 PEN", "1.200,00 PEN", "1200.00" → número
function _parseMonto(val) {
  if (!val) return 0;
  let s = val.toString().replace(/[^0-9.,]/g, '').trim();
  if (!s) return 0;
  // Detectar si la coma es separador decimal (ej: "10,00") o de miles (ej: "1,200")
  const comaIdx = s.lastIndexOf(',');
  const puntoIdx = s.lastIndexOf('.');
  if (comaIdx > puntoIdx) {
    // Coma es decimal: "1.200,00" o "10,00"
    s = s.replace(/\./g, '').replace(',', '.');
  } else if (puntoIdx > comaIdx) {
    // Punto es decimal: "1,200.00" o "10.00"
    s = s.replace(/,/g, '');
  }
  return parseFloat(s) || 0;
}

function _parseCsv(text) {
  const rows = [];
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (c === ',' && !inQ) {
        cols.push(cur); cur = '';
      } else {
        cur += c;
      }
    }
    cols.push(cur);
    rows.push(cols);
  }
  return rows;
}

// Parsear fechas de Notion: "16/03/2026", "2026-03-16", "March 16, 2026"
function _parseFechaNotion(str) {
  if (!str) return null;
  str = str.trim();
  // DD/MM/YYYY
  let m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) return m[3] + '-' + m[2].padStart(2,'0') + '-' + m[1].padStart(2,'0');
  // YYYY-MM-DD
  m = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return m[0];
  // MM/DD/YYYY
  m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) return m[3] + '-' + m[1].padStart(2,'0') + '-' + m[2].padStart(2,'0');
  return null;
}


function buildCharts(){
  const bl=[],bi=[],be=[];
  for(let i=5;i>=0;i--){
    const d=new Date(state.filterYear,state.filterMonth-i,1);
    const m=d.getMonth(),y=d.getFullYear();
    bl.push(MONTHS_SHORT[m]);
    bi.push(state.transactions.filter(t=>{const td=new Date(t.date+'T00:00:00');return td.getMonth()===m&&td.getFullYear()===y&&t.type==='ingreso';}).reduce((s,t)=>s+t.amount,0));
    be.push(state.transactions.filter(t=>{const td=new Date(t.date+'T00:00:00');return td.getMonth()===m&&td.getFullYear()===y&&t.type==='egreso';}).reduce((s,t)=>s+t.amount,0));

async function saveTx(editId){
  const amount=parseFloat(document.getElementById('tx-amount').value);
  const date=document.getElementById('tx-date').value;
  if(!amount||!date)return toast('Completa monto y fecha','error');
  const clienteEl=document.getElementById('tx-cliente');
  const ubicEl=document.getElementById('tx-ubicacion');
  const catId = document.getElementById('tx-cat').value;

  // Buscar la categoría en TODAS las listas disponibles
  const allCatsTx = [
    ...state.catsIn, ...state.catsEx,
    ...DEFAULT_CATS_NEG_IN, ...DEFAULT_CATS_NEG_EX,
    ...DEFAULT_CATS_IN, ...DEFAULT_CATS_EX
  ];
  const catObj = allCatsTx.find(c => c.id === catId);
  const catName = catObj ? catObj.name : (window._txType==='ingreso' ? 'Otro ingreso' : 'Otro gasto');

  // Preservar campos del registro original si es edición
  const original = editId ? state.transactions.find(t => t.id === editId) : null;

  const item = {
    ...(original || {}),               // preservar campos como _importadoDeNotion, etc.
    id: editId || (Date.now() + ''),   // mantener ID original en edición
    type: window._txType,
    amount,
    category: catName,
    catId,
    date,
    description: document.getElementById('tx-desc').value.trim() || catName,
    cliente: clienteEl ? clienteEl.value.trim() : (original?.cliente || ''),
    ubicacion: ubicEl ? ubicEl.value.trim() : (original?.ubicacion || ''),
    negocio: state.modo === 'negocio',
    moneda: window._txMoneda || original?.moneda || 'PEN',
  };

  // ✅ Bidireccional: Sync a Notion si fue importado de Notion
  if (original && original._importadoDeNotion && original._notionRowId) {
    toast('⏳ Guardando edición oficial en Notion...', 'info');
    try {
      // Remover sufijos -ing, -mov, -mat para obtener el pageId puro
      let pureId = original._notionRowId;
      if (pureId.includes('-')) pureId = pureId.split('-')[0];
      await _updateNotionPage(pureId, item);
      toast('✓ Cambio registrado en Notion', 'success');
    } catch (err) {
      console.error('Error Notion PATCH', err);
      // Fallback local y advertencia
      toast('⚠ Error en Notion (¿sin internet?). El cambio se guardó solo de forma local.', 'error');
    }
  }

  if(editId) {
    state.transactions = state.transactions.map(t => t.id === editId ? item : t);
  } else {
    state.transactions.unshift(item);
  }
  saveAll();
  syncToSheets(item);
  closeModal(); render();
  if(!original || (!original._importadoDeNotion)) toast(editId ? 'Movimiento actualizado ✓' : 'Movimiento guardado ✓');
}

function deleteTx(id){
  if(!confirm('¿Eliminar este movimiento?'))return;
  const tx=state.transactions.find(t=>t.id===id);
  state.transactions=state.transactions.filter(t=>t.id!==id);
  saveAll();
  if(tx&&tx.negocio) syncSeccionToSheets('tx_delete',{id});
  // Archivar en Notion si tiene ID de Notion
  if(tx&&tx._notionRowId){
    let pId = tx._notionRowId;
    // Quitar sufijos -ing, -mov, -mat, -otr para obtener el pageId puro
    if(pId.includes('-')) pId = pId.split('-').slice(0,-1).join('-');
    _deleteNotionPage(pId).then(()=>toast('Eliminado · Archivado en Notion ✓')).catch(()=>toast('Eliminado'));
  } else { toast('Eliminado'); }
  render();
}

function renderNotas(){
  if(!state.notas) state.notas = [];
  const filter = window._notaFilter || 'todas';
  const q = (window._nhSearch||'').toLowerCase().trim();

  // Sort: pinned first → favoritas → fecha desc
  let todas = [...state.notas].sort((a,b)=>{
    if(a.pinned && !b.pinned) return -1;
    if(!a.pinned && b.pinned) return 1;
    if(a.favorita && !b.favorita) return -1;
    if(!a.favorita && b.favorita) return 1;
    return (b.modificado||b.creado||'').localeCompare(a.modificado||a.creado||'');
  });

  // Filtro por tipo
  let notas = filter==='todas' ? todas : todas.filter(n=>{
    if(filter==='texto') return !n.tipo||n.tipo==='texto';
    return n.tipo===filter;
  });

  // Búsqueda
  if(q) notas=notas.filter(n=>{
    const txt=((n.titulo||'')+(n.texto||'')+(n.tags||[]).join(' ')).toLowerCase();
    return txt.includes(q);
  });

  const counts={
    todas: todas.length,
    texto: todas.filter(n=>!n.tipo||n.tipo==='texto').length,
    lista: todas.filter(n=>n.tipo==='lista').length,
    audio: todas.filter(n=>n.tipo==='audio').length,
    plano: todas.filter(n=>n.tipo==='plano').length,
    tabla: todas.filter(n=>n.tipo==='tabla').length,
  };

  const filterPills=[
    {k:'todas',lbl:'Todas'},
    {k:'texto',lbl:'📝 Texto'},
    {k:'lista',lbl:'📋 Listas'},
    {k:'audio',lbl:'🎙 Audio'},
    {k:'plano',lbl:'📐 Planos'},
    {k:'tabla',lbl:'📊 Tablas'},

function renderNotaCard3(n){
  try {
    if(!n || !n.id) return '';
    const nc=(NOTA_COLORES&&NOTA_COLORES[n.colorHoja])||NOTA_COLORES.amarillo;
    const fecha=n.modificado||n.creado ? new Date(n.modificado||n.creado).toLocaleDateString('es-PE',{day:'numeric',month:'short'}) : '';

    const tipoConf={
      texto: {ic:'📝',lbl:'Texto',bg:'#EAF3DE',col:'#27500A'},
      lista: {ic:'📋',lbl:'Lista',bg:'#E6F1FB',col:'#0C447C'},
      audio: {ic:'🎙',lbl:'Audio',bg:'#FCEBEB',col:'#791F1F'},
      plano: {ic:'📐',lbl:'Plano',bg:'#FAEEDA',col:'#633806'},
      tabla: {ic:'📊',lbl:'Tabla',bg:'#E1F5EE',col:'#085041'},
    };
    const tc=tipoConf[n.tipo]||tipoConf.texto;

    let previewHtml='';
    if(n.tipo==='lista'&&n.items&&n.items.length){
      const done=n.items.filter(i=>i.done).length;
      const pct=Math.round(done/n.items.length*100);
      const items=n.items.slice(0,3).map(i=>`<span style="display:block;font-size:12px;line-height:1.6;${i.done?'opacity:.45;text-decoration:line-through':''}">${i.done?'☑':'○'} ${(i.texto||'').substring(0,40)}</span>`).join('');
      previewHtml=`${items}
        <div class="nc3-progress">
          <div class="nc3-prog-bar"><div class="nc3-prog-fill" style="width:${pct}%;background:${nc.border}"></div></div>
          <span style="font-size:10px;font-weight:700;color:var(--muted)">${done}/${n.items.length}</span>
        </div>`;
    } else if(n.tipo==='audio'){
      previewHtml=`<div style="font-size:11px;color:var(--muted)">🎙 Grabación de audio</div>`;
    } else if(n.texto){
      previewHtml=`<div class="nc3-preview">${(n.texto||'').replace(/<[^>]+>/g,'').substring(0,80)}...</div>`;
    }

    return `
      <div class="nc3" onclick="abrirEditorNota('${n.id}')">
        <div class="nc3-body">
          <div class="nc3-icon-box" style="background:${nc.bg}">${tc.ic}</div>
          <div class="nc3-main">
            <div class="nc3-top">
              <div class="nc3-title">${n.titulo||'Sin título'}</div>
              <span class="nc3-badge" style="background:${tc.bg};color:${tc.col}">${tc.lbl}</span>
            </div>
            <div class="nc3-meta">${fecha}</div>
            ${previewHtml}
          </div>
        </div>
      </div>`;
  } catch(e) { return ''; }
}

function renderNotaCard(n){ return renderNotaCard3(n); }

function nhGeminiResumen(){
  const key=localStorage.getItem('fnz_gemini_key');
  if(!key){toast('Configurá Gemini en Ajustes','error');return;}
  if(!state.notas||!state.notas.length){toast('No hay notas para resumir','error');return;}
  const el=document.getElementById('nh-ai-text');
  if(el)el.textContent='✨ Generando resumen...';
  const resumen=state.notas.slice(0,15).map(n=>`- ${n.titulo||'Sin título'} (${n.tipo||'texto'}): ${(n.texto||'').replace(/<[^>]+>/g,'').trim().substring(0,60)}`).join('\n');
  fetch(GEMINI_URL(key),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{role:'user',parts:[{text:`Sos un asistente personal en español de Perú. Resumí en 2-3 oraciones el estado del cuaderno de notas del usuario, destacando lo más importante:\n${resumen}`}]}],generationConfig:{temperature:0.3,maxOutputTokens:200}})})
  .then(r=>r.json()).then(d=>{
    const txt=d?.candidates?.[0]?.content?.parts?.[0]?.text||'No se pudo generar el resumen.';
    window._nhAiSummary=txt;
    const el2=document.getElementById('nh-ai-text');
    if(el2)el2.textContent=txt;
  }).catch(()=>{const el2=document.getElementById('nh-ai-text');if(el2)el2.textContent='Error al conectar con Gemini.';});
}

function abrirGrabarAudio(){

function toggleAudioRec(){
  if(_audRecording) pararAudioRec();
  else iniciarAudioRec();
}

function iniciarAudioRec(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    document.getElementById('aud-status').textContent = '⚠ Necesitás Chrome para grabar voz.';
    return;
  }

  _audRecording = true;
  _audSecs = 0;

  const btn = document.getElementById('aud-mic-btn');
  if(btn){ btn.classList.add('rec'); btn.textContent='⏹'; }

  document.getElementById('aud-status').textContent = '🔴 Grabando... habla ahora';
  document.querySelectorAll('#aud-wave .aud-bar').forEach(b=>b.classList.add('active'));

  // Timer
  _audTimer = setInterval(()=>{
    _audSecs++;
    const m = String(Math.floor(_audSecs/60)).padStart(2,'0');
    const s = String(_audSecs%60).padStart(2,'0');
    const el = document.getElementById('aud-timer');
    if(el) el.textContent = m+':'+s;
  }, 1000);

  // Speech recognition — continuous
  _audRec = new SR();
  _audRec.lang = 'es-PE';
  _audRec.continuous = true;
  _audRec.interimResults = true;
  _audRec.maxAlternatives = 1;

  _audRec.onresult = (e)=>{
    let newFinal='', interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) newFinal += e.results[i][0].transcript+' ';
      else interim += e.results[i][0].transcript;
    }
    if(newFinal) _audTranscript += newFinal;
    const display = (_audTranscript + interim).trim();
    const el = document.getElementById('aud-transcript');
    if(el && display){
      el.innerHTML = `<span>${display}</span><span style="color:var(--muted);font-style:italic"> ${interim?'...':''}</span>`;
      el.scrollTop = el.scrollHeight;
    }
    if(_audTranscript.trim()){
      const sb = document.getElementById('aud-save-btn');
      if(sb) sb.style.display='block';
    }
  };

  _audRec.onerror = (e)=>{
    if(e.error==='no-speech'||e.error==='aborted') return;
    document.getElementById('aud-status').textContent = '⚠ '+e.error;
  };

  _audRec.onend = ()=>{
    if(_audRecording){ try{ _audRec.start(); }catch(er){} }
  };

  try{ _audRec.start(); }catch(e){}
}

function pararAudioRec(){
  _audRecording = false;
  clearInterval(_audTimer);
  if(_audRec){ try{ _audRec.stop(); }catch(e){} _audRec = null; }
  const btn = document.getElementById('aud-mic-btn');
  if(btn){ btn.classList.remove('rec'); btn.textContent='🎙'; }
  document.querySelectorAll('#aud-wave .aud-bar').forEach(b=>b.classList.remove('active'));
  const hasTxt = _audTranscript.trim().length > 0;
  document.getElementById('aud-status').textContent = hasTxt ? '✓ Listo — guardá o seguí grabando' : 'Toca el micrófono para empezar';
  if(hasTxt){
    const sb = document.getElementById('aud-save-btn');
    if(sb) sb.style.display='block';
  }
}

function cerrarGrabarAudio(){
  pararAudioRec();
  document.getElementById('audioRecModal')?.remove();
}

let _audSaving=false;
function guardarNotaAudio(){
  if(_audSaving) return;
  _audSaving=true; setTimeout(()=>{_audSaving=false;},3000);
  const txt = _audTranscript.trim();
  if(!txt){ _audSaving=false; toast('No hay texto grabado','error'); return; }

  // Formatear transcript en párrafos limpia
  const parrafos = txt.split(/(?<=[.!?])\s+/).filter(s=>s.trim().length>2)
    .map(s=>s.trim().charAt(0).toUpperCase()+s.trim().slice(1));
  const htmlTexto = '<p>' + parrafos.join('</p><p>') + '</p>';

  const nota = {
    id: Date.now()+'',
    tipo: 'audio',
    titulo: '🎙 Nota de voz · '+new Date().toLocaleDateString('es-PE',{day:'2-digit',month:'short'})+' '+new Date().toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'}),
    texto: htmlTexto,
    colorHoja: 'celeste',
    fotos: [],
    creado: new Date().toISOString(),
    duracion: _audSecs,
  };

  if(!state.notas) state.notas = [];
  state.notas.unshift(nota);
  save('fnz_notas', state.notas);
  cerrarGrabarAudio();

  // Limpiar con Gemini si hay clave
  const geminiKey = localStorage.getItem('fnz_gemini_key');
  if(geminiKey) _mejorarTranscriptoIA(nota.id, txt, geminiKey);

  toast('🎙 Nota de voz guardada ✓');
  render();
}

async function _mejorarTranscriptoIA(notaId, rawText, key){
  const prompt = `Limpia y estructura este texto dictado por voz en español peruano.
Corrije puntuación, mayúsculas y pequeños errores de dictado.
Devuelve el resultado como HTML usando solo <p> y <strong> si es necesario resaltar algo importante.
Texto original: "${rawText}"
Responde SOLO con el HTML limpio, sin explicaciones ni markdown.`;
  try{
    const res = await fetch(GEMINI_URL(key),{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{role:'user',parts:[{text:prompt}]}],generationConfig:{temperature:0.2,maxOutputTokens:500}})
    });
    const data = await res.json();
    const html = (data?.candidates?.[0]?.content?.parts?.[0]?.text||'').replace(/```html|```/g,'').trim();

      const n = state.notas.find(x=>x.id===notaId);
      if(n){ n.texto=html; save('fnz_notas',state.notas); }
      toast('✨ Transcripción mejorada por IA');
    }
  }catch(e){}
}

async function compartirNota(notaId){
  const n = (state.notas||[]).find(x=>x.id===notaId);
  if(!n) return;

  const titulo = n.titulo || 'Nota';
  let cuerpo = '';

  if(n.tipo==='lista' && n.items?.length){
    cuerpo = n.items.map(i=>`${i.done?'✅':'○'} ${i.texto}`).join('\n');
  } else {
    cuerpo = (n.texto||'').replace(/<br\s*\/?>/gi,'\n').replace(/<p[^>]*>/gi,'').replace(/<\/p>/gi,'\n').replace(/<[^>]+>/g,'').trim();
  }

  const texto = `📝 *${titulo}*\n\n${cuerpo}\n\n_Mis Finanzas App_`;

  // Intentar Web Share API nativa
  if(navigator.share){
    try{
      await navigator.share({ title: titulo, text: texto });
      return;
    } catch(e){ /* user cancelled or not supported */ }
  }

  // Fallback: modal con opciones
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-title" style="color:var(--gold)">📤 Compartir nota</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:16px">"${titulo}"</div>

      <button onclick="closeModal();compartirNotaWhatsApp('${notaId}')"
        style="background:#F0FDF4;border:1px solid #25D36633;border-radius:8px;padding:13px;text-align:left;font-size:14px;cursor:pointer;font-family:'Inter', system-ui, sans-serif;color:#15803D;display:flex;align-items:center;gap:12px;font-weight:600">

      </button>
      <button onclick="closeModal();_copiarNotaPortapapeles('${notaId}')"
        style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:13px;text-align:left;font-size:14px;cursor:pointer;font-family:'Inter', system-ui, sans-serif;color:var(--text);display:flex;align-items:center;gap:12px">
        📋 <span>Copiar al portapapeles</span>
      </button>
    </div>
    <div class="btn-row" style="margin-top:12px">
      <button class="btn-ghost" onclick="closeModal()">Cerrar</button>
    </div>`;
  showModal();
}

function toggleNotaVoz(){
